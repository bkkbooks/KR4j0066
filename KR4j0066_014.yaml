body:
  text: 花菴詞選續集巻四宋黄昇撰宋詞呉子和名禮之號順受老人錢塘人有詞五巻鄭國輔序之喜遷鶯閏元宵銀蟾光彩喜稔嵗閏正元宵還再樂事難并佳時罕遇依舊試燈何礙花市又移星漢蓮炬重芳人海盡勾引徧嬉遊寶馬香車喧隘晴快天意敎人月更圓償足風流債媚栁煙濃夭桃紅小景物逈然堪愛巷陌笑聲不斷襟袖餘香仍在待歸也便相期明日踏青挑菜醜奴兒秋别金風顫葉那更餞别江樓聽凄切陽闗聲斷楚館雲收去也難畱萬重煙水一扁舟錦屏羅幌多應換得蓼㟁蘋洲凝想恁時歡笑傷今萍梗悠悠謾回首妖饒何處眷戀無由先自悲秋眼前景物只供愁寂寥情緖也恨分淺也悔風流杏花天春思悶来凭得闌干暖自手引朱簾髙捲桃花半露胭脂面芳草如茵乍展煙光散湖光㶑灧映緑栁黃鸝巧囀遥山好似宫眉淺人比遥山更逺雨中花眷濃恩重長離永别慿誰為返香䰟憶湘裙霞袖杏臉櫻唇眉掃春山淡淡眼裁秋水盈盈便如何忘得温柔情態恬静天真凭欄念及夕陽西下暮烟四起江村漸入夜疎星映栁新月籠雲醖造一生清痩能消幾箇黄昏斷腸時候簾垂深院人掩重門瑞鶴仙秋思風傳秋信至顫葉葉庭梧飄零堦砌年蕐迅流水况榮枯翻手存亡彈指誰編故紙論古徃英雄鬭智在當時喚做功名到此盡成閒氣何謂生為行客死乃歸人世同驛邸十歩九計空撈攘謾兒戲忍都將有限光陰縈絆趂逐無窮天地我直須跳出樊籠做箇俏底詞鄙意髙驀山溪感舊劉郎老矣倦入繁華地觸目愈傷情念陳迹人非物是共誰携手落日歩江村臨逺水對遥山閒看烟雲起買牛賣劒便作兒孫計朋舊自榮華也怜我無名無利簞瓢鍾鼎等是百年身空妄作枉迂囘貪愛從今止風入松江景蘋汀蓼㟁荻花洲占斷清秋五湖景物供心眼幾曾有一㸃閒愁夢裏翩翩胡蝶覺来葉葉漁舟謝郎随分總優㳺信任沉浮恬然雲水無貪吝笑腰纒騎鶴揚州只恐丹青妙筆寫傳難盡風流漁家傲閨思紅日三竿鶯百囀夢囘鴛枕離䰟亂料得玉人腸已斷眉峰歛曉粧鏡裏春愁滿綠瑣窗深難見面雲牋謾寫敎誰傳聞道笙歌歸小院梁塵顫多因唱我新詞勸蝶戀花春思睡思厭厭鶯喚起簾巻東風猶未忺梳洗眼細眉長雲擁髻笑垂羅袖熏沈水媚態盈盈閒舉止只有江梅清韻能相比詩酒琴棊歌舞地又還同醉春風裏又别恨急水浮萍風裏絮恰似人情恩愛無慿據去便不来来便去到頭畢竟成輕負簾捲春山朝又暮鶯燕空忙不念花無主心事萬千誰與訴斷雲零雨知何處又春思滿地落紅初過雨緑樹成陰紫燕風前舞烟草低迷縈小路晝長人静扄朱户沉水香銷新剪苧欹枕朦朧花底聞鶯語春夢又還随栁絮等閒飛過東墻去桃源憶故人春暮畫橋流水飛花舞樓外斜風細雨紅痩綠肥春莫腸斷桃源路懽随仙子乗鸞去鏤月裁雲何處唯有病和愁緒肯伴劉郎住謁金門春晚風乍扇簾外落紅千片飛盡落花春不管鬬忙鶯與燕徃事上心撩亂睡起日髙猶倦料得伊家情眷眷近来長夢見霜天曉角王生陶氏月夜共沈西湖賦此弔之連環易缺難解同心結癡騃佳人才子情緣重怕離别意切人路絕共沈烟水闊蕩漾香魂何處長橋月斷橋月又秋景西風又急細雨黄花溼樓枕一篙烟水蘭舟漾畫橋側念昔空涙滴故人何處覔魂斷菱歌凄怨疎簾巻暮山碧生查子浙江呉山與越山相對摩今古褭纜浙江亭囘首西興渡區區名利人無分香閨住匆遽促征鞍又入臨平路鄭中卿名域三山人號松窗慶元丙辰多随張貴謨使金有燕谷剽聞兩巻記金人事甚詳畫堂春春思東風吹雨破花慳客氊曉夢生寒有人斜倚小屏山蹙損眉彎合是一釵雙燕却成兩鏡孤鸞莫雲修竹涙畱殘翠袖凝斑桃源憶故人春愁東風料峭寒吹面低下綉簾休巻憔悴怕它春見一任鶯花怨新愁不受詩排遣塵滿玉毫金硯若問此愁深淺天闊浮雲逺念奴嬌戊午生日作嗟来咄去被天公把做小兒調戲蹀雪龍庭歸未久還促炎州行李不半年間北燕南越一萬三千里征衫着破着衫人可知矣休問海角天涯黄蕉丹荔自足供甘㫖泛緑依紅無箇事時舞斑衣而巳救蟻藤橋養魚盆沼是亦經綸耳伊周安在且須學老莱子昭君怨梅花道是花来春未道是雪来香異水外一枝斜野人家冷淡竹籬茅舍富貴玉堂瓊榭兩地不同栽一般開浣溪沙别恨酒薄愁濃醉不成夜長欹枕數殘更嫩寒時節過燒燈已自孤鸞羞對鏡未能雙鳳怕聞笙莫敎吹作别離聲謝勉仲名懋號靜寄居士有樂章二巻呉坦伯明爲序稱其片言隻字戞玉鏗金醖藉風流為世所貴云憶少年寒食池塘綠徧王孫芳草依依斜日遊絲捲晴晝繫東風無力蝶趂幽香蜂醸蜜秋千外卧紅堆碧心情費消遣更梨花寒食石州引别恨日脚斜明秋色半陰人意凄楚飛雲特地凝愁做弄晩来微雨誰家别院舞困幾葉霜紅西風送客聞砧杵鞭馬出都門正潮平洲渚無語匆匆短棹滿載離愁片帆髙舉京洛紅塵因念幾年羈旅淺顰輕笑當時别来誰畫雙眉嫵囘首一銷凝望歸鴻容與洞仙歌春雨愁邉雨細漠漠天如醉揺颺遊絲晩風外醸輕寒和暝色花栁難勝春自老誰管啼紅歛翠關情潛入夜斜溼簾櫳幾處挑燈耿無寐念陽臺當日事好伴雲来因箇甚不入㐮王夢裏便添起寒潮捲長江又恐是離人斷腸清涙杏花天春思海棠枝上東風軟蕩霽色煙光弄煖雙雙燕子歸来晩零落紅香過半琵琶涙揾青衫淺念事與危腸易斷餘酲未解扶頭懶屏裏瀟湘夢逺畫堂春秋思西風庭院雨垂垂黄花秋閏遲已凉天氣未寒時才褪單衣睡起枕痕猶在鬢鬆釵壓雲低玉奩重拂淡胭脂情入雙眉武陵春惜春門掩東風人去後愁損燕鶯心一朶梅花淡有春粉黛不忺勻我亦青樓成倦客風月强追尋莫把恩情做弄成容易學行雲霜天曉角桂花綠雲剪葉低護黄金屑占斷花中聲譽香與韻兩清潔勝絕君聽説是它来處别試看仙衣猶帶金庭露玉階月風流子行樂少年多行樂方豪徤何處不嬉遊記情逐艷波暖香斜徑醉揺鞭影撲絮青樓難忘是笑歌偏婉娩鄕號得温柔嬌雨娛雲旋寛衣帶賸風殘月都在眉頭一成憔悴損人驚怪空自引鏡堪羞誰念短封難托征鴈虚浮念夜寒燈火懶尋前夢滿窗風雨供斷閒愁情到不堪言處却悔風流念奴嬌中秋呈徐叔至霽天湛碧正新凉風露氷壺清徹河漢無聲光練練湧出銀蟾孤絶岩桂香飄井梧影轉冷浸宫袍潔西廂徃事一簾輕夢悽切腸斷楚峽雲歸尊前無緒知有愁如髪此夕常娥應也恨冷落瓊樓金闕禁漏迢迢邉鴻杳杳幽意慿誰决闌干星斗落梅三弄初闋鵲橋仙七夕鈎簾借月染雲為幌花面玉枝交映凉生河漢一天秋問此㑹今宵孰勝銅壺尚滴燭龍已駕淚浥西風不盡明朝烏鵲到人間試説向靑樓薄倖趙文鼎名善扛號解林居士詩詞甚富葢趙德荘之流也傳言玉女上元璧月珠星輝映小桃穠李化工容易與人間富貴東風巷陌春在煖紅温翠人来人去笑歌聲裏油壁青驄第一畨共燕喜舉頭天上有月如人意歌傳樂府猶是昇平風味明朝須判醉眠花底好事近春景風動一川花揺瀁影迷紅碧人立杏花陰下泛光風襲襲瓊枝璧月互相輝春容泫將夕羅葢暗承花霧漬鮫綃香溼重疊金春遊楚宫楊桺依依碧遥山翠隱横波溢絶艷照穠春春光欲醉人纖纖芳草嫩微歩輕羅襯花戴滿頭歸逰蜂花上飛又春思玉關芳草粘天碧春風萬里思行客驕馬向風嘶道歸猶未歸南雲新有鴈望眼愁邉斷膏沭為誰容倚樓煙雨中又春宵一川花月青春夜玉容依約花陰下月照曲䦨干紅綃浥露寒袖香温素手意鑠金巵酒香逺綉簾開畫樓吹落梅十拍子上已桺絮飛時緑暗荼䕷開後春酣花外青帘迷酒思陌上晴光收翠嵐佳辰三月三解佩人逢遊女踏靑草鬭宜男醉倚畫欄欄檻北夢遶清江江水南飛鸞與竝驂青玉案春莫一年陌上尋芳意想人在東風裏褪粉銷紅春有幾青翰飛去紫雲凝佇徃事如流水煙横極浦山無際暗解明璫問誰寄鄉在温柔何處是輪囷香霧靜深庭院簾影參差翠燭影揺紅盱江有懐桃李墻頭向人都似他年意舞絲千丈颺晴光駘蕩春無際花氣薰然自醉傍垂楊行行緩轡倦逰無奈囘首雲山歸期猶未玉鎖樓空鳥啼花外東風起少年恩怨付波流臨望朱䦨倚冉冉塵生客袂對尊前髙情暫寄洞天一笑仙馭乗空姑峰凝翠謁金門春情新雨霽開徧滿園桃李波暖池塘風細細一雙花鴨戲喚起春融睡美扶醉宿粧慵理移歩避人花影裏綉裙低窣地宴清都餞明逺兄縣丞榮滿赴調疎栁無情緒都不管渡頭行客欲去猶依頼得玉光萬頃為人畱住相從嵗月如騖歎囘首離歌又賦更舉目斜照沈沈西風剪剪秋墅君行定憶南池歌筵舞地花晨月午八磚歩日三雍奏樂送君雲路别情未抵遺愛試聼取湖山共語便可能無意同傾一尊露醑小重山别情汲水添缻恰換花蜂兒爭要採打窗紗青春誰與度年華絃索暗無緖幾曾拏春思正交加馬蹄聲錯認客還家花牋欲冩寄天涯羞人見羅袖急忙遮感皇恩乙未生朝作七十古来稀吾生已半莫把身心自縈絆據他緣分且恁随時消遣但知逢酒飮逢花看林泉有約風光無限日上花稍起来晩芒鞋竹杖信歩水村山館更尋三兩箇清閒伴賀新郎夏晝永重簾巻乍池塘一畨雨過芰荷初展竹引新梢半含粉綠蔭扶踈滿院過花絮蝶稀蜂懶窗戸沉沉人不到伴清幽時有流鶯囀凝思久意何限玉釵墜枕風鬟顫湛虛堂壺氷瑩徹簟波零亂自是仙姿清無暑月影空垂素扇破午睡香銷餘篆一枕湖山千里夢正白蘋煙棹歸来晩雲弄碧楚天逺喜遷鶯春宴韶蕐駘蕩看化工盡力安排春仗薄霧霏煙軟風輕日物態與人交暢鳥聲弄巧千調樓影垂空十丈亂花栁粲寳鈿纓絡綵絲帷帳佳賞輝艷冶笑語盈盈花面交相向歌運長繅酒凝深碧和氣盎然席上好春易苦風雨人意難逢舒放但拍掌醉陶然一笑忘形天壌趙德莊名彦端號介庵官龍圖瑞鶴仙記河梁折栁問畫堂樂事燕鴻難偶十年謾囘首但亭亭紫葢差差南斗傳聞小有種桃花親煩素手恠歸来道骨仙風縹緲逈然非舊清晝江南如畫紫菊冬前翠橙霜後扁舟渡口佳客至奉名酒喚靑鸞起舞雲窗月罅一曲山明水秀笑相看玉海别来淺如故否祝英臺近春恨獸金寒簾玉潤梅雪印苔絮春意如人易散苦難聚幾多絲竹深情池塘幽夢猶倚頼與春同住舊遊處誰喚别浦仙帆風前問征路烟雨連江吹恨正無數莫敎紫燕歸来彩雲開後空悵望主人歸去清平樂閨思桃根桃葉一樹芳相接春到江南三二月迷損東家胡蝶殷勤踏取春陽風前花正低昻與我同心支子報君百結丁香鵲橋仙紅白蓮藕花塘上無塵無暑灧灧一池秋净緑羅寳葢碧瓊竿翠浪裏重重月影一家姊妹兩般粧束濃淡施朱傅粉夜深風露逼人寒問誰在牙床酒醒謁金門春半春已半綉綠新紅如換燕子還来簾幙畔閒愁天不管翠被曲屏香滿花葉彩牋人逺鵲喜蛛絲都未判連環空約腕黄子厚名銖號榖城翁與朱文公為友喜作古詩樂章甚少其母孫夫人能文有詞見前唐宋集江神子晚泊分水秋風嫋嫋夕陽紅晚烟濃莫雲重萬叠青山山外呌孤鴻獨上髙樓三百尺慿玉楯睇層空人間日月去匆匆碧梧桐又西風北去南来銷盡幾英雄擲下玉尊天外去多少事不言中菩薩鬘夜宿崇安縣第三舖聞吹簫海山翠疊青螺淺暮雲散盡天容逺匹馬度江臯北風生怒號解鞍棲倦翮皓月空庭白何處小䦨干玉簫吹夜寒漁家傲朱晦翁示歐公鼓子詞戲作一首永日離憂千萬緒雪舟逺泛清漳浦珍重故人寒夜語揮玉麈沈沈畫閣凝香霧風砌落花畱不住紅蜂翠蝶閒飛舞明日桺陰江上路雲起處蒼山萬疊人歸去趙昌甫名蕃號章泉負天下重望屢召不起劉後村所謂一生官職監南岳四海詩名仰玉山者此也小重山寄劉叔通先生序云小重山一闋傳聞叔通吾兄間畱建城銜盃之際可令歌以酹我否何地無溪秪欠人有翁年八十住其濵直鈎元不事絲緡優游爾聊以遂吾身陶令賦歸辰未嘗輕出入犯風塵江州太守獨情親廬山醉誰主復誰賓菩薩鬘送㳺季仙歸東陽雞聲茅店炊殘月板橋人跡霜如雪此是古人詩身經老忘之君行當此境今我昏成醒乗月犯霜来詩真誤爾哉韓仲止名淲號澗泉南澗先生之子賀新郎梅梅巳依稀矣嵗華深翛然向晚杖藜獨倚山逺荒林黄葉墜落日孤城烟水意興寄如何則是底事疎枝横絶峭未吹香便與花相似不忍折為之喜寒鴉數㸃霜風裏正人家園收芋栗小槽初美欲飮可誰同一醉擬賦才成又止老態度渾侵髪齒摸索孤根春在否任紅紅白白皆桃李空爛漫豈能爾易彦祥名祓長沙人寧宗朝狀元驀山溪春情海棠枝上畱得嬌鶯語雙燕幾時来竝飛入東風院宇夢囘芳草緑遍舊池塘棃花雪桃花雨畢竟春誰主東郊拾翠襟袖霑飛絮寳馬趂彫輪亂紅中香塵滿路十千斗酒相與買春閒呉姬唱秦娥舞拚醉青樓莫喜遷鶯春感帝城春晝見杏臉桃腮胭脂微透一霎兒晴一霎兒雨正是催花時候淡烟細栁如画雅稱踏青携手怎知道那人人獨倚䦨干消痩别後音信斷應是涙珠滴徧香羅袖記得年時膽瓶兒畔曾把牡丹同嗅故鄉水遥山逺怎得新歡如舊强消遣把閒愁推入花前盃酒蔡行之名㓜學號溪園永嘉人壬辰南宫進士第一好事近送春日日惜春殘春去更無明日擬把醉同春住又醒来岑寂明年不怕不逢春嬌春怕無力待向燈前休睡與畱連今夕陳同甫名亮永康人光宗朝狀元水龍吟春恨閙花深處層樓畫簾半捲東風軟春歸翠陌平莎茸嫩垂楊金淺遲日催花淡雲閣雨輕寒輕煖恨芳菲世界㳺人未賞都付與鶯和燕寂寞慿髙念逺向南樓一聲歸鴈金釵鬬草青絲勒馬風流雲散羅綬分香翠綃封涙幾多幽怨正銷䰟又是疎烟淡月子規聲斷洞仙歌秋雨瑣窗秋暮夢髙唐人困獨立西風萬千恨又簷花落處滴碎空堦芙蓉院無限秋容老盡枯荷摧欲折多少離聲鎖斷天涯訴幽悶似蓬山去後方士来時揮粉淚㸃㸃梨花香潤斷送得人間夜霖鈴更葉落梧桐孤燈成暈虞美人春愁東風蕩颺輕雲縷時送瀟瀟雨水邉臺榭燕新歸一口香泥溼帶落花飛海棠糝徑鋪香綉依舊成春痩黄昏庭院桺啼鴉記得那人和月折梨花眼兒媚春愁試燈天氣又春来難説是情懐寂寥聊似揚州何遜不為江梅扶頭酒醒爐香灺心緒未全灰愁人㝡是黄昏前後烟雨樓臺思佳客春感花拂䦨干栁拂空花枝綽約桺鬟鬆蝶翻淡碧低邉影鶯囀濃香杪處風深院落小簾櫳尋芳猶憶舊相逢橋邉携手歸来路踏皺殘花幾片紅清平樂秋晚伯成兄徃龍興山中意其登山臨水不無閨房之思作此詞惱之銀屏綉閣不道鮫綃薄嘶騎匆匆塵漠漠還過夕陽村落亂山千叠無情今宵遮斷愁人兩處香消夢覺一般曉月秋聲滴滴金梅斷橋雪霽聞啼鳥對林花弄晴曉畫角吹香客愁醒見梢頭紅小團酥剪蠟知多少向風前壓春倒江嶂人烟畫圖中有短篷香繞李居厚名廷忠自號橘山長於四六有樂府一巻然多是獻壽之詞水龍吟壽寧國太守王大卿正月二日風流㝡數宣城竒山秀水神仙府琴髙臺畔花姑壇上鸞翔鳯舞春度玉墀月昇金掌榮分銅虎想少陵知有異人間出三百載畱佳句嵗嵗椒盤栢斚到明朝又還重舉陽和散作千巖瑞雪兩溪甘雨汲取恩波醸成禄酒慶公初度有東風傳報都人已爲築沙堤路沁園春劉總幹㑹飮同寮出示新詞席上用韻幕府增輝前度劉郎又還到来看芙蓉池畔神凝秋水綺羅叢裏驩動春雷彩筆新題金釵半醉當日英雄安在哉開筵處是真仙福地不著纎埃堪怜勌客情懐聼吹竹彈絲金奏諧有黄花揷鬢何妨欹㡌綠橙醒酒莫惜空罍坐上疎狂簾間姝麗應想横波一笑囘停杯久待嬌歌緩勸歸騎休催水調歌頭武昌南樓落成次王漕韻撫景幾今古遺恨此江山百年形勝但見幽草雜枯管多少名流登覽頼有神扶壊棟詩墨尚斑斑風月要磨洗顧我巳衰顔擎天手携玉斧到江干一新竒觀領客觴詠有餘閒烟草半川開霽城郭兩州相望都在畫屏間便擬騎黄鵠直上扣雲闗滿江紅上䕫帥樂祕閣生日玉帳西来道前是綉衣使者游覽處秋風鼓吹自天而下湘水得霜清可鑒巫風過雨森如畫有神仙佳致在胸襟真瀟洒荆州寳元無價䕫門政長多暇聼談兵樽俎百川傾瀉此日壽觴容我勸他年樞柄還公把趂桂花時節去朝天香随馬鷓鴣天九日南樓和范總幹韻檻外長江浪拍空蕭蕭紅蓼白蘋風三秋告稔三農慶九日追歡九客同烟渚北月巖東莫嫌光景大匆匆登龍戲馬英雄事都在髙樓一嘯中踏沙行趙寛夫十二月十二日生賦此為壽星野涵輝雲峰環翠南園迎臘開梅蘂瑤臺仙子笑相逢金釵行裏拚沉醉照乗驪珠出閑天驥相随壽母多年紀春風侍宴寳花樓五枝七葉都榮貴李知幾名石號方舟臨江仙夜景煙栁疎疎人悄悄畫樓風外吹笙倚闌聞喚小紅聲薰香臨欲睡玉漏已三更坐待不来来不去一方明月中庭粉墻東畔小橋横起来花影下扇子撲飛螢長相思春思花飛飛絮飛飛三月江南烟雨時樓臺春樹迷雙鶯兒雙燕兒橋北橋南相對啼行人猶未歸漁家傲贈鼎州官妓西去征鴻東去水幾重别恨千山裏夢繞綠窗書半紙何處是桃花溪畔人千里痩玉倚香愁黛翠勸人須要人先醉問道明朝行也未猶自記燈前背立偷垂涙出塞夜夢一女子引扇求書為書小闋花樹樹吹碎胭脂紅雨將謂郎来推綉戸暖風揺竹塢睡起䦨干凝佇漠漠紅樓飛絮剗踏襪兒垂手處隔溪鶯對語㳺子明名次公建安人號西池范石湖帥桂林日西池實參内幕有唱酬詩巻賀新郎月夜斗柄囘秋律素蟾飛氷霜萬里滿川金碧得月偏多何處是惟有橋南第一正野逈西風寒寂丹桂婆娑疎影在想微瑕未累千金璧河漢逺澹無迹知君有句酬佳夕儘髙歌胡床自倚露漙珠溢坐到參横星欲闇隱隱天低似笠但絡緯悲啼催織吟詠凄凉翻有恨諒知音人逺空追憶誰為置鄭莊驛又宫詞暖雲浮晴籞鎖垂楊籠池罩閣萬絲千縷池上曉光分宿霧日近羣芳易吐尋竝蒂䦨干凝佇不信釵頭飛鳯去但寳刀被妾畱還住天一笑萬花妬阿嬌正好金屋貯甚西風易得蕭疎扇鸞塵土一自昭陽扄玉户墻角土花無數况多病情傷幽素别殿時聞簫鼓奏望紅雲冉冉知何處天尺五去無路滿江紅丹青閣一舸歸来何太晩鬢絲如織謾歎息凄凉徃事盡成陳迹山迫暮烟浮紫翠溪揺寒浪翻金碧看長虹渴飲下青㝠危欄溼誰可住烟蘿側俗士駕當囘勒伴巖扄須是碧雲仙客風月已供無盡藏溪山更衍清凉國恨謫仙蘇二不曾来無人説危逢吉名稹自號㢲齋水龍吟慶齊年諸丈洛陽九老圖中當時司馬年猶小爭如今夕舉盃相勸十人齊壽已幸同庚何分雌甲本無多少但有頭可白無愁可解只如此都贏了慶禮十年還又更十年依前難老儘敎百嵗做人髙祖見孫白首却要從今探梅脚健看山眼好頼天公頓得東園長在陪歌陪酒漁家傲和晏虞卿詠侍兒彈箜篌老去諸餘情味淺詩詞不上閒釵釧寳幌有人紅兩靨簾間見紫雲元在梨花院十四條絃音調逺栁絲不隔芙蓉面秋入西窗風露晩歸去懶酒酣一任烏巾㟁沁園春壽許貮車籍甚聲名門䦨相種文章世科筭當年瑞世正當夏五仙家毓德全是春和底事屏星着之海嶠奈此騰驤驥足何君知否看飛来丹詔徑上鸞坡殷勤携酒相過要灧灧浮君金叵羅嘆同心相契古来難覓二年同處意總無它如此平分更敎添箇也自清風明月多拚沉醉任光浮綠鬢笑滿紅渦花菴詞選續集巻四
