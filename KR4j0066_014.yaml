body:
  text: 花菴詞選續集卷四宋黃升撰宋詞吳子和名禮之號順受老人錢塘人有詞五卷鄭國輔序之喜遷鶯閏元宵銀蟾光彩喜稔嵗閏正元宵還再樂事難并佳時罕遇依舊試燈何礙花市又移星漢蓮炬重芳人海盡勾引遍嬉遊寶馬香車喧隘晴快天意教人月更圓償足風流債媚栁煙濃夭桃紅小景物逈然堪愛巷陌笑聲不斷襟袖餘香仍在待歸也便相期明日踏青挑菜醜奴兒秋别金風顫葉那更餞别江樓聽凄切陽關聲斷楚館雲收去也難留萬重煙水一扁舟錦屏羅幌多應換得蓼岸蘋洲凝想恁時歡笑傷今萍梗悠悠謾回首妖饒何處眷戀無由先自悲秋眼前景物只供愁寂寥情緒也恨分淺也悔風流杏花天春思悶來憑得闌干暖自手引朱簾髙捲桃花半露胭脂面芳草如茵乍展煙光散湖光瀲灧映緑栁黃鸝巧囀遙山好似宫眉淺人比遙山更逺雨中花眷濃恩重長離永别慿誰為返香魂憶湘裙霞袖杏臉櫻唇眉掃春山淡淡眼裁秋水盈盈便如何忘得溫柔情態恬靜天真憑欄念及夕陽西下暮煙四起江村漸入夜疏星映栁新月籠雲醖造一生清瘦能消幾箇黃昏斷腸時候簾垂深院人掩重門瑞鶴仙秋思風傳秋信至顫葉葉庭梧飄零階砌年華迅流水况榮枯翻手存亡彈指誰編故紙論古往英雄鬭智在當時喚做功名到此盡成間氣何謂生為行客死乃歸人世同驛邸十步九計空撈攘謾兒戲忍都將有限光陰縈絆趂逐無窮天地我直須跳出樊籠做箇俏底詞鄙意髙驀山溪感舊劉郎老矣倦入繁華地觸目愈傷情念陳迹人非物是共誰携手落日步江村臨逺水對遙山間看煙雲起買牛賣劒便作兒孫計朋舊自榮華也憐我無名無利簞瓢鍾鼎等是百年身空妄作枉迂回貪愛從今止風入松江景蘋汀蓼岸荻花洲占斷清秋五湖景物供心眼幾曾有一點間愁夢裏翩翩胡蝶覺來葉葉漁舟謝郎隨分總優遊信任沉浮恬然雲水無貪吝笑腰纒騎鶴揚州只恐丹青妙筆寫傳難盡風流漁家傲閨思紅日三竿鶯百囀夢回鴛枕離魂亂料得玉人腸已斷眉峰斂曉粧鏡裏春愁滿緑瑣窗深難見面雲箋謾寫教誰傳聞道笙歌歸小院梁塵顫多因唱我新詞勸蝶戀花春思睡思厭厭鶯喚起簾卷東風猶未忺梳洗眼細眉長雲擁髻笑垂羅袖熏沈水媚態盈盈間舉止只有江梅清韻能相比詩酒琴棊歌舞地又還同醉春風裏又别恨急水浮萍風裏絮恰似人情恩愛無慿據去便不來來便去到頭畢竟成輕負簾捲春山朝又暮鶯燕空忙不念花無主心事萬千誰與訴斷雲零雨知何處又春思滿地落紅初過雨緑樹成陰紫燕風前舞煙草低迷縈小路晝長人靜扄朱户沉水香銷新剪苧欹枕朦朧花底聞鶯語春夢又還隨栁絮等間飛過東墻去桃源憶故人春暮畫橋流水飛花舞樓外斜風細雨紅瘦緑肥春莫腸斷桃源路歡隨仙子乘鸞去鏤月裁雲何處唯有病和愁緒肯伴劉郎住謁金門春晚風乍扇簾外落紅千片飛盡落花春不管鬬忙鶯與燕往事上心撩亂睡起日髙猶倦料得伊家情眷眷近來長夢見霜天曉角王生陶氏月夜共沈西湖賦此弔之連環易缺難解同心結癡騃佳人才子情緣重怕離别意切人路絶共沈煙水闊蕩漾香魂何處長橋月斷橋月又秋景西風又急細雨黃花溼樓枕一篙煙水蘭舟漾畫橋側念昔空淚滴故人何處覔魂斷菱歌凄怨疏簾卷暮山碧生查子浙江吳山與越山相對摩今古裊纜浙江亭回首西興渡區區名利人無分香閨住匆遽促征鞍又入臨平路鄭中卿名域三山人號松窗慶元丙辰多隨張貴謨使金有燕谷剽聞兩卷記金人事甚詳畫堂春春思東風吹雨破花慳客氊曉夢生寒有人斜倚小屏山蹙損眉彎合是一叉雙燕却成兩鏡孤鸞莫雲修竹淚留殘翠袖凝斑桃源憶故人春愁東風料峭寒吹面低下繡簾休卷憔悴怕它春見一任鶯花怨新愁不受詩排遣塵滿玉毫金硯若問此愁深淺天闊浮雲逺念奴嬌戊午生日作嗟來咄去被天公把做小兒調戲蹀雪龍庭歸未久還促炎州行李不半年間北燕南越一萬三千里征衫著破著衫人可知矣休問海角天涯黃蕉丹荔自足供甘旨泛緑依紅無箇事時舞斑衣而巳救蟻藤橋養魚盆沼是亦經綸耳伊周安在且須學老萊子昭君怨梅花道是花來春未道是雪來香異水外一枝斜野人家冷淡竹籬茅舍富貴玉堂瓊榭兩地不同栽一般開浣溪沙别恨酒薄愁濃醉不成夜長欹枕數殘更嫩寒時節過燒燈已自孤鸞羞對鏡未能雙鳳怕聞笙莫教吹作别離聲謝勉仲名懋號靜寄居士有樂章二卷吳坦伯明為序稱其片言隻字戞玉鏗金醖藉風流為世所貴云憶少年寒食池塘緑遍王孫芳草依依斜日遊絲捲晴晝繫東風無力蝶趂幽香蜂釀蜜秋千外卧紅堆碧心情費消遣更梨花寒食石州引别恨日腳斜明秋色半陰人意凄楚飛雲特地凝愁做弄晚來微雨誰家别院舞困幾葉霜紅西風送客聞砧杵鞭馬出都門正潮平洲渚無語匆匆短棹滿載離愁片帆髙舉京洛紅塵因念幾年羈旅淺顰輕笑當時别來誰畫雙眉嫵回首一銷凝望歸鴻容與洞仙歌春雨愁邉雨細漠漠天如醉搖揚遊絲晚風外釀輕寒和暝色花栁難勝春自老誰管啼紅斂翠關情潛入夜斜溼簾櫳幾處挑燈耿無寐念陽臺當日事好伴雲來因箇甚不入襄王夢裏便添起寒潮捲長江又恐是離人斷腸清淚杏花天春思海棠枝上東風軟蕩霽色煙光弄暖雙雙燕子歸來晚零落紅香過半琵琶淚揾青衫淺念事與危腸易斷餘酲未解扶頭懶屏裏瀟湘夢逺畫堂春秋思西風庭院雨垂垂黃花秋閏遲已涼天氣未寒時才褪單衣睡起枕痕猶在鬢鬆叉壓雲低玉奩重拂淡胭脂情入雙眉武陵春惜春門掩東風人去後愁損燕鶯心一朵梅花淡有春粉黛不忺勻我亦青樓成倦客風月強追尋莫把恩情做弄成容易學行雲霜天曉角桂花緑雲剪葉低護黃金屑占斷花中聲譽香與韻兩清潔勝絶君聽説是它來處别試看仙衣猶帶金庭露玉階月風流子行樂少年多行樂方豪健何處不嬉遊記情逐艷波暖香斜徑醉搖鞭影撲絮青樓難忘是笑歌偏婉娩鄉號得溫柔嬌雨娛雲旋寬衣帶賸風殘月都在眉頭一成憔悴損人驚怪空自引鏡堪羞誰念短封難托征鴈虛浮念夜寒燈火懶尋前夢滿窗風雨供斷間愁情到不堪言處却悔風流念奴嬌中秋呈徐叔至霽天湛碧正新涼風露氷壺清徹河漢無聲光練練湧出銀蟾孤絶岩桂香飄井梧影轉冷浸宫袍潔西廂往事一簾輕夢悽切腸斷楚峽雲歸尊前無緒知有愁如髮此夕常娥應也恨冷落瓊樓金闕禁漏迢迢邉鴻杳杳幽意慿誰決闌干星斗落梅三弄初闋鵲橋仙七夕鈎簾借月染雲為幌花面玉枝交映涼生河漢一天秋問此會今宵孰勝銅壺尚滴燭龍已駕淚浥西風不盡明朝烏鵲到人間試説向靑樓薄幸趙文鼎名善扛號解林居士詩詞甚富蓋趙德莊之流也傳言玉女上元璧月珠星輝映小桃穠李化工容易與人間富貴東風巷陌春在暖紅溫翠人來人去笑歌聲裏油壁青驄第一畨共燕喜舉頭天上有月如人意歌傳樂府猶是升平風味明朝須判醉眠花底好事近春景風動一川花搖漾影迷紅碧人立杏花陰下泛光風襲襲瓊枝璧月互相輝春容泫將夕羅蓋暗承花霧漬鮫綃香溼重疊金春遊楚宫楊柳依依碧遙山翠隱橫波溢絶艷照穠春春光欲醉人纖纖芳草嫩微步輕羅襯花戴滿頭歸逰蜂花上飛又春思玉關芳草粘天碧春風萬里思行客驕馬向風嘶道歸猶未歸南雲新有鴈望眼愁邉斷膏沭為誰容倚樓煙雨中又春宵一川花月青春夜玉容依約花陰下月照曲闌干紅綃浥露寒袖香溫素手意鑠金巵酒香逺繡簾開畫樓吹落梅十拍子上已柳絮飛時緑暗荼䕷開後春酣花外青簾迷酒思陌上晴光收翠嵐佳辰三月三解佩人逢遊女踏靑草鬭宜男醉倚畫欄欄檻北夢繞清江江水南飛鸞與並驂青玉案春莫一年陌上尋芳意想人在東風裏褪粉銷紅春有幾青翰飛去紫雲凝佇往事如流水煙橫極浦山無際暗解明璫問誰寄鄉在溫柔何處是輪囷香霧靜深庭院簾影參差翠燭影搖紅盱江有懷桃李墻頭向人都似他年意舞絲千丈揚晴光駘蕩春無際花氣薰然自醉傍垂楊行行緩轡倦逰無奈回首雲山歸期猶未玉鎖樓空鳥啼花外東風起少年恩怨付波流臨望朱闌倚冉冉塵生客袂對尊前髙情暫寄洞天一笑仙馭乘空姑峰凝翠謁金門春情新雨霽開遍滿園桃李波暖池塘風細細一雙花鴨戲喚起春融睡美扶醉宿粧慵理移步避人花影裏繡裙低窣地宴清都餞明逺兄縣丞榮滿赴調疏栁無情緒都不管渡頭行客欲去猶依賴得玉光萬頃為人留住相從嵗月如騖歎回首離歌又賦更舉目斜照沈沈西風剪剪秋墅君行定憶南池歌筵舞地花晨月午八磚步日三雍奏樂送君雲路别情未抵遺愛試聼取湖山共語便可能無意同傾一尊露醑小重山别情汲水添缶恰換花蜂兒爭要採打窗紗青春誰與度年華絃索暗無緒幾曾拏春思正交加馬蹄聲錯認客還家花箋欲寫寄天涯羞人見羅袖急忙遮感皇恩乙未生朝作七十古來稀吾生已半莫把身心自縈絆據他緣分且恁隨時消遣但知逢酒飮逢花看林泉有約風光無限日上花稍起來晚芒鞋竹杖信步水村山館更尋三兩箇清間伴賀新郎夏晝永重簾卷乍池塘一畨雨過芰荷初展竹引新梢半含粉緑蔭扶踈滿院過花絮蝶稀蜂懶窗戶沉沉人不到伴清幽時有流鶯囀凝思久意何限玉叉墜枕風鬟顫湛虛堂壺氷瑩徹簟波零亂自是仙姿清無暑月影空垂素扇破午睡香銷餘篆一枕湖山千里夢正白蘋煙棹歸來晚雲弄碧楚天逺喜遷鶯春宴韶華駘蕩看化工盡力安排春仗薄霧霏煙軟風輕日物態與人交暢鳥聲弄巧千調樓影垂空十丈亂花栁粲寶鈿纓絡綵絲帷帳佳賞輝艷冶笑語盈盈花面交相向歌運長繅酒凝深碧和氣盎然席上好春易苦風雨人意難逢舒放但拍掌醉陶然一笑忘形天壤趙德莊名彥端號介庵官龍圖瑞鶴仙記河梁折栁問畫堂樂事燕鴻難偶十年謾回首但亭亭紫蓋差差南斗傳聞小有種桃花親煩素手怪歸來道骨仙風縹眇逈然非舊清晝江南如畫紫菊冬前翠橙霜後扁舟渡口佳客至奉名酒喚靑鸞起舞雲窗月罅一曲山明水秀笑相看玉海别來淺如故否祝英臺近春恨獸金寒簾玉潤梅雪印苔絮春意如人易散苦難聚幾多絲竹深情池塘幽夢猶倚賴與春同住舊遊處誰喚别浦仙帆風前問征路煙雨連江吹恨正無數莫教紫燕歸來彩雲開後空悵望主人歸去清平樂閨思桃根桃葉一樹芳相接春到江南三二月迷損東家胡蝶殷勤踏取春陽風前花正低昻與我同心支子報君百結丁香鵲橋仙紅白蓮藕花塘上無塵無暑灧灧一池秋淨緑羅寶蓋碧瓊竿翠浪裏重重月影一家姊妹兩般粧束濃淡施朱傅粉夜深風露逼人寒問誰在牙床酒醒謁金門春半春已半繡緑新紅如換燕子還來簾幕畔間愁天不管翠被曲屏香滿花葉彩箋人逺鵲喜蛛絲都未判連環空約腕黃子厚名銖號榖城翁與朱文公為友喜作古詩樂章甚少其母孫夫人能文有詞見前唐宋集江神子晚泊分水秋風嫋嫋夕陽紅晚煙濃莫雲重萬疊青山山外呌孤鴻獨上髙樓三百尺慿玉楯睇層空人間日月去匆匆碧梧桐又西風北去南來銷盡幾英雄擲下玉尊天外去多少事不言中菩薩鬘夜宿崇安縣第三鋪聞吹簫海山翠疊青螺淺暮雲散盡天容逺匹馬度江臯北風生怒號解鞍棲倦翮皓月空庭白何處小闌干玉簫吹夜寒漁家傲朱晦翁示歐公鼓子詞戲作一首永日離憂千萬緒雪舟逺泛清漳浦珍重故人寒夜語揮玉麈沈沈畫閣凝香霧風砌落花留不住紅蜂翠蝶間飛舞明日柳陰江上路雲起處蒼山萬疊人歸去趙昌甫名蕃號章泉負天下重望屢召不起劉後村所謂一生官職監南嶽四海詩名仰玉山者此也小重山寄劉叔通先生序云小重山一闋傳聞叔通吾兄間留建城銜杯之際可令歌以酹我否何地無溪秪欠人有翁年八十住其濵直鈎元不事絲緡優遊爾聊以遂吾身陶令賦歸辰未嘗輕出入犯風塵江州太守獨情親廬山醉誰主復誰賓菩薩鬘送遊季仙歸東陽雞聲茅店炊殘月板橋人迹霜如雪此是古人詩身經老忘之君行當此境今我昏成醒乘月犯霜來詩真誤爾哉韓仲止名淲號澗泉南澗先生之子賀新郎梅梅巳依稀矣嵗華深翛然向晚杖藜獨倚山逺荒林黃葉墜落日孤城煙水意興寄如何則是底事疏枝橫絶峭未吹香便與花相似不忍折為之喜寒鴉數點霜風裏正人家園收芋栗小槽初美欲飮可誰同一醉擬賦才成又止老態度渾侵髮齒摸索孤根春在否任紅紅白白皆桃李空爛漫豈能爾易彥祥名祓長沙人寧宗朝狀元驀山溪春情海棠枝上留得嬌鶯語雙燕幾時來並飛入東風院宇夢回芳草緑遍舊池塘梨花雪桃花雨畢竟春誰主東郊拾翠襟袖霑飛絮寶馬趂雕輪亂紅中香塵滿路十千斗酒相與買春間吳姬唱秦娥舞拚醉青樓莫喜遷鶯春感帝城春晝見杏臉桃腮胭脂微透一霎兒晴一霎兒雨正是催花時候淡煙細栁如畫雅稱踏青携手怎知道那人人獨倚闌干消瘦别後音信斷應是淚珠滴遍香羅袖記得年時膽瓶兒畔曾把牡丹同嗅故鄉水遙山逺怎得新歡如舊強消遣把間愁推入花前杯酒蔡行之名幼學號溪園永嘉人壬辰南宫進士第一好事近送春日日惜春殘春去更無明日擬把醉同春住又醒來岑寂明年不怕不逢春嬌春怕無力待向燈前休睡與留連今夕陳同甫名亮永康人光宗朝狀元水龍吟春恨閙花深處層樓畫簾半捲東風軟春歸翠陌平莎茸嫩垂楊金淺遲日催花淡雲閣雨輕寒輕暖恨芳菲世界遊人未賞都付與鶯和燕寂寞慿髙念逺向南樓一聲歸鴈金叉鬬草青絲勒馬風流雲散羅綬分香翠綃封淚幾多幽怨正銷魂又是疏煙淡月子規聲斷洞仙歌秋雨瑣窗秋暮夢髙唐人困獨立西風萬千恨又簷花落處滴碎空階芙蓉院無限秋容老盡枯荷摧欲折多少離聲鎖斷天涯訴幽悶似蓬山去後方士來時揮粉淚點點梨花香潤斷送得人間夜霖鈴更葉落梧桐孤燈成暈虞美人春愁東風蕩揚輕雲縷時送瀟瀟雨水邉臺榭燕新歸一口香泥溼帶落花飛海棠糝徑鋪香繡依舊成春瘦黃昏庭院柳啼鴉記得那人和月折梨花眼兒媚春愁試燈天氣又春來難説是情懷寂寥聊似揚州何遜不為江梅扶頭酒醒爐香灺心緒未全灰愁人最是黃昏前後煙雨樓臺思佳客春感花拂闌干栁拂空花枝綽約柳鬟鬆蝶翻淡碧低邉影鶯囀濃香杪處風深院落小簾櫳尋芳猶憶舊相逢橋邉携手歸來路踏皺殘花幾片紅清平樂秋晚伯成兄往龍興山中意其登山臨水不無閨房之思作此詞惱之銀屏繡閣不道鮫綃薄嘶騎匆匆塵漠漠還過夕陽村落亂山千疊無情今宵遮斷愁人兩處香消夢覺一般曉月秋聲滴滴金梅斷橋雪霽聞啼鳥對林花弄晴曉畫角吹香客愁醒見梢頭紅小團酥剪蠟知多少向風前壓春倒江嶂人煙畫圖中有短篷香繞李居厚名廷忠自號橘山長於四六有樂府一卷然多是獻壽之詞水龍吟壽寧國太守王大卿正月二日風流最數宣城竒山秀水神仙府琴髙臺畔花姑壇上鸞翔鳯舞春度玉墀月升金掌榮分銅虎想少陵知有異人間出三百載留佳句嵗嵗椒盤柏斚到明朝又還重舉陽和散作千巖瑞雪兩溪甘雨汲取恩波釀成祿酒慶公初度有東風傳報都人已為築沙堤路沁園春劉總幹會飮同寮出示新詞席上用韻幕府增輝前度劉郎又還到來看芙蓉池畔神凝秋水綺羅叢裏歡動春雷彩筆新題金叉半醉當日英雄安在哉開筵處是真仙福地不著纎埃堪憐倦客情懷聼吹竹彈絲金奏諧有黃花插鬢何妨欹帽緑橙醒酒莫惜空罍坐上疏狂簾間姝麗應想橫波一笑回停杯久待嬌歌緩勸歸騎休催水調歌頭武昌南樓落成次王漕韻撫景幾今古遺恨此江山百年形勝但見幽草雜枯管多少名流登覽賴有神扶壞棟詩墨尚斑斑風月要磨洗顧我巳衰顔擎天手携玉斧到江干一新竒觀領客觴詠有餘間煙草半川開霽城郭兩州相望都在畫屏間便擬騎黃鵠直上扣雲關滿江紅上夔帥樂祕閣生日玉帳西來道前是繡衣使者遊覽處秋風鼓吹自天而下湘水得霜清可鑒巫風過雨森如畫有神仙佳致在胸襟真瀟灑荆州寶元無價夔門政長多暇聼談兵樽俎百川傾瀉此日壽觴容我勸他年樞柄還公把趂桂花時節去朝天香隨馬鷓鴣天九日南樓和范總幹韻檻外長江浪拍空蕭蕭紅蓼白蘋風三秋告稔三農慶九日追歡九客同煙渚北月巖東莫嫌光景大匆匆登龍戲馬英雄事都在髙樓一嘯中踏沙行趙寬夫十二月十二日生賦此為壽星野涵輝雲峰環翠南園迎臘開梅蘂瑤臺仙子笑相逢金叉行裏拚沉醉照乘驪珠出間天驥相隨壽母多年紀春風侍宴寶花樓五枝七葉都榮貴李知幾名石號方舟臨江仙夜景煙栁疏疏人悄悄畫樓風外吹笙倚闌聞喚小紅聲薰香臨欲睡玉漏已三更坐待不來來不去一方明月中庭粉墻東畔小橋橫起來花影下扇子撲飛螢長相思春思花飛飛絮飛飛三月江南煙雨時樓臺春樹迷雙鶯兒雙燕兒橋北橋南相對啼行人猶未歸漁家傲贈鼎州官妓西去征鴻東去水幾重别恨千山裏夢繞緑窗書半紙何處是桃花溪畔人千里瘦玉倚香愁黛翠勸人須要人先醉問道明朝行也未猶自記燈前背立偷垂淚出塞夜夢一女子引扇求書為書小闋花樹樹吹碎胭脂紅雨將謂郎來推繡戶暖風搖竹塢睡起闌干凝佇漠漠紅樓飛絮剗踏襪兒垂手處隔溪鶯對語遊子明名次公建安人號西池范石湖帥桂林日西池實參內幕有唱酬詩卷賀新郎月夜斗柄回秋律素蟾飛氷霜萬里滿川金碧得月偏多何處是惟有橋南第一正野逈西風寒寂丹桂婆娑疏影在想微瑕未纍千金璧河漢逺淡無迹知君有句酬佳夕儘髙歌胡床自倚露漙珠溢坐到參橫星欲暗隱隱天低似笠但絡緯悲啼催織吟詠凄涼翻有恨諒知音人逺空追憶誰為置鄭莊驛又宫詞暖雲浮晴籞鎖垂楊籠池罩閣萬絲千縷池上曉光分宿霧日近羣芳易吐尋並蒂闌干凝佇不信叉頭飛鳯去但寶刀被妾留還住天一笑萬花妬阿嬌正好金屋貯甚西風易得蕭疏扇鸞塵土一自昭陽扄玉户墻角土花無數况多病情傷幽素别殿時聞簫鼓奏望紅雲冉冉知何處天尺五去無路滿江紅丹青閣一舸歸來何太晚鬢絲如織謾歎息凄涼往事盡成陳迹山迫暮煙浮紫翠溪搖寒浪翻金碧看長虹渴飲下青冥危欄溼誰可住煙蘿側俗士駕當回勒伴巖扄須是碧雲仙客風月已供無盡藏溪山更衍清涼國恨謫仙蘇二不曾來無人説危逢吉名稹自號巽齋水龍吟慶齊年諸丈洛陽九老圖中當時司馬年猶小爭如今夕舉杯相勸十人齊壽已幸同庚何分雌甲本無多少但有頭可白無愁可解只如此都贏了慶禮十年還又更十年依前難老儘教百嵗做人髙祖見孫白首却要從今探梅腳健看山眼好賴天公頓得東園長在陪歌陪酒漁家傲和晏虞卿詠侍兒彈箜篌老去諸餘情味淺詩詞不上間叉釧寶幌有人紅兩靨簾間見紫雲元在梨花院十四條絃音調逺栁絲不隔芙蓉面秋入西窗風露晚歸去懶酒酣一任烏巾岸沁園春壽許貮車籍甚聲名門闌相種文章世科算當年瑞世正當夏五仙家育德全是春和底事屏星著之海嶠奈此騰驤驥足何君知否看飛來丹詔徑上鸞坡殷勤携酒相過要灧灧浮君金叵羅嘆同心相契古來難覓二年同處意總無它如此平分更教添箇也自清風明月多拚沉醉任光浮緑鬢笑滿紅渦花菴詞選續集卷四
