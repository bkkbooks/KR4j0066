body:
  text: 花菴詞選卷三宋黃升撰宋詞宋子京名祁乃張子野所稱紅杏枝頭春意閙尚書者也玉樓春春景東城漸覺風光好縠皺波紋迎客棹緑楊烟外曉寒輕紅杏枝頭春意閙浮生長恨歡娛少肯愛千金輕一笑為君持酒勸斜陽且向花間留晚照蝶戀花情景繡幕茫茫羅帳捲春睡騰騰困入嬌波慢隱隱枕㾗留玉臉膩雲斜溜叉頭燕逺夢無端歡又散泪落胭脂界破蜂黃淺整了翠鬟勻了面芳心一寸情何限鷓鴣天子京過繁臺街逢內家車子中有褰簾者曰小宋也子京歸遂作此詞都下傳唱達于禁中仁宗知之問內人第幾車子何人呼小宋有內人自陳頃侍御宴見宣翰林學士左右內臣曰小宋也時在車子中偶見之呼一聲爾上召子京從容語及子京皇懼無地上笑曰蓬山不逺因以內人賜之畫轂雕鞍狹路逢一聲腸斷繡簾中身無彩鳯雙飛翼心有靈犀一㸃通金作屋玉為籠車如流水馬游龍劉郎已恨蓬山逺更隔蓬山幾萬重好事近睡起玉屏風吹去亂紅猶落天氣驟生輕暖襯沈香帷箔珠簾約住海棠風愁拖兩眉角昨夜一庭明月冷秋千紅索顏持約名博文西江月詞簡意髙佳作也草草書傳錦字厭厭夢繞梅花海山無計駐仙槎腸斷芭蕉影下缺月舊時庭院飛雲到處人家而今憔悴鬢先華說著多情巳怕陳希元名堯佐為仁宗朝宰相號知餘子諡文惠公踏莎行皇祐中呂公夷簡乞致仕而仁宗因問卿去誰可代者夷簡乃薦堯佐上遂召還大拜申公生日公作此詞携酒過之申公使之歌申公笑曰只恐捲簾人巳老公曰莫愁調鼎事無功老於廊廟猶藴藉如此二社良辰千家庭院翩翩又覩雙飛燕鳯皇巢穩許為鄰瀟湘烟暝來何晚亂入紅樓低飛緑岸畫梁輕拂歌塵轉為誰歸去為誰來主人恩重珠簾捲范希文名仲淹諡文正公蘇幕遮别恨碧雲天紅葉地秋色連波波上寒烟翠山映斜陽天接水芳草無情更在斜陽外黯鄉魂追旅意夜夜除非好夢留人睡明月樓髙休獨倚酒入愁腸化作相思泪漁家傲秋思塞下秋來風景異衡陽鴈去無留意四面邊聲連角起千嶂裏長烟落日孤城閉濁酒一杯家萬里燕然未勒歸無計羌管悠悠霜滿地人不寐將軍白髮征夫淚蘇子美名舜欽娶杜祁公女坐監進奏院市故紙會客削籍為民自號滄浪翁善書草聖尤妙水調歌頭滄浪亭瀟灑太湖岸淡竚洞庭山魚龍隱處烟霧深鎖渺瀰間方念陶朱張翰忽有扁舟急槳撇浪載鱸還落日暴風雨歸路繞汀灣丈夫志當景盛耻疏閒壯年何事憔悴華髮改朱顏擬借寒潭垂釣又恐鷗鳥相猜不肯傍青綸刺棹穿蘆荻無語看波瀾王元之名禹稱翰林學士為太宗嘗稱其文章獨步當世㸃絳唇感興雨恨雲愁江南依舊稱佳麗水村漁市一縷孤烟細天際征鴻遙認行如綴平生事此時凝睇誰會憑欄意蘇叔黨名過坡仙季子㸃綘唇此詞作時方禁坡文故隱其名以傳于世今或以為汪彥章所作非也新月娟娟夜寒江靜山銜斗起來搔首梅影橫窗瘦好箇霜天閒却傳杯手君知否亂鴉啼後歸興濃如酒王君玉名琪仕仁宗朝翰林學士望江南江南栁烟穗拂人輕愁黛空長描不似舞腰雖瘦學難成天意與風情攀折處離恨幾時平巳縱柔條縈客棹更飛狂絮撲旗亭三月亂鶯聲又江南雨風送滿長川碧瓦烟昏沈栁岸紅綃香潤入梅天飄灑正瀟然朝與暮長在楚峯前寒夜愁欹金帶枕暮江深閉木蘭船烟浪逺相連又江南岸雲樹半晴陰帆去帆來天亦老潮生潮落日還沈南北别離心興廢事千古一沾襟山下孤烟漁市曉栁邊疏雨酒家深行客莫登臨張文潛名耒元祐中為館職與魯直少游無咎號四學士竝從東坡游風流子秋思亭臯木葉下重陽近又是搗衣秋奈愁入庾腸老侵潘鬢謾簪黃菊花也應羞楚天晚白蘋烟盡處紅蓼水邊頭芳草有情夕陽無語鴈橫南浦人倚西樓玉容知安否香箋共錦字兩處悠悠空恨碧雲離合青鳥沈浮向風前懊惱芳心一㸃寸眉兩葉禁甚閒愁情到不堪言處分付東流解方叔名昉永遇樂春情風暖鶯嬌露濃花重天氣和煦院落烟收垂楊舞困無奈堆金縷誰家巧縱青樓絃管惹起夢雲情緒憶當時紋衾粲枕未嘗暫孤鴛侶芳菲易老故人難聚到此翻成輕誤閬苑仙遙蠻箋縱寫何計傳深訴青山緑水古今長在惟有舊歡何處空嬴得斜陽暮草淡烟細雨程觀過名過滿江紅梅春欲來時長是與江梅有約還又向竹林疏處一枝開却對酒漸驚身老大看花應念人離索但十分沈醉祝東君長如昨芳草渡孤舟泊山斂黛天垂幕黯銷魂無奈暮雲殘角便好折來和雪戴莫教酒醒隨風落待殷勤留此寄相思誰堪託昭君怨試問愁來何處門外山無重數芳草不知人翠連雲欲看不忍看心事只堪腸斷腸斷宿孤村雨昏昏孫濟師名艤菩薩鬘落梅一聲羌管吹嗚咽玉溪夜半梅翻雪江月正茫茫斷橋流水香含章春欲暮落日千山雨一㸃著枝酸吳姬先齒寒王晉卿名詵與東坡最善燭影搖紅春恨香臉輕勻黛眉巧畫宮粧淺風流天付與精神全在嬌波轉早是縈心可慣更那堪頻頻顧盻幾回得見見了還休爭如不見燭影搖紅夜䦨飲散春宵短當時誰解唱陽關離恨天涯逺無奈雲收雨散憑䦨干東風淚眼海棠開後燕子來時黃昏庭院蝶戀花鐘送黃昏雞報曉昏曉相催世事何時了萬恨千愁人自老春來依舊生芳草忙處人多閒處少閒處光陰幾箇人知道獨上髙樓雲渺渺天涯一㸃青山小玉樓春海棠錦城春色花無數排比笙歌留客住輕寒輕暖夾衣天乍雨乍晴寒食路花雖不語鶯能語莫放韶光容易去海棠開後月明前縱有千金無買處花發沁園春帝里春歸早先粧㸃皇家池館園林雛鶯未遷燕子乍歸時節戲弄晴陰瓊樓珠閣恰正在栁曲花心翠袖艷衣憑䦨干慣聞絃管新音此際相携宴賞縱行樂隨處芳樹遙岑桃腮杏臉嫩英萬葉千枝緑淺紅深輕風終日泛暗香長滿衣襟洞户醉歸訪笙歌晚來雲海沈沈踏青遊春遊金勒狨鞍西城嫩寒春曉路漸入垂楊芳草過平堤穿緑徑幾聲啼鳥是處裏誰家杏花臨水依約靚粧斜照極目髙原東風露桃烟島望十里紅圍緑繞更相將乘酒興幽情多少待向晚從頭記將歸去說與鳯樓人道人月圓元夜小桃枝上春來早初試薄羅衣年年此夜華燈盛照人月圓時禁街簫鼓寒輕夜永纎手同携更䦨人靜千門笑語聲在簾幃李景元過秦樓春晚賣酒壚邊尋芳原上亂花飛絮悠悠已蝶稀鶯散便擬把長繩繫日無由謾道草忘憂也徒將酒解閒愁正江南春盡行人千里蘋滿汀洲有翠紅徑裏盈盈侶簇芳茵禊飲時笑時謳當暖風遲景任相將永日爛漫狂遊誰信盛狂中有離情忽到心頭向樽前擬問雙燕來時曽過秦樓帝臺春春感芳草碧色萋萋遍南陌暖絮亂紅也知人春愁無力憶得盈盈拾翠侶共携賞鳯城寒食到今來海角逢春天涯倦客愁旋釋還似織泪暗拭又偷滴謾倚遍危欄儘黃昏也只是暮雲凝碧拚則而今已拚了忘則怎生便忘得又還問鱗鴻試重尋消息孫巨源名洙河滿子秋怨悵望浮生急景悽凉寶瑟餘音楚客多情偏怨别碧山逺水登臨目送連天衰草夜䦨幾處疏砧黃葉無風自落秋雲不雨長陰天若有情天亦老搖搖幽恨難禁惆悵舊歡如夢覺來無處追尋菩薩鬘公於元豐間為翰苑與李端願太尉往來尤數㑹一日鎖院宣召者至其家則出數十輩蹤跡得之於李氏時李新納妾能琵琶公飲不肯去而迫於宣命入院幾二鼓矣草三制罷作此詞記恨遲明遣示李樓頭尚有三通鼓何須抵死催人去上馬苦匆匆琵琶曲未終回頭凝望處那更廉纎雨謾道玉為堂玉堂今夜長石曼卿名延年真宗朝為學士死後人有見之者云我今為仙主芙蓉城燕歸梁春愁芳草年年惹恨幽想前事悠悠傷春傷别幾時休算從古為風流春山總把深勻翠黛千疉在眉頭不知供得幾多愁更斜日憑危樓晏同叔名殊以神童出身仁宗朝宰相諡元獻公有詞名珠玉集張子野為序玉樓春春恨緑楊芳草長亭路年少拋人容易去樓頭殘夢五更鐘花底離情三月雨無情不似多情苦一寸還成千萬縷天涯地角有窮時只有相思無盡處破陳子春景燕子來時新社梨花落後清明池上碧苔三四㸃葉底黃鸝一兩聲日長飛絮輕巧笑東鄰女伴采桑徑裏逢迎疑怪昨宵春夢好元是今朝鬭草嬴笑從雙臉生踏莎行春景細草愁烟幽花泣露憑欄總是銷魂處日髙深院靜無人穿簾海燕雙飛去帶緩羅衣香殘蕙炷天長不禁迢迢路垂楊只解惹春風何曽繫得行人住又春思小徑紅稀芳郊緑遍髙臺樹色陰陰見春風不解禁楊花濛濛亂撲行人面翠葉藏鶯朱簾隔燕爐香靜逐遊絲轉一場愁夢酒醒時斜陽却照深深院更漏子佳人蕣華濃山翠淺一寸秋波如剪紅日永綺筵開暗隨仙馭來遏雲聲回雪袖占斷曉鶯春栁才送目又顰眉此情誰得知又早春雪藏梅烟著栁依約上春時候初送鴈欲聞鶯緑池波浪生探花開留客醉憶得去年情味金盞酒玉爐香任他紅日長晏叔原元獻公之暮子自號小山有樂府行于世山谷為之序稱其詞為髙唐洛神之流其下者不減桃葉團扇云鷓鴣天慶厯中開封府與棘寺同日奏獄空仁宗與宮中宴集宣晏叔原作此大稱上意碧藕花開水殿凉萬年枝上轉紅陽升平歌管隨天仗祥瑞封章滿御床金掌露玉爐香歲華方共聖恩長皇州又奏圜扉靜十樣宮眉捧壽觴又佳會彩袖殷勤捧玉鍾當筵拚却醉顏紅舞低楊栁樓心月歌盡桃花扇底風從别後憶相逢幾回魂夢與君同今宵剩把銀缸照猶恐相逢是夢中蝶戀花别恨醉別西樓醒不記春夢秋雲聚散真容易斜月半窗還少睡畫屏門展吳山翠衣上酒㾗詩裏字㸃㸃行行總是凄凉意紅燭自憐無好計夜䦨空替人垂淚又別恨夢入江南煙水路行盡江南不與離人遇睡裏銷魂無說處覺來惆悵佳期誤欲盡此情書尺素浮鴈沈魚終了無憑據却倚緩絃歌別緒斷腸移破秦筝柱又深秋庭院碧苔紅葉遍黃菊開時已近登高宴日日露荷凋緣扇粉塘煙水明如練試倚凉風醒酒面鴈字來時恰向層樓見幾㸃護霜雲影轉誰家蘆管吟秋怨生查子閨思金鞍美少年去躍青驄馬牽繫玉樓人繡被春寒夜消息未歸來寒食梨花謝無處說相思背面秋千下又别思一分殘酒霞兩㸃愁蛾暈羅幕夜猶寒玉枕春先困心情翦綵慵時節燒燈近見少别離多還有人堪恨又閨思紅塵陌上遊碧栁堤邊住才趂彩雲來又逐飛花去深深美酒家曲曲幽香路風月有情時總是相逢處清平樂春情波紋碧皺曲水晴明後折得疏梅香滿袖暗喜春紅依舊歸來紫陌東頭金叉換酒消愁栁影深深細路花梢小小層樓滿庭芳秋思南苑吹花西樓題葉故園歡事重重憑欄秋思閒記舊相逢幾處歌雲夢雨可憐便流水西東別來久淺情未有錦字繫征鴻年光還少味開殘檻菊落盡溪桐謾留得樽前淡月凄風此恨誰堪說與清愁付緑酒杯中佳期在歸時待把香袖看啼紅南鄉子緑水帶春潮水上朱欄小渡橋橋上女兒雙笑靨夭饒倚著䦨干弄栁條月夜與花朝減字偷聲按玉簫栁外行人回首處迢迢若比銀河路更遙阮郎歸粉㾗閉邸玉尖纎啼紅傍晚奩舊寒新暖尚相兼梅疏待雪添春冉冉恨厭厭章臺對卷簾箇人鞭影弄凉蟾樓前側帽簷花菴詞選卷三
