body:
  text: 花菴詞選卷六宋黃升撰宋詞趙德麟名令畤東坡之友襲封安定郡王清平樂春情春風依舊著意隋堤桞搓得鵝兒黃欲就天氣清明厮勾去年紫陌青門今宵雨魄雲魂斷送一生憔悴能消幾箇黃昏蝶戀花清明欲減羅衣寒未去不捲珠簾人在深深處紅杏枝頭花幾許啼䀶止恨清明雨盡日水沈香一縷宿酒醒遲惱破春情緒飛燕又將歸信誤小屏風上西江路又春恨卷絮風頭寒欲盡墜粉飄香日日紅成陳新酒又添宿酒困今春不減前春恨蝶去鶯來無處問隔水盈盈望斷雙魚信惱亂橫波秋一寸斜陽只與黃昏近天仙子春情宿雨洗空臺榭瑩下盡珠簾寒未定花開花落幾畨晴春欲竟愁未醒池面杏花紅透影一紙短書言不盡明月清風還記省玉樓香斷又添香間展興臨好景心似亂萍何處整浣溪沙風急花飛晝掩門一簾疏雨滴黃昏便無離恨也銷魂翠被任熏終不暖玉杯慵舉幾畨溫這般情事與誰論思越人素玉朝來有好懷一枝梅粉照人開晴雲欲向杯中起春色先從臉上來深院落小樓臺玉盤香篆看徘徊須知月色撩人恨數夜春寒不下階又情景可是相逢意便深為郎巧笑不須金門前一尺春風髻窗內三更夜雨衾情渺渺信沈沈青鸞無路寄芳音山城鐘鼓愁難聽不解襄王夢裏尋烏夜啼春思樓上縈簾弱絮牆頭礙月低花年年春事關心事腸斷欲棲鴉舞鏡鸞衾翠減啼珠鳳蠟紅斜重門不鎖相思夢隨意繞天涯虞美人春恨畫船穩泛春江渺夕雨寒聲小紫煙深處數峯橫驚起一灘鷗鷺照人明玉樓今夜歸期誤恨入闌干暮可堪春事滿春懷不似珠簾新燕早歸來蔡子正名挺為神宗朝樞密諡敏肅喜遷鶯元豐間公自西掖出鎮平陽府經數嵗意欲歸作此詞詞播中都逐徹聖聽上因語吕丞相曰蔡挺欲歸遂以西掖召還霜天秋曉正紫塞故壘黃雲衰草漢馬嘶風邊鴻叫月隴上鐵衣寒早劍歌騎曲悲壯盡道君恩須報塞垣樂盡櫜鞬錦領山西年少談笑刁斗靜烽火一把時報平安耗聖主憂邊威懷遐逺強敵尚寬天討嵗華向晚愁思誰念玉關人老太平也且歡娛莫惜金尊頻倒阮閎休名閲有詩話總龜行干世曾守袁州眼兒媚離情樓上黃昏杏花寒斜月小闌干一雙燕子兩行征鴈畫角聲殘綺窗人在東風裏灑泪對春間也應似舊盈盈秋水淡淡青山閎休小詞惟有此篇見于世英妙傑時所謂百不為多一不為少毛澤民名雱有東堂集十卷惜分飛元祐中東坡守錢塘澤民為法曹椽秩滿辭去是夕晏客有妓歌此詞坡問誰所作妓以毛法曹對坡語坐客曰郡寮有詞人不及知某之罪也翌日折簡追還留連數月澤民因此得名泪濕闌干花著露愁到眉峯碧聚此恨平分取更無言語空相覷斷雨殘雲無意緒寂寞朝朝暮暮今夜山深處斷魂分付潮回去玉樓春立春小園半夜東風轉吹皺氷池雲母面曉披閻闔見朝陽知向碧階添幾線小煙弄桞晴先暖殘雪禁梅香尚淺殷勤洗拂舊東君多少韶華都借看相見歡秋思十年湖海扁舟幾多愁白髮青燈今夜不宜秋中庭樹空階雨思悠悠寂寞一生心事五更頭西江月春夕煙雨半藏楊桞風光初著桃花玉人細細酌流霞醉裏將春留下桞外鴛鴦作伴花邊胡蝶為家醉翁醉裏也隨他月在桞橋花榭青玉案秋思芙蕖花上濛濛雨又冷落池塘暮何處風來搖碧樹捲簾凝望淡煙衰桞翡翠穿花去玉京人去無由駐忍獨在憑闌處試問緑忩秋到否可人今夜新涼一枕無計相分付謝無逸名逸臨川進士自號溪堂蝶戀花春景豆蔻梢頭春色淺新試紗衣拂袖東風軟紅日三竿簾幕卷畫樓影裏雙飛燕攏鬢步搖青玉碾缺樣花枝葉葉蜂兒顫獨倚闌干凝望逺一川煙草平如翦踏莎行春思桞絮風輕棨花雨細春陰院落簾垂地碧溪影裏小橋橫青簾市上孤煙起鏡約關情琴心破睡輕寒漠漠侵鴛被酒醒霞散臉邊紅夢回山蹙眉峯翠南歌子春夜雨洗溪光淨風掀桞帶斜畫樓朱户玉人家簾外一眉新月浸梨花金鴨香凝袖銅荷燭映紗鳳盤宫錦小屏遮夜靜寒生春笋理琵琶減字木蘭花七夕荷花風細乞巧樓中涼似水天幕低垂新月彎環淺暈眉橋橫烏鵲不負年年雲外約殘角疏鐘腸斷朝霞一縷紅漁家傲漁父秋水無䀶清見底蓼花汀上西風起一葉小舟煙霧裏蘭棹艤桞條帶雨穿雙鯉自歎直鈎無處使笛聲吹散雲山翠鱠落霜刀紅縷細新美酒醉來獨枕蓑衣睡驀山溪月夜霜清木落深院簾櫳靜池面捲輕波瑩香水一奩明鏡修筠拂檻疏翠挽嬋娟山霧斂水雲收野闊江天逈紅消醉玉酒面風前醒羅幕護輕寒錦屏空金爐燼冷星橫參昴梅徑月黃昏清夢覺淺眉顰忩外橫斜影玉樓春寒食弄晴數點梨梢雨門外畫橋寒食路杜鵑飛破草間煙蛺蝶惹殘花底霧東君著意憐樊素一段韶華都付與粧成不管露桃嗔舞罷從教風桞妬南鄉子美人淺色染春衣衣上雙雙小鴈飛袖捲藕絲寒玉瘦彈棊嬴得尊前酒一巵氷雪拂胭脂綘臘香融落日西唱徹陽關人欲去依依醉眼橫波翠黛低江神子别情一江秋水碧灣灣繞青山玉連環簾幕低垂人在畫圖間間抱琵琶尋舊曲彈未了意闌珊飛鴻數點拂雲端倚闌看楚天寒擬倩春風吹夢到長安恰似梨花春帶雨愁滿眼泪闌干又春思杏花村館酒旗風水溶溶揚殘紅野渡舟橫楊桞緑隂濃望斷江南山色逺人不見草連空夕陽樓外晚煙籠粉香融淡眉峯記得年時相見畫屏中只有關山今夜月千里外素光同千秋嵗夏景練花飄砌蔌蔌清香細梅雨過蘋風起情隨湘水逺夢繞吳峯翠琴書倦鷓鴣喚起南窗睡密意無人寄幽恨慿誰洗修竹畔疏簾裏歌餘塵拂扇舞罷風掀袂人散後一鈎淡月天如水如夢令花落鶯啼春暮陌上緑楊飛絮金鴨晚香寒人在洞房深處無語無語葉上數聲疏雨清平樂春情花邊桞際已漸知春意歸信不知何日是舊恨欲拚無計故人零落西東題詩待倩歸鴻不似多情芳草年年處處相逢謝幼槃名薖自號竹友無逸之弟醉蓬萊中秋懷無逸兄望晴峯染黛暮靄澄空碧天無漢圓鏡高飛又一年秋半皓色誰同歸心暗折聽唳雲孤鴈問月停杯錦袍何處一尊無伴好在南鄰詩盟酒社刻燭爭成引觴愁緩今夕樓中繼阿連清玩飲劇狂歌歌終起舞醉冷光零亂樂事難窮疏星易曉又成浩歎江神子美人破瓜年紀桞腰身懶精神帶羞嗔手把江梅氷雪鬬清新不向鴉兒飛處著留乞與眼中人水精船裏酒鱗鱗皺香茵駐行雲舞罷歌餘花困不勝春問著些兒心底事才靨笑又眉顰減字木蘭花贈棊妓宋瑶風篁度曲倦倚銀屏初睡足清簟疏簾金鴨香消懶更添纎纎露玉風雹縱橫飛鈿局顰斂雙蛾凝佇無言密意多陳瑩中名瓘延平人號了翁青玉案雪碧空黯淡同雲繞漸枕上風聲峭明透紗窗天欲曉珠簾才捲美人驚報一夜青山老使君命客金尊倒正千里瓊瑶未經掃欹壓江梅春信早十分農事滿城和氣管取來年好滿庭芳離情淮葉繽紛江煙濃淡别樽同倒寒暉未逢春信霜露惹征衣往事元無是處何須待回首知非春鵑語從來勸我常道不如歸家山何處近江樓簾棟夕捲朝飛問西江筍蕨何似鱸肥且置華胥舊夢忘言處千古同時君知我平生心事相契古來稀臨江仙贈别聞道洛陽花正好家家庭户春風道人飲散百壺空年年花下醉開謝幾畨紅此别又從何處去風萍一任西東語聲雖異笑聲同一輪深夜月何處不相逢徐師川名俯號東湖山谷之甥卜算子春愁天生百種愁挂在斜陽樹緑葉隂隂占得春草滿鶯啼處不見凌波步空憶如簧語桞外重重疊疊山遮不斷愁來路鷓鴣天漁父七澤三湘碧草連洞庭秋到水如天朝廷若覓玄真子不在雲邊即酒邊明月棹夕陽船鱸魚恰似鏡中懸絲綸釣餌都收盡八字山前聽雨眠王履道名安中受知於蔡元長有文章盛名號初寮先生蝶戀花迎春花雪霽花梢春欲到殘臘迎春一夜花開早青帝回輿雲縹眇鮮鮮金雀來飛繞繡閣紗窗人窈窕翠樓紅絲鬬翦幡兒小戴在花枝爭笑道願人長共春難老洞仙歌情景深庭夜寂但涼蟾如晝鵲起髙槐露華透聽西樓玉管吹徹伊州金釧響軋軋朱扉暗扣迎人巧笑道好箇今宵怎不相尋暫携手見淡淨晚粧殘對月偏宜多情更越饒纎瘦早促分飛霎時休便恰似陽臺夢雲歸後一落索送楊伯紹帥慶陽塞桞未傳春信霜花侵鬢送君西去指秦關看日近長安近玉帳同時英俊合離無定路逢新鴈北飛來寄一字燕山問清平樂春宴花時微雨未減春分數占取簾疏花密處把酒聽歌金縷斜風輕度濃香間情正與春長向晚紅燈入座嘗新春杏催觴玉樓春春情飛鴻只向秦箏住終寄青樓書不去手因春夢有携時眼到花梢無著處泥金小字回文句翠袖紅裙知在否欲尋巫峽舊時雲看取高唐臺畔路小沖山夜晏椽燭垂珠清漏長酒黏衫袖濕有餘香紅牙雙捧旋排行將歌處相向更勻粧明月映東牆海棠花徑密迸流光遲留春筍緩催觴菊堂靜人已候虛廊蝶戀花千古銅臺今莫問流水浮雲歌舞西陵近煙桞有情看不盡東風約定年年信天與麟符行樂分緩帶輕裘雅晏催雲鬢翠霧縈紆銷篆印箏聲恰度秋鴻陳李世英名冠山東人蝶戀花春暮遙夜亭臯間信步才過清明漸覺傷春暮數點雨聲風約住朦朧淡月雲來去桃杏依稀香暗度誰在秋千笑裏輕輕語一寸相思千萬緒人間沒箇安排處六州歌頭驪山凄涼繡嶺宫殿倚山阿明皇帝曾遊地鎖煙蘿鬱嵯峨憶昔真妃子艷傾國方姝麗朝復暮嬪嬙妬寵偏頗三尺玉泉新浴蓮羞吐紅浸秋波聽花奴敲羯鼓酣奏鳴鼉體不勝羅舞婆娑正霓裳曵驚烽燧千萬騎擁雕戈情宛轉魂空亂蹙雙蛾奈兵何痛惜三春暮委妖麗馬嵬坡平寇亂回宸輦忍重過香瘞紫囊猶有鴻都客鈿合應訛使行人到此千古只傷歌事往愁多葉道卿名清臣賀聖朝留别滿斟緑醑留君住莫匆匆歸去三分春色二分愁更一分風雨花開花謝都來幾許且髙歌休訴不知來嵗牡丹時再相逢何處沈公述念奴嬌春恨杏花過雨漸殘紅零落胭脂顔色流水飄香人漸逺難託春心脈脈恨别王孫牆隂目斷手把青梅摘金鞍何處緑楊依舊南陌消散雲雨須臾多情因甚有輕離輕拆燕語千般爭解説些子伊家消息厚約深盟除非重見了方端的而今無奈寸腸千恨堆積望海潮上太原知府王君貺尚書山光凝翠川容如畫名都自古并州簫鼓沸天弓刀似水連營十萬貔貅金騎走長楸少年人一一錦帶吳鈎路入榆關鴈飛汾水正宜秋追思昔日風流有儒將醉吟才子狂遊松偃舊亭城高故國空如舞榭歌樓方面倚賢侯便恐為霖雨歸去難留好向西溪恣携絃管燕蘭舟公述此詞典雅有味而今世但傳其杏花過兩之曲真所謂吾未見好德如好色者也楊時可名適棣州人年十八登第未肯出仕從陳后山學詩晚為尚書比部外郎南柯子送淮漕向伯恭怨草迷南浦愁花傍短亭有情歌酒莫催行看取無情花草也關情舊日臨岐曲而今忍泪聽淮山何在暮雲凝待倩春風吹夢過江城蔣元龍名子雲好事近春晚葉暗乳鴉啼風定亂紅猶落胡蝶不隨春去入薰風池閣休歌金縷勸金巵酒病煞如昨簾捲日長人靜任楊花飄泊阮郎歸春雨小池芳草緑初勻桞寒眉尚顰東風吹雨細於塵一庭花臉皴鶯共蝶怨還嗔眼前無好春這般天氣殺愁人人愁旋旋新烏夜啼春小桃落盡殘紅夜來風又是一畨春事不從容翠屏掩芳信斷轉愁濃可惜日長間暇小簾櫳花菴詞選卷六
