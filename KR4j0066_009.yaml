body:
  text: 花菴詞選卷九宋黃升撰宋詞禪林僧覺範名惠洪按許彥周稱其善作小詞情思婉約似秦少游云鳳棲梧梅花碧瓦籠晴香霧繞水殿西偏小駐聞啼鳥風度女牆吹語笑南枝破臘應開了道骨不凡江瘴曉春色通靈醫得花重少爆暖釀寒春杳杳江城畫角留殘照㸃絳唇流水泠泠斷橋橫路梅枝亞雪花飛下渾似江南畫白璧青錢欲買春無價歸來也風吹平野一㸃香隨馬青玉案上元凝祥宴罷回歌吹畫轂走香塵起冠壓花枝馳萬騎馬行燈閙鳳樓簾卷陸海鼇山對當年曽看天顔醉御杯舉歡聲沸時節雖同悲樂異海風吹夢嶺猿啼月一枕思歸泪僧仲殊名揮姓張氏安州進士棄家為僧居杭州吳山寶月寺東坡所稱蜜殊者是也有詞七卷沈注為序訴衷情春情楚江南岸小青樓樓前人艤舟别來後庭花晚花上夢悠悠山不斷水空流謾凝眸建康宫殿燕子來時多少閒愁又建康鍾山影裏看樓臺江烟晚翠開六朝舊時明月清夜滿秦淮寂寞處兩潮回黯愁懷汀花雨細水樹風閒又是秋來又寶月山作清波門外擁輕衣楊花相送飛西湖又還春晚水樹亂鶯啼閒院宇小簾幃晚初歸鐘聲已過篆香才㸃月到門時又春詞長橋春水拍堤沙疏雨帶殘霞幾聲脆管何處橋下有人家宮樹緑晚烟斜噪閒鴉山光無盡水風長在滿面楊花又寒食湧金門外小瀛洲寒食更風流紅船滿湖歌吹花外有髙樓晴日暖淡烟浮恣嬉遊三千粉黛十二䦨干一片雲頭仲殊之詞多矣佳者固不少而小令為最小令之中訴衷情一調又其最蓋篇篇奇麗字字清婉髙處不減唐人風致也蝶戀花春愁開到杏花寒食近人在花前宿酒和春困酒有盡時情不盡日長只恁厭厭悶經歲别離閒與問花上啼鶯解道深深恨可惜斷雲無定準不能為寄藍橋信念奴嬌荷花水楓葉下乍湖光清淺凉生商素西帝宸遊羅翠蓋擁出三千宮女絳綵嬌春鉛華掩晝占斷鴛鴦浦歌聲搖曳浣沙人在何處别岸孤裊一枝廣寒宮殿冷落栖愁苦雪艷氷肌羞淡泊偷把胭脂勻注媚臉籠霞芳心泣露不肯為雲雨金波影裏為誰長恁凝竚南柯子憶舊十里青山逺潮平路帶沙數聲啼鳥怨年華又是凄凉時候在天涯白露收殘月清風散曉霞緑楊堤畔閙荷花記得年時沽酒那人家栁梢青吳中岸草平沙吳王故苑柳裊烟斜雨役寒輕風前香軟春在梨花行人一棹天涯酒醒處殘陽亂鴉門外秋千牆頭紅粉深院誰家夏雲峯傷春天濶雲髙溪橫水逺晚日寒生輕暈閒階靜楊花漸少朱門掩鶯聲猶嫩悔匆匆過却清明旋占得餘芳巳成幽恨都幾日陰沈連宵慵困起來韶華都盡怨入雙眉閒鬭損乍品得情懷看承全近深深態無非自許厭厭意終羞人問爭知道夢裏蓬萊待忘了餘香時傳音信縱留得鶯花東風不住也則眼前愁悶僧祖可字正平俗蘇氏伯固之子江西詩社之一也小冲山春晚誰向江頭遣恨濃碧波流不斷楚山重栁烟和雨隔疏鐘黃昏後羅幕更朦朧桃李小園空阿誰猶笑語拾殘紅珠簾捲盡夜來風人不見春在緑蕪中僧如晦卜算子送春有意送春歸無計留春住畢竟年年用著來何似休歸去目斷楚天遙不見春歸路風急桃花也似愁㸃㸃飛紅雨花菴詞選卷九
