㸃新霜曾是朝衣染御香重到故鄉交舊少凄凉却恐他鄉勝故鄉感皇恩感懷小閣倚秋空下臨江渚漠漠孤雲未成雨數聲新鴈回首杜陵何處壯心空萬里人誰許黃閣紫樞築壇開府莫怕功名缺人做如今熟計只有故鄉歸路石帆山腳下菱三畝好事近東歸書事嵗晚喜東歸掃盡市朝陳迹揀得亂山環處釣一潭澄碧賣魚沽酒醉還醒心事付橫笛家在萬重雲外有沙鷗相識蝶戀花寒食陌上簫聲寒食近雨過園林花氣浮芳潤千里斜陽鍾欲暝慿髙望斷南樓信海角天涯行略盡三十年間無處無遺恨天若有情終欲問忍教霜㸃相思鬢又懷别水漾萍根風卷絮倩笑嬌顰忍記逢迎處只有夢魂能再遇堪嗟夢不由人做夢若由人何處去短帽輕衫夜夜眉州路不怕銀缸深繡户只愁風斷青衣渡朝中措閨情怕歌愁舞懶逢迎粧晚托春酲總是向人深處當時枉道無情關心近日啼紅密訴剪緑深盟杏館花陰恨淺畫堂銀燭嫌明鵲橋仙感舊華燈縱博雕鞍馳射誰記當年豪舉酒徒一一取封侯獨去作江邉漁父輕舟八尺低篷三扇占斷蘋洲烟雨鏡湖元自屬閒人又何必君恩賜與破陳子省華仕至千鍾良易年過七十常稀眼底榮華元是夢身後聲名不自知營營端為誰幸有旗亭沽酒何妨繭紙題詩幽谷雲蘿朝采藥靜院軒窗夕對棊不歸真箇癡玉胡蝶王忠州家席上倦客平生行處墜鞭京洛解佩瀟湘此夕何年初賦宋玉髙唐繡簾開香塵乍起蓮步穩銀燭分行暗端相燕羞鶯妬蝶繞蜂忙難忘芳樽頻勸峭寒新退玉漏猶長幾許幽情只愁歌罷月侵廊欲歸時司空笑問微近處丞相嗔狂斷人腸假饒相送上馬何妨如夢令閨思獨倚博山峰小翠霧滿身飛繞只恐學行雲去作陽臺春曉春曉春曉滿院緑楊芳草真珠簾羇逰有感水村山館參差路感羇逰正似殘春風絮掠地復穿簾必竟歸何處鏡裏新霜空自閔問幾時鸞臺鼇署遲暮謾慿髙竚立書空獨語自昔儒冠多誤悔當年早不抽身歸去醉下白蘋洲看夕陽鷗鷺蓴菜鱸魚都弃了只換得青衫塵土休顧早扁舟江上一蓑烟雨花菴詞選續集卷二
