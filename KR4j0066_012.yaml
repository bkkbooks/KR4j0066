body:
  text: 花菴詞選續集卷二宋黃升撰宋詞劉彥沖名子翬號屏山先生劉忠顯公之子朱文公之師有屏山文集行于世小詞附其後驀山溪九日浮煙冷雨此日還重九秋去又秋來但黃花年年依舊平臺戲馬無處問英雄茅舍小竹籬疏兀坐空搔首客來何有草草三杯酒一醉萬緣空休貪他金印如斗病翁老矣誰共賦歸與芟隴麥網溪魚未落它人後滿庭芳和胡明仲桂花詞秋入微陰涼生平逺小山愁絶天南似聞還斷飛䇿遍千巖葉底輕黃纂纂惱人是微裂芳緘翛然勝清真冷淡無艷寄塵凡澄潭欹兩岸波光搖動碧影相參任西風十里吹度松杉我自寒灰槁木凝神處不覺醺酣歸來晚飛花無迹明月滿空函趙元鎮名鼎號得全居士為中興名相詞婉媚不減花間集蝶戀花春思盡日東風吹緑樹向晚輕寒數㸃催花雨年少淒凉天賦與更堪春思縈離緒臨水髙樓携酒處曾倚哀絃歌斷黃金縷樓下水流何處去憑欄目送蒼煙暮㸃絳唇春愁香冷金爐夢回鴛帳餘香嫩更無人問一枕江南恨消瘦休文頓覺春衫褪清明近杏花吹盡薄暮東風緊又惜别惜别傷離此生此念無重數故人何處還送春歸去美酒一杯誰解歌金縷無情緒淡煙疏雨花落空庭暮賀聖朝秋思斷霞收盡黃昏雨滴梧桐疏樹簾櫳不卷夜沉沉鎖一庭風露天涯人逺心期夢悄苦長宵難度知它窗外促織兒有許多言語浣溪沙美人艷艷春嬌入眼波勸人金盞緩聲歌不禁粉淚揾香羅暮雨朝雲相見少落花流水别離多寸腸爭奈此情何畫堂春春日空籠簾影隔垂楊夢回芳草池塘杏花枝上蝶雙雙春晝初長強理雲鬟臨照暗彈粉淚沾裳自憐容艷惜流光無限思量醉桃園春晚青春不與花為主花正開時春暮花下醉眠休訴看取春歸去鶯愁蝶怨春知否欲問春歸何處只有一樽芳醑留得青春住人月圓中秋連環寶瑟深深願結盡一生愁人間天上佳期勝賞今夜中秋雅歌妍態常娥見了應羡風流芳樽美酒年年嵗嵗月滿髙樓怨東風閨怨寶鑑凌花瑩孤鸞慵照影魚書蝶夢兩消沉恨恨恨結盡丁香瘦如楊柳雨疏雲冷宿醉懨懨病羅巾空淚粉欲將逺意託湘絃悶悶悶香絮悠悠畫簾悄悄日長春困滿江紅丁未九日南渡泊舟儀真江口慘結秋隂西風送絲絲雨溼凝望眼征鴻幾字莫投沙磧欲向鄉關何處是水雲浩蕩連南北但修眉一抹有無中遙山色天涯路江上客腸巳斷頭應白空搔首興嘆莫年離隔欲待忘憂除是酒奈酒行有盡愁無極便挽將江水入樽罍澆胸臆西江月福唐别故人世態浮雲易變時光飛箭難留五年重見海東頭只有交情似舊未盡别來深意難堪老去離愁青山迢遞水悠悠明日扁舟病酒王民瞻名庭圭號瀘溪先生廬陵人棄官養志二十年紹興辛酉胡淡菴謫新州民瞻以詩送之云癡兒不了公家事男子要為天下竒坐是除名編𨽻辰州感皇恩留别一葉下西風寒生南浦椎鼓鳴鐃送君去長亭把酒却倩阿誰留住樽前人似玉能留否醉中暫聽離歌幾許聽不能終淚如雨無情江水斷送扁舟何處歸時煙浪捲朱簾暮㸃絳唇感舊花外紅樓當時青鬢顔如玉淡煙殘燭醉入花間宿白髮相逢猶唱當時曲當時曲斷絃難續且盡杯中醁鳯棲梧王彥恭生日瓊海無邊銀浪捲畫㦸朱樓縹眇雲間見當日使君曾擁傳海霞光裏時開宴翠斚紅鱗吹酒面莫謂今朝人在天涯逺彩鳯銜書應不晚願公難老身長健滿庭芳戊辰上元黃子餘席上時未有月宿雨初收晚風微度萬家簾捲青煙暗塵隨馬人物似神仙試問天公借月天須放明月教圎應移下廣寒宫殿燈火接星躔盧川元古郡當時太守賔從俱賢到如今萬井歌吹喧闐花下紅粧賣酒時相遇曲水橋邉誰知道山城父老重見中興年桃園憶故人辰州泛舟送郭景文周子康赴行在催花一霎清明雨留得東風且住兩岸柳汀煙塢未放行人去人如雙鵠雲間舉明夜扁舟何處只向武陵南渡便是長安路李似之名彌遜自號筠翁中興初名士不附秦檜坐貶聲聲慢木犀龍涎燒就沈水熏成分明亂屑瓊瑰一朵才開人間十里先知此花大即不大有許多瀟灑清竒較量盡謂勝如茉䔧賽得荼䕷更被秋光掇送放些兒月照著陳風吹惱殺多情猛拚沉醉酬伊朝朝暮暮守定儘忙時也不相離睡夢裏膽瓶兒枕畔數枝菩薩蠻别意江城烽火連三月不堪對酒長亭别休作斷腸聲老來無淚傾風髙帆影疾目送舟痕碧錦字幾時來薰風無雁回張材甫名掄號蓮社居士南渡故老及見太平之盛者集中多應制詞柳梢青侍宴栁色初勻輕寒似水纎雨如塵一陳東風縠紋微皺碧沼鱗鱗仙娥花月精神奏鳳管鸞絲鬭新萬嵗聲中九霞杯裏長醉芳春蝶戀花海棠前日海棠猶未破㸃㸃胭脂染就真珠顆今日重來花下坐亂鋪宫錦春無那賸摘繁枝簪幾朵痛惜深憐只恐芳菲過醉倒何妨花底卧不須紅袖來扶我臨江仙禁中丹桂玉宇涼生清禁曉丹葩色照晴空珊瑚敲碎小玲瓏人間無此種來自廣寒宫雕玉䦨干深院靜嫣然凝笑西風曲屏須占一枝紅且圖欹醉枕香到夢魂中又車駕朝享景靈宫久雨一夕開霽聞道彤庭森寶仗霜風逐雨驅雲六龍扶輦下青冥香隨鸞扇逺曰射赭袍明簾捲天街人隘路滿城喜望清塵歡聲催起嶺梅春欲知天意好昨夜月華新西江月瑞香剪就碧雲閙葉刻成紫玉芳心淺春不怕峭寒侵暖徹薰籠瑞錦花裏清芬獨步樽前勝韻難禁飛香直到玉杯深消得厭厭痛飮朝中措夜景燈花挑盡夜將䦨斜掩小屏山一㸃凉蟾窺幔釧敲玉臂生寒起來無緒爐薰燼冷桐葉聲乾都把沈思幽恨明朝分付眉端燭影搖紅上元有懷雙闕中天鳳樓十二春寒淺去年元夜奉宸游曾侍瑶池宴玉殿珠簾盡捲擁羣仙蓬壺閬苑五雲深處萬燭光中揭天絲管馳隙流年恍如一瞬星霜換今宵誰念泣孤臣回首長安逺可是塵緣未斷謾惆悵華胥夢短滿懷幽恨數㸃寒燈幾聲歸鴈浣溪沙和曾純甫題謝氏小閣築室崢嶸占寶峰退朝燕坐萬緣空出塵髙志抗冥鴻何日嘉招陪一笑看君豪飮釂千鍾試慿鄙句作先容霜天曉角别恨曉風搖幕欹枕聞殘角霜月可窗寒影金猊冷翠衾薄舊恨無處著新愁還又作夜夜單于聲裏燈花共淚珠落張安國名孝祥號于湖歷陽人以妙年射䇿魁天下不數載入直中書有紫微雅詞湯衡為序稱其平昔為詞未嘗著藁筆酣興健頃刻即成無一字無來處如歌頭凱歌諸曲駿發蹈厲寓以詩人句法者也六州歌頭長淮望斷關塞莽然平征塵暗霜風徑悄邉聲黯銷凝追想當年事殆天數非人力洙泗上絃歌地亦荆榛隔水氊鄉落日牛羊下區脫縱橫看名王宵獵騎火一川明笳鼓悲鳴遣人驚念腰間箭匣中劍空埃蠧竟何成時易失心徒壯嵗將零渺神京干羽方懷逺靜烽燧且休兵冠蓋使紛馳騖若為情聞道中原遺老常南望翠葆霓旌使行人到此忠憤氣填膺有淚如傾水調歌頭凱歌寄湖南安撫劉舍人猩鬼嘯篁竹玉帳夜分弓少年荆楚劒客突騎錦襜紅千里風飛雷厲四校星流彗掃蕭斧挫春葱談笑青油幕日奏捷書同詩書帥黃閣老黑頭公家傳鴻寶祕略小試不言功聞道璽書頻下看即沙堤歸去帷幄且從容君王自神武一舉朔庭空又舟過金山寺江山自雄麗風露與髙寒寄聲月姊借我玉鑑此中看幽壑魚龍悲嘯倒影星辰搖動海氣夜漫漫擁起白銀闕危駐紫金山表獨立飛玉佩整雲冠潄氷濯雪眇視萬里一毫端回首三山何處聞道羣仙笑我要我欲俱還揮手從此去翳鳳更驂鸞又隱靜寺觀雨寺有碧霄泉青嶂度雲氣幽壑舞回風江神助我雄觀喚起碧霄龍電掣金蛇千丈雷震靈鼉萬疊洶洶欲崩空盡瀉銀潢水散入寶蓮宫坐中客凌積翠看奔洪人間應失匕箸惟我獨從容淨洗從來塵垢潤及無邉枯槁造物不言功天宇忽開霽日在五雲東滿江紅秋懷秋滿灕源瘴雲淨曉山如簇動逺思空江小艇髙丘喬木䇿䇿西風雙鬢底暉暉斜日朱欄曲試側身回首望京華迷南北思歸夢天邉鵠遊宦事蕉中鹿想一年好處砌紅堆緑羅帕分柑霜落齒氷盤剝芡珠盈掬借春纎縷鱠搗金虀新篘熟念奴嬌欲雪呈朱漕朔風吹雨送凄凉天意垂垂欲雪萬里南荒雲霧滿弱水蓬萊相接凍合龍岡寒侵銅柱碧海氷澌結慿髙一笑問君何處炎熱家在楚尾吳頭歸期猶未對此驚時節記得年時貂帽暖鐵馬千羣觀獵狐兔成車歌鍾殷地歸踏層城月持杯且醉不須北望凄切又洞庭洞庭青草近中秋更無一㸃風色玉界瓊田三萬頃著我扁舟一葉素月分輝銀河共影表裏俱澄徹怡然心㑹妙處難與君說應念嶺海經年孤光自照肝肺皆氷雪短髮蕭騷襟袖冷穩泛滄浪空濶盡挹西江細傾北斗萬象為賔客扣舷一笑不知今夕何夕又離思星沙初下望重湖逺水長雲漠漠一葉扁舟誰念我今日天涯飄泊平楚南來大江東去處處風波惡吳中何地滿懷俱是離索長記送我行時緑波亭上泣透青羅薄檣燕低飛人去後依舊湘城簾幕不盡山川無窮烟浪辜負秦樓約漁歌聲斷為君雙淚傾落木蘭花離思送歸雲去鴈淡寒彩滿溪樓正佩解湘腰叉孤楚鬢鸞鑑分收凝情望行處路但疏煙逺樹織離憂只有樓前溪水伴人清淚長流霜華夜永逼衾裯喚誰護衣篝念粉館重來芳塵未掃爭見嬉逰情知悶來殢酒奈回腸不醉只添愁脉脉無言竟日斷魂雙騖南州又别情紫簫吹散後恨燕子只空樓念璧月長虧玉簪中折覆水難收青鸞送碧雲句道霞扄霧鎖不堪憂情與文梭共織怨隨宫葉同流人間天上兩悠悠暗淚灑燈篝記谷口園林當時驛舍夢裏曾逰銀屏低聞笑語但夢時冉冉醒時愁擬把菱花一半試尋髙價皇州雨中花長沙一葉凌波十里御風煙鬟雨鬢蕭蕭認得江臯玉佩水館氷綃秋净明霞乍吐曙凉宿靄初消恨微顰不語欲進還休凝佇超遙神交冉冉愁思盈盈斷魂欲遣誰招還似待青鸞傳信烏鵲成橋悵望胎仙琴叠羞看翡翠蘭苕夢回人逺紅雲一片天際笙簫驀山溪春情雄風豪雨時節清明近簾幕起輕寒暖紅爐笑翻灰燼陰藏遲日欲驗幾多長繡工慵圍棊倦香篆頻銷印茂林芳徑緑變紅添潤桃杏意酣酣占前頭一畨花信華堂尊酒但作艷陽歌禽聲喜流雲盡明日春逰俊鷓鴣天長沙餞劉樞密浴殿西頭白玉堂湘江東畔碧油幢北辰躔次占星象南斗山川解印章隨步武借恩光送君先促舍人裝他年真肯傳衣鉢今日先須釂一觴又春情日日青樓醉夢中不知樓外已春濃杏花未遇疏疏雨楊柳初搖短短風扶畫鷁躍花驄湧金門外小橋東行行又入笙歌裏人在珠簾第幾重菩薩鬘舟中十年長作江南客檣竿又挂西風席白鳥去邉明楚山無數青倒冠仍落佩我醉君同醉試問識君不青山與白鷗又杏花東風約略吹羅幕一簷細雨春陰薄試把杏花看溼紅嬌暮寒佳人雙玉枕烘醉鴛鴦錦折得最繁枝暖香生翠幃鵲橋仙橫波滴素遙山蹙翠江北江南腸斷不知何處御風來雲霧裏叉橫鬢亂香羅叠恨鸞箋寫意付與瑶臺女伴醉時言語醒時愁道說與醒時休看又梅吹香成陳飛花如雪不那朝來風雨可憐無處避春寒但玉立仙衣數縷清愁萬斛柔腸千結醉裏一時分付勸君不用嘆飄零待結子成陰歸去西江月黃陵廟滿載一船明月平鋪千里秋江波神留我看斜陽喚起鱗鱗細浪明日風回更好今朝露宿何妨水晶宫裏奏霓裳凖擬嶽陽樓上又洞庭問訊湖邉春色重來又是三年東風吹我過湖船楊柳絲絲拂面世路如今巳慣此心到處悠然寒光亭下水連天飛起沙鷗一片又為劉樞密太夫人壽疇昔通家事契即今兩鎮交承起居樞密太夫人緑髮斑衣相映乞得神仙九醖祝教福祿千春台星直上壽星明長見問䦨鼎盛憶秦娥雪雲垂幕陰風慘淡天花落天花落千林瓊玖滿空