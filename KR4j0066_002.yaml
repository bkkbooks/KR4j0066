body:
  text: 花菴詞選卷二宋黃升輯宋詞歐陽永叔名修號六一居士朝中措送劉原父守揚州平山欄檻倚晴空樓閣有無中手種堂前楊柳别來幾度春風文章太守揮毫萬字一飲千鍾行樂直須年少尊前看取衰翁蝶戀花春晚庭院深深深幾許楊栁堆煙簾幕無重數玉勒金鞍遊冶處樓髙不見章臺路雨橫風狂三月暮門掩黃昏無計留春住淚眼問花花不語亂紅飛過秋千去又春情海燕雙雙歸畫棟簾幕無風花影頻移動半醉騰騰春睡重緑鬟堆枕香雲擁翠被雙盤金縷鳯憶得前春有箇人人共花裏鶯聲時一弄日斜驚起相思夢又初春南鴈依稀回側陳雪霽牆陰遍覺蘭芽嫩中夜夢餘消酒困爐香捲穗燈生暈急景流年都一瞬往事前歡未免縈方寸臘後花期知漸近東風已作寒梅信又清明六曲闌干偎碧樹楊栁風輕展盡黃金縷誰抱鈿筝移玉柱穿簾海燕雙飛去滿眼遊絲兼落絮紅杏開時一霎清明雨濃醉覺來鶯亂語驚殘好夢無尋處浣溪沙春思葉底青青杏子垂枝頭薄薄柳綿飛日髙深院晚鶯啼堪恨風流成薄幸斷無消息道歸期托腮無語翠眉低又湖景湖上朱橋響畫輪溶溶春水浸春雲碧琉璃滑淨無塵當路遊絲縈醉客隔花啼鳥喚行人日斜歸去奈何春又湖上堤上遊人逐畫船拍堤春水四垂天緑楊樓外出秋千白髮戴花君莫笑六么催拍盞頻傳人生何處似尊前又春半青杏園林煮酒香佳人初試薄羅裳柳絲搖曳燕飛忙乍雨乍晴花自落間愁間悶日偏長為誰消瘦減容光採桑子潁州西湖羣芳過後西湖好狼藉殘紅飛絮濛濛垂栁闌干盡是風笙歌散盡遊人去始覺春空垂下簾櫳雙燕歸來細雨中又西湖荷花開後西湖好載酒來時不用旌旗前後紅幢緑蓋隨畫船撑入花深處香泛金巵煙雨微微一片笙歌醉裏歸踏莎行相别候館梅殘溪橋栁細草芳風暖搖征轡離愁漸逺漸無窮迢迢不斷如春水寸寸柔腸盈盈粉泪樓髙莫近危闌倚平蕪盡處是春山行人更在春山外句意最工生查子别恨含羞整翠鬟得意頻相顧鴈柱十三絃一一春鶯語嬌雲容易飛夢斷知何處深院鎖黃昏陳陳芭蕉雨阮郎歸踏青南園春半踏青時風和聞馬嘶青梅如豆栁如眉日長胡蝶飛花露重草煙低人家簾幕垂秋千慵困解羅衣畫梁雙燕棲訴衷情眉意清晨簾幕卷輕霜呵手試梅粧都緣自有離恨故畫作逺山長思往事借流芳易成傷擬歌先咽欲笑還顰最斷人腸木蘭花西湖西湖南北煙波濶風裏絲簧聲韻咽舞餘羅帶緑雙垂酒入香腮紅一抹杯深不覺琉璃滑貪看六么花十八明朝車馬各西東惆悵畫樓風與月玉樓春别恨春山斂黛低歌扇暫解吳鈎登祖宴畫樓鐘動巳魂銷何況馬嘶芳草岸青門栁色隨人逺望欲斷時腸已斷洛城春色待君來莫待落花飛似霰漁家傲小春十月小春梅蘂綻紅爐暖閣新粧遍錦帳美人貪睡暖羞起懶玉壺一夜氷澌滿樓上四垂簾不捲天寒山色偏宜逺風急鴈行吹字斷紅日晚江天雪意雲撩亂蘇子瞻名軾號東坡居士朝無咎云東坡詞橫放傑出自是曲子中縳不住者念奴嬌赤壁懷古大江東去浪淘盡千古風流人物故壘西邊人道是三國周郎赤壁亂石穿空驚濤拍岸捲起千堆雪江山如畫一時多少豪傑遙想公瑾當年小喬初嫁了雄姿英發羽扇綸巾談笑間檣櫓灰飛煙滅故國神遊多情應笑我早生華髮人生如夢一樽還酹江月蝶戀花中春花褪殘紅青杏小燕子飛時緑水人家繞枝上柳綿吹又少天涯何處無芳草牆裏秋千牆外道牆外行人牆裏佳人笑笑漸不聞聲漸杳多情却被無情惱洞仙歌公自序云僕七歲時見眉州老尼姓朱忘其名年九十餘自言嘗隨其師入蜀主孟昶宮中一日大熱主與花蘂夫人夜起避暑摩訶池上作一詞朱具能記之今四十年朱巳死久矣人無知此詞者獨記其首兩句暇日尋味豈洞仙歌令乎乃為足之云氷肌玉骨自清涼無汗水殿風來暗香滿繡簾開一點明月窺人人未寢欹枕叉橫鬢亂起來携素手庭户無聲時見疏星度河漢試問夜如何夜已三更金波淡玉繩低轉但屈指西風幾時來又不道流年暗中偷換漁家傲金陵賞心亭送王勝之龍圖王守金陵視事一日而移南郡千古龍蟠并虎踞從公一弔興亡處渺渺斜風吹細雨芳草渡江南父老留公住公駕飛車凌彩霧紅鸞驂乘青鸞馭却訝此洲名白鷺非吾侶翩然欲下還飛去賀新郎夏景乳燕飛華屋悄無人桐陰轉午晚涼新浴手弄生綃白團扇扇手一時似玉漸困倚孤眠清熟簾外誰來推繡户枉教人夢斷瑤臺曲又却是風敲竹石榴半吐紅巾蹙待浮花浪蘂都盡伴君幽獨穠艷一枝君看取芳心千重似束又恐被西風驚緑若待得君來向此花前對酒不忍觸共粉淚兩簌簌西江月公自序云春夜行蘄水中過酒家飲酒醉乘月至一溪橋上解鞍曲肱少休及覺已曉亂山蔥蘢不謂人世也書此語橋柱上照野瀰瀰淺浪橫空曖曖微霄障泥未解玉驄驕我欲醉眠芳草可惜一溪明月莫教踏碎瓊瑤解鞍欹枕緑楊橋杜字一聲春曉又感懷世事一場大夢人生幾度秋涼夜來風葉已鳴廊看取眉頭鬢上酒賤常愁客少月明多被雲妨中秋誰與共孤光把酒凄然北望一又重九點點樓頭細雨重重江外平湖當年戲馬會東徐今日凄涼南浦莫恨黃花未吐且教紅粉相扶酒闌不必看茱萸俯仰人間今古又三過平山堂下半生彈指聲中十年不見老仙翁壁上龍蛇飛動欲弔文章太守仍歌楊栁春風休言萬事轉頭空未轉頭時皆夢滿江紅東武流杯亭東武城南新堤固漣漪初溢隱隱遍長林髙阜卧紅堆碧枝上殘花吹盡也與君試向江邊覔問向前猶有幾多春三之一官裏事何時畢風雨外無多日相將泛曲水滿城爭出君不見蘭亭修褉事當時座上皆豪逸到而今修竹滿山陰空陳迹水調歌頭丙辰中秋歡飲達旦大醉作此篇兼懷子由明月幾時有把酒問青天不知天上宮闕此夕是河年我欲乘風歸去只恐瓊樓玉宇髙處不勝寒起舞弄清影何似在人間轉朱閣低綺户照不眠不應有恨何事偏向别時圓人有悲歡離合月有陰晴圓缺此事古難全但願人長久千里共嬋娟水調歌頭快哉亭落日繡簾捲亭下水連空知君為我新作窗户濕青紅長記平山堂上欹枕江南煙雨杳杳沒孤鴻認得醉翁語山色有無中一千頃都鏡淨倒碧峯忽然浪起掀舞一葉白頭翁堪笑蘭臺公子未解莊生天籟剛道有雌雄一點浩然氣千里快哉風水龍吟太守閭丘公顯致仕居姑蘇公飲其家出後房佐酒有懿卿者善吹笛公因賦此以贈楚山修竹如雲異材秀出千林表龍鬚半翦鳯膺微漲玉肌勻繞木落淮南雨晴雲夢月明風裊自中郎不見桓伊去後知辜負秋多少聞道嶺南太守後堂深緑珠嬌小綺窗學弄梁州初遍霓裳未了嚼徵含宮泛商流羽一聲雲杪為使君洗盡蠻風瘴雨作霜天曉又次韻章質夫楊花詞似花還似非花也無人惜從教墜拋家傍路思量却是無情有思縈損柔腸困酣嬌眼欲開還閉夢隨風萬里尋郎去處又還被鶯呼起不恨此花飛盡恨西園落紅難綴曉來雨過遺蹤何在一池萍碎春色三分二分塵土一分流水細看來不是楊花點點是離人淚臨江仙夜飲東坡醒復醉歸來倣佛三更家僮鼻息巳雷鳴敲門都不應倚杖聽江聲長恨此身非我有何時忘却營營夜闌風靜縠紋平小舟從此去江海寄餘生南鄉子九日霜降水痕收淺碧粼粼露逺洲酒力漸消風力軟颼颼破帽多情却戀頭佳節若為酬但把金樽斷送秋萬事到頭都是夢休休明日黃花蝶也愁阮郎歸夏景緑槐髙栁咽新蟬薰風入舜絃碧紗窗下水沈煙棊聲驚晝眠微雨過小荷翻榴花開欲然玉人纎手掬清泉瓊珠碎又圓永遇樂夜登燕子樓夢盼盼因作此詞久後秦少遊自會稽入京見東坡坡云別當作文甚勝都下盛唱公山抹微雲之詞秦遜謝坡遽云不意別後公却學栁七作詞秦答曰某雖無識亦不至是先生之言無乃過乎坡云銷魂當此際非栁詞句法乎秦慚服然已流傳不復可改矣又問别作何詞秦舉小樓連苑橫空下窺繡轂雕鞍驟坡云十三箇字只説得一箇人騎馬樓前過秦問先生近著坡云亦有一詞説樓上事乃舉燕子樓空佳人何在空鎖樓中燕朝無咎在座云三句説盡張建封燕子樓一段事奇哉明月如霜好風如水清景無限曲港跳魚圓荷瀉露寂寞無人見紞如五鼓錚然一葉黯黯夢雲驚斷夜茫茫重尋無覔處覺來小園行遍天涯倦客山中歸路望斷故園心眼燕子樓空佳人何在空鎖樓中燕古今如夢何曽夢覺但有舊歡新怨異時對南樓夜景為余浩歎哨遍歸去來詞為米折腰因酒棄家口體交相纍歸去來誰不遣君歸覺從前皆非今是露未晞征夫指豫歸路門前笑語喧童稚嗟舊菊都荒新松暗老吾年今巳如此但小窗容膝閉柴扉策杖看孤雲暮鴻飛雲出無心鳥倦知還本非有意噫歸去來兮我今忘我兼忘世親戚無浪語琴書中有真味步翠麓崎嶇泛溪窈窕涓涓暗谷流春水觀草木欣榮幽人自感吾生行且休矣念寓形宇內復幾時不自覺皇皇欲何之委吾心去留誰計神仙知在何處富貴非吾願但知臨水登山嘯詠自引壺觴自醉此生天命更何疑且乘流遇坎還止如夢令為向東坡傳語人在畫堂深處别後有誰來雪壓小橋無路歸去歸去江上一犂春雨浣溪沙蓛蓛衣巾落棗花村南村北響繅車牛衣古栁賣黃瓜酒困路長惟欲睡日髙人渴漫思茶敲門試問野人家牛衣一作半依采桑子多景樓多情多感仍多病多景樓中樽酒相逢樂事回頭一笑空停杯且聽琵琶語慢撚輕攏醉臉春融斜照江天一抹紅江神子送述古翠蛾羞黛怯人看掩霜紈淚偷彈且盡一尊收淚唱陽關謾道帝城天樣逺天易見見君難畫堂新締近孤山曲闌干為誰安飛絮落花春色屬明年欲棹小舟尋舊事無處問水連天又春别天涯流落思無窮既相逢却匆匆携手佳人和淚折殘紅為問東風餘幾許春縱在與誰同隋堤三月水溶溶背歸鴻去吳中回望彭城清泗與淮通寄我相思千點淚流不到楚江東又別意相逢不覺又初寒對尊前惜流年風緊離亭氷結泪珠圓雪意留君君且住從此去少清歡轉頭山下轉頭看路漫漫玉花翻雲海光寬何處是超然知道故人相念否携翠袖倚朱闌菩薩鬘西湖送述古秋風湖上蕭蕭雨使君欲去還留住今日謾留君明朝愁殺人佳人千點泪灑向長江水不用斂雙蛾路人啼更多卜算子黃山谷云坡在黃州作此語意髙妙似非喫煙火食人語非胸中有數萬卷書筆下無一點塵俗氣孰能至此時鮦陽居士云缺月刺明微也漏斷暗也幽人不得志也獨往來無助也驚鴻賢人不安也回頭愛君不忘也無人省君不察也揀盡寒枝不肯棲不偷安於髙位也寂寞吳江冷非所安也此與考槃詩相似缺月挂疏桐漏斷人初靜時見幽人獨往來縹眇孤鴻影驚起却回頭有恨無人省㨂盡寒枝不肯棲楓落吳江冷昭君怨誰作桓伊三弄驚破緑窗幽夢新月與愁煙滿江天欲去又還不去明日落花飛絮飛絮送行舟水東流行香子別意携手江村梅雪飄裙情何限處處銷魂故人不見舊曲重聞向望湖樓孤山寺湧金門尋常行處題詩千首繡羅衫與拂紅塵别來相憶知是何人有湖中月江邊栁隴頭雲又茶綺席才終歡意猶濃酒闌時髙興無窮共誇君賜初拆臣封看分香餅黃金縷密雲龍鬭嬴一水功敵千鍾覺涼生兩腋清風暫留紅袖少却紗籠放笙歌散庭館靜略從容又七里瀨一葉舟輕雙漿鴻驚水天清影湛波平魚翻藻鑑鷺點煙汀過沙溪急霜溪冷月溪明重重似畫曲曲如屏算當年虛老嚴陵君臣一夢今古空名但逺山長雲山亂曉山青王介甫名安石丞相荆國文公桂枝香金陵懷古登臨送目正故國晚秋天氣初肅千里澄江似練翠峯如簇征帆去棹殘陽裏背西風酒旗斜矗綵舟雲淡星河鷺起圖畫難足念自昔豪華競逐歎門外樓頭悲恨相續千古憑髙對此謾嗟榮辱六朝舊事隨流水但寒煙衰草凝緑至今商女時時猶唱後庭遺曲漁家傲極能道間居之趣平岸小橋千嶂抱揉藍一水縈花草茅屋數間窗窈窕塵不到時時自有清風掃午枕覺來聞語鳥欹眠似聽朝雞早忽憶故人今揔老貪夢好茫茫忘了邯鄲道菩薩鬘集句數間茆屋間臨水窄衫短帽垂楊裏花是去年紅吹開一夜風一本作今日是何朝看余渡石橋梢梢新月偃午醉醒來晚何許最關情黃鸝三兩聲浣溪沙集句百畞庭中半是苔門前古道水縈回愛間能有幾人來小院回廊人寂寂山桃野杏兩三栽為誰零落為誰開浪淘沙伊呂伊呂兩衰翁歷遍窮通一為釣叟一耕農假使當時俱不遇老了英雄湯武一相逢風虎雲龍興王只在笑談中及至而今千載下誰與爭功千秋歲引秋景别館寒砧孤城畫角一派秋聲入寥廓東歸燕從海上去南來鴈向沙頭落楚臺風庾樓月宛如昨無奈被些名利縳無奈被它情擔閣可惜風流總間却當初謾留華表語而今誤我秦樓約夢闌時酒醒後思量著王元澤名雱荆公之子封臨川伯倦尋芳露晞向曉簾幕風輕小院間晝翠徑鶯來驚下亂紅鋪繡倚危闌登髙榭海棠著雨胭脂透算韶華又因循過了清明時候倦遊燕風光滿目好景良辰誰共携手恨被榆錢買斷兩眉長皺憶得髙陽人散後落花流水仍依舊這情懷對東風盡成消瘦王平甫名安國荆公之弟點絳唇秋景秋氣微涼夢回明月穿簾幕井梧蕭索正繞南枝鵲寶瑟塵生金鴈空零落情無託鬢雲慵掠不似君恩薄清平樂春晚留春不住費盡鶯兒語滿地殘紅宮錦汚昨夜南園風雨小憐初上琵琶曉來思繞天涯不肯畫堂朱户春風自在梨花減字木蘭花春情畫橋流水雨濕落紅飛不起月破黃昏簾裏餘香馬上聞徘徊不語今夜夢魂何處去不似垂楊猶解飛花入洞房林君復名逋贈和靖先生長相思別情吳山青越山青兩岸青山相送迎誰知離别情君泪盈妾泪盈羅帶同心結未成江頭潮巳平點絳唇草金谷年年亂生春色誰為主餘花落處滿地和煙雨又是離愁一闋長亭暮王孫去萋萋無數南北東西路錢思公名惟演玉樓春此詞暮年作詞極悽惋城上風光鶯語亂城下煙波春拍岸緑楊芳草幾時休淚眼愁腸先已斷情懷漸變成衰晚鸞鏡朱顏驚暗換昔年多病厭芳尊今日芳尊惟恐淺賈子明名昌朝為仁宗朝宰相諡文元公木蘭花平生惟賦此一詞極有風味都城水緑嬉遊處仙棹往來人笑語紅隨逺浪泛桃花雪散平堤飛柳絮東君欲共春歸去一陳狂風和驟雨碧油紅斾錦障泥斜日畫橋芳草路夏子喬名竦乃慶厯間所謂一不肖者然文章有名于世諡文莊公喜遷鶯令景德中水殿按舞時公翰林內直上遣中使取新詞公援毫立成以進大蒙天奬霞散綺月垂鈎簾捲未央樓夜涼銀漢截天流宮闕鎖清秋瑤臺樹金莖露鳯髓香盤煙霧三千珠翠擁宸遊水殿接涼州丁謂之名謂為真宗朝宰相諡晉公鳯棲梧十二層樓春色早三殿笙歌九陌風光好堤栁岸花連復道玉梯相對開蓬島鶯囀喬林魚在藻太液微波緑鬭王孫草南闕萬人瞻羽葆後天祝聖天難老又朱闕玉城通閬苑月桂星榆春色無深淺簫瑟篌笙仙客宴蟠桃花滿蓬萊殿九色明霞裁羽扇雲霧為車鸞鶴驂雕輦路指瑤池歸去晚壺中日月如天逺寇平仲名準為真宗朝宰相贈萊國公踏莎行春暮春色將闌鶯聲漸老紅英落盡青梅小畫堂人靜雨濛濛屏山半掩餘香裊密約沈沈離情杳杳菱花塵滿慵將照倚樓無語欲銷魂長空暗淡連芳草點絳唇小陌輕寒社公雨足東風慢定巢新燕濕雨穿花轉象尺熏爐拂曉停針線愁蛾淺飛紅零亂側卧珠簾捲謝希深名絳仕仁宗朝知制誥菩薩鬘詠目娟娟侵鬢粧痕淺雙眸相媚彎如翦一瞬百般冝無論笑與啼酒闌思翠被特故瞢騰地生怕促歸輪微波先注人夜行船别情昨夜佳期初共鬢雲低翠翹金鳯尊前和笑不成歌意偷轉眼波微送草草不容成楚夢漸寒深翠簾霜重相看送到斷腸時月西斜畫樓鐘動後段語最奇訴衷情宮怨銀缸夜永影長孤香草續殘爐倚屏脈脈無語粉泪不成珠雙粲枕百嬌壺憶當初君恩莫似秋葉無情欲向人疏花菴詞選卷二
