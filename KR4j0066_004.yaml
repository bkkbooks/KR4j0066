body:
  text: 花菴詞選卷四宋黃升撰宋詞黃魯直名庭堅號山谷按陳後山云今代詞手惟秦七黃九耳唐諸人不逮也驀山溪别意鴛鴦翡翠小小思珍偶眉黛斂秋波儘湖南山明水秀娉娉裊裊恰近十三餘春未透花枝瘦正是愁時候尋芳載酒肯落他人後只恐逺歸來緑成陰青梅如豆心期得處每自不由人長亭栁君知否千里猶回首又春晴朝來風日陡覺春衫便翠栁艷明眉戲秋千誰家倩盼烟勻露洗草色媚橫塘平沙軟雕輪轉行樂聞絃管追思年少走馬尋芳伴一醉幾纒頭過揚州珠簾盡捲而今老矣花似霧中看歡意淺天涯逺信馬歸來晚水調歌頭春行瑤草一何碧春入武陵溪溪上桃花無數花上有黃鸝我欲穿花尋路直入白雲深處浩氣展虹霓秪恐花深裏紅露濕人衣坐白石欹玉枕拂金徽謫仙何處無人伴我白螺杯我為靈芝仙草不為朱唇丹臉長嘯亦何為醉舞下山去明月逐人歸江城子情景畫堂髙會酒䦨珊霎時間倚䦨干千里關山長恨見伊難及至而今相見了依舊是隔關山倩人傳語問平安省愁煩泪偷彈泣損眼兒不似舊時單尋得石榴雙葉子慿寄與插雲鬟踏莎行春晚臨水夭桃倚牆繁李長楊風掉青驄尾樽中有酒可酬春更尋何處無愁地明日重來落花如綺芭蕉漸展山公啓欲箋心事寄天公教人長壽花前醉清平樂晚春春歸何處寂寞無行路若有人知春去處喚取歸來同住春無蹤跡誰知除非問取黃鸝百囀無人能會因風飛過薔薇鷓鴣天西塞山前白鷺飛桃花流水鱖魚肥朝廷尚覓𤣥真子何處如今更有詩青蒻笠緑簔衣斜風細雨不須歸人間欲避風波險一日風波十二時菩薩鬘半烟半雨溪橋畔漁翁醉後無人喚疏懶意何長春風花草香江山如有待此意陶潛解問我去何之君行到自知好事近一弄醒心絃意在兩山斜疉彈到古今愁處有真珠承睫使君來去本無心休泪界紅頰自恨老來憎酒負十分蕉葉黃元明名知命山谷之兄青玉案和賀方回韻送山谷弟貶宜州千峯百嶂宜州路天黯淡知人去曉别吾家黃叔度弟兄華髮舊山修水異日同歸處樽罍飲散長亭暮别語丁寧不成句已斷離腸知幾許水村山館酒醒無寐滴盡空階雨秦少游名觀一字太虛號淮海居士水龍吟寄營妓婁婉婉字東玉詞中藏其姓名與字在焉小樓連苑橫空下窺繡轂雕鞍驟疏簾半捲單衣初試清明時候破暖輕風弄晴微雨欲無還有賣花聲過盡垂楊院宇紅成陳飛鴛甃玉佩丁東别後悵佳期參差難又名韁利鎖天還知道和天也瘦花下重門栁邊深巷不堪回首念多情但有當時皓月照人依舊風流子初春東風吹碧草年華換行客老滄洲見梅吐舊英栁搖新緑惱人春色還上枝頭寸心亂北隨雲黯黯東逐水悠悠斜日半山暝烟兩岸數聲橫笛一葉扁舟青門同携手前歡記渾似夢裏揚州誰念斷腸南陌回首西樓算天長地久有時有盡奈何綿綿此恨無休擬待倩人說與生怕伊愁夢揚州中春晚雲收正栁塘烟雨初休燕子未歸惻惻輕寒如秋曲䦨干外東風軟透繡幃花密香稠江南逺人何處鷓鴣啼破春愁長記曽陪燕遊酬妙舞清歌麗錦纒頭殢酒為花十載因甚淹留醉鞭拂面歸來晚望翠樓簾捲金鈎佳會阻離情正亂頻夢揚州滿庭芳晚景山抹微雲天連衰草畫角聲斷譙門暫停征棹聊共飲離尊多少蓬萊舊事空回首烟靄紛紛斜陽外寒鴉數㸃流水繞孤村銷魂當此際香囊暗解羅帶輕分謾嬴得秦樓薄幸名存此去何時見也襟袖上空染啼㾗傷情處髙城望斷燈火巳黃昏又秋思碧水澄秋黃雲凝暮敗葉零亂空階洞房人靜斜月照徘徊又是重陽近也幾處處砧杵聲催重簾外風搖翠竹疑是故人來情懷增悵望新歡易失往事難猜問籬邊黃菊知為誰開謾道愁須殢酒酒未醒愁巳先回慿欄久金波漸轉白露㸃蒼苔又春遊曉色雲開春隨人意驟雨才過還晴古臺芳榭飛燕蹴紅英舞困榆錢自落秋千外緑水橋平東風裏朱門映栁低按小秦筝多情行樂處珠鈿翠蓋玉轡紅纓漸酒空金榼花困蓬瀛豆蔻梢頭舊恨十年夢屈指堪驚憑欄久疏烟淡日寂寞下蕪城江城子春别西城楊栁弄春柔動離憂泪難收猶記多情曽為繫歸舟碧野朱橋當日事人不見水空流韶華不為少年留恨悠悠幾時休飛絮落花時節一登樓便做春江都是泪流不盡許多愁千秋歲少游謫處州日作今郡治有鶯花亭蓋因此詞取名水邊沙外城郭春寒退花影亂鶯聲碎飄零疏酒盞離别寬衣帶人不見碧雲暮合空相對憶昔西池會鴛鷺同飛蓋携手處今誰在日邊清夢斷鏡裏朱顏改春去也落紅萬㸃愁如海踏莎行東坡絶愛尾兩句霧失樓臺月迷津渡桃源望斷無尋處可堪孤館閉春寒杜鵑聲裏斜陽暮驛寄梅花魚傳尺素砌成此恨無重數郴江幸自繞郴山為誰流下瀟湘去阮郎歸春晚退花新緑漸團枝撲人風絮飛秋千未拆水平堤落紅成地衣遊蝶困乳鶯啼怨春春不知日長早被酒禁持那堪更別離又旅況滿天風雨破寒初深沈庭院虛麗譙吹徹小單于迢迢清夜徂鄉夢斷旅魂孤崢嶸歲又除衡陽猶有鴈傳書郴陽和鴈無南歌子贈陶心兒玉漏迢迢盡銀潢淡淡橫夢回宿酒未全醒巳被鄰雞催起怕天明臂上粧猶在襟間泪尚盈水邊燈火漸人行天外一鈎殘月帶三星末句蓋心字也又香墨彎彎畫燕脂淡淡勻揉藍衫子淡黃裙獨倚玉欄無語㸃檀唇人去空流水花飛半掩門亂山何處覓行雲又是一勾新月照黃昏菩薩鬘秋思蛩聲泣露喧秋枕羅幃泪濕鴛鴦錦獨卧玉肌涼殘更與恨長陰風翻翠幔雨濕燈花暗畢竟不成眠鴉啼金井寒畫堂春春情東風吹栁日初長雨餘芳草斜陽杏花零落燕泥香睡損紅粧香篆暗消鸞鳯畫屏縈繞瀟湘暮寒輕透薄羅裳無限思量又落紅堆徑水平池弄晴小雨霏微杏園憔悴杜䳌啼無奈春歸栁外畫樓獨上憑欄手撚花枝放花無語對斜暉此恨誰知賀方回名鑄少為武辨以定力寺一絶見奇於舒王山谷又賞其詞遂知名當世小詞二卷名東山寓聲樂府張右史序之青玉案山谷稱此詞云解道江南斷腸句世間只有賀方回凌波不過橫塘路但目送芳塵去錦瑟年華誰與度月臺花榭瑣窗朱户惟有春知處碧雲冉冉蘅臯暮綵筆新題斷腸句試問閒愁都幾許一川煙草滿城風絮梅子黃時雨薄幸憶故人淡粧多態更滴滴頻回盼睞便認得琴心先許欲綰合歡雙帶記畫堂風月逢迎輕顰淺笑都無奈待翡翠屏開芙蓉帳掩羞把香羅暗解自過了燒燈都不見踏青挑菜幾回慿雙燕丁寧深意往來却恨重簾礙知何時再正春濃酒困人閒晝永無聊賴厭厭睡起猶有花梢日在浣溪沙閨思樓角紅銷一縷霞淡黃楊栁帶棲鴉玉人和月折梅花笑撚粉香歸繡戶半垂羅幕護窗紗東風寒似夜來些又春愁閒把琵琶舊譜尋四絃聲怨却沈吟燕飛人靜畫堂陰欹枕有時成雨夢隔簾無處說春心一從燈夜到如今又春事鸚鵡無言理翠襟杏花零落晝陰陰畫橋流水一篙深芳徑與誰同鬭草繡床終日罷拈針小箋香管寫春心菩薩鬘閨思章臺遊冶金龜壻歸來猶帶醺醺醉花漏怯春宵雲屏無限嬌絳紗燈影背玉枕叉聲碎不待宿酲消馬嘶催早朝南柯子别恨斗酒才供泪扁舟只載愁畫橋青栁小朱樓猶記出城車馬為遲留有恨花空委無情水自流河陽新鬢儘禁秋蕭散楚雲巫雨此生休望湘人春思厭鶯聲到枕花氣動簾醉魂愁夢相半被惜餘薰帶驚剩眼幾許傷春春晚泪竹㾗鮮佩蘭香老湘天濃暖記小江風月佳時屢約非烟游伴須信鸞絃易斷奈雲和再鼓曲終人逺認羅襪無蹤舊處弄波清淺青翰棹艤白蘋洲畔儘目臨臯飛觀不解寄一字相思幸有歸來雙燕感皇恩記别蘭芷滿汀洲游絲橫路羅襪塵生步迎顧整鬟顰黛脉脉多情難語細風吹栁絮人南渡回首舊游山無重數花底深朱户何處半黃梅子向晚一簾疏雨斷魂分付與春歸去臨江仙立春巧翦合歡羅勝子叉頭春意翩翩艷歌淺笑拜嫣然願郎宜此酒行樂駐華年未至文園多病客幽襟悽斷堪憐舊遊夢掛碧雲邊人歸落鴈後思發在花前憶秦娥春思曉曚曨前溪百鳥啼匆匆啼匆匆凌波人去拜月樓空舊年今日東門東鮮粧輝映桃花紅桃花紅吹開吹落一任東風舒信道名亶為神宗朝御史與李定同陷東坡于罪者菩薩鬘此詞極有味畫船槌鼓催君去髙樓把酒留君住去住若為情江頭潮欲平江潮容易得却是人南北今日此樽空知君何日同又冬江梅未放枝頭結江樓已見山頭雪待得此花開知君來未來風帆雙畫鷁小雨隨行色空得鬱金裙酒㾗和泪㾗一落索春正是看花天氣為春一醉醉來却不帶花歸誚不解看花意試問此花明媚將花誰比只應花好似年年花不似人憔悴木蘭花令別意金絲絡馬青錢路笑指玉皇香案去㸃衣栁陌墮殘紅拂面風橋吹細雨曉叉壓鬢頭慵舉恨裏歌聲兼别苦西湖一頃白菱花惆悵行雲無覓處卜算子苔池臺小雨乾門巷香輪少誰把青錢襯落紅滿地無人掃何時鬭草歸幾度尋花了留得佳人蓮步㾗宮樣鞋兒小秦處度名湛黃山谷嘗稱其詞卜算子春情春透水波明寒峭花枝瘦極目烟中百尺樓人在樓中否四和裊金鳬雙陸思纎手擬倩東風浣此情情更濃於酒李方叔名豸東坡門下士虞美人玉䦨干外清江浦渺渺天涯雨好風如扇雨如簾時見岸花汀草漲㾗添青林枕上關山路卧想乘鸞處碧蕪千里思悠悠惟有霎時凉夢到南州清平樂落梅嗚咽暗淡城頭月吹滿江天驚夢蝶喚起畫樓傷别簾風輕觸銀鈎梧桐玉露新秋底事瑣窗深夜素娥常伴人愁廖世美好事近夕景落日水鎔金天淡暮烟凝碧樓上誰家紅袖靠䦨干無力鴛鴦相對浴紅衣短棹弄長笛驚起一雙飛去聽波聲拍拍燭影搖紅别愁靄靄春空畫樓森聳凌雲漢紫薇登覽最關情絶妙誇能賦惆悵相思遲暮記當日朱欄共語塞鴻難問岸栁何窮别愁紛絮催促年光舊來流水知何處斷腸何必更殘陽極目傷平楚晚霽波聲帶雨悄無人舟橫古渡數峰江上芳草天涯參差烟樹李嬰滿江紅元豐中為益水令作此上東坡坡甚奇之荆楚風烟寂寞近中秋時候露下冷蘭英將謝葦花初秀歸燕殷勤辭巷陌鳴蛩凄楚來窗牖又誰念江邊有神仙飄零久橫琴膝携笻手曠望眼閒吟口任紛紛萬事到頭何有君不見凌煙冠劍客何人氣貌長依舊歸去來一曲為君吟為君壽杜安世名壽域訴衷情燒殘絳蠟泪成㾗街鼓報黃昏碧雲又阻來信廊上月侵門愁永夜拂香䄄待誰溫夢蘭憔悴擲果凄凉兩處銷魂花菴詞選卷四
