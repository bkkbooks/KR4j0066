body:
  text: 花菴詞選巻八宋黄昇撰宋詞魯逸仲詞意婉麗佀万俟雅言南浦旅懷風悲畫角聽單于三弄落譙門投宿駸駸征騎飛雪滿孤村酒市漸閒燈火正敲窓亂葉舞紛紛送數聲驚鴈下離烟水嘹唳度寒雲好在半朧溪月到如今無處不銷魂故國梅花歸夢愁損綠羅裙為問暗香閒艶也相思萬㸃付啼㾗算翠屏應是兩眉餘恨倚黄昏水龍吟梅花歲窮風雪飄零望迷萬里雲垂凍紅綃碎翦凝酥繁綴烟深霜重疎影沈波暗香和月横斜浮動悵別來欲把芳菲寄逺還羌管吹三弄寂寞玉人睡起涴殘粧不勝嬌鳯盈盈山館紛紛江路相思誰共才與風流賦稱清艶多情唯宋算襄王枉被棃花瘦損又成春夢惜餘春慢情景弄月餘花團風輕絮露濕池塘春草鶯鶯戀友燕燕將雛惆悵睡殘清曉還似初相見時携手旗亭酒香梅小向登臨長是傷春滋味泪彈多少因甚却輕許風流終非長久又說分飛煩惱羅衣瘦損綉被香消那更亂紅如掃門外無窮路岐天若有情和天須老念髙唐歸夢凄凉何處水流雲遶劉偉明名弇號龍雲先生洞仙歌別恨凄凉楚弄行客腸應斷濤捲秋容暗淮甸去年時正是今日孤舟烟浪裏身與江雲共逺別來單枕夢幾過滄洲皓月而今為誰滿薄倖苦無端誤却嬋娟有人在玉樓天半最不慣西風破㠶來甚時節收拾望中心眼宋退翁名齊愈宣和間為太學官眼兒媚固陵召對曰卿文章新奇可作梅詞進呈須是不經人道語齊愈立進此詞時天語稱善次日諭近臣曰宋齊愈梅詞非惟不經人道又且自開花說主結子黄熟并天色言之可謂盡之矣霏霏疎影轉征鴻人語暗香中小橋斜渡曲屏深院水月濛濛人閒不是藏春處玉笛曉霜空江南處處黄垂密雨綠漲薫風唐子西名庚眉山人累為學官張天覺拜相擢京畿提舉常平後坐貶惠州有詩文十巻行于世訴衷情旅愁平生不會歛眉頭諸事等閒休元來却到愁處須着與他愁殘照外大江流去悠悠風悲蘭杜烟淡滄浪何處扁舟何晉之名大圭小重山惜别綠樹鶯啼春正濃釵頭青杏小綠成叢玉船風動酒鱗紅歌聲咽相見幾時重車馬去匆匆路隨芳草逺恨無窮相思只在夢魂中今宵月偏照小樓東陸敦信感皇恩旅思殘角兩三聲催登古道逺水長山又重到水聲山色看盡輪蹄昏曉風頭日脚下人空老匹馬舊時西征談笑緑鬢朱顏正年少旗亭斗酒任是十千傾倒而今酒興減詩情少趙循道名企感皇恩入京騎馬踏紅塵長安重到人面依前似花好舊歡才展又被新愁分了未成雲雨夢巫山曉千里斷腸關山古道囘首髙城似天杳滿懷離恨付與落花啼鳥故人何處也青春老何子初名籕宴清都春詞細草沿堦軟遲日薄蕙風輕靄微暖春工靳惜桃紅尚小柳芽猶短羅幃綉幕髙捲又早是歌慵笑懶凭畫樓那更天逺山逺水逺人逺堪歎傅粉疎狂竊香俊雅無計拘管青絲絆馬紅巾寄羽甚時迷戀無言泪珠零亂翠袖滴重重漬徧故要知別後思量歸時覷見向伯恭名子諲自號薌林居士鷓鴣天上元有懷京師紫禁烟花一萬重鼇山宮闕隱晴空玉皇端拱彤雲上人物嬉游陸海中星轉斗駕囘龍五侯池館醉春風而今白髪三千丈愁對寒燈數㸃紅阮郎歸乙卯番陽道中江南江北雪漫漫遙思易水寒同雲深處是三關斷腸山又山天可老海能翻消除此恨難頻聞遣使報平安幾時鸞輅還報一本作問清平樂詠木犀贈韓叔夏吳頭楚尾踏破芒鞋底散入千巖秋色裏不奈惱人風味如今老我薌林世間百不關心獨喜愛香韓壽能來同醉花陰韓叔夏名璜清平樂同向伯恭賦木犀秋光如水釀作鵝黄蟻散入千岩佳樹裏惟許修門人醉輕鈿重上風鬟不禁月冷霜寒步障深沈歸去依然愁滿江山沈㑹宗小沖山初夏花過園林清蔭濃琅玕新脫笋綠成叢語聲只在小樓東閒欹枕敵面芰荷風長日敞簾櫳輕塵飛不到畫堂空一尊今夜與誰同人如玉相對月明中菩薩鬘初夏落花迤􅆔層陰少青梅競弄枝頭小江色雨和烟行人江那邊好花都過了滿地空芳草落日醉醒間一春無此寒驀山溪惜別想伊不住船在藍橋路别語未甘聽更忍問而今是去門前楊栁幾日轉西風將行色欲留心忽忽城頭鼓一畨幽會只覺添愁緒解后却相逢又還有此時歡否臨岐把酒莫惜十分斟尊前月月中人明夜知何處天仙子幽居景物因人成勝槩滿目更無塵可礙等閒簾幕小䦨干衣未解心先快明月清風如有待誰信門前車馬隘別是人間閒世界坐中無物不清凉山一帶水一𣲖流水白雲長自在陳子髙名克天台人呂安老帥建康辟為參議有赤城詞一巻菩薩鬘春赤䦨橋盡香街直籠街細栁嬌無力金碧上晴空花晴簾影紅黄衫飛白馬日日青樓下醉眼不逢人午香吹暗塵又春詞綠蕪牆遶青苔院中庭日淡芭蕉巻胡蝶上堦飛風簾自在垂玉鈎雙語燕寶甃楊花轉幾處簸錢聲綠窓春夢輕又清明池塘淡淡浮鸂􅈃杏花吹盡垂楊碧天氣度清明小園新雨晴綠窓描綉罷笑語荼􅐘下圍坐賭青梅困從雙臉來謁金門春曉愁脉脉目斷江南江北烟樹重重芳信隔小樓山幾尺細草孤雲斜日一向弄晴天色簾外落花飛不得東風無氣力又春晚花滿院飛去飛來雙燕紅雨入簾寒不巻曉屏山六扇翠袖玉笙悽斷脉脉兩蛾愁淺消息不知郎近逺一春長夢見又寒食栁絲碧栁下人家寒食鶯語匆匆花寂寂玉堦春蘚溼閒凭熏籠無力心事有誰知得檀炷繞窓燈背壁畫簷殘雨滴臨江仙有感四海十年兵不解征塵直到江城歲華銷盡客心驚疎髯渾似雪衰涕欲生氷送老虀鹽何處是我緣應在吳興故人相望若為情别愁深夜雨孤影小窓燈山花子佳人鬆慢梳頭淺畫眉亂鶯殘夢起多時不道小庭花露濕翦荼􅐘簾額好風低燕子窓油晴日打蜂兒翠袖粉牋閒弄筆寫新詩浣溪沙佳人淺畫香膏拂紫綿牡丹花重翠雲偏手挼梅子竝郎肩病起心情終是怯困來模樣不禁憐旋移針線小姑前又夜景短燭熒熒照碧窓重重簾幕護梨霜幽歡不怕夜偏長羅襪鈿筝紅粉醉曲屏深幔綠橙香征鴻雖逺斷人腸鷓鴣天憶舊小市橋彎更向東便門長記舊相逢踏青㑹散秋千下鬢影衣香怯晚風悲往事向孤鴻斷腸腸斷舊情濃梨花院落黄茅店綉被春寒此夜同豆葉黄初夏粉牆丹柱栁陰中簾幙輕明花影重午醉醒來一面風綠蔥蔥幾顆櫻桃葉底紅又新晴樹頭初日鵓鴣鳴野店山橋新雨晴短褐無泥竹杖輕水泠泠梅片飛時春草青張敏叔選冠子詠栁一名蘇武慢漱水挼藍遙堤影翠半雨半烟橋畔鳴禽弄舌夢草縈心偏稱謝家池館紅粉牆頭步搖金縷纎柔舞腰低軟被和風搭在䦨干終日畫簾髙巻春易老細葉舒眉輕花吐絮漸覺綠陰成幔章臺繫馬灞水維舟誰念鳯城人逺惆悵故國陽關盃酒飄零惹人腸斷恨青青客舎江頭風笛亂雲空晚曹元寵名組工謔詞有寵於徽宗任睿思殿待制鷓鴣天輦路薫風起綠槐都人凝望滿天街雲韶杳杳鳴鞘肅芝葢亭亭障扇開微雨過絶纎埃内家車子走晴雷千門不敢垂簾看總上銀鈎等駕來阮郎歸春夢簷頭風珮響丁東簾疎燭影紅秋千人散月溶溶樓臺花氣中春酒醒夜寒濃蘭衾誰與同只愁夢短不相逢覺來羅帳空青玉案旅情碧山錦樹明秋霽路轉陵疑無地忽有人家臨曲水竹離茅舍酒旗沙岸一簇漁樵市凄凉只恐鄉心起鳯樓逺囘頭謾凝睇何處今宵孤館裏一聲征鴈半窓殘月總是離人泪又旅情田園有計歸須早在家縱貧亦好南去北來何日了光陰送盡可憐青鬢暗逐流年老寂寥孤館殘燈照正鄉思驚時夢初覺落月蒼蒼關河曉一聲雞唱馬嘶人起又上長安道如夢令春情門外綠陰千頃兩兩黄鸝相應睡起不勝情行到碧梧金井人静人静風動一庭花影驀山溪梅洗粧真態不假鈆華御竹外一枝斜想佳人天寒日暮黄昏小院無處着清香風細細雪垂垂何況江頭路月邊疎影夢到銷魂處結子欲黄時又須作廉纎微雨孤芳一世供斷有情愁消瘦損東陽也試問花知否好事近梅花茆舎竹籬邊雀噪晩枝時節一陣暗香飄處巳不勝愁絶江南得地故先開不待有飛雪腸斷幾囘山路恨無人攀折憶少年春恨年時酒伴年時去處年時春色清明又近也却天涯為客念過眼光陰難再得想前歡盡成陳迹登臨恨無語把䦨干暗拍徐幹臣名伸三衢人有青山樂府一巻行于世然多雜調詞惟此一曲天下稱之二郎神春詞悶來彈鵲又攪碎一簾花影謾試着春衫還思纎手熏徹金猊燼冷動是愁端如何向但怪得新來多病嗟舊日沈腰如今潘鬢怎堪臨鏡重省别時泪溼羅衣猶凝料為我厭厭日髙慵起長托春酲未醒鴈足不來馬蹄難去門掩一庭芳景空佇立盡日䦨干倚遍晝長人静李玉賀新郎春情篆縷銷金鼎醉沈沈庭陰轉午畫堂人静芳草王孫知何處惟有楊花糝徑漸玉枕騰騰春醒簾外殘紅春已透鎮無聊殢酒厭厭病雲鬢亂未忺整江南舊事休重省遍天涯尋消問息斷鴻難倩月滿西樓慿䦨久依舊歸期未定又只恐缾沈金井嘶騎不來銀燭暗枉敎人立盡梧桐影誰伴我對鸞鏡李君之詞雖不多見然風流醖藉盡此篇矣王昴嘉王榜狀元及第好事近催粧詞喜氣擁朱門光動綺羅香陌行到紫薇花下悟身非凡客不須脂粉涴天真嫌怕太紅白留取黛眉淺處畫章臺春色花菴詞選巻八
