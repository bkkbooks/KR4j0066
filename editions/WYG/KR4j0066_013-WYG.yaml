body:
  text: 花菴詞選續集巻三宋黄昇撰宋詞張功甫名鎡號約齋居士西秦人楊誠齋極稱其詩賀新郎李頤正路分見訪畱飮書贈看了梅花去要東風攀翻看雪與君同賦海内從来天際逺一笑平窺萬古待剪盡燭花紅吐久矣南湖無此客似喬松萬丈凌霄舉飛咳唾掃塵土承平氣象森眉宇想天家驂鸞洞裏細烟氷霧我亦秦闗歸未得誰念干將醉撫判良夜倚横冠屨莫歎瀟湘居尚逺擁戎軺萬騎鳴笳鼓雲正鎖汴京路又陳退翁分敎衡湘將行酒䦨索詞漫成桂隠傳杯處有風流千岩韻勝太丘遺緒玉季金昆霄漢侣平歩鸞坡揮麈莫便駕飛颿烟渚雲動精神衡岳去向君山帝樂鏘韶濩蘭藝畹吊湘楚南湖老矣無襟度但樽前踉蹡醉影㡌花顛仆只恐清時專文敎猶貸陰山烽火卧錦帳貔貅征鼓忠烈前勲賫萬恨望神都魏闕奔狐呼翠袖為君舞夢遊仙記夢飛夢去閒到玉京遊塵絕天髙那得暑月明雲薄澹於秋宫殿鎖金虬氷佩冷風颺紫綃裘五色光中瞻帝所方知碧落勝炎洲香霧濕簾鈎木蘭花癸丑年生日年年三月二是居士始生朝念緑鬢功名初心已負難報劬勞天畱帝城勝處匯平湖逺岫碧岧嶤竹色詩書燕几栁陰桃杏横橋西隣東舍不難招太半是漁樵任翁媪歡呼兒孫歌笑野具村醪醉来更随鶴舞看清風送月過松梢百嵗因何快樂盡從心地逍遥又甲寅三月中澣邀樓大防陳君舉中書兩舍人黄文叔待制彭子壽右史黃子由匠監沈應先大著過桂隠卽席作清明初過後正空翠靄晴鮮念水際樓臺城隅花栁春意無邊清時自多暇日看聮鑣飛葢擁羣賢朱邸横經滿座紫㣲淵思如泉髙情那更屬雲天語笑雜歌絃向啼鴂聲中落紅影裏忍負芳年浮生轉頭是夢恐它時髙㑹却難全快吐淋浪醉墨要令海内喧傳漁家傲漁翁拂拂春風生草際新晴萬景供遊戲鷗鷺飛来斜照裏金和翠分明畫出真山水遮箇漁翁無愠喜乾坤都在孤篷底一曲髙歌千古意閒来睡從敎月到花汀外鵲橋仙立秋後一夕暑雲猶在澄空欲變入夜徘徊庭際新秋知是昨宵来愛殘月纖纖西墜芭蕉老大流螢衰健靜裏細觀天意輕風未有半分涼奈人道今宵好睡栁梢青舟泊秦淮天逺山圍龍蟠淡靄虎踞斜暉幾度功名幾畨成敗渾似鷗飛樓臺一望凄迷筭到底空爭是非今夜潮生明朝風順且送船歸江城子夏夜觀月飛来氷雪冷無聲可中庭骨毛清卧看東南和露兩三星驀地神逰天上去呼彩鳳駕雲軿望舒宫殿玉崢嶸桂千層寶香凝搗藥仙童邀我論長生一笑歸来人未睡花送影上窗櫺昭君怨月夜賞荷花月在碧虛中住人向亂荷中去花氣雜風凉滿船香雲被歌聲揺動酒被詩情掇送醉裏卧花心擁紅衾八聲甘州中秋夜作歎流光迅景百年間能醉幾中秋正凄蛩鳴砌驚烏翻樹烟淡蘋洲誰喚金輪出海不帶一雲浮纔上青林頂俄轉朱樓人老歡情已減料素娥信我不為閑愁念幾畨清夢常是故鄉畱倩風前數聲横管呌玉鸞騎向碧空遊誰能顧黍炊榮利蟻戰怨讐滿江紅小圃玉照堂賞梅呈洪景盧内翰玉照梅開三百樹香雲同色光揺動一川銀浪九霄珂月幸遇勲華時世好歡娛况是張燈夕更不邀名勝賞東風真堪惜盤誥手春秋筆今内相斯文伯肯閒迂軒葢逺過泉石竒事人生能幾見清樽花畔須敎側到鳳池却欲醉鷗邊應難得念奴嬌登平江齊雲樓夜飲雙瑞堂呈雷吏部東呉名勝有髙樓直在浮雲齊處十二䦨干邀逺望歴歴斜陽烟樹香徑人稀屧廊山遶徃事今何許一天和氣爲誰吹散疎雨知是蘭省星即朱輪森㦸與風光為主暇日登携多雅致容我追随臨賦小宴重開晩寒初勁還下危梯去燭蕐紅墜瑞堂猶按歌舞燭影揺紅燈夕玉照堂梅花正開宿雨初乾舞梢烟痩金絲裊嫰雲扶日做新晴舊碧尋芳草幽徑蘭芽尚小怪今年春歸太早栁塘花院萬朶紅蓮一宵開了梅雪翻空忍敎空對東風老粉圍香陣擁詩仙戰退春寒峭現樂歌彈閙曉宴親賓團欒同笑醉歸時候月過珠樓參横蓬島桺塘花院現樂皆家中堂名也滿庭芳促織兒月洗髙梧露漙幽草寳釵樓外秋深土花沿翠螢火墜墻隂静聽寒聲斷續㣲韻轉凄噎悲沉爭求侣殷勤勸織促破曉機心兒時曾記得呼燈灌穴歛歩随音任滿身花影猶自追尋携向畫堂戲鬭亭臺小籠巧粧金今休說從渠牀下涼夜聽孤吟胡仲任名仔苕溪人嘗編漁隠叢話感皇恩自得乞得夢中身歸棲雲水始覺精神自家底峭帆輕棹時與白鷗逰戲畏途多不管風波起光景如梭人生浮靡百嵗何妨盡沉醉卧龍多事謾説三分竒計筭来爭似我長昏睡張東父名震號無隠居士詞甚婉媚葢富貴人語也蝶戀花惜春梅子初青春已暮芳草連雲緑遍西池路小院繡垂簾半舉銜泥紫燕雙飛去人在赤欄橋畔住不解傷春還解相思否清夢欲尋猶間阻紗窗一夜蕭蕭雨鷓鴣天怨别寛盡香羅金縷衣心情不似舊家時萬絲栁暗才飛絮一㸃梅酸已着枝金底背玉東西前歡贏得兩相思傷心不及風前燕猶解穿簾度幕飛又春暮横素橋邉景㝡佳緑波清淺見瓊沙銜泥燕子迎風絮得食魚兒趂浪花春已暮日初斜畫船簫鼓是誰家蘭橈􅁒去空畱戀醉倚䦨干看晩霞驀山溪春半青梅如豆斷送春歸去小綠間長紅看幾處雲歌栁舞偎花識面對月共論心携素手採香逰踏徧西池路水邉朱戸曾記銷䰟處小立背秋千空悵望娉婷韻度楊花撲面香糝一簾風情脉脉酒厭厭囘首斜陽暮又初春春光如許春到江南路桺眼弄晴暉笑梅花落英無數峭寒庭院羅幙護窗紗金鴨暖錦屏深曾記看承處雲邉尺素何計傳心縷無處説相思空惆悵朝雲暮雨曲欄干外小立近黄昏心下事眼邉愁借問春知否韓无咎名元吉號南澗名家文獻政事文學為一代冠冕水龍吟題三峰閣詠英華女子雨餘叠巘浮空望中秀色仙都是洞天未鎖人間春老玉妃曾墜錦瑟繁絃鳯簫清響九霄歌吹問分香舊事劉郎去後知誰伴風前醉囬首暝烟千里但紛紛落紅如泪多情易老青鸞何許詩成誰寄斗轉參横半簾花影一溪寒水悵飛鳬路杳行雲夢斷有三峰翠謁金門春雪春尚淺誰把玉英裁剪儘道梅梢開未遍巻簾花滿院樓上酒融歌暖樓下水平烟逺却似湧金門外見絮飛波影亂水調歌頭九日今日俄重九莫負菊花開試尋髙處携手躡屐上崔嵬放目蒼崖萬仞雲護曉霜成陣知我與君来古寺倚修竹飛檻絕塵埃笑談間風滿座酒盈杯仙人跨海休問随處是蓬莱落日平園西望鼓角秋深悲壯戯馬但荒臺細把茱茰看一醉且徘徊辛㓜安名弃疾號稼軒瑞鶴仙片帆何太急望一葉須㬰去天咫尺舟人好看客似風濤三峽嵳峩劒㦸溪南溪北正遐想幽人泉石被漁樵指㸃危樓却羡舞筵歌席歎息山林鍾鼎意倦情遷本無欣戚轉頭陳迹飛鳥外晩烟碧問誰憐舊日南樓老子㝡愛月明吹笛到而今撲面黃塵欲歸未得又上洪倅壽黄金堆到斗怎得似長生畫堂勸酒蛾眉㝡明秀向水沈烟裏兩行紅袖笙歌撋就爭説道明年時候被常娥做了殷勤仙桂一枝入手知否風流别駕近日人呼文章太守天長地久嵗嵗上乃翁壽記從来人道相門出相金印纍纍儘有但直須周公拜前魯公拜後滿江紅賀王宣子平湖南寇笳鼓歸来舉鞭問何如諸葛人道是匆匆五月渡瀘深入白羽風生貔虎嘯青溪路斷猩鼯泣早紅塵一騎落平岡㨗書急三萬巻龍頭客渾未得文章力把詩書馬上笑驅鋒鏑金印明年如斗大貂蟬却自兜鍪出待刻公勲業等雲霄浯溪石又感興過眼溪山怪都似舊時曾識還記得夢中行遍江南江北佳處徑須携杖去能消幾緉平生屐笑塵勞三十九年非長為客呉楚地東南坼英雄事曹劉敵被西風吹盡了無陳迹樓觀才成人已去旌旗未巻頭先白嘆人間哀樂轉相尋今猶昔又送鄭舜舉赴召湖海平生筭不負蒼髯如㦸聞道是君王着意太平長䇿此老自當兵十萬長安正在天西北便鳳凰飛詔下天来催歸急車馬路兒童泣風雨暗旌旗溼看野梅官栁春風消息莫向蔗菴追笑語只今松竹無顔色問人間誰管别離愁杯中物祝英臺近春晚寶釵分桃葉度烟栁暗南浦怕上層樓十日九風雨斷腸㸃㸃飛紅都無人管倩誰喚流鶯聲住鬢邉覻試把花卜歸期才簪又重數羅帳燈昏哽咽夢中語是他春帶愁来春歸何處又不解帶將愁去水調歌頭盟鷗帶湖吾甚愛千丈翠奩開先生杖履無事一日走千囘凡我同盟鷗鷺今日旣盟之後来徃莫嫌猜白鶴在何處嘗試與偕来破青萍排翠藻立蒼苔窺魚笑汝癡計不解舉吾杯廢沼荒丘疇昔明月清風此夜人世幾懽哀東㟁綠陰少楊栁更須栽又折盡武昌栁挂席上瀟湘二年魚鳥江上笑我徃来忙富貴何時休問離别中年堪恨憔悴鬢成霜絲竹陶冩耳急羽且飛觴序蘭亭歌赤壁綉衣香使君千騎鼓吹風采漢侯王莫把離歌頻唱可惜南樓佳處風月已凄凉在家貧亦好此語試平章酹江月登賞心亭我来吊古上危樓贏得閒愁千斛虎踞龍盤何處是只有興亡滿目栁外斜陽水邉歸鳥隴上吹喬木片帆西去一聲誰噴霜竹却憶安石風流東山嵗晩淚落哀筝曲兒輩功名都付與長日惟消棊局寳鏡難尋碧雲將暮誰勸杯中綠江頭風怒朝来波浪翻屋又西湖和人韻晩風吹雨戰新荷聲亂明珠蒼璧誰把香奩收寳鏡雲錦周遭紅碧飛鳥翻空㳺魚吹浪慣聽笙歌席坐中豪氣看君一飮千石遥想處士風流鶴随人去巳作飛仙客茅舍竹籬今在否松竹已非疇昔欲説當年望湖樓下水與雲寛窄醉中休問斷腸桃葉消息又春恨野棠花落又匆匆過了清明時節剗地東風欺客夢一枕銀屏寒怯曲㟁持觴垂楊立馬此地曾經别樓空人去舊遊飛燕能説聞道綺陌東頭行人曾見簾底纎纎月舊悵春江流不盡新恨雲山千疊料得明朝尊前重見鏡裏花難折也應驚問近来多少華髪水龍吟賞心亭楚天千里清秋水随天去秋無際遥岑逺目獻愁供恨玉簪螺髻落日樓頭斷鴻聲裏江南㳺子把呉鈎看了欄干拍遍無人㑹登臨意休説鱸魚堪鱠儘西風季鷹来未求田問舍怕應羞見劉郎才氣可惜流年憂愁風雨樹猶如此倩何人喚取紅巾翠袖揾英雄淚又壽韓南澗渡江天馬南来幾人真是經綸手長安父老新亭風景可憐依舊夷甫諸人神州沈陸幾曾囘首筭平戎萬里功名本是真儒事君知否况有文章山斗對桐陰滿庭清晝當年堕地而今試看風雲奔走綠野風烟平泉草木東山歌酒待他年整頓乾坤事了為先生壽又再壽韓南澗玉皇金殿微凉看公一試薰風手髙門畫㦸桐陰聞道青青如舊蘭佩空芳蛾眉誰妬無言搔首甚年年却有呼韓塞上人爭問公安否金印明年如斗向中州錦衣如晝依然盛事貂蟬前後鳯麟飛走富貴浮雲我評軒冕不如杯酒待從今痛飮八千餘嵗伴松椿壽又題南澗雙溪樓舉頭西北浮雲倚天萬里須長劒人言此地夜深長見斗牛光燄我覺山髙潭空水冷月明星澹待然犀下看慿欄却怕風雷怒魚龍慘峽束滄江對起過危樓欲飛還歛元龍老矣不妨髙卧氷壺凉簟千古興亡百年悲笑一時登覽問何人又卸片帆沙際繫斜陽纜木蘭花慢送張仲固帥興元漢中開漢業問此地是耶非想劒指三秦君王得意一戰東歸追亡事今不見但山川滿目涙沾衣落日征塵未斷西風塞馬空肥一編書是帝王師小試去征西更草草離筵匆匆去路愁滿旌旗君思我囘首處正江涵秋影鴈初飛安得車輪四角不堪帶減腰圍又送滁州范倅老来情味減對别酒惜流年更屈指中秋十分好月不照人圓無情水都不管共西風只等送歸船秋晚蓴鱸江上夜深兒女燈前征衫便好去朝天玉殿正思賢想夜半恩綸畱敎視草却遣籌邉長安故人問我道愁腸殢酒只依然目斷秋霄落鴈醉来時響空絃摸魚兒莫春更能消幾畨風雨匆匆春又歸去惜春長怕花開早何况落紅無數春且住見説道天涯芳草無歸路怨春不語筭只有殷勤畫簷珠網盡日惹飛絮長門事凖擬佳期又誤娥眉曾有人妬千金縱買相如賦脉脉此情誰訴君莫舞君不見玉環飛燕皆塵土閑愁㝡苦休去倚危欄斜陽正在烟桺斷腸處㝡髙樓洪内翰慶七十金閨老眉壽正如川七十且蕐筵樂天詩句香山裏杜陵酒債曲江邉問何如歌窈窕舞嬋娟更十嵗大公方出將又十嵗武公才入相畱盛事看明年直須腰下添金印莫敎頭上欠貂蟬向人間長富貴地行仙又梅花花知否花一似何即又似沈東陽痩稜稜地天然白冷清清地許多香笑東君還又趂北枝忙着一陣霎時間底雪着一箇缺些兒底月山下路水邉墻清香怕有人知處蒼松側畔竹㫄相怎禁他桃與李少年場千秋嵗建康壽史致道塞垣秋草又報平安好樽俎上英雄表金湯生氣象珠玉霏談笑春近也梅花得似人難老莫惜金樽倒鳳詔看看到畱不住江東小從容帷幄裏整頓乾坤了千百嵗從今盡是中書考沁園春退閒三逕初成鶴怨猿驚稼軒未來甚雲山自許平生意氣衣冠人笑抵死塵埃意倦須還身閑要早豈為蓴羮鱸鱠哉秋江上看驚弦鴈避駭浪船囘東岡更葺茅齋好都把軒窗臨水開要小舟行釣先應種桺疎籬護竹莫礙觀梅秋菊堪餐春蘭可佩畱待先生手自栽沈吟久怕君恩未許此意徘徊又將止酒戒酒杯杯汝来前老子今朝檢㸃形骸甚長年抱病咽如焦釡于今喜眩氣似奔雷汝説劉伶古今達者醉後何妨死便埋渾如此歎汝扵知已真少恩哉更慿歌舞為媒筭合作平居鴆毒猜况愁無小大生扵所愛物無美惡過則為灾與汝成言勿畱亟退吾力猶能肆汝杯杯再拜道麾之即去招則須来聲聲慢滁州作奠枕樓征埃成陣行客相逢都道幻出層樓指㸃簷牙髙處浪湧雲浮今年太守萬里罷長淮千騎臨秋凭欄望有東南佳氣西北神州千古懐嵩人去還笑我身在楚尾呉頭見説弓刀陌上車馬如流從今賞心樂事剰安排酒令詩籌華胥夢願年年人似舊逰洞仙歌壽葉丞相江頭父老説新来朝野都道今年太平也見朱顔緑鬢玉帶金魚相公是舊日中朝司馬遥知宣勸後東閣蕐燈别賜仙韶接元夜問天上幾多春只似人間但長見精神如畫好都取山河獻君王看父子貂蟬玉京迎駕鷓鴣天春日卽事春入平原薺菜花新耕雨後落羣鴉多情白髪春無奈晚日青帘酒易賖閒意態細生涯牛欄西畔有桑麻青裙縞袂誰家女去趂蠶生看外家又秋意枕簟溪堂冷欲秋斷雲依水晚来收紅蓮相倚渾如怨白鳥無言定自愁書咄咄且休休一丘一壑也風流不知筋力衰多少但覺新来懶上樓又春行卽事着意尋春懶便囘何如信歩兩三杯山才好處行還倦詩未成時雨早催携竹杖更芒鞋朱朱粉粉野蒿開誰家寒食歸寧女笑語柔桑陌上来又東陽道中撲面征塵去路遥香篝漸覺水沉消山無重數周遭碧花不知名分外嬌人歷歷馬蕭蕭旌旗又過小紅橋愁邉剰有相思句揺斷吟鞭碧玉梢又陌上柔桑初破芽東隣蠶種已生些平岡細草鳴黃犢斜日寒林㸃暮鴉山逺近路橫斜青旗沽酒有人家城中桃李愁風雨春在溪頭薺菜花菩薩鬘書江西造口壁鬱孤臺下清江水中間多少行人涙西北望長安可憐無數山青山遮不住畢竟江流去江晚正愁予山深聞鷓鴣又稼軒日向兒童説帶湖買得閒風月頭白早歸来種花花巳開功名渾是錯更莫思量着見説小樓東好山千萬重鵲橋仙和廓之弟送祐之歸浮梁小窗風雨從今便憶中夜笑談清軟啼鴉衰栁自無聊更管得離人腸斷詩書事業青氊猶在頭上貂蟬㑹見莫貪風月卧江湖道日近長安路逺蝶戀花送祐之弟衰草殘陽三萬頃不筭飄零天外孤鴻影幾許凄凉須痛飲行人自向江頭醒㑹少離多看兩鬢萬縷千絲何况新来病不是離愁難整頓被他引惹其他恨又戊申元日立春誰向椒盤簪彩勝整整韶華爭上春風鬢徃日不堪重記省為花長抱新春恨春未来時先借問晩恨開遲早又飄零近今嵗花期消息定只愁風雨無慿凖又别意莫向城頭聽漏㸃説與行人黙黙情千萬總是離愁無近逺人間兒女空恩怨錦綉心胷氷雪面舊日詩名曾道空梁燕傾葢未償平日願一盃早唱陽闗勸霜天曉角惜别呉頭楚尾一棹人千里休説舊愁新恨長亭樹今如此宦逰吾倦矣玉人畱我醉明日落花寒食得且住為佳耳清平樂村居茅簷低小溪上青青草醉裏蠻音相媚好白髪誰家翁媪大兒鋤豆溪東中男正織鷄籠㝡喜小兒無頼溪頭卧剝蓮蓬又爲兒鐵柱作靈皇醮罷福禄都来也試引鶴雛花樹下斷了驚驚怕怕從今日日聰明更冝潭妹嵩兄看取辛家鐵柱無灾無難公卿西江月秀骨青松不老新詞玉佩相磨靈槎凖擬泛銀河剰摘天星幾箇奠枕樓東風月駐春亭上笙歌畱君一醉意如何金印明年斗大喜遷鶯荷花暑風凉月愛亭亭無數綠衣持節掩冉如羞參差似妬擁出芙蓉花發歩襯潘娘堪恨貎比六即誰潔添白鷺晩晴時公子佳人竝列休説搴木末當日靈均恨與君王别心阻媒勞交疎怨極恩不甚兮輕絕千古離騷文字芳至今猶未歇都休問但千杯快飲露荷翻葉賀新郎自述甚矣吾衰矣悵平生交逰零落只今餘幾白髪空垂三千丈一笑人間萬事問何物能令公喜我見青山多嫵媚料青山見我應如是情與貎略相似一尊搔首東窗裏想淵明停雲詩就此時風味江左沉酣求名者豈識濁醪妙理囘首呌雲飛風起不恨古人吾不見恨古人不見吾狂耳知我者二三子京仲逺滿江紅乗興西来問誰是平生相識筭惟有瑶臺明月照人如昔萬里凄凉銀世界放敎千丈氷輪出便招邀我軰上層樓橫孤笛陰晴事人難必懽樂處天常惜幸星稀河淡雲收風息更著兩賢陪勝賞此身如與塵寰隔笑謫仙對影足成三空孤寂漢宫春上元前一日立春暖律初回又燒燈市井賣酒樓臺誰將星移萬㸃月滿千街輕車細馬隘通衢蹴起香埃今嵗好土牛作伴挽畱春色同来不是天公省事要一時壮觀特地安排何妨綵樓鼓吹綺席樽罍良宵勝景語邦人莫惜徘徊休敎我癡頑不去年年爛醉金釵洞仙歌次王漕部賞海棠韻東皇着意妙出粧春手㸃綴名花勝扵綉向魚鳬國裏琴鶴堂前仍共賞蜀錦堆紅炫晝妖饒真艷麗盡是天然莫恨無香欠檀口幸今年風雨不苦摧殘還肯為逰人再三畱否筭魏紫姚黃號花王若定價收名未應居右賀新郎中秋試與常娥語問因何年年此夜月明如許萬頃鎔成銀世界是處玉壺風露又豈比尋常三五變化乾坤同一色覺星纒斗柄皆囘互須敎我共分付平生脚踏紅塵處謾紛紛雞蟲厚薄燕鴻来去只有嬋娟多情在依舊當時雅素空自嘆歸心難住畱取清光岷江畔照扁舟送我章江路頻滿引莫匆遽木蘭花慢重九筭秋来景物皆勝賞况重陽正露冷欲霜煙輕不雨玉宇開張蜀人從来好事遇良辰不肯負時光藥市家家簾幙酒樓處處絲簧婆娑老子興難忘聊復與平章也隨分登髙茱茰綴席菊蘂浮觴明年未知誰健笑杜陵底事獨凄凉不道頻開笑口年年落㡌何妨姚令威名寛西溪菩薩鬘春愁斜陽山下明金碧画樓返照融春色睡起揭簾旌玉人蟬鬢輕無言空佇立花落東風急燕子引愁来眉心那得開又别恨夢中不記江南路玉釵翠鬢驚春去午醉晩来醒暝烟花上輕紅綃空浥淚錦字慿誰寄衫薄暖香銷相思雲水遙憶王孫春情毿毿楊栁綠初低澹澹梨花開未齊樓上情人聽馬嘶憶郎歸細雨春風溼酒旗生查子情景郎如陌上塵妾似堤邉絮相見兩悠揚蹤跡無尋處酒面撲春風涙眼零秋雨過了别離時還解相思否踏莎行秋思蘋葉烟深荷花露溼碧蘆紅蓼秋風急採菱渡口日將沉飛鴻樓上人空立彩鳳難雙紅綃暗泣回紋未剪呉刀澁夢雲歸處不畱蹤厭厭一夜凉蟾入花菴詞選續集巻三
