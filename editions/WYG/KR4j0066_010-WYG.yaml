body:
  text: 花菴詞選巻十宋黄昇撰宋詞閨秀吳城小龍女清平樂令黄魯直登荆州亭柱間有此詞魯直悽然曰似為余發也筆勢類女子又有泪眼不曽晴之語疑其鬼也是夕有女子見夢曰我家豫章吳城山附客舟至此墮水死登江亭有感而作不意公能識之魯直驚悟曰此必吳城小龍女也簾巻曲䦨獨倚山展暮天無際泪眼不曾晴家在吳頭楚尾數㸃雪花亂委撲鹿沙鷗驚起詩句欲成時没入蒼烟叢裏魏夫人曽子宣丞相之内子菩薩鬘春景溪山掩映斜陽裏樓臺影動鴛鴦起隔岸兩三家出牆紅杏花緑楊堤下路早晚溪邊去三見柳綿飛離人猶未歸又夏紅樓斜倚連溪曲樓前溪水凝寒玉蕩漾木蘭船船中人少年荷花嬌欲語笑入鴛鴦浦波上暝烟低菱歌月下歸武陵春别情小院無人簾半卷獨自倚䦨時寛盡春來金縷衣憔悴有誰知玉人近日音書少應是怨來遲夢裏長安早晚歸和泪立斜暉好事近恨别雨後曉寒輕花外曉鶯啼歇愁聽隔溪殘漏正一聲凄咽不堪西望去程賖離腸萬回結不似海棠花下按凉州時節減字木蘭花春晚落花飛絮杳杳天涯人甚處欲寄相思春盡衡陽鴈漸稀離腸泪眼腸斷泪痕流不斷明月西樓一曲䦨干一倍愁阮郎歸别意夕陽樓外落花飛晴空碧四垂去帆囘首巳天涯孤烟巻翠微樓上客鬢成絲歸期未有期斷魂不忍下危梯桐陰月影移江神子春恨别郎容易見郎難幾何般懶臨鸞憔悴容儀陡覺縷衣寛門外紅梅將謝也誰信道不曽看曉粧樓上望長安怯輕寒莫慿䦨嫌怕東風吹恨上眉端為報歸期須及早休誤妾一春閒李易安趙明誠之妻善為詞有漱玉集三巻漁家傲記夢天接雲濤連曉霧星河欲轉千㠶舞彷彿夢魂歸帝所聞天語殷勤問我歸何處我報路長嗟日暮學詩謾有驚人句九萬里風鵬正舉風休住蓬舟吹取三山去一剪梅别愁紅藕香殘玉簟秋輕解羅裳獨上蘭舟雲中誰寄錦書來鴈字囘時月滿一本有西字方叶調樓花自飄零水自流一種相思兩處閒愁此情無計可消除才下眉頭却上心頭如夢令酒興常記溪亭日暮枕醉不知歸路興盡晚囘舟誤入藕花深處爭渡爭渡驚起一行鷗鷺又苕溪漁隱云近時婦人能文詞如李易安頗多佳句如云緑肥紅瘦此語甚新昨夜雨疎風驟濃睡不消殘酒試問巻簾人却道海棠依舊知否知否應是緑肥紅瘦醉花陰九日薄霧濃雲愁永晝瑞腦銷金獸時節又重陽玉枕紗厨半夜凉初透東籬把酒黄昏後有暗香盈袖莫道不銷魂簾巻西風人似黄花瘦念奴嬌春情蕭條庭院又斜風細雨重門須閉寵柳嬌花寒食近種種惱人天氣險韻詩成扶頭酒醒别是閒滋味征鴻過盡萬千心事難寄樓上幾日春寒簾垂四面玉䦨干慵倚被冷香銷新夢覺不許愁人不起清露晨流新桐初引多少遊春意日髙烟歛更看今日晴未前輩嘗稱易安緑肥紅瘦為佳句余謂此篇寵柳嬌花之語亦甚竒俊前此未有能道之者蝶戀花離情暖雨和風初破凍柳潤梅輕巳覺春心動酒意詩情誰與共泪融殘粉花鈿重乍試夾衣金縷縫山枕欹斜枕損釵頭鳯獨抱濃愁無好夢夜䦨猶剪燈花弄鳳皇臺上憶吹簫香冷金猊被翻紅浪起來慵自梳頭任寳奩塵滿日上簾鈎生怕離懐别苦多少事欲説還休新來瘦非干病酒不是悲秋休休這囘去也千萬遍陽關也則難留念武陵人逺烟鎻秦樓惟有樓前流水應念我終日凝眸凝眸處從今又添一段新愁孫夫人名道絢號冲虚居士黄榖城之母滴滴金梅月光飛入林前屋風策策度庭竹夜半江城擊柝聲動寒梢棲宿等閒老去年華促秪有江梅伴幽獨夢繞夷門舊家山恨驚囘難續菩薩鬘梅䦨干六曲天圍碧松風亭下梅梢白臘盡見春囘寒花驚又開曲瓊閒不捲沈燎孤星轉凝竚小徘徊雲間征鴈來清平樂雪悠悠颺颺做盡輕模樣半夜蕭蕭忩外響多在梅邊竹上朱樓向曉簾開六花片片飛來無奈熏爐烟霧騰騰扶上金釵醉思仙寓居妙湛悼亡作此晚霞紅看山迷暮靄烟暗孤松動翩翻風袂輕若驚鴻心似鑑鬢如雲弄清影月明中謾悲凉歲冉冉蕣華潜改衰容前事銷凝久十年光景匆匆念雲軒一夢囘首春空彩鳳逺玉簫寒夜悄悄恨無窮歎黄塵久埋玉斷腸揮泪東風如夢令宫詞翠擘紅蕉影亂月上朱闌一半風自碧空來吹落歌珠一串不見不見人被綉簾遮斷吳淑姬女流中黠慧者有詞五巻名陽春白雪佳處不減李易安也小重山春愁謝了荼䕷春事休無多花片子綴枝頭庭槐影碎被風揉鶯雖老聲尚帶嬌羞獨自倚粧樓一川烟草浪襯雲浮不如歸去下簾鈎心兒小難著許多愁惜分飛送别岸栁依依拖金縷是我朝來别處惟有多情絮故來衣上留人住兩眼啼紅空彈與未見桃花又去一片征帆舉斷腸遙指苕溪路祝英臺近春恨粉痕銷芳信斷好夢久無據病酒無聊欹枕聽春雨斷腸曲曲屏山温温沈水都是舊看承人處久離阻應念一㸃芳心閒愁知幾許偷照菱花清瘦自羞覷可堪梅子酸時楊花飛絮亂鶯啼催將春去阮氏阮逸之女工於文詞惟此曲傳於世花心動春詞仙苑春濃小桃開枝枝巳堪攀折乍雨乍晴輕暖輕寒漸近賞花時節柳搖臺榭東風軟簾櫳静幽禽調舌斷魂逺閒尋翠徑頓成愁結此恨無人共説還立盡黄昏寸心空切强整綉衾獨掩朱扉簟枕為誰鋪設夜長更漏傳聲逺紗忩映銀缸明滅夢囘處梅梢半籠淡月盧氏蝶戀花天聖中隨父往漢州作縣令歸題泥溪驛蜀道青天烟靄翳帝里繁華迢逓何時至囘望錦川揮粉泪鳳釵斜嚲烏雲膩綬帶雙垂金鏤細玉珮珠璫露滴寒如水從此鸞粧添逺意畫眉學得遙山翠聶勝瓊鷓鴣天玉慘花愁出鳳城蓮花樓下柳青青尊前一唱陽關曲别箇人人第五程尋好夢夢難成有誰知我此時情枕前泪共堦前雨隔箇忩兒滴到明陳鳳儀成都樂妓一落索送蜀守蔣龍圖蜀江春色濃如霧擁雙旌歸去海棠也似别君難一㸃㸃啼紅雨此去馬蹄何處沙堤新路禁林賜宴賞花時還憶著西樓否陸氏侍兒如夢令送别日暮馬嘶人去船逐清波東注後夜最髙樓還肯思量人否無緒無緒生怕黄昏疎雨花菴詞選巻十
