body:
  text: 花菴詞選巻五宋黄昇撰宋詞晁无咎名補之濟北人永遇樂東臯寓居松菊堂深芰荷池小長夏清暑燕引雛還鳩呼婦往人静郊原趣麥天已過薄衣輕扇試起遶園徐步聽衡宇欣欣童稚共說夜來初雨蒼苔徑裏紫葳枝上數㸃幽花垂露東里催鋤西鄰助餉相戒清晨去斜川歸興翛然滿目囘首帝鄉何處只愁恐輕鞍犯夜霸陵舊路摸魚兒幽居愛真西山絶此詞買陂塘旋栽楊栁依稀淮岸湘浦東臯雨足輕痕漲沙觜鷺來鷗聚堪愛處最好是一川夜月光流渚無人自舞任翠幕張天柔茵藉地酒盡未能去青綾被休憶金閨故步儒冠曽把身誤弓刀千騎成何事荒了召平𤓰圃君試覷滿青鏡星星鬢影今如許功名浪語便做得班超封侯萬里歸計恐遲暮借分飛湖州作山水光中元無暑是我銷䰟别處只有多情雨會人深意留人住不及梅花來暮未見荷花又去圖畫他年覷斷腸千古苕溪路憶少年送别無窮官栁無情畫舸無根行客南山尚相送只髙城人隔罨畫園林溪紺碧算重來盡成陳迹劉郎鬢如此況桃花顏色臨江仙别意身外閒愁空滿眼就中歡事常稀明年應賦送春詩試從今夜數相㑹幾多時淺酒欲邀誰共歡深情惟有君知東溪春近好同歸栁垂江上影梅謝雪中枝洞仙歌泗州中秋作此絶筆之詞也青烟幕處碧海飛金鏡永夜閒階卧桂影露凉時零亂多少寒螿神京逺惟有藍橋路近水晶簾不下雲母屏開冷浸佳人淡脂粉待都將許多明付與金尊投曉共流霞傾盡更携取胡床上南樓看玉做人間素秋千頃晁叔用感皇恩寒食寒食不多時牡丹初賣小院重簾燕飛礙昨宵風雨尚有一分春在今朝猶自得陰晴快熟睡起來宿酲微帶不惜羅襟揾眉黛日長梳洗看看花影移改笑拈雙杏子連枝戴又春情胡蝶滿西園啼鶯無數水閣橋南路凝竚兩行烟栁吹落一池風絮秋千斜挂起人何處把酒勸君閒愁莫訴留取笙歌住休去幾多春色怎禁許多風雨海棠花謝也君知否玉胡蝶春思目斷江南千里灞橋一望烟水微茫晝鎖重門人去暗惜流光雨輕輕棃花院落風淡淡楊栁池塘恨偏長佩沈湘浦雲散髙唐清狂重來一夢手搓梅子煮酒新嘗寂寞經春小橋依舊燕飛忙玉鈎䦨凭多漸暖金縷枕别久猶香最難忘看花南陌待月西廂傳言玉女上元一夜東風吹散柳梢殘雪御樓烟暖對鰲山彩結簫鼓向晚鳯輦初囘宮闕千門燈火九衢風月綉閤人人乍嬉遊困又歇艶粧初試把珠簾半揭嬌波溜人手撚玉梅低說相逢長是上元時節如夢令春情牆外轆轤金井驚夢瞢騰初省深院閉斜陽燕入陰陰簾影人静人静花落鳥啼風定張子野名先乃宋子京稱為雲破月來花弄影郎中者也天仙子春恨水調數聲持酒聽午醉醒來愁未醒送春春去幾時囘臨晩鏡傷流景往事悠悠空記省沙上竝禽池上暝雲破月來花弄影重重翠幙密遮燈風不定人初静明日落紅應滿徑醉落魄美人吹笛雲輕栁弱内家髻子新梳掠生香真色人難學横筦孤吹月淡天垂幕朱唇淺破櫻桃萼倚樓人在䦨干角夜寒指冷羅衣薄聲入霜林蔌蔌飛梅落浣溪沙江景樓倚江邊百尺髙烟中還未見歸橈幾時期信似春潮花片片飛風弄蝶栁陰陰下水平橋日長才過又今宵青門引春思乍暖還輕冷風雨晩來方定庭軒寂寞近清明殘花中酒又是去年病樓頭畫角風吹醒入夜重門静那堪更被明月隔牆送過秋千影滿江紅初春飄盡寒梅笑粉蝶遊蜂未覺漸迤􅆔水明山秀暖生簾幕過雨小桃紅未透舞烟新栁青猶弱記畫橋深處水邊亭曽偷約多少恨今猶昨愁和悶都忘却􅂸從前爛醉被花迷着晴鴿試鈴風力軟雛鶯弄舌春寒薄但只愁錦繡閙粧時東風惡行香子美人舞雪歌雲閒淡粧勻藍溪水深染輕裙酒香熏臉粉色生春更巧談話美情性好精神空江無伴凌波何處月橋邊青栁朱門斷鐘殘角又送黄昏奈心中事眼中泪意中人清平樂末二句最工清歌逐酒醉臉鮮霞透櫻小杏青寒食後衣換縷金輕綉畫堂新月朱扉嚴城夜鼓歸遲細看玉人粧面春工不在花枝李元膺洞仙歌一年春物惟梅栁間意味最深至鶯花爛漫時則春已衰遲使人無復新意予作洞仙歌使探春者歌之無後時之悔雪雲散盡放曉晴庭院楊栁於人便青眼更風流多處一㸃梅心相映逺約略嚬輕笑淺一年春好處不在濃芳小艶疎香最嬌軟到清明時候百紫千紅花正亂已失春風一半蚤占取韶光共追遊但莫管春寒醉紅自暖又雨廉纎細雨殢東風如困縈斷千絲為誰恨向楚宮一夢多少悲凉無處問愁到而今未盡分明都是泪泣栁沾花常與騷人伴孤悶記當年得意處酒力方酣怯輕寒玉爐香潤又豈識情懷苦難禁對㸃滴簷聲夜寒燈暈茶瓶兒悼亡去年相逢深院宇海棠下曽歌金縷歌罷花如雨翠羅衫上㸃㸃紅無數今歲重尋携手處空物是人非春暮囘首青門路亂紅飛絮相逐東風去鷓鴣天春情寂寞秋千兩綉旗日長花影轉堦遲燕驚午夢周遮語蝶困春遊落托飛思往事入顰眉栁梢陰重又當時薄情風絮難拘束飛過東牆不肯歸王通叟名觀著有冠栁集序者稱其髙於柳詞故曰冠栁至於踏青一詞又不獨冠栁詞之上也踏青詞即慶清朝慢今載于首慶清朝慢踏青調雨為酥催氷做水東君分付春還何人便將輕暖㸃破殘寒結伴踏青去好平頭鞋子小雙鸞煙郊外望中秀色如有無間晴則箇陰則箇餖飣得天氣有許多般須敎鏤花撥栁爭要先看不道吳綾綉襪香泥斜沁幾行斑東風巧盡收翠緑吹在眉山風流楚楚詞林中之佳公子也世謂栁耆卿工為浮艶之詞方之此作蔑矣詞名冠栁豈偶然哉清平樂擬太白應制黄金殿裏燭影雙龍戲勸得官家真箇醉進酒猶呼萬歲美人舞徹梁州天恩與整搔頭一夜御前宣住六宮多少人愁又同前宜春小苑處處花開滿學得紅粧紅要淺催上金車要看君王曲宴瑤池小舟掠水如飛奪得錦標歸去匆匆不惜羅衣雨中花令呈元厚之百尺清泉聲陸續映瀟洒碧梧翠竹面千步囘廊重重簾幕小枕欹寒玉試展鮫綃看畫軸見一派瀟湘凝綠待玉漏穿花銀河垂地月上䦨干曲木蘭花令栁銅駝陌上新正後第一風流除是栁勾牽春事不如梅斷送離人强似酒東君有意偏撋就慣得腰肢真箇瘦阿誰道你不思量因甚眉頭長恁皺生查子關山䰟夢長塞鴈音書少兩鬢可憐青一夜相思老歸傍碧紗窓說與人人道真箇别離難不似相逢好卜算子送鮑浩然之湘東水是眼波横山是眉峯聚欲問行人去那邊眉眼盈盈處才始送春歸又送君歸去若到江南趕上春千萬和春住菩薩鬘歸思單于吹落山頭月漫漫江上沙如雪誰唱縷金衣水寒船舫稀蘆花楓葉浦憶抱琵琶語身未發長沙夢魂先到家江城梅花引年年江上見寒梅暗香來為誰開疑是月宮仙子下瑤臺冷艶一枝春在手故人逺相思寄與誰怨極恨極嗅香蘂念此情家萬里暮霞散綺楚天碧片片輕飛為我多情特地㸃征衣花易飄零人易老正心碎那堪塞管吹田不伐工於樂府南柯子春景夢怕愁時斷春從醉裏囘悽凉懷抱向誰開些子清明時候被鶯催栁外都成絮闌邊半是苔多情簾燕獨徘徊依舊滿身花雨又歸來又春思團玉梅梢重香羅芰扇低簾風不動蝶交飛一樣綠陰庭院鎖斜暉對月懷歌扇因風念舞衣何須惆悵惜芳菲􅂸却一年憔悴待春歸汪正夫名輔之行香子記恨晩綠寒紅芳意匆匆惜年華今與誰同碧雲零落數字賔鴻看渚蓮凋宮扇舊怨秋風流波墜葉佳期何在想天敎離恨無窮試將前事閒倚梧桐有銷䰟處明月夜錦屏空趙承之名鼎臣仕宣和中自開封少尹除少蓬以右文撰除知鄧州召為太府卿卒贈待制念奴嬌送王長卿赴河間司録舊遊何處記金湯形勝蓬瀛佳麗綠水芙蓉元帥與賔僚風流濟濟萬栁亭邊雅歌堂上醉倒春風裏十年一夢覺來烟水千里惆悵送子重遊南樓依舊否朱䦨誰倚要識當時惟是有明月曽陪珠履量減盃中雪添頭上甚矣吾衰矣酒徒相問為言憔悴如此章質夫名楶水龍吟栁花燕忙鶯懶花殘正堤上栁花飄墜輕飛㸃畫青林誰道全無才思閒趂游絲静臨深院日長門閉傍珠簾散漫垂垂欲下依前被風扶起蘭帳玉人睡覺怪春衣雪霑瓊綴綉床漸滿香毬無數才圓却碎時見蜂兒仰粘輕粉魚吞池水望章臺路杳金鞍遊蕩有盈盈泪傍珠簾散漫數語形容盡矣劉仲方六州歌頭項羽廟秦亡草昧劉項起吞并驅龍虎鞭寰宇斬長鯨掃攙搶血染彭門戰視餘耳皆鷹犬平禍亂歸炎漢勢奔傾兵散月明風急旌旗亂刁斗三更命虞姬相對泣聽楚歌聲玉帳魂驚泪盈盈恨花無主凝愁緒揮雪刄掩泉扄時不利騅不逝困陰陵叱追兵喑嗚摧天地望歸路忍偷生功葢世成閒紀建遺靈江静水寒烟冷波紋細古木凋零遣行人到此追念痛傷情勝負難慿水調歌頭落日塞垣路風勁戞貂裘翩翩數騎閒獵深入黒山頭極目平沙千里惟見琱弓白羽鐵面駭驊騮隱隱望青冢特地起閒愁漢天子方鼎盛四百州玉顏皓齒深鎖三十六宮秋堂有經綸賢相邊有縱横謀將不作翠蛾羞寰宇和樂也聖主永無憂聶冠卿多麗想人生美景良辰堪惜向其間賞心樂事古來難是并得況東城鳯臺沁苑泛晴波淺照金碧露洗華桐煙霏絲柳綠陰搖曳蕩春一色畫堂逈玉簪瓊珮髙會盡詞客一本於此分段清歡久重然絳蠟别就瑤席有翩若輕鴻體態暮為行雨標格逞朱唇緩歌妖麗似聽流鶯亂花隔慢舞縈囘嬌鬟低嚲腰肢纎細困無力忍分散彩雲歸後何處更尋覓休辭醉明月好花莫謾輕擲冠卿之詞不多見如此篇亦可謂才情富麗矣其露洗華桐四句又所謂玉中之拱璧珠中之夜光毎一觀之撫玩無斁栁耆卿名永長於纎艶之詞然多近俚俗故市井之人悅之今取其尤佳者醉蓬萊慶老人星現漸亭臯葉下隴首雲飛素秋新霽華闕中天鎻葱葱佳氣嫩菊黄深拒霜紅淺近寶階香砌玉宇無塵金莖有露碧天如水正直昇平萬機多暇夜色澄鮮漏聲迢逓南極星中有老人呈瑞此際宸遊鳯輦何處度管絃聲脆太液波翻披香簾捲月明風細永為屯田員外郎會太史奏老人星見時秋霽宴禁中仁宗命左右詞臣為樂章内侍屬栁應制栁方冀用作此詞奏呈上見首有漸字色若不懌讀至宸遊鳯輦何處乃與御製真宗挽詞暗合上慘然又讀至太液波翻曰何不言波澄投之於地自此不復擢用滿江紅桐川暮雨初收長江静征㠶夜落臨島嶼蓼烟疎淡葦風蕭索幾許漁人横短艇盡將燈火歸村郭遣行客到此念囘程傷漂泊桐江好煙漠漠波似染山如削遶嚴陵灘畔鷺飛魚躍游宦區區成底事平生況有林泉約歸去來一曲仲宣樓從軍樂換頭數語最工木蘭花慢清明拆桐花爛漫乍疎雨洗清明正艶杏燒林緗桃綉野芳景如屏傾城盡尋勝賞驟雕鞍紺幰出郊坰風暖繁絃脆管萬家競奏新聲盈盈鬭草踏青人艶冶逓逢迎向路傍往往遺簪墮珥珠翠縱横歡情對佳麗地任金罍罄竭玉山傾􅂸却明朝永日畫堂一枕春醒玉胡蝶春遊漸覺東郊明媚夜來膏雨一洒塵埃滿目淺桃深杏露染烟裁銀塘静魚鱗簟展煙岫翠龜甲屏開殷晴雷雲中鼓吹遊徧蓬萊徘徊隼旟前後三千珠履十二金釵雅俗熙熙下車成宴盡春臺好雍容東山妓女堪笑傲北海樽罍且追陪鳯池歸去那更重來又秋思望處雨收雲斷凭欄悄悄目送秋光晚景蕭疎堪動宋玉悲凉水風輕蘋花漸老月露冷梧葉飄黄遣情傷故人何在煙水茫茫難忘文期酒會幾辜風月屢變星霜海闊山遙未知何處是瀟湘念雙燕難慿逺信指暮天空識歸航黯相望斷鴻聲裏立盡斜陽雨零鈴秋别寒蟬凄切對長亭晚驟雨初歇都門帳飲無緒方留戀處蘭舟催發執手相看泪眼竟無語凝噎念去去千里烟波暮靄沈沈楚天濶多情自古傷離別更那堪冷落清秋節今宵酒醒何處楊栁岸曉風殘月此去經年應是良辰好景虛設便縱有千種風流待與何人說二郎神七夕炎光謝過暮雨芳塵輕洒乍露冷風清庭户爽天如水玉鈎遙掛應是星娥嗟久阻叙舊約飇輪欲駕極目處微雲暗度耿耿銀河髙瀉閒雅須知此景古今無價運巧思穿針樓上女擡粉面雲鬟相亞鈿合金釵私語處算誰在囘廊影下願天上人間占得歡娛年年今夜柳腰輕贈妓英英妙舞腰肢軟章臺柳昭陽燕錦衣冠葢綺堂筵宴是處千金爭選顧香砌絲管初調倚輕風珮環微顫乍入霓裳促遍逞盈盈漸催檀板慢垂霞袖急趨蓮步進退奇容千變算何止傾國傾城暫囘眸萬人腸斷晝夜樂贈妓秀香家住桃花徑算神仙才堪竝層波細翦明眸膩玉圓搓素頸愛把歌喉當筵逞遏天邊亂雲愁凝言語似嬌鶯一聲聲堪聽洞房飲散簾幃静擁香衾歡心稱金爐麝褭青煙鳯帳燭搖紅影無限狂心乘酒興這歡娛漸入佳境猶自怨鄰雞道秋宵不永此詞麗以淫不當入選以東坡嘗引用其語故録之甘草子秋暮亂洒衰荷顆顆真珠雨雨過月華生冷徹鴛鴦浦池上凭闌無語奈此箇單悽情緒却傍金籠敎鸚鵡念粉郎言語少年遊長安古道馬遲遲髙栁亂蟬嘶夕陽島外秋風江上目斷四天垂歸雲一去無蹤跡何處是前期狎興生疎酒徒蕭索不似少年時鄭毅夫名獬在仁宗朝舉進士第一好事近初春江上探春囘正值早梅時節兩行小槽雙鳯按凉州初徹謝娘扶下綉鞍來紅靴踏殘雪歸去不須銀燭有山頭明月花菴詞選巻五
