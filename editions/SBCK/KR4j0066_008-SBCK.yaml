seq: 8
front:
  text: 窮風雪飄零望迷萬里雲垂凍紅綃碎剪凝酥䌓綴煙深霜重踈影沈波暗香和月横斜浮動悵别來欲把芳菲􅀉逺還􅆧管吹三弄寂寞玉人睡起涴殘粧不勝嬌鳳盈盈山館紛紛江路相思誰共才與風流賦稱清艶多情唯宋筭襄王枉􅀍棃花瘦損又成春夢
  hash: sha256:77115076c16923379e78ca51c015fd96c5b5df198ecc85d9f7ed8effa7b71d6b
body:
  text: 惜餘春慢情景弄月餘花團風輕絮露濕池塘春草鶯鶯戀友燕燕鷓鴣天上元紫禁烟花一萬重鼇山宫闕􅀮晴空玉皇端拱彤雲上人物嬉游陸海中星轉斗駕囘龍五侯池館醉春風而今白髮三千丈愁對寒燈數􅀧紅阮郎㱕乙夘番陽道中江南江北雪漫漫遥思易水寒同雲深處是三関㫁腸山又山天可老海能翻消除此恨難頻聞遣使報平安幾時鸞輅還清平樂詠木犀贈韓叔夏吳頭楚尾踏破芒鞋底散入千岩秋色裏不柰惱人小冲山􅀄夏花過園林清䕃濃琅玕新脫笋緑成􅓜語聲只在小樓東閑欹枕敵靣芰荷風長日敞簾櫳輕塵飛不到画堂窓一尊今夜與誰同人如玉相對月明中菩薩蠻初夏落花迤邐層隂少青梅競弄枝頭小江色雨和烟行人江那邉好花都過了滿地空芳草落日醉醒間一春無此寒驀山溪惜别想伊不住船在藍橋路別語未甘聽更􅃘問而今是菩薩蠻春赤欄橋盡香街直籠街細栁嬌無力金碧上晴空花晴簾影紅黄衫飛白馬日日青樓下醉眼不逢人午香吹暗塵菩薩蠻春詞緑蕪墻遶青苔院中庭日淡巴蕉卷胡蝶上堦飛風簾自在垂玉鈎雙語燕寶甃楊花轉幾處簸錢聲緑窓春夢輕菩薩蠻清明池塘淡淡浮鸂鶒杏花吹盡垂楊碧天氣度清明小園新雨晴緑窓描綉罷笑語荼䕷下圍坐賭青梅困從雙臉來謁金門春晚愁脉脉目㫁江南江北烟樹重重芳信隔小樓山幾尺細草􅀌雲斜日一向弄晴天色簾外落花飛不得東風無氣力謁金門春晚花滿院飛去飛來雙燕紅雨入簾寒不卷曉屏山六扇翠袖玉笙悽㫁脉脉兩蛾愁淺消息不知郎近逺一春長夢見謁金門寒食栁絲碧栁下人家寒食鶯語匆匆花寂寂玉堦春蘚濕閑凭熏籠無力心事有誰知得檀炷繞窓燈背壁画簷殘雨滴臨江仙有感四海十年兵不解胡塵直到江城歳華銷盡客心驚踈髯渾似雪衰涕欲生氷送老虀塩何處是我縁應在吳興故人相望若為情別愁深夜雨􅀌影小窓燈山花子佳人鬆慢梳頭淺画眉亂鶯殘夢起多時不道小庭花露濕剪荼䕷簾額好風低燕子窓油晴日打蜂兒翠袖粉牋閑弄筆寫新詩浣溪沙佳人淺画香膏拂紫綿牡丹花重翠雲偏手挼梅子並郎肩病起心情終是怯困來模様不禁憐旋移針線小姑前浣溪沙夜景短燭熒熒照碧窓重重簾幕護梨霜幽􅂬不怕夜偏長羅襪鈿筝紅粉醉曲屏深幔緑橙香征鴻雖逺㫁人腸鷓鴣天憶舊小市橋彎更向東便門長記舊相逢踏青㑹散秋千下􅁂影衣香怯晚風悲徃事向􅀌鴻㫁腸腸㫁舊情濃梨花院落黄茅店綉􅀍春寒此夜同豆葉黄初夏粉墻丹柱栁隂中簾幙輕明花影重午醉醒來一靣風緑葱葱幾顆櫻桃葉底紅豆葉黄新晴樹頭初日鵓鴣鳴野店山橋新雨晴短􅄄無泥竹杖青玉案旅情碧山錦樹明秋霽路轉􅈝疑無地忽有人家臨曲水竹籬茅舍酒旗沙岸一簇漁樵市凄凉只恐鄉心起鳳樓逺囘頭謾凝睇何處今宵􅀌館裏一聲征鴈半窓殘月揔是離人淚青玉案旅情田園有計㱕湏早在家縱貧亦好南去北來何日了光隂送盡可憐青􅁂暗逐流年老寂寥􅀌館殘燈照正鄉思驚時夢初覺落月蒼蒼関河曉一聲雞唱馬嘶人起又上長安道如夢令春情門外緑隂千頃兩兩黄鸝相應睡起不勝情行到碧梧金井人静人静風動一庭花影驀山溪梅洗粧眞態不假鈆華御竹外一枝斜想佳人天寒日暮黄昏小院無處着清香風細細雪垂垂何况江頭路月邊踈影夢到消魂處結子欲黄時又湏作廉纎微雨􅀌芳一世供㫁有情愁消痩損東陽也試問花知否好事近梅花凡客不須朱粉涴天真嫌怕太紅白􅅏取黛眉淺處画章臺春色唐宋諸賢絶妙詞選卷之八
