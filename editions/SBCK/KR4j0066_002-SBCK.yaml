front:
  text: 遊冶處樓髙不見章臺路雨横風狂三月暮門掩黄昏無計留春住淚眼問花花不語亂紅飛過秋千去
  hash: sha256:7c87344f99c1e4b9864c07fdc927855b1e5c7996cd9af896e482f11501064ce9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4j0066_SBCK_001-20b}
body:
  text: 蝶戀花春情海燕雙飛㱕画棟簾幕無風花影頻移動半醉騰騰春睡重緑鬟堆枕香雲擁翠􅀍􅀟盤金縷鳳憶淂前春有箇人人共花裏鶯聲時一弄日斜驚起相思夢蝶戀花初春南鴈依俙囬側陣雪霽墻隂遍覺蘭芽嫰中夜夢餘消酒困爐香捲穗燈生暈急景流年都一瞬徃事前􅂬未免縈方寸臘後花期知漸近東風已作寒梅信蝶戀花清明六曲闌干偎碧􅀣楊栁風輕展盡黄金縷誰抱鈿筝移玉柱穿簾海燕雙飛去滿眼遊絲兼落絮紅杏開時一霎清明雨濃醉覺來鶯亂語驚殘好夢無㝷處浣溪沙春思葉底青青杏子垂枝頭薄薄栁綿飛日髙深院晚鶯啼堪恨風流成薄倖㫁無消息道㱕期托腮無語翠眉低浣溪沙湖景湖上朱橋響画輪溶溶春水浸春雲碧琉璃滑浄無塵當路遊絲縈醉客隔花啼鳥喚行人日斜㱕去柰何春浣溪沙湖上堤上遊人逐画船拍堤春水四垂天緑楊樓外出秋千白髪戴花君莫笑六么催拍盞頻傳人生何處似尊前浣溪沙春半青杏園林煑酒香佳人初試薄羅裳栁絲揺曵燕飛忙乍雨乍晴花自落閑愁閑悶日偏長為誰消痩减容光採桑子頴州西湖群芳過後西湖好狼藉殘紅飛絮濛濛垂栁闌干盡是風笙歌散盡遊人去始􅁴春空垂下簾櫳雙燕㱕來細雨中採桑子西湖荷花開後西湖好載酒來時不用旌旗前後紅幢緑盖隨画船撑入花深處香泛金巵烟雨㣲微一片笙歌醉裏㱕踏莎行相别候舘梅殘溪橋栁細草芳風暖摇征轡離愁漸逺漸無窮迢迢不㫁如春水寸寸柔腸盈盈粉淚樓高莫近危闌􅀝平蕪盡處是春山行人更在春山外句意最工生查子别恨含羞整翠鬟淂意頻相顧鴈柱十三絃一一春鶯語嬌雲容易飛夢㫁知何處深院鎻黄昏陣陣芭蕉雨阮郎㱕踏青南園春半踏青時風和聞馬嘶青梅如豆栁如眉日長胡蝶飛花露重草烟低人家簾幕垂秋千慵困解羅衣画梁雙燕棲訴􅂨情眉意清晨簾幕卷輕霜呵手試梅粧都縁自有離恨故画作逺山長思徃事惜流芳易成傷擬歌先咽欲笑還顰最㫁人腸木蘭花西湖西湖南北烟波闊風裏絲篁聲韻咽舞餘羅帶緑􅀟垂酒入香腮紅一抹杯深不􅁴琉璃滑貪看六么花十八明朝車馬各西東惆悵画樓風與月玉樓春别恨春山歛黛低歌扇暫解吳鈎登祖宴画樓鐘動已魂消何况馬嘶芳草岸青門栁色隨人逺望欲㫁時腸已㫁洛城春色待君來莫待落花飛似霰漁家傲小春十月小春梅蘂綻紅爐煖閤新粧遍錦帳美人貪睡暖羞起􅂴玉壺一夜氷凘滿樓上四垂簾不捲天月蝶戀花中春花褪殘紅青杏小燕子飛時緑水人家遶枝上栁綿吹又少天涯何處無芳草墻裏秋千墻外道墻外行人墻裏佳人笑笑漸不聞聲漸杳多情却􅀍無情惱洞仙歌公自序云僕七歳時見眉州老尼姓朱忘其名年九十餘自言甞隨其師入蜀主孟昶宫中一日大􅀬主與花蘂夫人夜起避暑摩訶池上作一詞朱具能記之今四十年朱巳死乆矣人無知此詞者獨記其首兩句暇日㝷味豈洞仙歌令乎乃為足之云氷肌玉骨自清凉無汗水殿風來暗香滿綉簾開一􅀧明月窺人人未寢欹枕􅁫横􅁂亂起來携素手庭戸無聲時見踈星度河漢試問夜如何夜已三更金波淡玉繩低轉但屈指西風幾時來又不道流年暗中偷換漁家傲金陵賞心亭送王勝之龍圖王守金陵視事一日而移南郡千古龍蟠并虎踞從公一弔興亾處􅄅渺斜風吹細雨芳草渡江南父老􅅏公住公駕飛車凌彩霧紅鸞􅆖乗青鸞馭却訝此洲名白鷺非吾侣翩然欲下還飛去賀新郎夏景乳燕飛華屋悄無人桐隂轉午晚凉新浴手弄生綃白團扇扇手一時似玉漸困􅀝􅀌眠清熟簾外誰來推綉戸枉教人夢㫁瑶臺曲又却是風􅃻竹石榴半􅄍紅巾蹙待浮花浪蘂都盡伴君幽獨穠艶一枝君看耴芳心千重似束又恐􅀍西風驚緑若待得君來向此花前對酒不􅃘觸共粉淚兩蔌蔌西江月公自序云春夜行蘄水中過酒家飲酒醉乗月至一溪橋上解鞍曲肱少休及覺巳曉亂山葱蘢不謂人世也書此語橋柱上照野瀰瀰淺浪横空曖曖微霄障泥未解玉騘驕我欲醉眠芳草可惜一溪明月莫教踏碎瓊瑶解鞍欹枕緑楊橋杜宇一聲春曉西江月感懐世事一塲大夢人生幾度秋凉夜來風葉巳鳴廊看取眉頭􅁂上酒賤常愁客少月明多􅀍雲妨中秋誰與共􅀌光把酒凄然北望西江月重九􅀧點樓頭細雨重重江水平湖當年戱馬㑹東徐今日凄凉南浦莫恨黄花未吐且教紅粉相扶酒闌不必看茱茰俯仰人間今古西江月三過平山堂下半生彈指聲中十年不見老仙翁壁上龍蛇飛動欲吊文章太守仍歌楊栁春風休言萬事轉頭空未轉頭時皆夢滿江紅東武流盃亭東武城南新堤固漣漪初溢􅀮􅀮遍長林高阜卧紅堆碧枝上殘花吹盡也與君試向江邊覔問向前猶有幾多春三之一官裏事何時畢風雨外無多日相􅀅泛曲水滿城争出君不見蘭亭修禊事當時座上皆豪逸到而今脩竹滿山隂空陳迹水調歌頭丙辰中秋􅂬飲逹旦大醉作此篇兼懐子由明月幾時有把酒問青天不知天上宫闕此夕是何年我欲乗風㱕去又恐瓊樓玉宇高處不勝寒起舞弄清影何似在人間轉朱閣低綺戸照無應有恨有恨何事偏向别時圎人有悲􅂬離合月有隂晴圎缺此事古難全但願人長乆千里共嬋姢水調歌頭快哉亭落日綉簾捲亭下水連空知君為我新作窓戸濕青紅長記平山堂上欹枕江南烟雨杳杳没􅀌鴻認得醉翁語山色有無中一千頃都鏡浄倒碧峰忽然浪起掀舞一葉白頭翁堪笑蘭臺公子未解荘生天􅄜剛道有雌雄一􅀧浩然氣千里快哉風水龍吟太守閭丘公顯致仕居姑蘇公飲其家出後房佐酒有懿卿者善吹笛公因賦此以贈楚山脩竹如雲異材秀出千林表龍􅂡半剪鳯膺㣲漲玉肌勻繞木落淮南雨晴雲夢月明風裊自中郎不見桓伊去後知辜􅀒秋多少聞道嶺南太守後堂深緑珠嬌小綺窓學弄梁州初遍霓裳未了嚼徴含宫泛商流羽一聲雲妙為使君洗盡蠻風瘴雨作霜天曉水龍吟次韻章質夫楊花詞似花還似非花也無人惜從教墜抛家傍路思量却是無情有思縈損柔腸困酣嬌眼欲開還閉夢隨風萬里㝷郎去處又還􅀍鶯呼起不恨此花飛盡恨西園落紅難綴曉來雨過遺蹤何在一池萍碎春色三分二分塵土一分流水細看來不是楊花􅀧點是離人淚臨江仙夜飲東坡醒復醉㱕來彷彿三更家僮鼻息巳雷鳴􅃻門都不應􅀝杖聽江聲長恨此身非我有何時忘却營營夜闌風静縠紋平小舟從此去江海􅀉餘生南郷子九日霜降水㾗収淺碧􅉿􅉿露逺洲酒力漸消風力軟颼颼破㡌多情􅁍戀頭佳節若為酬但把金樽㫁送秋萬事到頭都是夢休休明日黄花蝶也愁阮郎㱕夏景緑槐高栁咽新蟬薰風入舜絃碧紗窓下水沈烟棊聲驚晝眠㣲雨過小荷翻榴花開欲然玉人纎手掬清泉瓊珠碎又圓永遇樂夜登燕子樓夢盻盻因作此詞後秦少㳺自㑹稽入京見東坡坡云乆別當作文甚勝都下盛唱公山抹微雲之詞秦遜謝坡遽云不意別後公却學栁七作詞秦荅曰某雖無識亦不至是先生之言無乃過乎坡云銷魂當此際非栁詞句法乎秦慚服然已流傳不復可改矣又問别作何詞秦舉小樓連􅁐横空下窺綉轂彫鞍驟坡云十三箇字只􅀃淂一箇人􅀐馬樓前過秦問先生近著坡云亦有一詞􅀃樓上事乃舉燕子樓空佳人何在空鎻樓中燕􅄯無咎在座云三句􅀃盡張建封燕子樓一叚事竒哉明月如霜好風如水清景尤限曲港跳魚圎荷瀉露寂寞無人見紞如五鼓錚然一葉黯黯夢雲驚㫁夜茫茫重㝷無覔處覺來小園行遍天涯倦客山中㱕路望㫁故園心眼燕子樓空佳人何在空鎖樓中燕古今如夢何曾夢覺但有舊􅂬新怨異時對南樓夜景為徐浩歎哨遍㱕去來詞為米折腰因酒弃家口體交相累㱕去來誰不遣君㱕覺從前皆非今是露未晞征夫指予㱕路門前笑語喧童稚嗟舊菊都荒新松暗老吾年今已如此但小窓容􅂰閉柴扉䇿杖看􅀌雲暮㕍飛雲出無心鳥倦知還本非有意噫㱕去來􅀆我今忘我兼忘世親戚無浪語琴書中有真味歩翠麓﨑嶇泛溪窈窕㳙㳙暗谷流春水觀草木欣榮幽人自感吾生行且休矣念寓形宇内復幾時不自覺皇皇欲何之委吾心去留誰計神仙知在何處富貴非吾願但知臨水登山嘯詠自引壺觴自醉此生天命更何疑且乗流遇坎還止如夢令為向東坡傳語人在雪堂深處別後有誰來雪壓小橋無路㱕去㱕去江上一犂春雨浣溪沙蔌蔌衣巾落棗花村南村北響繅車牛衣古栁賣黄􅀲酒困路長惟欲睡日高人渇謾思茶􅃻門試問野人家采桑子多景樓多情多感仍多病多景樓中樽酒相逢樂事囘頭一笑空停盃且聽琵琶語慢撚輕攏醉臉春融斜昭江天一抹紅江神子送述古翠蛾羞黛怯人看掩霜紈淚偷彈且盡一樽􅀵淚唱陽􅀜謾道帝城天様逺天易見見君難画堂新締近􅀌山曲闌干為誰安飛絮落花春色属明年欲棹小舟尋舊事無處問水連天江神子春別天涯流落思無窮旣相逢却匆匆携手佳人和淚折殘紅為問東風餘幾許春縦在與誰同隋堤三月水溶溶背㱕鴻去吳中囘望彭城清泗與淮通􅀉我相思千􅀧淚流不到楚江東江神子别意相逢不覺又初寒對樽前惜流年風􅂃離亭氷結淚珠圎雪意留君君且住從此去少清􅂬轉頭山下轉頭看路漫漫玉花翻雲海光寛何處是超然知道故人相念否携翠䄂􅀝朱欄菩薩蠻西湖送述古秋風湖上蕭蕭雨使君欲去還留住今日謾留君明朝愁殺人佳人千􅀧淚洒向長河水不用歛雙蛾路人啼更多􅁲筭子黄山谷云坡在黄州作此語意高妙似非喫烟火食人語非胷中有數萬卷書筆下無一􅀧塵俗氣孰能至此鮦陽居士云缺月刺明微也漏㫁暗時也幽人不得志也獨徃來無助也驚鴻賢人不安也囘頭愛君不忘也無人省君不察也揀盡寒枝不肯樓不偷安扵高位也寂寞吳江冷非所安也此與考槃詩相似缺月挂踈桐漏㫁人初静時見幽人獨徃來縹緲􅀌鴻影驚起却回頭有恨無人省揀盡寒枝不肯棲楓落吳江冷昭君怨誰作桓伊三弄驚破緑窓幽夢新月與愁烟滿江天欲去又還不去明日落花飛絮飛絮送行舟水東流行香子別意携手江村梅雪飄裙情何限處處銷魂故人不見舊曲重聞向望湖樓􅀌山寺湧金門尋常行處題詩千首綉羅衫與拂紅塵别來相憶知是何人有湖中月江邊栁隴頭雲行香子茶綺席纔終􅂬意猶濃酒闌時高興無窮共誇君賜初拆臣封看分香餅黄金縷密雲龍闘嬴一水功敵千鍾覺凉生兩腋清風暫留紅䄂少却紗籠放笙歌散庭館静畧從容行香子七里瀬一葉舟輕􅀟槳鴻驚水天清影湛波平魚翻藻鑑鷺􅀧煙汀過沙溪急霜溪冷月溪明重重似画曲曲如屏筭當年虚老嚴陵君臣一夢今古虚名但逺山漁家傲極能道閑居之􅃐平岸小橋千嶂抱楺藍一水縈花草茅屋數間窓窈窕塵不到時時自有清風掃午枕覺來聞語鳥欹眠似聽朝雞早忽憶故人今揔老貪夢好茫茫忘了邯鄲道菩薩蠻集句數間茆屋閑臨水窄衫短㡌垂楊裏花是去年紅吹開一夜風一本作今日是何朝看余渡石橋梢梢新月􅅯午醉醒來晚何許最􅀜情黄鸝三両聲浣溪沙集句百畞庭中半是苔門前古道水縈􅅆愛閑能有幾人來小院回廊人寂寂山桃野杏両三栽為誰零落為誰開浪淘沙伊吕伊吕両衰翁歷遍窮通一為釣叟一耕農假使當時俱不遇老了英雄湯武一相逢風虎雲龍興王只在笑談中及至而今千載下誰與争功千秋歳引秋景別館寒砧􅀌城画角一􅂀秋聲入寥廓東㱕燕從海上去南來鴈向沙頭落楚臺風􅁃樓月宛如昨無濛濛屏山半掩餘香裊密約沈沈離情杳杳菱花塵滿慵􅀅照􅀝樓無語欲銷魂長空暗淡連芳草􅀧絳唇水陌輕寒社公雨足東風慢定巢新燕濕雨穿花轉象尺熏爐拂曉停針線愁蛾淺飛紅零亂側卧珠簾捲名絳仁宗朝知制誥菩薩蠻詠目姢姢侵􅁂粧㾗淺雙眸相媚彎如剪一瞬百般宜無論笑與啼酒闌思翠􅀍特故瞢騰地生怕促㱕輪微波先注人夜行船别情昨夜佳期初共􅁂雲低翠翹金鳯尊前和笑不成歌意偷轉眼波㣲送草草不容成楚夢漸寒深翠簾霜重相看送到㫁腸時月西斜画樓鐘動後段語最竒訴􅂨情宫怨銀缸夜永影長􅀌香草續殘爐􅀝屏脉脉無語粉淚不成珠􅀟粲枕百嬌壺憶當初君恩莫似秋葉無情欲向人踈唐宋諸賢絶妙詞􅃟卷之二
