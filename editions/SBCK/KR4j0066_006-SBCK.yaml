seq: 6
front:
  text: 花幾許啼㾗止恨清明雨盡日水沈香一縷􅀫酒醒遲惱破春情緒飛燕又將㱕信誤小屏風上西江路
  hash: sha256:84af2956c54f141e3c894453d51fb425c06205dfd969ae431a623793cb48219b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4j0066_SBCK_005-16a}
body:
  text: 蝶戀花春恨卷絮風頭寒欲盡墜粉飄香日日紅成陣新酒又添殘酒困今春不减前春恨蝶去鶯來無處問隔水樓高望㫁雙魚信惱亂横波秋一寸斜陽只與黄昏近天仙子春情􅀫雨洗空臺榭瑩下盡珠簾寒未定花開花落㡬畨晴春欲竟愁未醒池靣杏花紅透影一􅁓短書言不盡明月清風還記省玉樓香㫁又添香閑展興臨好景心似亂萍何處整浣溪沙風急花飛晝掩門一簾踈雨滴黄昏便無離恨也銷魂翠􅀍任熏終不暖玉盃慵舉幾畨温這般情事與誰論思越人素玉朝來有好懐一枝梅粉照人開晴雲欲向盃中起春色先從臉上來深院落小樓臺玉盤香􅂐看徘徊湏知月色撩人恨數夜春寒不下堦思越人情景可是相逢意便深爲郎巧笑不湏金門前一尺春風䯻窓内三更夜雨衾情􅄅􅄅信沉沉青鸞無路􅀉芳音山城鐘鼓愁難聽不解襄王夢裏尋烏夜啼春思樓上縈簾弱絮墻頭礙月低花年年春事関心事腸㫁欲棲鴉舞鏡鸞衾翠减啼珠鳳蠟紅斜重門不鎻相思夢隨意遶天涯虞美人春恨言語空相覷㫁雨殘雲無意緒寂寞朝朝暮暮今夜山深處㫁魂分付潮囘去玉樓春立春小園半夜東風轉吹皺氷池雲母靣曉披閶闔見朝陽知向碧堦添幾線小烟弄栁晴先暖殘雪禁梅香尚淺殷勤洗拂舊東君多少韶華都借看相見懽秋思十年湖海扁舟幾多愁白髮青燈今夜不宜秋中庭􅀣空堦雨思悠悠寂寞一生心事五更頭西江月春夕蝶戀花春景荳􅛌梢頭春色淺新試紗衣拂䄂東風軟紅日三竿簾幕卷画樓影裏雙飛燕攏􅁂歩揺青玉碾缺様花枝葉葉蜂兒顫獨􅀝闌干凝望逺一川烟草平如翦踏莎行春思栁絮風輕棃花雨細春隂院落簾垂地碧溪影裏小橋横青帘市上孤烟起鏡約関情琴心破睡輕寒漠漠侵鴛􅀍酒醒霞散臉邊紅夢囘山蹙眉峯翠南歌子春夜雨洗溪光浄風掀栁帶斜画樓朱戸玉人家簾外一眉新月浸棃花金鴨香凝䄂銅荷燭映紗鳳盤宫錦小屏􅃒夜静寒生春笋理琵琶减字木蘭花七夕荷花風細乞巧樓中凉似水天幕低垂新月彎環淺暈眉橋横烏鵲不􅀒年年雲外約殘角踈鐘腸㫁朝霞一縷紅漁家傲漁父秋水無㾗清見底蓼花汀上西風起一葉小舟烟霧裏蘭棹艤栁條帶雨穿雙鯉自歎直鈎無處使笛聲吹散雲山翠鱠落霜刀紅縷細新酒美醉來獨枕簔衣睡驀山溪月夜霜清木落深院簾櫳静池靣捲輕波瑩香氷一奩明鏡脩筠拂檻踈翠挽嬋姢山霧歛水雲􅀵野闊江天逈紅消醉玉酒靣風前醒羅幕護輕寒錦屏空金爐燼冷星横參昴梅徑月黄昏清夢覺淺眉顰窓外横斜影玉樓春寒食弄晴數􅀧棃梢雨門外画橋寒食路杜䳌飛破草間烟蛺蝶惹殘花底霧東君着意憐樊素一叚韶華都付與粧成不管露桃嗔舞罷從教風栁妬南郷子美人淺色染春衣衣上雙雙小鴈飛䄂捲藕絲寒玉痩彈棊嬴得尊前酒一巵氷雪拂胭脂絳䗶香融落日西唱徹陽関人欲去依依醉眼横波翠黛低江神子别情一江秋水碧灣灣繞青山玉連環簾幕低垂人在画圖間閑抱琵琶尋舊曲彈未了意闌􅃢飛鴻數􅀧拂雲端􅀝欄看楚天寒擬倩春風吹夢到長安恰似棃花春帶雨愁滿眼淚闌干江神子春思杏花村館酒旗風水溶溶颺殘紅野渡舟横楊栁緑隂濃望㫁江南山色逺人不見草連空夕陽樓外晚烟籠粉香融淡眉峯記得年時相見画屏中只有関山今夜月千里外素光同千秋歳夏景練花飄砌蔌蔌清香細梅雨過蘋風起情隨湘水逺夢遶吳峯翠琴書倦鷓鴣喚起南窓睡密意無人􅀉幽恨慿誰洗脩竹畔踈簾裏歌餘塵拂扇舞罷風醉蓬萊中秋懐無逸兄望晴峯染黛暮靄澄空碧天無漢圎鏡高飛又一年秋半皓色誰同㱕心暗折聽唳雲􅀌鴈問月停盃錦􅂁何處一尊無伴好在南鄰詩盟酒杜刻燭争成引觴愁緩今夕樓中􅁇阿連清玩飲劇狂歌歌終起舞醉冷光零亂樂事難窮踈星易曉又成浩歎江神子美人破􅀲年紀栁腰見􅂴精神帶羞嗔手把江梅氷雪闘清新不向鴉兒飛處着􅅏乞與眼中人水精船裏酒鱗鱗皺香茵駐行雲舞罷歌餘花困不勝春問着倒正千里瓊瑶未經掃欹壓江梅春信早十分農事滿城和氣管耴來年好滿庭芳離情淮葉􅌭紛江烟濃淡別樽同倒寒暉未逢春信霜露惹征衣徃事元無是處何湏待囘首知非春䳌語從來􅂆我常道不如㱕家山何處近江樓簾棟夕捲朝飛問西江筍蕨何似鱸肥且置華胥舊夢忘言處千古同時君知我平生心事相契古來稀臨江仙贈别聞道洛陽花正好家家庭戸春風道人飲散百壺空洞仙歌情景深庭夜寂但凉蟾如晝鵲起高槐露華透聽曲樓玉筦吹徹伊州金釧響軋軋朱扉暗扣迎人巧笑道好箇今宵怎不相尋暫携手見淡浄晚粧殘對月偏宜多情更越饒纎痩早促分飛霎時休便恰似陽臺夢雲㱕後一落索送楊伯紹帥慶陽塞栁未傳春信霜花侵􅁂送君西去指秦関看日近長安近玉帳同時英俊合離無定路逢新鴈北飛來􅀉一字燕山問清平樂春宴花時微雨未减春分數占耴簾踈花密處把酒聴歌金縷斜風輕度濃香閑情正與春長向晚紅燈入座嘗新青杏催觴玉樓春春情飛鴻只解􅅏筝柱終􅀉青樓書不去手因春夢有携時眼到花梢無着處泥金小字囘文句翠袖紅裙知在否欲尋楚館舊時雲看耴高唐臺畔路小冲山夜宴椽燭垂珠清漏長酒黏衫䄂濕有餘香紅牙雙捧旋風約住朦朧淡月雲來去桃杏依俙香暗度誰在秋千笑裏輕輕語一寸相思千萬緒人間没箇安排處六州歌頭驪山凄凉綉嶺宫殿􅀝山阿明皇帝曾游地鎻烟蘿鬱嵯峨憶昔眞妃子艶傾國方姝麗朝復暮嬪嬙妬寵偏頗三尺玉泉新浴蓮羞吐紅浸秋波聽花奴􅃻羯鼓酣奏鳴鼉體不勝羅舞婆娑正霓裳曳驚烽燧千萬􅀐擁琱戈情宛轉魂空亂蹙雙蛾柰兵何痛惜三春暮委妖麗馬嵬坡平寇亂囘宸輦􅃘重過香􅙁紫念奴嬌春恨杏花過雨漸殘紅零落胭脂顔色流水飄香人漸逺難託春心脉脉恨別王孫墻隂目㫁手把青梅摘金鞍何處緑楊依舊南陌消散雲雨湏􅁷多情因甚有輕離輕拆燕語千般争解􅀃些子伊家消息厚約深盟除非重見見了方端的而今無柰寸腸千恨堆積望海潮上太原知府王君貺尚書山光凝翠川容如画名都自古并州簫鼓沸天弓刀似水連營十萬􅆛貅金􅀐走長楸少年人一一錦帶庭花臉皴鶯共蝶怨還嗔眼前無好春這般天氣煞愁人人愁旋旋新烏夜啼春小桃落盡殘紅夜來風又是一畨春事不從容翠屏掩芳信㫁轉愁濃可惜日長閑暇小簾櫳唐宋諸賢絶妙詞選卷之六
