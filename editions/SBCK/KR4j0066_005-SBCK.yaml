seq: 5
front:
  text: 陵舊路
  hash: sha256:d7b0f1273235b3479bc2da3368ffbbf5928a972ddca6df04d03494198c534487
body:
  text: 摸魚兒幽居真西山絶愛此詞買陂塘旋栽楊栁依俙淮岸湘浦東臯雨足輕㾗漲沙觜鷺來鷗聚堪愛處最好是一川夜月光流渚無人自舞任翠幕張天柔茵藉地酒盡未能去青綾􅀍休憶金閨故歩儒冠曾把身誤􅃓刃千􅀐成何事荒了召平􅀲圃君試覷滿青鏡星星􅁂影今如許功名浪語便做得班超封侯萬里㱕計恐遲暮惜分飛湖州作山水光中元無暑是我銷魂别處只有多情雨會人深意􅅏人住不及梅花來暮未見荷花又去圖画他年覷㫁腸千古苕溪路憶少年送别無窮官栁無情画舸無根行客南山尚相送只高城人隔罨画園林溪紺碧筭重來盡成陳迹劉郎􅁂如此况桃花顔色臨江仙别意身外閑愁空滿眼就中􅂬事常稀明年應賦送春詩試從今夜數相㑹幾多時淺酒欲邀誰共􅂬深情惟有君知東溪春近好同㱕栁垂江上影梅謝雪中寒食不多時牡丹初賣小院重簾燕飛礙昨宵風雨尚有一分春在今朝猶自得隂晴快熟睡起來􅀫酲㣲帶不惜羅􅁭揾眉黛日長梳洗看着花隂移改笑拈雙杏子連枝戴感皇恩春情胡蝶滿西園啼鶯無數水閣橋南路凝竚兩行烟栁吹落一池風絮秋千斜挂起人何處把酒􅂆君閑愁莫訴􅅏耴笙歌住休去幾多春色怎禁許多風雨海棠花謝也君知否玉胡蝶春思目㫁江南千里㶚橋一望烟水微茫晝鎻重門人去暗惜流光雨輕輕棃花院落風淡淡楊栁池塘暗偏長佩沈湘浦雲散高唐清狂重來一夢手搓梅子煑酒新嘗寂寞經春小橋依舊燕飛忙玉鈎欄凭多漸暖金縷枕别乆猶香最難忘看花南陌待月西廂傳言玉女上元一夜東風吹散栁梢殘雪御樓烟暖對鰲山彩結簫鼓向晚鳳輦初囘宫闕千門燈火九街風月綉閤人人乍嬉遊困又歇艶粧初試把珠簾半掲嬌波溜人手撚玉梅低􅀃相逢長是上元時節醉落魄美人吹笛雲輕栁弱内家髻子新梳掠生香真色人難學横筦孤吹月淡天垂幕朱唇淺破櫻桃蕚􅀝樓人在闌干角夜寒指冷羅衣薄聲入霜林蔌蔌飛梅落浣溪沙江景樓􅀝江邊百尺高烟中還未見㱕橈幾時期信似春潮花片片飛風弄蝶栁隂隂下水平橋日長才過又今宵青門引春思乍暖還輕冷風雨晚來方定庭軒寂寞近清明殘花中酒又是去年病樓頭画角風吹醒入夜重門静那堪更􅀍明月隔墻送過秋千影滿江紅初春飄盡寒梅笑粉蝶遊蜂未覺漸迤􅆔水明山秀暖生簾幕過雨小桃紅未透舞烟新栁青猶弱記画橋深處水邊亭曾偷約多少恨今猶昨愁和悶都忘却􅂸從前爛醉􅀍花迷着晴鴿試鈴風力軟雛鶯弄舌春寒薄但只愁錦綉閙粧時東風惡行香子美人舞雪歌雲閑淡粧勻藍溪水深染輕裙酒香熏臉粉爛熳時則春已衰遲使人無復新意予作洞仙歌使探春者歌之無後時之悔雪雲散盡放曉晴庭院楊栁於人便青眼更風流多處一􅀧梅心相映逺約略嚬輕笑淺一年春好處不在濃芳小艶踈香最嬌軟到清明時候百紫千紅花正亂已失春風一半蚤占耴韶光共追遊但莫管春寒醉紅自暖洞仙歌雨㢘纎細雨殢東風如困縈㫁千絲爲誰恨向楚宫一夢多少悲凉無處問愁到而今未盡分明都是淚泣栁沾花常與騷人伴孤悶記當年得意處酒力方酣怯輕寒玉爐香潤又豈識情懐苦難禁對􅀧滴簷聲夜寒燈暈茶瓶兒悼亡去年相逢深院宇海棠下曾歌金縷歌罷花如雨翠羅衫上􅀧􅀧紅無數今歳重㝷携手處空物是人非春暮囘首青門路亂紅飛絮相逐東風去鷓鴣天春情寂寞秋千兩綉旗日長花影轉堦遲燕驚午夢周􅃒語蝶困春遊落托飛思往事入顰眉栁梢隂重又椘椘詞林中之佳公子也世謂栁耆卿工為浮艶之詞方之此作蔑矣詞名冠栁豈偶然哉清平樂擬太白應制黄金殿裏燭影雙龍戯􅂆得官家真箇醉進酒猶呼萬歳美人舞徹梁州天恩與整搔頭一夜御前宣住六宫多少人愁清平樂同前宜春小􅁐處處花開滿學得紅粧紅要淺催上金車要看君王曲宴瑶池小舟掠水如飛奪得錦標㱕去匆匆不惜羅衣雨中花令呈元厚之百尺清泉聲陸續映瀟洒碧梧翠竹面千歩囘廊重重簾幕小枕欹寒玉試展鮫綃看画軸見一派瀟湘凝緑待玉漏穿花銀河垂地月上闌干曲木蘭花令栁銅駝陌上新正後第一風流除是栁勾牽春事不如梅㫁送離人強似酒東君有意偏撋就慣得腰肢眞箇痩阿誰道你不思量因甚眉頭長恁皺生查子関山魂夢長塞鴈音書少兩􅁂可憐青一夜相思老㱕傍碧紗窓􅀃與人人道眞箇別離難不似相逢好卜筭子送鮑浩然之湘東水是眼波横山是眉峯聚欲問行人去那邊眉眼盈盈處才始送春㱕又送君㱕去若到江南趕上春千萬和春住菩薩蠻㱕思單于吹落山頭月漫漫江上沙如雪誰唱縷金衣水寒船舫稀蘆花楓葉浦憶抱琵琶語身未發長沙夢魂先到家多麗想人生美景良辰堪惜向其間賞心樂事古來難是并得况東城鳳臺沁􅁐泛晴波淺照金碧露洗華桐烟霏絲栁緑隂揺曵蕩春一色画堂逈玉簮瓊佩高㑹盡詞客一本扵此分清􅂬乆重然絳䗶别就瑶席有翩若輕鴻體態暮爲行雨標格逞朱唇緩歌妖麗似聽流鶯亂花隔慢舞縈囘嬌鬟低嚲腰肢纎細困無力􅃘分散彩雲㱕後何處更尋覔休辭醉明月好花莫謾輕擲冠卿之詞不多見如此篇亦可謂才情富麗矣其露洗華桐四句又所謂玉中之拱璧珠中之仁宗命左右詞臣為樂章内侍属栁應制栁方兾進用作此詞奏呈上見首有漸字色若不懌讀至宸遊鳳輦何處乃與御製真宗挽詞暗合上慘然又讀至太液波翻曰何不言波澄投之扵地自此不復擢用滿江紅桐川暮雨初􅀵長江静征帆夜落臨島嶼蓼烟踈淡葦風蕭索幾許漁人横短艇盡將燈火㱕村郭遣行客到此念囘程傷漂泊桐江好煙漠漠波似染山如削遶嚴陵灘畔鷺飛魚躍游宦區區成底事平生况有林泉約㱕去來一曲仲宣樓從軍樂換頭數語最工木蘭花慢清明拆桐花爛熳乍踈雨洗清明正艶杏燒林緗桃綉野芳景如屏傾城盡尋勝賞驟雕鞍紺幰出郊坰風暖䌓絃脆管萬家競奏新聲盈盈闘草踏青人艶冶遞逢迎向路傍往往遺簮墮珥珠翠縱横􅂬情對佳麗地任金罍罄竭玉山傾􅂸却明朝永日画堂一枕春醒玉胡蝶春遊漸覺東郊明媚夜來膏雨一洒塵埃滿目淺桃深杏露染烟裁銀塘静魚鱗簟展煙岫翠􅀛甲屏開殷晴雷雲中鼓吹遊徧蓬萊徘徊隼旟前後三千珠履十二金􅁫雅俗熈熈下車成宴盡春臺好雍容東山妓女堪笑傲北海樽罍且追陪鳳池㱕去那更重來玉胡蝶秋思望處雨􅀵雲㫁凭欄悄悄目送秋光晚景蕭踈堪動宋玉悲凉水風輕蘋花漸老月露冷梧葉飄黄遣情傷故人何在煙水茫茫難忘文期酒㑹幾辜風月屢變星霜海闊山遥未知何處是瀟湘念雙燕難慿逺信指暮天空識㱕航黯相望㫁鴻聲裏立盡斜陽雨零鈴秋别寒蟬凄切對長亭晚驟雨初歇都門帳飲無緒方􅅏戀處蘭舟催發執手相看淚眼竟無語凝噎念去去千里烟波暮靄沈沈楚天闊多情自古傷離别更那堪冷落清秋節今宵酒醒何處楊栁岸曉風殘月此去經年應是良辰好景虚設便縱有千種風流待與何人􅀃二郎神七夕炎光謝過暮雨芳塵輕洒乍露冷風清庭戸爽天如水玉鈎遥掛應是星娥嗟乆阻叙舊約飈輪欲駕極目處微雲暗度耿耿銀河高瀉閑雅湏知此景古今無價運巧思穿針樓上女擡粉靣雲鬟相亞鈿合金􅁫私語處筭誰在囘廊影下願天上人間占得􅂬娛年年今夜栁腰輕贈妓英英妙舞腰肢軟章臺栁昭陽燕錦衣冠盖綺堂筵宴是處千金争選顧香砌絲管初調􅀝輕風珮環㣲顫乍入霓裳促遍逞盈盈漸催檀板慢垂霞䄂急趍蓮歩進退竒容千變筭何止傾國傾城暫囘眸萬人腸㫁晝夜樂贈妓秀香家住桃花徑筭神仙才堪並層波細剪明眸膩玉圓磋素頸愛把歌喉當筵逞遏天邊亂雲愁凝言語似嬌鶯一聲聲堪聽洞房飲散簾幃静擁香衾􅂬心稱金爐麝裊青煙鳳帳燭揺紅影無限狂心乗酒興這􅂬娛漸入佳境猶自怨鄰雞道秋宵不永此詞麗以淫不當入選以東坡嘗引用其語故録之甘草子秋暮亂洒衰荷顆顆眞珠雨雨過月華生冷徹鴛鴦流池上凭欄無語柰此箇單棲情緒却傍金籠敎
