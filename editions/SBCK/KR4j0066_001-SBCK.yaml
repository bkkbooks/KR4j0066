canonical_identifier: bkk:krp/KR4j0066/SBCK/v1/juan/1
seq: 1
front:
  text: 樂遊原上清秋節咸陽古道音塵絶音塵絶西風殘照漢家陵闕
  hash: sha256:5cefeef042c5a39023a8bd856a291544611edb7b46898b52ea098a6a467c98eb
body:
  text: 清平樂令翰林􅀿制按唐吕鵬遏雲集載應制詞四首以後二首無清逸氣韻疑非太白􅀁作禁庭春晝鶯羽披新綉百草巧求花下闘只賭珠璣滿斗日晚却理殘粧御前閑舞霓裳誰道腰支窈窕折旋消得君王清平樂令禁闈秋夜月探金窓罅玉帳鴛鴦噴沉麝時落銀燈香灺女伴莫話􅀌眠六宫羅綺三千一笑皆生百筦絃絃管絃管春草昭陽路㫁古調笑胡蝶胡蝶飛上金花枝葉君前對舞春風百葉桃花樹紅紅樹紅樹燕語鶯啼日暮古調笑羅袖羅袖暏舞春風已舊遥看歌舞玉樓好日新粧坐愁愁坐愁坐一世虚生虚過古調笑楊栁楊栁日暮白沙渡口船頭江水茫茫商人少婦㫁腸腸㫁腸㫁鷓鴣夜來失伴粧梳洗遲照花前後鏡花面交相映新着綺羅􅃭􅀟􅀟金鷓鴣菩薩蠻南園滿地堆輕絮愁聞一霎清明雨雨後却斜陽杏花零落香無言勻睡臉枕上屏山掩時節􅁒黄昏無􅂓獨􅀝門菩薩蠻翠翹金縷􅀟鸂􅴞水紋細起春池碧池上海棠􅀺雨晴紅滿枝綉衫遮笑靨烟草粘飛蝶青􅃈對芳菲玉􅀜音信稀菩薩蠻水精簾裏玻瓈枕暖香惹夢鴛鴦錦江上栁如烟鴈飛殘日天藕絲秋色淺人勝參差剪雙􅁂隔香紅玉􅁫頭上風更漏子栁絲長春雨細花外漏聲迢逓驚塞鴈起城烏􅀞屏金鷓鴣香霧薄透簾幕惆悵謝家池閤紅燭背綉簾垂夢長君不知更漏子玉爐香紅䗶淚偏照􅀞堂秋思眉翠薄􅁂雲殘夜長衾枕寒梧桐􅀣三更雨不道離情正苦一葉葉一聲聲空堦滴到明更漏子背江樓臨海月城上角聲嗚咽堤栁動島烟昏兩行征鴈分京口路㱕帆渡正是芳菲􅁒度銀燭盡玉繩低一聲村落雞更漏子星斗稀鐘鼓歇簾外曉鶯殘月蘭露重栁風斜滿庭堆落花虚閣上􅀝闌望還似去年惆悵春􅁒暮思無窮舊􅂬如夢中菩薩蠻洛陽城裏春光好洛陽才子他郷老栁暗魏王隄此時心轉迷桃花春水緑水上鴛鴦浴凝恨對殘暉憶君君不知菩薩蠻人人盡􅀃江南好遊人只合江南老春水碧扵天画船聽雨眠壚邊人似月皓腕凝霜雪未老莫還郷還郷湏㫁腸應天長緑槐隂裏黄鶯語深院無人春晝午画簾垂金鳳舞寂寞綉屏香一縷碧天雲無定處空有夢魂來去夜夜緑窓風雨㫁腸君信否清平樂令野花芳草寂寞關山道栁吐金絲鶯語早惆悵香閨暗老羅帶悔結同心獨凭朱欄思深夢覺半床斜月小窓風觸鳴琴謁金門空相憶無計得傳消息天上嫦娥人不識􅀉書何處覔新睡覺來無力不􅃘看伊書迹滿院落花春寂寂㫁腸芳草碧浣溪沙握手河橋栁似金􅉕鬚輕惹百花心蕙風蘭思􅀉清琴意滿便同春水滿情深還似酒盃深楚烟湘月兩沈沈浣溪沙傾國傾城恨有餘幾多紅淚泣姑蘇􅀝風凝䏲雪肌膚吳主山河空落日越王宫殿半平蕪藕花菱蔓滿重湖小重山春到長門春草青玉堦華露滴月朧明東風吹㫁紫簫聲金爐冷簾外曉啼鶯愁極夢難成殘粧和􅀫淚不勝情手挼裙帶遶花行思君切羅幌暗塵生小重山秋到長門青草黄画梁􅀟燕去出宫墻玉簫無復理霓裳金蝉墜鸞鏡俺休粧憶昔在昭陽舞衣紅綬帶綉鴛鴦至今猶惹御爐香魂夢㫁愁聽漏更長謁金門春滿院疊損羅衣金線睡覺水精簾未捲簷前雙語燕斜掩金鋪一扇滿地落花千片早是相思腸􅁒㫁􅃘敎頻夢見滿宫花花正芳樓似綺寂寞上陽宫裏鈿籠金鎻睡鴛鴦簾冷露華珠翠嬌艶輕盈香雪膩細雨黄鶯雙起東風惆悵􅁒清明公子橋邊沈醉江城子唐詞多無換頭如此詞雨叚自是兩首故兩押情字今人不知合為一首則誤矣碧闌干外小中庭雨初晴曉鶯聲飛絮落花時節近清明睡起卷簾無一事勻面了没心情浣花溪上見郷郷眼波明黛眉輕髙綰緑雲金簇小蜻蜓好是問他來得麽還笑道莫多情落絮殘鶯半日天玉柔花醉只思眠惹窓映竹滿爐烟獨掩画屏愁不語斜欹瑶枕髻鬟偏此時心在阿誰邊賀明朝憶昔花前相見後只慿纎手暗抛紅豆人前不解巧傳心事別來依舊􅀌􅀒春晝碧羅衣上蹙金綉覩對對鴛鴦空裛淚㾗透想韶顔非乆終是為伊只恁偷瘦玉樓春日照玉樓花似錦樓上醉和春色寢緑楊風送小鶯荔支􅓜頭鞋子紅編細裙窣金絲無事嚬眉春思翻敎阿母疑喜遷鶯曉月墜􅀫雲披銀燭錦屏帷建章鐘動玉繩低宫漏出花遲春態淺來雙燕紅日漸長一線嚴粧􅁒罷囀黄鸝飛上萬年枝薄命女天􅁒曉宫漏穿花聲繚繞窓裏星光少冷霞寒侵帳額殘月光沈􅀣杪夢㫁錦幃空悄悄強起愁眉小又一本名長命女玉樓春拂水雙飛來去燕曲檻小屏山六扇春愁凝思結眉心緑綺􅂴調紅錦薦話別情多聲􅁒顫玉筯㾗留紅粉面鎭長獨立到黄昏却怕良宵頻夢見浣溪沙春色迷人恨正賖可堪蕩子不還家細風輕露着棃花簾外有情雙燕颺檻前無力緑楊斜小屏狂夢遶天涯臨江仙幽閨小檻春光晩栁濃花澹鶯稀舊􅂬思想尚依依愁楊栁秪知傷怨別杏花應信損嬌羞淚沾魂㫁軫離憂浣溪沙輕打銀筝墜燕泥㫁絲髙􅇢画樓西花冠閑上午墻啼粉籜半開新竹逕紅苞盡落舊桃蹊不堪終日閉深閨菩薩蠻木綿花映􅓜祠小越禽聲裏春光曉銅鼓雜蠻歌南人祈賽多客帆風正急茜䄂偎檣立極浦幾囬頭烟波無限愁菩薩蠻羅衣隱約金泥画玳筵一曲當秋夜聲顫覷人嬌雲鬟裊翠翹酒醺紅玉軟眉翠秋山逺綉幌麝烟沈誰人知兩心生查子寂寞画堂空深夜垂羅幕燈暗錦屏欹月冷珠簾薄愁恨夢難成何處貪􅂬樂看看春又來還是長蕭索漁歌子栁如眉雲似髪鮫綃霧縠籠香雪夢魂驚鐘漏歇窓菩薩蠻綉簾髙軸臨塘看雨翻荷芰眞珠散殘暑晚初凉輕風度水香無憀悲徃事争那牽情思光影暗相催等閑秋又來更漏子秋色清河影澹深戸燭寒光暗綃幌碧錦衾紅博山香炷融更漏咽蛩鳴切滿院霜華如雪新月上薄雲􅀵映簾懸玉鈎更漏子煙月寒秋夜静漏轉金壺初永羅幙下綉屏空燈花芳鏤玉梳斜雲􅁂膩縷金衣透雪肌香暗思何事立殘陽望逺行露滴幽庭葉落時愁聚蕭娘栁眉玉郎一去􅀒佳期水雲迢逓鴈書遲屏半掩枕斜欹蠟淚無言對垂吟蛩㫁續漏頻移入窓明月鑒空帷菩薩蠻􅅆塘風起波紋細刺桐花裏門斜閉殘日照平蕪􅀟􅀟飛鷓鴣征帆何處客相見還相隔不語􅁒魂銷望中煙水遥河傳去去何處迢迢巴楚山水相連朝雲暮雨依舊十二峰前猿聲到客船愁腸容易丁香結因離別故國音書絶想佳人花下對明月春風恨應同河傳春暮微雨送君南浦愁歛􅀟蛾落花深處啼鳥似逐離歌粉檀珠淚和臨流更把同心結情哽咽後㑹何時節不堪囬首相望巳隔汀洲艣聲幽巫山一叚雲唐詞多縁題所賦臨江仙則言仙事女冠子則述道情河瀆神則詠祠廟大槩不失本題之意爾後漸變去題逺矣如此二詞實唐人本來詞體如此有客經巫峽停橈向水湄楚王曾此夢瑶􅁎一夢杳無期塵暗珠簾卷香銷翠幄垂西風囬首不勝悲暮雨洒空祠巫山一叚雲古廟依青嶂行宫枕碧流水聲山色鎻粧樓徃事思悠悠雲雨朝還暮烟花春復秋啼猿何必近􅀌舟行客自多愁國不堪囬首月明中彫欄玉砌應猶在只是朱顔改問君還有幾多愁恰似一江春水向東流山花子菡蓞香銷翠葉殘西風愁起緑波間還與韶光共憔悴不堪看細雨夢囬雞塞逺小樓吹徹玉笙寒多少淚珠何限恨􅀝闌干山花子手捲珠簾上玉鈎依前春恨鎻重樓風裏落花誰是主思悠悠青鳥不傳雲外信丁香空結雨中愁囬首緑波三峽暮接天流烏夜啼此詞最悽惋所謂亾國之音哀以思無言獨上西樓月如鈎寂寞梧桐深院鎻清秋剪不㫁理還亂是離愁別是一般滋味在心頭清平樂別來春半觸目愁腸㫁砌下落梅如雪亂拂了一身還滿鴈來音信無慿路遥㱕夢難成離恨恰如春草更行更逺還生浪淘沙簾外雨潺潺春意闌􅃢羅衾不暖五更寒夢裏不知身是客一餉貪􅂬獨自莫凭欄無限江山别時容
