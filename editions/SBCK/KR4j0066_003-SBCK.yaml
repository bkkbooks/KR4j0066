seq: 3
front:
  text: 留玉臉膩雲斜溜􅁫頭燕逺夢無端􅌚又散淚落胭脂界破蜂黄淺整了翠鬟勻了面芳心一寸情何限
  hash: sha256:cdd820f43e64894fd2e6443f0223a8653701acb2a6af260530c463d5423746e6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4j0066_SBCK_003-1a}
body:
  text: 鷓鴣天子京過䌓臺街逢内家車子中有褰簾者曰小宋也子京㱕遂作此詞都下􅀓唱逹于禁中仁宗知之問内人第幾車子何人呼小宋有内人自陳頃侍御宴見宣翰林學士左右内臣曰小宋也時在車子中偶見之呼一聲尔上召子京從容語及子京皇懼無地上笑望江南栁江南栁烟穂拂人輕愁黛空長描不似舞腰雖痩學難成天意與風情攀折處離恨幾時平已縱柔條縈客棹更飛狂絮撲旗亭三月亂鶯聲望江南江景江南雨風送滿長川碧瓦烟昏沉栁岸紅綃香潤入梅天飄洒正瀟然朝與暮長在楚峰前寒夜愁欹金帶枕暮江深閉木蘭船烟浪逺相連望江南江郷江南岸雲樹半晴隂帆去帆來天亦老潮生潮落日香臉輕匀黛眉巧画宫粧淺風流天付與精神全在嬌波轉早是縈心可慣更那堪頻頻顧盻幾回得見見了還休争如不見燭影揺紅夜闌飲散春宵短當時誰解唱陽関離恨天涯逺無柰雲収雨散凭闌干東風淚眼海棠開後燕子來時黄昏庭院蝶戀花鐘送黄昏雞報曉昏曉相催世事何時了萬恨千愁人自老春來依舊生芳草忙處人多閑處少閑處光隂幾箇人知道獨上高樓雲渺渺天涯一􅀧青山小玉樓春海棠錦城春色花無數排比笙歌􅅏客住輕寒輕暖夾衣天乍雨乍晴寒食路花雖不語鶯能語莫放韶光容易去海棠開後月明前縱有千金無買處花􅀤沁園春帝里春㱕早先粧􅀧皇家池館園林雛鶯未遷燕子乍㱕時節戯弄晴隂瓊樓珠閣恰正在栁曲花心翠袖艶衣凭闌干慣聞絃管新音此際相携宴賞縱行樂隨處芳樹遥岑桃腮杏臉嫰英萬葉千枝緑淺紅深輕風終日泛暗香長滿衣􅁭洞戸醉㱕訪笙歌晚來雲海沈沈踏青遊春遊金勒狨鞍西城嫰寒春曉路漸入垂楊芳草過平堤穿緑逕幾聲啼鳥是處裏誰家杏花臨水依約靚粧斜照極目高原東風露桃烟島望十里紅圍緑繞更相將乗酒興幽情多少待向晚從頭記將㱕去說與鳯樓人道人月圎元夜小桃枝上春來早初試薄羅衣年年此夜華燈盛照人月圎時禁街簫鼓寒輕夜永纎手同携更闌人山逺水登臨目送連天衰草夜闌幾處踈砧黄葉無風自落秋雲不雨長隂天若有情天亦老揺揺幽恨難禁惆悵舊􅂬如夢斍來無處追尋菩薩蠻公於元豊間爲翰􅁐與李端愿太尉往來尤數㑹一日鎻院宣召者至其家則出數十輩蹤跡得之扵李氏時李新納妾能琵琶公飲不肯去而迫扵宣命入院幾二鼓矣草三制罷作此詞記恨遟明遣示李樓頭尚有三通鼓何湏抵死催人去上馬苦匆匆琵玉樓春春恨緑楊芳草長亭路年少抛人容易去樓頭殘夢五更鐘花底離情三月雨無情不似多情苦一寸還成千萬縷天涯地角有窮時只有相思無盡處破陣子春景燕子來時新社棃花落後清明池上碧苔三四􅀧葉底黄鸝一兩聲日長飛絮輕巧笑東鄰女伴采桑徑裏逢迎疑怪昨宵春夢好元是今朝闘草嬴笑從雙臉生踏莎行春景細草愁烟幽花泣露凭欄揔是銷魂處日高深院静無人穿簾海燕雙飛去帶緩羅衣香殘􅈍炷天長不禁迢迢路垂楊只解惹春風何曾繫得行人住踏莎行春思小徑紅稀芳郊緑遍高臺樹色隂隂見春風不解禁楊花濛濛亂撲行人靣翠葉藏鶯朱簾隔燕爐香静逐遊絲轉一􅂣愁夢酒醒時斜陽却照深深院更漏子佳人蕣華濃山翠淺一寸秋波如剪紅日永綺筵開暗隨仙馭來遏雲聲廻雪䄂占㫁曉鶯春栁才送目又上意碧藕花開水殿凉萬年枝上轉紅陽昇平歌管隨天伏祥瑞封章滿御床金掌露玉爐香歳華方共聖恩長皇州又奏圜扉静十様宫眉捧壽觴鷓鴣天佳㑹彩䄂殷勤捧玉鍾當筵􅂸却醉顔紅舞低楊栁樓心月歌盡桃花扇底風從别後憶相逢幾囘魂梦與君同今宵剰把銀缸照猶恐相逢是夢中蝶戀花别恨醉别西樓醒不記春夣秋雲聚散真容易斜月半窓還少睡画屏閑展吳山翠衣上酒㾗詩裏字􅀧點行行揔是凄凉意紅燭自憐無好計夜闌空替人垂淚蝶戀花別恨夣入江南煙水路行盡江南不與離人遇睡裏消魂無􅀃處覺來惆悵佳期誤欲盡此情書尺素浮鴈沉魚終了無慿據却􅀝緩絃歌別緒㫁腸移破秦筝柱蝶戀花深秋庭院碧苔紅葉遍黄菊開時已近登高宴日日露荷凋緑扇粉塘煙水明如練試􅀝凉風醒酒靣鴈字來時恰向層樓見幾􅀧護霜雲影轉誰家蘆管吟秋怨生查子閨思金鞍美少年去躍青騘馬牽繫玉樓人繡􅀍春寒夜消息未㱕來寒食􅀺花謝無處􅀃相思背靣秋千下生查子别思一分殘酒霞兩􅀧愁蛾暈羅幕夜猶寒玉枕春先困心情剪綵慵時節燒燈近見少别離多還有人堪恨生查子閨思紅塵陌上遊碧栁堤邉住才趂彩雲來又逐飛花去深深美酒家曲曲幽香路風月有情時揔是相逢處清平樂春情波紋碧皺曲水晴明後折得踈梅香滿䄂暗喜春紅依舊㱕來紫陌東頭金􅁫換酒消愁栁影深深細路花梢小小層樓滿庭芳秋思南苑吹花西樓題葉故園懽事重重凭欄秋思閑記舊相逢幾處歌雲夢雨可憐便流水西東別來乆淺情未有錦字繫征鴻年光還少味開殘檻菊落盡溪桐謾􅅏得樽前淡月凄風此恨誰堪􅀃與清愁付緑酒杯中佳期在㱕時待把香䄂看啼紅南鄕子緑水帶春潮水上朱欄小渡橋橋上女兒雙笑靨夭饒􅀝着闌干弄栁條月夜與花朝减字偷聲按玉簫栁外行人
