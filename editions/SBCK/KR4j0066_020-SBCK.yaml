front:
  text: 選卷之九
  hash: sha256:311df67f467489bd86a653ff51e7f2dc1e67f148291e24e89b22eff2cc115f77
body:
  text: 菩薩蠻夏紅樓斜􅀝連溪曲樓前溪水凝寒玉蕩􅃞木蘭船船中人少年荷花嬌欲語笑入鴛鴦浦波上暝烟低菱歌月下㱕武陵春别情小院無人簾半卷獨自􅀝欄時寛盡春來金縷衣憔悴有誰知玉人近日音書少應是怨來遲夢裏長安早晚㱕和淚立斜暉好事近恨别雨後曉寒輕花外曉鶯啼歇愁聽隔溪殘漏正一聲凄咽不堪西望去程賖離腸萬囘結不似海棠花下按凉州時節减字木蘭花春晚落花飛絮杳杳天涯人甚處欲􅀉相思春盡衡陽鴈漸稀離腸淚眼腸㫁淚痕流不㫁明月西樓一曲闌干一倍愁阮郎㱕别意夕陽樓外落花飛晴空碧四垂去帆囘首已天涯􅀌烟卷翠微樓上客􅁂成絲㱕期未有期㫁魂不􅃘下危梯桐隂月影移詩謾有驚人句九萬里風鵬正舉風休住蓬舟吹取三山去一剪梅别愁紅藕香殘玉簟秋輕解羅裳獨上蘭舟雲中誰􅀉錦書來鴈字囘時月滿樓花自飄零水自流一種相思雨處閑愁此情無計可消除才下眉頭却上心頭如夢令酒興常記溪亭日暮沈醉不知㱕路興盡晚囘舟誤入藕花深處争渡争渡驚起一行鷗鷺如夢令苕溪漁􅀮云近時婦人䏻文詞如李易安頗多佳句如云緑肥紅瘦此語甚新昨夜雨踈風驟濃睡不消殘酒試問卷簾人却道海棠依舊知否知否應是緑肥紅痩醉花隂九日薄霧濃雲愁永晝瑞腦銷金獸時節又重陽玉枕紗厨半夜凉初透東籬把酒黄昏後有暗香盈袖莫道不消魂簾卷西風人似黄花瘦念奴嬌春情蕭條庭院又斜風細雨重門湏閉寵栁嬌花寒食近種種惱人天氣險韻詩成扶頭酒醒别是閑滋味征鴻過盡萬千心事難􅀉樓上幾日春寒簾垂四靣玉欄干慵􅀝􅀍冷香銷新夢覺不許愁人不起清露晨流新桐初引多少遊春意日高烟歛更看今日晴未前軰嘗稱易安緑肥紅瘦為佳句全謂此篇寵栁嬌花之語亦甚竒俊前此未有能道之者蝶戀花離情暖雨和風初破凍栁潤梅輕已覺春心動酒意詩情誰與共淚融殘粉花鈿重乍試夾衣金縷縫山枕欹斜枕損􅁫頭鳳獨抱濃愁無好夢夜闌猶剪燈花弄動寒梢棲􅀫等閑老去年華促秪有江梅伴幽獨夢繞夷門舊家山恨驚囘難續菩薩蠻梅䦨干六曲天圍碧松風亭下梅梢白臘盡見春囘寒花驚又開曲瓊閑不捲沈燎􅀌星轉凝竚小徘徊雲間征鴈來清平樂雪悠悠颺颺做盡輕模様半夜蕭蕭窓外響多在梅邊竹上朱樓向曉簾開六花片片飛來無柰熏爐烟霧騰騰扶上金􅁫醉思仙寓居妙湛悼亡作此晚霞紅看山迷暮靄烟暗􅀌松動翩翩風袂輕若驚鴻心似鑑􅁂如雲弄清影月明中謾悲凉歳冉冉蕣華潜改衰容前事銷凝乆十年光景匆匆念雲軒一夢囘首春空彩鳳逺玉簫寒夜悄悄恨無窮歎黄塵乆埋玉㫁腸揮淚東風如夢令宫詞翠擘紅蕉影亂月上朱欄一半風自碧空來吹落歌珠一串不見不見人􅀍綉簾􅃒㫁
