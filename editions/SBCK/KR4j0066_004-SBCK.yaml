seq: 4
front:
  text: 囘首處迢迢若比銀河路更遥
  hash: sha256:3ee1b1f0605ca93770ea2ef833a7d44753ea2a5c56020cec284bd7af1cdbd111
body:
  text: 阮郎㱕粉㾗閉邸玉尖纎啼紅傍晚奩舊寒新暖尚相兼梅踈待雪添春冉冉恨厭厭章臺對卷簾箇人鞭影弄凉蟾樓前側㡌簷唐宋諸賢絶妙詞選卷之三驀山溪春晴朝來風日陡覺春衫便翠栁艶明眉戯秋千誰家倩盻烟勻露洗草色媚横塘平沙軟彫輪轉行樂聞絃管追思年少走馬尋芳伴一醉幾纒頭過楊州珠簾盡捲而今老矣花似霧中看􅂬意淺天涯逺信馬㱕來晚水調歌頭春行瑶草一何碧春入武陵谿谿上桃花無數花上有黄鸝我欲穿花㝷路直入白雲深處浩氣展虹霓秪恐花深裏紅露濕人衣坐白石欹玉枕拂金徽謫仙何處無人伴我白螺盃我爲靈芝仙草不爲朱唇丹臉長嘯亦何爲醉舞下山去明月逐人㱕江城子情景画堂高㑹酒闌􅔐霎時間􅀝闌干千里関山長恨見伊難及至而今相見了依舊是隔􅀜山倩人傳語問平安省愁煩淚偷彈泣損眼兒不似舊時單尋得石榴雙葉子慿􅀉與挿雲鬟踏莎行春晚臨水夭桃􅀝墻繁李長楊風掉青騘尾樽中有酒可酬春更尋何處無愁地明日重來落花如綺巴蕉漸展山公啓欲牋心事􅀉天公教人長壽花前醉清平樂晚春春㱕何處寂寞無行路若有人知春去處喚取㱕來同住春無蹤跡誰知除非問取黄鸝百囀無人能會因風飛過薔􅅔鷓鴣天西塞山前白鷺飛桃花流水鱖魚肥朝廷尚覔玄真子何處如今更有詩青篛笠綠簑衣斜風細雨不須㱕人間欲避風波險一日風波十二時菩薩蠻集句過盡垂楊院宇紅成陣飛鴛甃玉珮丁東別後悵佳期參差難又名韁利鎻天還知道和天也痩花下重門栁邉深巷不堪囘首念多情但有當時皓月照人依舊風流子初春東風吹碧草年華換行客老滄洲見梅吐舊英栁揺新緑惱人春色還上枝頭寸心亂北隨雲黯黯東逐水悠悠斜日半山暝烟兩岸數聲横笛一葉扁舟青門同携手前􅂬記渾似夢裏楊州誰念㫁腸南陌囘首西樓筭天長地乆有時有盡柰何綿綿此恨無休擬待倩人􅀃與生怕伊愁夢楊州中春晚雲􅀵正栁塘煙雨初休燕子未㱕惻惻輕寒如秋曲闌干外東風軟透綉幃花宻香稠江南逺人何處鷓鴣啼破春愁長記曾陪燕遊酬妙舞清歌麗錦纒頭殢酒爲花十載因甚淹􅅏醉鞭拂靣㱕來晚望翠樓簾捲金鈎佳㑹阻離情正亂頻夢楊州滿庭芳晚景山抹微雲天連衰草画角聲㫁譙門暫停征棹􅂓共飲離尊多少蓬萊舊事空囘首烟靄紛紛斜陽外寒鴉數􅀧流水遶孤村銷魂當此際香囊暗解羅帶輕分謾嬴得秦樓薄倖名存此去何時見也􅁭䄂上空染啼㾗傷情處高城望㫁燈火已黄昏滿庭芳秋思碧水澄秋黄雲凝暮敗葉零亂空堦洞房人静斜月照徘徊又是重陽近也幾處處砧杵聲催重簾外風揺翠竹疑是故人來情懐增悵望新􅂬易失往事難猜問籬邉黄菊知爲誰開謾道愁須殢酒酒未醒愁已先囘慿欄乆金波漸轉白露􅀧蒼苔滿庭芳春遊曉色雲開春隨人意驟雨才過還晴古臺芳榭飛燕蹴紅英舞困榆錢自落秋千外緑水橋平東風裏朱門映栁低按小秦筝多情行樂處珠鈿翠盖玉轡紅纓漸酒空金榼花困蓬瀛豆􅛌梢頭舊恨十年夢屈指堪驚凭欄乆踈烟淡日寂寞下蕪城江城子春别西城楊栁弄春柔動離憂淚難􅀵猶記多情曾爲繫㱕舟碧野朱橋當日事人不見水空流韶華不爲少年􅅏恨悠悠幾時休飛絮落花時節一登樓便做春江都是淚流不盡許多愁千秋歳少游謪處州日作今郡治有鶯花亭盖因此詞耴名水邉沙外城郭春寒退花影亂鶯聲碎飄零踈酒盞離別寛衣帶人不見碧雲暮合空相對憶昔西池㑹鴛鷺同飛盖携手處今誰在日邉清夢㫁鏡裏朱顔改春去也落紅萬􅀧愁如海踏莎行東坡絶愛尾兩句霧失樓臺月迷津渡桃源望㫁無尋處可堪孤館閉春寒杜䳌聲裏斜陽暮驛􅀉梅花魚傳尺素砌成此恨無重數郴江幸自遶郴山爲誰流下瀟湘去阮郎㱕春晩退花新緑漸􅇛枝撲人風絮飛鞦靬未拆水平堤落紅成地衣遊蝶困乳鶯啼怨春春不知日長早􅀍酒禁持那堪更別離阮郎㱕旅况湘天風雨破寒初深沉庭院虚麗譙吹徹小單于迢迢清夜徂郷夢㫁旅魂孤峥嶸歳又除衡陽猶有鴈傳書郴陽和鴈舞南歌子贈陶心兒玉漏迢迢盡銀潢淡淡横夢囘􅀫酒未全醒已􅀍鄰雞催起怕天明臂上粧猶在􅁭間淚尚盈水邉燈火漸人行天外一鈎殘月帶三星末句盖心字也南歌子香墨彎彎画燕脂淡淡匀揉藍衫子淡黄裙獨􅀝玉欄無語􅀧檀唇人去空流水花飛半掩門亂山何處覔行雲又是一鈎新月照黄昏菩薩蠻秋思􅆉聲泣露喧秋枕羅幃淚濕鴛鴦錦獨卧玉肌凉殘更與恨長隂風翻翠幌雨澁燈花暗畢竟不成眠鴉啼金井寒二卷名東山寓聲樂府張右史序之青玉案山谷稱此詞云解道江南㫁腸句世間只有賀方囘凌波不過横塘路但目送芳塵去錦瑟年華誰與度月臺花榭􅃈窓朱戸惟有春知處碧雲冉冉蘅臯暮綵筆新題㫁腸句試問閑愁都幾許一川煙草滿城風絮梅子黄時雨薄倖憶故人淡粧多態更滴滴頻囘盻睞便認得琴心先許欲綰合􅂬雙帶記画堂風月逢迎輕顰淺笑都無柰待翡翠屏開芙蓉帳掩羞把香羅暗解自過了燒灯都不見踏青挑菜幾囘慿雙燕丁寕深意往來却恨重簾礙知何時再正春濃酒困人閑晝永無􅂓頼厭厭睡起猶有花梢日在浣溪沙閨思樓角紅銷一縷霞淡黄禄栁帶棲鴉玉人和月折梅花笑撚粉香㱕綉戸半垂羅幙護窓紗東風寒似夜來些浣溪沙春愁閑把琵琶舊譜尋四絃聲怨却沈吟燕飛人静画堂隂欹枕有時成雨夢隔簾無處􅀃春心一從燈夜到如今浣溪沙春事鸚鵡無言理翠衿杏花零落畫隂隂画橋流水一篙深芳徑與誰同闘草綉床終日罷拈針小牋香管寫春心菩薩蠻閨思章臺遊冶金􅀛壻㱕來猶帶醺醺醉花漏怯春宵雲屏無限嬌絳紗燈影背玉枕􅁫聲碎不待􅀫酲消馬嘶催早朝南柯子别恨斗酒才供淚扁舟只載愁画橋青栁小朱樓猶記出城車馬爲遲􅅏有恨花空委無情水自流河陽新􅁂儘禁秋蕭散楚雲巫雨此生休望湘人春思厭鶯聲到枕花氣動簾醉魂愁夢相半􅀍惜餘薫帶驚剰眼幾許傷春春晚淚竹痕鮮佩蘭香老湘天濃暖記小江風月佳時屢約非烟游伴湏信鸞絃易㫁柰雲和再鼓曲終人逺認羅襪無蹤舊處弄波清淺青翰棹艤白蘋洲畔儘目臨臯飛􅀚不解􅀉一字相思幸有㱕來雙燕感皇恩記别蘭芷滿汀洲游絲横路羅襪塵生歩迎顧整鬟顰黛脉脉多情難語細風吹栁絮人南渡囘首舊游山無重數花厎深朱戸何處半黄梅子向晚一簾踈雨㫁魂分付與春㱕去臨江仙立春巧剪合􅂬羅勝子􅁫頭春意翩翩艶歌淺笑拜嫣然願郎宜此酒行樂駐華年末至文園多病客幽􅁭悽㫁堪憐舊遊夢掛碧雲邉人㱕落鴈後思發在花知君何日同菩薩蠻冬江梅未放枝頭結江樓已見山頭雪待得此花開知君來未來風帆雙画鷁小雨隨行色空得鬱金裙酒痕和淚痕一落索春正是看花天氣爲春一醉醉來却不帶花㱕誚不解看花意試問此花明媚將花誰比只應花好似年年花不似人憔悴木蘭花令别意夜覇
