front:
  text: 有詞七卷沈注爲序
  hash: sha256:6ec54f431cb41523d7856ed5fe81931432a8b6c6bde660825bf1d069014a6434
body:
  text: 訴􅂨情春情楚江南岸小青樓樓前人艤舟別來後庭花晚花上夢悠悠山不㫁水空流謾凝眸建康宫殿燕子來時多少閑愁訴􅂨情建康鍾山影裏看樓臺江烟晚翠開六朝舊時明月清夜滿秦淮寂寞處兩潮􅅆黯愁懐汀花雨細水樹風閑又是秋來訴􅂨情宝月山作清波門外擁輕衣楊花相送飛西湖又還春晩水樹亂鶯啼閑院宇小簾幃晚初㱕鐘聲已過􅂐香才􅀧月到門時訴􅂨情春詞長橋春水拍堤沙踈雨帶殘霞幾聲脆管何處橋下有人家宫樹緑晚烟斜噪閑鴉山光無盡水風長在滿靣楊花訴􅂨情寒食湧金門外小瀛洲寒食更風流紅船滿湖歌吹花外有高樓晴日煖淡烟浮恣嬉遊三千粉黛十二闌干一片雲頭仲殊之詞多矣佳者固不少而小令爲最小令之中訴􅂨情一調又其最盖篇篇竒麗字字清婉高處不减唐人風致也蝶戀花春愁開到杏花寒食近人在花前􅀫酒和春困酒有盡時情不盡日長只恁厭厭悶經歳別離閑與問花上啼鶯解道深深恨可惜㫁雲無定凖不能爲􅀉藍橋信念奴嬌荷花水楓葉下乍湖光清淺凉生商素西帝宸遊羅翠盖擁出三千宫女絳綵嬌春鉛華掩晝占㫁鴛鴦浦歌聲揺曵浣沙人在何處別岸􅀌梟一枝廣寒宫殿冷落栖愁苦雪艶氷肌羞淡泊偷把胭脂匀注媚臉籠霞芳心泣露不肯爲雲雨金波影裏爲誰長恁凝竚南柯子憶舊十里青山逺潮平路帶沙數聲啼鳥怨年華又是凄凉時候在天涯白露􅀵殘月清風散暁霞緑楊堤畔問荷花記得年時沽酒那人家栁梢青吳中岸草平沙吳王故􅁐栁裊烟斜雨後寒輕風前香軟春在棃花行人一棹天涯酒醒處殘陽亂鴉門外秋千墻頭紅粉深院誰家夏雲峯傷春天闊雲高溪横水逺晚日寒生輕暈閑堦静楊花漸少朱門掩鶯聲猶嫰悔匆匆過却清明旋古得餘芳已成幽恨都幾日隂沈連宵慵困起來韶華都盡怨入雙眉閑闘損乍品得情懐看承全近深深態無非自許厭厭意終羞人問争知道夢裏蓬萊待忘了餘香時傳音信縱􅅏得鶯花東風不住也則眼前愁有意送春㱕無計􅅏春住畢竟年年用着來何似休㱕去目㫁楚天遥不見春㱕路風急桃花也似愁􅀧􅀧飛紅雨唐宋諸賢絶妙詞選卷之九菩薩蠻
