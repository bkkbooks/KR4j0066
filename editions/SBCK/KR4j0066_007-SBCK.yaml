front:
  text: 事與􅀌鴻去探春盡是傷離意緒官栁低金縷㱕􅀐晚纎纎池塘飛雨㫁腸院落一簾風絮今按比詞自章臺路至㱕來舊處是第一叚自黯凝竚至盈盈笑語是第二叚此謂之雙拽頭属正平調自前度劉郎以下即犯大石係第三叚至㱕􅀐晚以下四句再㱕正平今諸本皆扵吟牋賦茟處分叚者非也
  hash: sha256:456d0010a0849ba074c20f58924164c09cc810b11a5ba497e52a91f955b6c19a
