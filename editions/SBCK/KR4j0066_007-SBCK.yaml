body:
  text: 蘭陵王栁栁隂直煙裏絲絲弄碧隋堤上曾見幾畨拂水飄綿送行色登臨望故國誰識京華倦客長亭路年去歳來應折柔條過千尺閑尋舊蹤跡又酒趂哀絃燈照離席棃花榆火催寒食愁一箭風快半篙波暖囘頭迢逓便數驛望人在天北悽惻恨堆積漸别浦縈􅅆津堠岑寂斜陽冉冉春無極記月榭携手露橋聞笛沈思前事似夢裏淚暗滴隔浦蓮近夏景新篁揺動翠葆曲徑通深窈夏果􅀵新脆金丸落驚飛鳥濃靄迷岸草蛙聲閙驟雨鳴池沼水亭小浮萍破處簾花簷影顚倒綸巾羽扇困卧北窓清曉屏裏吳山夢自到驚覺依然身在江表西河金陵懐古佳麗地南朝盛事誰記山圍故國遶清江䯻鬟對起怒濤寂寞打空城風檣遥度天際㫁崖樹猶倒􅀝莫愁艇子曾繫空餘舊迹鬱蒼蒼霧沈半壘夜深月過女墻來傷心東望淮水酒旗戯鼓甚處市想依俙王謝鄰里燕子不知何世向尋常巷陌人家相對如􅀃興亾斜陽裏解連環怨別怨懐難託嗟情人㫁絶信音遼邈縱妙手能解連環似風散雨􅀵霧輕雲薄燕子樓空暗塵鎻一床絃索想移根換葉盡是舊時手種紅藥汀洲漸生杜若料舟移岸曲人在天角謾記得當日音書把閑語閑言待揔燒却水驛春回望􅀉我江南梅蕚􅂸今生對花對酒爲伊淚落風流子初夏新緑小池塘風簾動碎影舞斜陽羡金屋去來舊時巢燕土花繚繞前度莓墻綉閣鳳幃深幾許聽得理絲簧欲􅀃又休慮乖芳信未歌先咽愁近清觴遥知新粧了開朱戸應自待月西廂最苦夢魂今宵不到伊行問甚時􅀃與佳音密耗音將秦鏡偷換韓香天便教人霎時厮見何妨風流子秋詞楓林凋晚葉関河逈楚客慘將㱕望一川􅊕靄鴈聲哀怨半規凉月人影參差酒醒後淚花銷鳳蠟風幙卷金泥砧杵韻高喚囘殘夢綺羅香减牽起餘悲亭臯分􅁭地難􅂸處偏是掩靣牽衣何况怨懐長結重見無期想􅀉恨書中銀鉤空滿㫁腸聲裏玉筯偷垂多少暗愁密意惟有天知花犯梅花粉墻低梅花照眼依然舊風味露㾗輕綴疑浄洗鈆華無限清麗去年勝賞曾孤􅀝氷盤同宴喜更可惜雪中高樹香篝熏素􅀍今年對花太匆匆相逢似有恨依依愁悴凝望乆青苔上旋看飛墜相將見脆圎薦酒人正在空江烟浪裏但夢想一枝瀟洒黄昏斜照水此只詠梅花而紆餘反覆道盡三年間事昔人謂好詩圎美流轉如弹丸余扵此詞亦云意難忘美人衣染鶯黄愛停歌駐拍􅂆酒持觴低鬟蟬影動私語口脂香荷露滴竹風凉􅂸劇飲淋浪夜漸深籠燈就月細與端相知音見􅀃無雙解移宫換羽未怕周郎長顰知有恨貪耍不成粧些箇事惱人腸待􅀃與何妨又恐伊尋消問息痩减容光側犯荷花暮霞霽雨小蓮出水紅粧靚風定看歩襪江妃照明鏡飛螢度暗草秉燭遊花徑人静携艶質追凉就槐影金環皓腕雪藕清泉瑩誰念省滿身香猶是舊荀令見􅀃胡􅁎酒壚寂静烟鎻漠漠藻池苔井蝶戀花早行月皎驚烏棲不定更漏將闌轆轤牽金井喚起兩眸清炯炯淚花落枕紅綿冷執手霜風吹􅁂影去意徊徨别語愁難聽樓上䦨干横斗柄露寒人逺雞相應齊天樂秋詞緑蕪凋盡臺城路殊郷又逢秋晚暮雨生寒鳴蛩􅂆織深閣時聞裁剪雲窓静掩嘆重拂羅䄄頓踈花簟尚有綀嚢露螢清夜照書卷荆江􅅏滯最乆故人相望處離思何限渭水西風長安亂葉空憶詩情宛轉凭高眺逺正玉液新篘蟹螯初薦醉倒山翁但愁斜照歛滿庭芳夏景風老鶯雛雨肥梅子午隂嘉􅀣清圎地卑山近衣潤費爐烟人静烏鳶自樂小橋外新緑濺濺凭欄乆黄蘆苦竹疑泛九江船年年如社燕漂流瀚海來􅀉脩椽且莫思身外長近尊前憔悴江南倦客不堪聽急筦危絃歌筵畔先安簟枕容我醉時眠渡江雲春詞晴嵐低楚甸暖囘鴈翼陣勢起平沙驟驚春在眼借問何時委曲到山家􅂗香暈色盛粉飾争作妍華千萬絲陌頭楊栁漸漸可藏鴉堪嗟清江東注画舸西流指長安日下愁宴䦨風翻旗尾潮濺烏紗今宵正對初弦月傍水驛深艤蒹叚沈恨處時時自剔燈花過秦樓夜景水浴清蟾葉喧凉吹巷陌馬聲初㫁閑依露井笑撲流螢惹破画羅輕扇人静夜乆凭欄愁不㱕眠立殘更箭嘆年華一瞬人今千里夢沈書逺空見􅀃􅁂怯瓊梳容消金鏡漸􅂴趂時匀染梅風地溽虹雨苔滋一架舞紅都變誰信無僇爲伊才减江淹情傷荀倩但明河影下遥看稀星數􅀧解蹀􅉜秋詞􅀱館丹楓吹盡靣旋隨風舞夜寒霜月飛來伴孤旅還是獨擁秋衾夢餘酒困都醒滿懷離苦甚情緒深念凌波微歩幽房暗相遇淚珠都作秋宵枕前雨此恨音驛難通待慿征鴈㱕時􅀉將愁去一寸金新定作州夾蒼崖下枕江山是城郭望海霞接日紅翻水靣晴風吹草青揺山脚波暖鳬鷖作沙㾗退夜潮正落踈林外一􅀧炊烟渡口叅差正寥廓自歎勞生經年何事京華信漂泊念渚滿汀栁空㱕閑夢風輪雨楫終辜前約情景牽心眼流連處利名易薄囘頭謝冶葉倡條便入漁釣樂淡元宵燈近香散梅梢凍消池靣一畨春信記南樓醉裏西城宴闋都不管人春困屈指流年未幾早驚人潘郎雙􅁂當時體態而今情緒多應瘦損馬上墻頭縱教瞥見也難相認凭闌千但有盈盈淚眼把羅􅁭揾水龍吟梅花夜來深雪前村路應是早梅初綻故人念我江頭春信南枝向暖踈影横斜暗香浮動月明清淺向亭邊驛畔行人立馬頻囘首空腸㫁别有玉溪仙館壽陽人宫粧粉靣天教占了百花頭上和羮未晚最是傷情處高樓上一聲􅆧管仗何人向道争如􅅏耴􅀝闌干看鷓鴣天升平詞霜壓天街不動塵千官環珮賀成禋三竿閶闔樓邊日五色蓬萊頂上雲隨歩輦卷香䄄六宫紅粉倍添春樂章近與中聲合一片仙韶特地新清平樂夏詞深沈院宇枕簟清無暑睡起花隂初轉午一霎飛雲過雨雨餘􅀮􅀮殘雷夕陽􅁍照庭槐莫把珠簾垂下妨他雙燕㱕來驀山溪春情風流心膽直把春償酒選得一枝花綺羅中筭來未有名園翠􅁐風月最佳時夜迢迢車欵欵是處曾携手重來一夢池館皆依舊幽恨寫新詩托何人章臺問栁漁舟㱕後雲鎻武陵溪水潺潺花片片艤棹空囘首行香子别恨别恨綿綿屈指三年再相逢情分依然君初霜􅁂我已華顚况其間有多少恨不堪言小庭幽檻菊蘂斕斑近清宵月已嬋姢莫思身外且闘尊前願花長聚雙雙遊女餳香更酒冷踏青路㑹暗識夭桃朱戸向晚驟寶馬雕鞍醉􅁭惹亂花飛絮正輕寒輕暖漏永半隂半晴雲暮禁火天已是試新粧歳華到三分佳處清明看漢宫傳䗶炬散翠煙飛入槐府歛兵衛閶闔門開住傳宣又還休務戀芳春慢寒食前進蜂蘂分香燕泥破潤暫寒天氣清新帝里繁華昨夜細雨初匀萬品花藏四􅁐望一帶栁接重津寒食近蹴踘秋千又是無限遊人紅粧趂戯綺羅夾道青帘賣酒臺榭侵雲處處笙歌不􅀒治世良辰共見西城路好翠華定將出嚴宸誰知道仁主祈祥爲民非事行春安平樂慢都門池􅁐應制瑞日初遲緒風乍暖千花百草争香瑶池路穏閬􅁐春深雲􅀣水殿相望栁曲沙平看塵隨青盖絮惹紅粧賣酒緑隂傍無人不醉春光有十里笙歌萬家羅綺身世疑在仙郷行樂知無禁五侯半􅀮少年場舞妙歌妍空妬得鶯嬌燕忙念芳菲都來幾日不堪風雨踈狂卓牌兒春晚東風緑楊天如画出清明院宇玉艶淡泊棃花帶月胭脂零落海棠經雨單衣怯黄昏人正在珠簾笑語相並戯蹴秋千共携同􅀝闌干暗香時度翠窓綉戸路繚繞潜通幽處㫁魂凝佇嗟不似飛絮閑悶閑愁難消遣此日年年意緒無據柰酒醒春去昭君怨春到南樓雪盡驚動燈期花信小雨一畨寒􅀝䦨干莫把䦨干􅀝一望幾重烟水何處是京華暮雲􅃒昭君怨一望西山煙雨目㫁心飛何處天外白雲城幾多程謾記陽関句衣上粉啼㾗汚隴水一分流此生休訴􅂨情送春一鞭清曉喜還家􅀫醉困流霞夜來小雨新霽雙燕舞風斜山不盡水無涯望中賖送春滋味念逺情懐分付楊花梅花引冬怨曉風酸曉霜乾一鴈南飛人度関客衣單客衣單千里㫁魂空歌行路難寒梅驚破前村雪寒雞啼破西樓月酒腸寛酒腸寛家在日邊不堪頻􅀝欄憶秦娥别情千里草萋萋盡處遥山小遥山小行人逺似此山多少天若有情天亦老此情􅀃便􅀃不了􅀃不了一聲喚起又驚春曉憶少年隴首山隴雲溶􅂥隴山峻秀隴泉嗚咽行人暫駐馬已不勝愁絶上隴首凝眸天四闊更一聲塞鴈凄切征書待􅀉逺有知心明月長相思雨一聲聲一更更窓外芭蕉窓裏燈此時無限情夢難成恨難平不道愁人不喜聽空堦滴到明鷓鴣天和康伯可韻梅妬晨粧雪妬輕逺山依約學眉青樽前無復歌金縷夢􅁴空餘月滿林魚與鴈兩浮沉淺顰微笑揔関心相思恰似江南栁一夜東風一夜深鷓鴣天楓落河梁野水秋淡烟衰草接郊丘醉眠小塢黄茅店夢􅀝高城赤葉樓天杳杳路悠悠鈿筝歌扇等閑休㶚橋楊栁年年恨鴛浦芙蕖葉葉愁阮郎㱕春恨西園風暖落花時緑隂鶯亂啼􅀝欄無語惜芳菲絮枝風裊竒妙竒妙半夜山空月皎水龍吟郎官湖碧山横繞清湖茂林秀麓波光裏南宫老大西州漂蕩危樓重􅀝雨歩雲行餌風飲霧平生遊戯笑此中空洞都無一物有神妙浩然氣掃盡雲南夢北看三江五湖秋水狂歌兩解清尊一舉超然千里江漢蒼茫故人何處山川良是待白蘋露下青天月上約􅀐鯨起醉桃源春風碧水滿郎湖水清梅影踈渡江桃葉酒家壚䯻啼鳥兩三聲霜華重迫駝裘冷心共馬蹄輕十里青山一溪流水都做許多情唐宋諸賢絶妙詞􅃟卷之七􅀝黄昏水龍吟梅花歳
