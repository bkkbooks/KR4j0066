body:
  text: 花菴詞選詞曲類二詞選之屬提要臣等謹案花菴詞選十卷續集十卷宋黃升輯升字叔暘號玉林又號花菴詞客以所居有玉林又有散花菴也毛晉刻六十家詞以升作昃以叔暘作叔陽而諸本實多作黃升考此書舊傳刋本又題曰黃而詩人玉屑前有升序世所傳翻刻宋本猶鈎摹當日手書亦作黃檢此書序末尚有當時姓名小印實作字蓋許慎說文升字篆文作升特以篆體署名故作字晉不考六書妄改為昃殊為舛謬至叔陽乃盧炳之字炳即作哄堂詞者晉乃移而為升之字益桃僵李代矣此乃所選南宋詞人之作自康與之至洪瑹凡八十八家而以已作附録於末共七百五十餘首即所稱中興以來絶妙詞選者是也其意蓋欲以繼趙宏祚花間集曾慥樂府雅詞之後故搜羅頗廣又於作者姓氏下各綴數語略具始末亦足以資考核惟所裒詞人祇有此數而自序乃云得數百家則未免夸詞非其實耳升論詞最服膺姜䕫故所録多典雅清俊非草堂詩餘專取俗體者可比又草堂詩餘刻本多訛字及失名者而此猶舊帙於彼此並收之作亦可互相參證云乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀花菴詞選序長短句始於唐盛於宋唐詞具載花間集宋詞多見於曽端伯所編而復雅一集又兼采唐宋迄於宣和之季凡四千三百餘首吁亦備矣況中興以來作者繼出及乎近世人各有詞詞各有體知之而未見見之而未盡者不勝算也暇日裒集得數百家名之曰絶妙詞選佳詞豈能盡録亦嘗鼎一臠而巳然其盛麗如遊金張之堂妖冶如攬嬙施之袪悲壯如三閭豪俊如五陵花前月底舉杯清唱合以紫簫節以紅牙飄飄然作騎鶴揚州之想信可樂也親友劉誠甫謀刋諸梓傳之好事者此意善矣又録豫舊作數十首附於後不無珠玉在側之愧有愛我者其為刪之淳祐已酉百五玉林
