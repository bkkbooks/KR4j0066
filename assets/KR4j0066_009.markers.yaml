  - {type: variant, offset: 0, length: 258, content: 欽定四庫全書花菴詞選巻九宋黄昇撰宋詞禪林僧覺範名恵洪按許彦周稱其善作小詞情思婉約似秦少游云鳳棲梧梅花碧瓦籠晴香霧繞水殿西偏小駐聞啼鳥風度女牆吹語笑南枝破臈應開了道骨不凡江瘴曉春色通靈醫得花重少爆煖釀寒春杳杳江城畫角留殘照㸃絳唇流水泠泠斷橋横路梅枝亞雪花飛下渾似江南畫白璧青錢欲買春無價歸來也風吹平野一㸃香隨馬青玉案上元凝祥宴罷囘歌吹畫轂走香塵起冠壓花枝馳萬騎馬行燈閙鳳樓簾巻陸海鼇山對當年曽看天顔醉御杯舉懽聲沸時節雖同悲樂異海風吹夢嶺猿啼月一枕思歸泪僧仲殊名揮姓張氏安州進士棄家為僧居杭州吳山寳月寺東坡所稱蜜殊者是也, SBCK: ''}
