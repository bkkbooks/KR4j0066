  - {type: variant, offset: 6245, length: 412, content: 了無拘礙袖裏陰符枕中鴻寳功名蟬蜕看舌端霹霹劇談𤣥妙人間世疑無對閬苑醉鄉佳處想當年緑陰猶在羣仙寄語不須㸃勘鬼神功罪碧海千尋赤城萬丈風髙浪快待踞龜食蛤相期汗漫與煙霞會西河巳亥秋作天似洗殘秋未有寒意何人短笛弄西風數聲壯偉倚欄感慨展雙眸離離煙樹如薺少年事成夢裏客愁付與流水筆牀茶具老空山未妨肆志世間富貴要時賢深居宜有餘味大江東去日西墜想悠悠千古興廢此地閲人多矣且揮絃寄興氛埃之外目送蜚鴻歸天際清平樂宫怨珠簾寂寂愁背銀缸泣記得少年初選入三十六宫第一當時掌上承恩而今冷落長門又是羊車過也月明花落黄昏又宫詞深深禁籞霽日明鸎羽風動槐龍交翠舞恰恰花陰亭午一簾暖絮悠颺金爐旋炷沉香天子方看諌疏内人休鬭新粧酹江月戲題玉林玉林何有有一灣蓮沼數間茅宇斷塹疎籬聊補葺那得粉墻朱戶禾黍秋風雞豚曉日活脱田家趣客來茶罷自挑野菜同煮多少甲第連雲十眉環座人醉黄金塢回首邯鄲春夢破零落珠歌翠舞得似衰翁蕭然陋巷長作溪山主紫芝可採更尋巖谷深處酹江月夜涼西風解事為人間洗, SBCK: ''}
