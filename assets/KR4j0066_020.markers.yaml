  - {type: variant, offset: 1463, length: 1583, content: 兩地㸔花西湖斷橋路想繫馬垂楊依舊欹斜葵麥迷煙處問離巢孤燕飛過誰家故人為寫深怨空壁掃秋蛇但醉上吳臺殘陽草色歸思賖宴清都病渇文園久梨花月夢殘春故人舊愁彈枕雨哀翻㡌雪為情僝僽千金醉躍驕驄試問取朱橋翠柳痛恨不買斷斜陽西湖醖入春酒吳宫亂水斜煙留連倦客慵更回首幽蛩韵苦哀鴻呌絶斷音難偶題紅汎葉零亂想夜冷江楓暗痩付與誰一半悲秋行雲在否金縷曲陪履齋先生滄浪㸔梅喬木生雲氣訪中興英雄陳迹暗追前事戰艦東風慳借便夢斷神州故里旋小築吳宫閒地華表月明歸夜鶴歎當時花竹今如此枝上露濺清淚遨頭小簇行春隊歩蒼苔尋幽别塢看梅開未重唱梅邊新度曲催發寒梢凍蘂此心與東君同意後不如今今非昔兩無言相對滄浪水懐此恨寄殘醉陳敬叟名以莊號月溪建安人水龍吟記錢塘之恨晩來江濶潮平越船吳㮄催人去稽山滴翠胥濤濺恨一襟離緒訪柳章臺問桃仙浦物華如故向秋娘渡口泰娘橋畔依稀是相逢處窈窕青門紫曲蒨羅新衣翻金縷舊音恍記輕攏慢撚哀絃危柱金屋難成阿嬌巳逺不堪春暮聼一聲杜宇紅殷緑老雨花風絮賀新郎和劉潛夫韵曉夢鶯呼起便安排詩家厨傳酒家行李㸃檢花邊新雨露春在萬家生齒道官似錦溪清駛但使有人耕緑野正不妨鼔吹頻來此方覓句且夷俟畫橋西畔多春意記年年曽來幾度落花流水行到水窮雲起處依約輞川竹里興未屬王孫公子料想明年端門裏有傳柑宴罷黄封醉肯回首萬杉底馮熙之名取洽號雙溪翁延平人摸魚兒和玉林韵葢為遺蛻山中桃花作歎劉郎那回輕别霏霏三落紅雨𤣥都觀裏應遺恨一抹淡煙殘縷愁望處想霧暗雲深忘却來時路新花舊主記刻羽流商裁紅剪翠山徑日將暮空枝上時有幽禽對語聲聲如問來否人生行樂須聞健衰老念誰免此吾所與在谿上深深錦綉千花塢何時定去但對酒思君呼兒為我頻唱小桃句賀新郎送别江定軒夢折營門柳送君歸蹔戲斑衣又攏征袖到得皇州風景異只有湖山似舊把感慨寓之杯酒雨抹晴粧西子様且平章剰賦詩千首富與貴本來有青油幕底籌攻守擁貔貅朝氣凌雲夜鋒衝斗蜀祲淮氛猶在眼一掃政須健帚又何惜驅馳奔走快展韜鈐資世用看歸來金印懸雙肘須玉斚為君夀沁園春中和節日為黄玉林夀禀氣之中具聖之和生逢令辰算三春中月方纔破二百年大齊去聲恰則平分立玉林深散花菴小中有翛然自在身詩何似似蘇州閒逺庾府清新青鞵布韈烏巾試勇徃蓉谿一問津有心香一瓣心聲一闋更携阿艾同夀靈椿劫劫長存生生不息寧極深根秋又春聊添我作去聲風流二老嵗嵗尋盟西江月太嵗日作老子齊頭六十新年第一今朝放開懐抱不須焦萬事付之一笑煙柳效顰翠斂露桃獻笑紅妖巳拚行樂到元宵尚可追隨年少蝶戀花和玉林韵秋到雙溪溪上樹葉葉凉聲未省來何許盡拓溪樓窗與戶倚欄清夜窺河鼓那得吟朋同此住獨對秋芳欲寄花無處杖屨相從曽有語未來先自愁君去馮偉夀名艾子號雲月雙溪子精於律吕詞多自製腔玉連環憶李謫仙謫仙徃矣問當年飲中儔侣於今誰在歎沈香醉夢胡塵日月流浪錦袍宫帶髙吟三峽動舞劒九州隘玉皇歸覲半空遺下詩囊酒佩雲月仰挹清芬攬虬鬚尚友千載晉宋頺波羲黄春夢樽前一嘅待相將共躡龍肩鯨背海山何處五雲靉靉春風嬝娜春恨黄鍾羽被梁間雙燕話盡春愁朝粉謝午花柔倚紅欄故與蝶圍蜂遶柳綿無數飛上搔頭鳳管聲圓蠶房香煖笑挽羅衫須少留隔院蘭馨趂風逺鄰墻桃影伴煙收些子風情未减眉頭眼尾萬千事欲說還休薔薇露牡丹毬慇懃記省前度綢繆夢裏飛紅覺來無覓望中新緑别後空稠相思難偶歎無情明月今年巳是三度如鈎春雲怨上巳黄鍾商春風惡劣把數枝香錦和鶯吹折雨重柳腰嬌困燕子欲扶扶不得軟日烘煙乾風收霧芍藥荼䕷弄顔色簾幕輕陰圖書清潤日永篆香絶盈盈笑靨宫黄額試紅鸞小扇丁香雙結團鳳眉心倩郎貼教洗金罍共看西堂醉花新月曲水成空麗人何處徃事暮雲萬葉雲僊引桂花夾鍾羽紫鳳臺髙紅鸞鏡裏馡馡幾度秋馨黄金重緑雲輕丹砂鬢邊滴粟翠葉玲瓏煙剪成含笑出簾月香滿袖天霧縈身年時花下逢迎有遊女翩翩如五雲亂擲芳英為簪斜朶事事關心長向金風一枝在手嗅蘂悲歌雙黛嚬遶臨溪樹對初弦月露下更深眼兒媚春情自嚬雙黛聼啼鴉簾外翠煙斜社前風雨巳歸燕子未入人家鞋兒試著無人看莫是忒寛些想他樓上悶拈簫管憔悴鶯花, SBCK: 字}
