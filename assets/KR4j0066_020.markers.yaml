  - {type: variant, offset: 88, length: 514, content: 雲深處綵鷁雙飛水亭開宴近重午溪蒲堪薦緑醑幔亭何惜為曽孫留住碧水吟哦滄洲夢想未放舟横野渡維申及甫正夾輔中興擎天作柱願祝嵩髙嵗添長命縷花發沁園春呈史滄洲換譜伊涼選歌燕趙一畨樂事重起花新笑靨柳軟纎腰濟楚衆芳圍裏年年佳㑹長是傍清明天氣正魏紫衣染天香蜀粧紅破春睡一簇猩羅鳳翠徧東園西城㸃檢芳事鈴齋吏散晝館人稀幾闋管絃清脆人生適意流轉共風光遊戲到遇景取次成歡怎教良夜休醉玉樓春題小竿嶺今來古徃吳京道嵗嵗榮枯原上草行人幾度到江濵不覺身隨風樹老蒲花易晩蘆花早客裏光陰如過鳥一般垂柳短長亭去路不如歸路好沁園春西巖三澗雲壑泉泓小者如盃大者如罌更石筵平瑩寛容數客淙流回激環遶飛觥三澗交流兩崖懸瀑𢷬雪飛霜落翠屏經行處有丹荑碧草古木蒼藤裵􅏆却倚山楹笑山水娛人若有情見傍回側轉峰巒疊疊欲窮還有巖谷層層仰視雲間茅茨雞犬疑有仙家來避秦青林表望煙霞縹緲隱隱鸞笙賀新郎登玉田峰拄杖凌髙絶望千山隱隱波瀾動揺天末下有白雲平逺壑湧起潮頭噴雪浸絶島孤峰出没赤縣神州何處是但風烟杳杳迷空闊呼不見古人物碧松枝下青瑤石舉頭看長空湛湛淡琉璃色上界星辰多官府夸父忙鞭日月任兔走烏飛超忽宇宙茫茫如許大百年間何用爭優劣身世事一毛髮滿江紅風泉峽觀泉雲壑飛泉蒲根下懸流陸續堪愛處石池湛湛一方, SBCK: 凝}
