  - {type: variant, offset: 5556, length: 517, content: 空樽靖節貧世間那復有斯人目送歸鴻西去一傷神行香子梅寒意方濃暖信才通是晴陽暗拆花封氷霜作骨玉雪為容看體清癯香淡竚影朦朧孤城小驛斷角殘鐘又無邊散與春風芳心一㸃幽恨千重任雪霏霏雲漠漠月溶溶賣花聲己亥三月一日鶯蝶太匆匆惱殺衰翁牡丹開盡狀元紅俯仰之間増感慨花事成空垂柳緑陰中粉絮濛濛多情多病轉疎慵不是東風孤負我負東風又憶舊秋色滿層霄剪剪寒飇一襟殘照兩無聊數盡歸鴉人不見落木蕭蕭徃事欲魂銷夢想風標春江緑漲水平橋側帽停鞭沽酒處柳軟鶯嬌長相思秋懐天悠悠水悠悠月印金樞曉未收笛聲人倚樓蘆花秋蓼花秋催得吳霜㸃鬢稠香箋莫寄愁又秋夜砧聲齊杵聲齊金井欄邊敗葉飛夜寒烏不棲風淒淒露淒淒影轉梧桐月已西花冠窗外啼又春晩惜春歸愛春歸脱了羅衣著苧衣緑陰黄鳥啼酒醒時夢醒時清簟疎簾一局棋丁東風馬兒感皇恩送饒溪臺遊浙騎鶴上揚州腰纒十萬拈起詩人舊公案看山看水此去勝遊須徧煩君收拾取歸吟巻少日風流暮年蕭散佳處何妨小留欵沙河塘上落日綉簾爭捲也須拂拭起看花眼蝶戀花春感百計留春春不住褪粉吹香日日催教去心事欲憑鶯語訴流鶯剗地無憑據緑玉䦨干圍綺戶一㸃柔紅應在深深處想倚翠簾吹柳絮淺顰惆悵芳期誤月照梨花閨怨晝景方永重簾花影好夢猶酣鶯聲喚醒門外風絮交飛送春歸修蛾畫了無人問幾多别恨淚洗殘粧粉, SBCK: ''}
