  - {type: variant, offset: 644, length: 324, content: 忻翫滯留空谷靜坐時看松䑕飲醉眠不礙山禽浴喚仙人伴我酌瓊瑶餐秋菊霜天曉角春愁横陰漠漠似覺羅衣薄正是海棠時候紗窗外東風惡惜春春寂寞尋花花冷落不㑹這些情味元不是念離索洞仙歌寄劉令君潛夫風饜雨足也解為花地收拾浮雲放新霽愛調亭小翠㸃滴猩紅新粧了妃子朝來睡起遙知春有主整頓歡娛興在新亭錦圍底便選歌燕趙授簡鄒枚須記作他日城山盛事笑東君不用管楊花任飛去天涯在東風裏吳君特名文英自號夢窗四明人從吳履齋諸公遊山陰尹煥叙其詞畧曰求詞於吾宋者前有清真後有夢窗此非煥之言四海之公言也聲聲慢閨重九飲郭園檀欒金碧婀娜蓬萊游雲不蘸芳洲露柳霜蓮十分㸃綴殘秋新彎畫眉未穩似含羞低度墻頭愁送逺駐西臺車馬共惜臨流知道池亭多宴掩庭花長是驚落秦謳膩粉䦨干猶聞凭袖香畱輸他翠漣拍甃瞰新粧終日凝眸, SBCK: ''}
