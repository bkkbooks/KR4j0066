  - {type: variant, offset: 3787, length: 1646, content: 魂夢空費斷鴈無情離鸞有恨空想吳山越水花憔玉悴但翠黛愁横紅鈆淚洗待剪江梅倩人傳此意菩薩鬘宿水口斷虹逺飲横江水萬山紫翠斜陽裏繫馬短亭西丹楓明酒旗浮生長客路事逐孤鴻去又是月黄昏寒燈人閉門又湖上吳姬壓酒浮紅蟻少年未飲心先醉駐馬緑楊隂酒樓三月春相看成一笑遺恨知多少回首欲魂銷長橋連斷橋踏莎行别意滿滿金盃垂垂玉筯離歌不放行人去醉中扶上木蘭船醒來忘却桃源路帶綰同心釵分一股斷魂空草髙唐賦秋山萬疊水雲深茫茫無著相思處瑞鶴仙離筵代意聼梅花吹動涼夜何其明星有爛相看淚如霰問而今去也何時㑹靣匆匆聚散恐便作秋鴻社燕最傷情夜來枕上斷雲零雨何限且念人生萬事回首悲涼都成夢幻芳心繾綣空惆悵巫陽館况船頭一轉三千餘里隱隱髙城不見恨無情春水連天片帆似箭浪淘沙别意花霧漲𡨕𡨕欲雨還晴薄羅衫子正宜春無奈金宵鴛帳裏身是行人别酒不須斟難洗離情絲鞘如電紫騮鳴腸斷畫橋芳草路月曉風清南柯子新月柳浪揺晴沼荷風度晩簷碧天如水印新蟾一罅清光斜露玉纎纎寳鏡微開匣金鈎半押簾西樓今夜有人忺應傍粧臺低照畫眉尖永遇樂送春歌雪徘徊夢雲溶曳欲勸春住薄倖楊花無端杜宇抵死催教去參差煙岫千回百匝不解禁春歸路病厭厭那堪更聼小樓一夜風雨金釵鬭草玉盤行菜徃事了無憑據合數松兒分香帕子總是牽情處小桃朱戶題詩在否尚憶去年崔䕶緑陰中鶯鶯燕燕也應解語謁金門春晩風共雨催盡亂紅飛絮百計留春春不住杜鵑聲更苦細柳官河狹路幾被嬋娟相誤空憶墜鞭遺扇處碧窗眉語度菩薩鬘春感玉琴不療文園病對花長抱深深恨恨入鬢霜邊才情輸少年蛾眉梳墮馬翠袖薫蘭麝醉夢未全醒緑窗啼曉鶯阮郎歸壬辰邵武試燈夕東風吹破藻池氷晴光開五雲緑情紅意兩逢迎扶春來逺林花艷艷玉英英羅衣金縷明閙蛾兒簇小蜻蜓相呼看試燈行香子代贈楚楚精神楊柳腰身是風流天上飛瓊凌波微步羅韈生塵有許多嬌許多韻許多情十年心事兩字眉婚問何時真箇行雲秋衾半冷窗月窺人想為人愁為人痩為人顰鷓鴣天情景意態嬋娟畫不如瑩然初日照芙渠笑捐瓊佩遺交甫肯把文梭擲㓜輿花上蝶水中鳬芳心密意兩相於情知不作庭前柳到得秋來日日疎黄叔暘名號玉林又號花菴賀新郎題雙溪馮熙之交游風月之樓倦整摩天翼笑歸來㸃畫亭臺按行泉石落落元龍湖海氣更著髙樓百尺收攬盡水光山色曽駕飇車蟾宫去幾回批借月支風敕斯二者慣相識玲瓏窗戶青紅濕夜深時寒光爽氣洗清肝髙似此交游真灑落判與升堂入室有萬象來為賔客不用笙歌輕㸃涴㸔仙翁手搦虹霓筆吟思逺兩峰碧樓對兩峯甚竒又乙已正月十日雙溪携酒遺蜕亭桃花方開主人浩歌酌客歡甚即席作此風送行春歩漸行行山回路轉入雲深處問訊花梢春幾許半在詩人杖屨㸃㸃是祥煙膏露中有瑶池千嵗種整嚴粧來作巢仙侣相嫵媚試凝竚風流座上揮談麈更多情多才多調緩歌金縷趂取芳時同宴賞莫惜清樽緩舉有明月隨人歸去從此一春須一到願東君長與花為主泉共石聞斯語又菊莫恨黄花痩正千林風霜揺落暮秋時候晩節相看元不惡采采東籬獨秀試攬結幽香盈手幾劫修來方得到與淵明千載為知舊同冷淡比蘭友柴桑心事君知否把人間功名富貴付之塵垢不肯折腰營口腹一笑歸歟五栁悵此意而今安有若得風流如此老也何妨相對無杯酒詩自可了重九又梅自掃梅花下問梢頭冷蘂疎疎幾時開也間者濶焉今久矣多少幽懐欲寫有誰是孤山流亞香月一聨真絶唱與詩人千載為嘉話餘興味付來者清癯不戀華亭榭待與君白髪相親竹籬茅舍喜甚今年無酒禁溜溜小槽壓蔗已準擬雪天霜夜自醉自吟仍自笑任解冠落珮從嘲罵書此意寄同社木蘭花慢題馮雲月玉連環詞後自沈香夢斷風雨外失餘春悵袍錦淋漓金鑾論奏四海無人蛾眉古來見妬奈昭陽飛燕亦成塵惟有空梁落月至今能為傳神神遊八表跨長鯨誰是再來身愛雲月溪頭玉環一曲筆力千鈞人間不堪著眼但香名百世尚如新乞我九霞蜚珮梯空共上秋旻又乙巳病中問潘郎兩鬢更禁得幾畨秋悵病骨臞臞幽懐渺渺短髪颼颼雲邊一聲長笛這風情都屬趙家樓欹枕困尋藥裹熏衣慵訊香篝悠悠老矣復焉求何止賦三休念少日書魔中年酒病晩嵗詩愁巳攀桂花作證便從今把筆一齊勾只有煙霞痼疾相陪風月交游又懐舊問春春不語謾新緑滿芳洲記歴歴前遊看花南陌命酒西樓東風翠紅圍繞把功名一笑付糟邱醉裏了忘身世吟邊自負風流風流莫莫復休休白髪漸盈頭悵十載重來畧無歡意惟有, SBCK: ''}
