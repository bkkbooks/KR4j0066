  - {type: variant, offset: 0, length: 1146, content: 欽定四庫全書花菴詞選續集巻五宋黄昇撰宋詞劉德修名光祖號後溪蜀之名士有鶴林文集小詞附焉鵲橋仙畱别相逢一笑又成相避南鴈歸時霜透明朝人在短亭西看舞袖雙雙行酒歌聲此處秋聲何處幾度亂愁搔首如何不寄一行書有萬緒千端别後昭君怨别恨人在醉鄉居住記得舊曾来去疎雨聼芭蕉夢魂遥惆悵栁烟何處目送落霞江浦明夜月當樓照人愁江城子梅花十分雪意却成霜莫雲黄月微茫只有梅花依舊吐幽芳還喜無邉春信漏疎影下覓浮香才清端是紫薇郎别鵷行憶宫墻夜半胡為人與月交相君合召歸吾老矣月随去照西廂洞仙歌荷花晩風收暑小池塘荷净獨倚胡床酒初醒起徘徊時有香氣吹来雲藻亂葉底游魚動影空擎承露葢不見氷容惆悵明粧曉鸞鏡後夜月凉時月淡花低幽夢覺欲慿誰省且應記臨流凭䦨干便遥想江南紅酣千頃長相思别意玉樽凉玉人凉若聼離歌須斷腸休敎成鬢霜畫橋西畫橋東有涙分明清漲同如何畱醉翁水調歌頭旅思客夢一回醒三度碧梧秋仰看今夕天上河漢又西流早晩凉風過鴈驚落空堦一葉急雨閙清溝歸計休令莫宵露浥征裘古来今生老病許多愁那堪更説無限功業鏡中羞只有青山髙致對此還論世事舉白與君浮送我一盃酒誰起舞凉州臨江仙春思小院回廊春寂寂晚来獨自閒行畫簾東畔碧雲生也知無雨空滴枕邉聲一簇小桃開又落低頭拾取紅英東風相送忘相迎棃花寒食到得錦官城又自詠我似萬山千里外悠然一片歸雲官銜猶自帶云云誰知於進士已是故將軍閒坐閒行閒飲酒閒拈閒字閒文諸公畱我笑紛紛一枝簪寳髻六幅舞羅裙踏莎行春暮掃徑花零閉門春晩恨長無奈東風短起来消息探荼䕷雪條玉蘂都開徧晚月魂清夕陽香逺故山别後誰拘管多情於此更情多一枝嗅罷還重撚醉落魄春日懐故山春風開者一時還共春風謝栁條送我今槐夏不飲香醪辜負人生也曲塘泉細幽琴冩胡床滑簟應無價日遲睡起簾鈎挂何不歸歟花竹秀而野李子大名洪家世同登桂籍躋膴仕號淮甸儒族子大其弟漳泳洤淛皆以文鳴有李氏花萼詞五巻其姪直倫為之序廬陵人念奴嬌曉起觀落梅麗譙吹角漸疎星明澹簾篩殘月嫋嫋霜飇欺翠袖飛下一庭香雪半面粧新廻風舞困此况真竒絶桄榔林裏蘇仙偏感蕐髪休怨時暫飄零玉堂清夢不惹閒蜂蝶好似王家叢竹畔乗興山陰時節剪水無情閬風歸去忍使芳心歇和羮有待恁時身到天闕李子清名漳鵲橋仙七夕迢迢郎意盈盈妾恨今夕鵲橋欲度世間兒女一何癡鬭乞巧紛紛無數遥知此際有人孤坐心切天街雲路好因縁是惡因緣夢魂逺陽臺雨暮桃源憶故人閨情小樓簾捲闌干外花下朱門半啟中有傾城佳麗一笑西風裏盈盈臨水情難致盡日相看如醉乾鵲不知人意只管聲聲喜李子永名泳賀新郎感舊門掩長安道捲重簾垂楊散暑嫰凉生早午夢驚囘庭陰翠蝶舞鶯吟未了政露冷芙蓉池沼金鴈塵昏么絃斷理餘音尚想腰支褭歡漸逺思還繞臨臯望極滄江𣺌晚潮平湘烟萬頃斷虹殘照綵舫凌波分飛後别浦菱花自老問錦鯉何時重到樓逈層城看不見對瀟瀟暮雨憐芳草幽恨濶楚天杳李子召名洤滿庭芳送張守漢卿赴召麥秀連雲桑枝重綠史君佳政流傳鳳銜丹詔来自, SBCK: ''}
