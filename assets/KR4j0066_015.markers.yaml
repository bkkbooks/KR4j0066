  - {type: line-break, offset: 1141, content: '', id: KR4j0066_WYG_015-6a02}
  - {type: variant, offset: 1141, length: 5669, content: 重天千里歡騰祖帳棠隂外多少攀轅津亭路紞如五鼓難駐鄧侯船光蕐家世事門中列㦸圯上遺編况建炎勲業圖畫凌烟此去朝端濟美看平歩兩兩台躔須知道中興盛治主聖賴臣賢李子秀名淅踏莎行送新城交代李達善紅藥香殘綠筠粉嫩春歸何處尋春信綉鞍初上馬蹄輕舉頭便覺長安近别酒無情啼粧有恨山城向晚斜陽褪清江極目帶寒烟錦鱗去後慿誰問劉改之名過太和人稼軒之客王簡卿侍郎嘗贈以詩云觀渠論到前賢處據我看来近世無其詞多壯語葢學稼軒者也號龍洲道人賀新郎懐舊老去相如倦問文君説似而今怎生消遣衣袂京塵曾染處空有香紅尚軟料彼此魂銷腸斷一枕新凉眠客舍聼梧桐疎雨秋聲顫燈暈冷記初見樓低不放珠簾捲晩粧殘翠鈿狼藉淚痕凝臉人道愁来須殢酒無奈愁深酒淺但寄興焦琴紈扇莫鼓琵琶江上曲怕荻花楓葉俱悽怨雲萬疊寸心逺又逰西湖睡覺啼鶯曉醉西湖兩峰日日買花簪㡌去盡酒徒無人問惟有玉山自倒任拍手兒童爭笑一騎乗風翩然去避魚龍不見波聲悄歌韻逺喚蘇小神仙路近蓬莱島紫雲深參差禁樹有烟花遶人世紅塵西障日百計不如歸好付樂事與它年少費盡桺金梨雪句問沉香亭北何時召心未愜鬢先老又贈張彦功曉印霜花歩夢半醒扶上彫鞍馬嘶人去嵐溼青絲雙轡冷緩鞚野梅江路聼畫角吹殘更鼓悲壯寒聲撩客恨甚貂裘重擁愁無數霜月白照離緒青樓囘首家何處早山遥水闊天低斷腸烟樹誰念天涯牢落况輕負暖雲濃雨記酒醒香銷時語客裏歸韀須早發怕天寒風急相思苦應為我翠眉聚又多病劉郎痩最傷心天寒嵗晩客它鄉久大舸翩翩何許至元是髙陽舊友便一笑相歡携手為問武昌城下月定何如揚子江頭栁追徃事兩眉皺燭花細剪明扵晝喚青娥小紅樓上殷勤勸酒昵昵琵琶恩怨語春笋輕攏翠袖看舞徹金釵㣲澑若見故鄉吾父老道長安市上狂如舊重㑹面幾時又念奴嬌自述知音者少筭乾坤許大着身何處直待功成方肯退何日可尋歸路多景樓前垂虹亭下一枕眠秋雨虛名相誤十年枉費辛苦不是奏賦明光獻書北闕無驚人之語我自匆忙天未許嬴得衣裾塵土白璧堆前黄金買笑付與君為主蓴鱸江上浩然明日歸去糖多令再過武昌蘆葉滿汀洲寒沙帶淺流二十年重度南樓栁下繫船猶未穩能幾日又中秋黄鶴斷磯頭故人曾到不舊江山都是新愁欲買桂花重載酒終不似少年逰水調歌頭春半春事能幾許密葉着青梅日髙花困海棠風暖想都開不惜春衣典盡只怕春光歸去片片㸃蒼苔能得幾時好追賞莫徘徊雨飄紅風換翠苦相催人生行樂且須痛飮莫辭杯坐則髙談風月醉則恣眠芳草醒後亦佳哉湖上新亭好何事不曾来又自述弓劒出榆塞鈆槧上蓬山得之渾不費力失亦匹如閑未必古人皆是未必今人俱錯世事沐㺅冠老子不分别内外與中間酒須飲詩可作指休彈人生行樂何自催得鬢毛斑逹則牙旗金甲窮則蹇驢破帽莫作兩般看世事只如此自有識鴞鸞天仙子初赴省别妾别酒醺醺渾易醉囘過頭来三十里馬兒不住去如飛牽一憩坐一憩斷送殺人山共水是則青衫終可喜不道恩情拚得未雪迷村店酒旗斜去則是住則是煩惱自家煩惱你沁園春風雪中欲詣稼軒久寓湖上未能一徃因賦此詞以自解斗酒彘肩風雨渡江豈不快哉被香山居士與林和靖約坡仙等勒駕予囘坡謂西湖正如西子淡粧濃抹臨照臺二公者皆掉頭不顧只恁傳杯白云天竺去来看金璧崔嵬樓觀開況一澗縈迂東西水遶兩山南北髙下雲堆逋曰不然暗香浮動何似孤山先放梅晴須去訪稼軒未晩且此徘徊劉叔擬名仙倫廬陵人自號招山有詩集行於世樂章尤為人所膾炙吉州刋本多遺落今以家藏善本選集賀新郎壽王侍郎簡卿小隊停鉦鼓向沙邉栁下維舟慶公初度平盡羣蠻方易鎮此事多應有數奈自古功成人妬君看樂羊中山役任謗書盈篋終無據千載下竟誰與詩中帶得西山雨指天台鴈蕩歸歟壽鄉深處緩急朝廷須公出更作中流砥柱笑癡騃紛紛兒女多少人間不平事有皇天老眼能區處揮玉斚聽金縷又題呉江重喚松江渡嘆垂虹亭下銷磨幾畨今古依稀四橋風景在為問坡仙甚處但遺愛沙邉鷗鷺天水相連蒼茫外更碧雲去盡山無數潮正落日還暮十年到此長凝竚恨無人與共秋風鱠絲蓴縷小轉朱絃彈九奏擬致湘妃伴侣俄皓月飛来烟渚恍若乗槎河漢上怕客星犯斗蛟龍怒歌欵乃過江去又洪守席上詠牡丹翠葢籠嬌面記當年沉香亭北醉中曾見見了風流傾國艷紅紫紛紛過眼算好處何嫌春晩誰把天香和曉露倩東風特地勻芳臉千萬朶一時徧隔花聼取提壺勸道此花過了春歸蝶愁鶯怨挽住東君須醉倒花底不妨畱戀待喚取笙歌一片㝡愛就中紅一朶似狀元得意春風殿還惹起少年眼又贈建康鄭玉脱籍鄭玉非娼女嘆塵縁未了飄零被春畱住腸斷胭脂坡下路成甚心情意緒生怕入梨園歌舞寂寞陽臺雲雨散算人間誰是吹簫侣空買斷兩眉聚新来鏡裏驚如許暗傷懐鶯老花殘幾畨春莫事逐孤鴻都已徃月落千山杜宇念修竹天寒何處不念瑣窗并綉户妾從前命薄甘荆布誰為作解絛主念奴嬌送張明之赴京西幕艅艎東下望西江千里蒼茫烟水試問㐮州何處是雉堞連雲天際叔子殘碑卧龍陳迹遺恨斜陽裏後来人物如君瓌偉能幾其肯為我来邪河陽下士正自強人意勿謂時平無事也便以言兵為諱眼底山河樓頭鼔角都是英雄涙功名機㑹要湏閒暇先備又感懐呈洪守呉山青處悵長安路斷黄塵如霧荆楚西来行塹逺北過淮堧嚴扈九塞貔貅三闗虎豹空作陪京固天髙難呌若為得訴忠語追念江左英雄中興事業枉被姦臣誤不見翠蕐移蹕處枉負吾皇神武擊楫慿誰問籌無計何日寛憂顧倚笻長嘆滿懐清涙如雨又長沙趙帥席上作西風何事為行人掃蕩煩襟如洗熏漲蒸瀾都巻盡一片瀟湘清泚酒病驚秋詩愁入鬢對景人千里楚宫故事一時分付流水江上買取扁舟排雲湧浪直過金沙尾歸去江南丘壑處不用来尋月姊風露盃深芙蓉裳冷笑傲烟霞裏草廬如舊卧龍知為誰起滿江紅題快閣和徐宰韻快閣東西鷗邉問晩晴可喜鷗解語旣盟之後兩翁曾倚笛弄慣聽黄魯直履聲深識徐淵子添我来相對兩忘機真相似也不種閒桃李也不翫佳山水有新詩字字愛民而已一片心閒秋月外三年人在春風裏漲一篙江水送歸鴻明朝是又春曉着意畱春畱不住春歸難戀最苦是梅天煙雨麥秋庭院嫰竹濃陰鶯出谷柔桑采盡蠶成繭奈沈腰寛盡有誰知難消遣幽閣恨雙眉歛香牋寄飛鴻逺向風簾羞見一雙歸燕翠被閒將情做夢青樓賺得恩成怨對尊前莫惜喚瓊姬持杯勸木蘭花幔秋日海棠漸秋空向晩被風雨趲重陽正木落疎林海棠枝上忽見紅粧料應妬它蘭菊甚年年獨自占秋光故把春風嬌面向人逞艷呈芳看来畢竟此花強秪是欠些香俏一似當年五陵公子却厭膏粱肯来水邉竹下與幽人相對說凄凉只恐夜深花睡五更㣲有清霜霜天曉角題蛾眉亭倚空絶壁直下江千尺天際兩蛾凝黛愁與恨幾時極暮潮風正急酒醒聞塞笛試問謫仙何處青山外逺烟碧訴衷情客中征衣薄薄不禁風長日雨絲中又是一年春事花信到梧桐雲漠漠水溶溶去匆匆客懐今夜家在江西身在江東江神子洪守出歌姬就席口占華堂深處出娉婷語聲輕笑聲清燕語鶯啼一一付春情恰似洛陽花正發見花好不知名金甌盛酒玉纖擎滿盈盈勸深深不怕主人敎你十分斟只怕酒䦨歌罷後人不見暮山青繫裙腰愁别山兒矗矗水兒清船兒似葉兒輕風兒更沒人情月兒明厮合造送行人眼兒蓛蓛涙兒傾燈兒更冷青青遭逢着鴈兒又沒前程一聲聲怎生得夢兒成詞獧薄而意優柔永遇樂春莫有懐青幄蔽林白氊鋪徑紅雨迷楚晝閣闗愁風簾捲恨盡日縈情緖陽臺雲去文園人病寂寞翠尊彫爼惜韶容匆匆易失芳叢對眼如霧巾欹潤裛衣寛凉滲又覺漸回驕暑解籜吹香遺丸薦脆小芰浮鴛浦畫欄如舊依稀猶記佇立一鈎蓮歩黯銷魂那堪又聼杜鵑更苦菩薩鬘怨别吹簫人去行雲杳香篝翠被都閒了叠損縷金衣是他渾不知冷烟寒食夜淡月梨花下猶自軟心腸為他燒夜香又怨别東風去了秦樓畔一川烟草無人管芳樹雨初晴黄鸝三兩聲海棠花已謝春事無多也只有牡丹時知它歸不歸辭鄙意濃嚴次山名仁樵溪人詞集名清江欵乃杜月渚為之序其詞極能道閨闈之趣賀新郎寄上官偉長序云扁舟何時下滄灣孤劒尚客東楚𣺌渺千里寄一曲歌覩物懐人想見臨風激烈也蘭芷湘東國正愁子一江紅葉水程孤驛欲寫瀟湘無限意那得如椽彩筆但滿眼西風蕭瑟我所思兮何處所在鐔津津上滄灣側誰氏子閬風客閬風仙客才無敵賦悲秋抑揚頓挫流離沉鬱百賦千詩朝復暮解道波濤春力憶共爾乗槎吹笛八表神逰吾夢見渺洞庭青草烟波隔空悵望楚天碧又清浪軒送春碧浪揺春渚浸虚簷蒲萄滉漾翠綃掀舞委曲經過臺下路載取落花東去問花亦漂流良苦花不能言應有恨恨十分都被春風誤同此恨有飛絮人生聚散元無據儘凭欄一樽相對蘋洲春莫嫉色沖沖空悵望涙盡世間兒女君不見千金求賦飛燕媫妤今何在看粘雲江影傷千古流不去斷䰟處又送杜子野赴省説到城南杜儘風流至今人號去天尺五家世聯翩蒼玉佩自有文章機杼看鸞鳳九霄軒翥文陣堂堂新得雋正少年壯氣虹霓吐拈彩筆月城去出闗相送梅千樹雪連空馬蹄特特曉寒人度帝里春濃花似海吹入明光奏賦須快展亨衢濶歩随世功名真漫浪要平生所學期無負須記得别時語歸朝懽南劒雙溪樓五月人間揮汗雨離恨一襟何處去雙溪樓下碧千尋雙溪樓上匏尊舉晩凉生緑樹漁燈幾㸃依洲渚莫狂歌潭空月凈慘慘痩蛟舞變化徃来無定所求劒刻舟應笑汝只今誰是晉司空斗牛奕奕紅光吐我来空弔古與君同記凭欄語問滄波乗槎此去流到天河否又壽蕭禹平知縣雲表金莖珠璀璨當日投懷驚玉燕文章議論壓西廱風流姓字翔東觀紫皇嗟見晩祥麟五色畱金殿大江西銅章墨綬暫爾煩君綰十二金釵扶玉盞錦瑟摐摐随急管獸爐烟動彩雲髙秋聲拍碎紅牙板趣君歸翰苑莱衣煥爛潘輿穩任方瞳從今看到弱水波淸淺又别意朱户緑窗深窈窕閃閃蕐旗紅幹小相逢斜栁絆輕舟渚香不斷蘋花老西風吹夢草題詩未了還驚覺獨傷心凄凉故館月過西樓悄樓外斜河低浸斗夜巳如何夜將曉心期欲寄赤鱗魚秋雲不動秋江𣺌相思千里道多情直被無情惱玉臺前請君試看華髪添多少水龍吟題連州翼然亭呈歐守翼然新㮄髙亭翰林鐵畫燕公手滁陽盛事何人重繼湟川太守太守謂誰文章的𣲖醉翁賢胄對千峰削翠雙溪注玉端不减琅琊秀坐歗清香畫㦸聼丁丁滴花晴漏棠陰晝寂細賡賔客竹枝楊栁只恐明朝綈封趣覲未容借冦儘江山識賞鹽梅事業煥青氊舊又題天風海濤呈潘料院飇車飛上蓬莱不須㬰跨琴髙鯉剨然長嘯天風澒洞雲濤無際我欲乗桴從兹浮海約任公子辦虹竿千丈犗鈎五十親點對連鼇餌誰㮄佳名空翠紫陽仙去騎箕尾銀鈎鐵畫龍拏鳯峙畱人間世更憶東山哀筝一曲洒沾襟涙到而今幸有髙亭遺愛寓甘棠意又題盱江偉觀城頭傑觀崢嶸重欄下瞰蒼龍脊鏤珉盤礎彫檀竦楶玲瓏金碧華子岡頭麻源谷口神仙窟宅道至今清夜月明風冷常隱隱聞笙笛翠壁烟霞縹緲更寒泉飛空千尺數峰江上孤舟天際夕陽紅溼抖擻征塵浩然長嘯跨青鸞翼向鳯岡西望遥釃斗酒酹文章伯李泰伯墓在鳯凰山下水調歌頭上韶州方檢討時有節制之命慘淡望京闕慷慨夢天山引杯中夜看劒壯氣刷幽燕鼉鼓滿天催曙画角連雲嘯月吹斷戍缾烟犀角赤兔馬虎帳綠熊氊仗漢節伸大義伐可汗靑㝠更下斧鉞赤子要君安鐵騎千羣觀獵宫様十眉環座礕礰聼鳴弦莫厭兠鍪冷歸去已貂蟬木蘭花慢社日有懐東風吹霧雨更吹起裌衣寒正莽莽叢林潭潭伐鼓鬱鬱焚蘭䦨干曲多少意看青烟如篆遶溪灣桑柘綠陰猶薄杏桃紅雨初翻飛花片片走潺湲問何日西還嘆擾擾人生紛紛離合𣺌𣺌悲歡想雲軿何處也對芳時應只在人間惆悵囘紋錦字斷腸斜日雲山蝶戀花快閣傑閣青紅天半倚萬里歸舟更近䦨干􅋈木落山寒鳬鴈起一聲漁笛滄洲尾千古文章黄太史捫蝨髙風長照氷壺裏何以薦君秋菊蘂癯瓢為酌西江水又春情院靜日長花氣暖一簇嬌紅得見春深淺風送生香来近逺笑聲只在秋千畔目力未窮腸已斷一寸芳心更逐逰絲亂朱戸對開簾捲半日斜江上春風晩鷓鴣天怨别一徑蕭條落葉深離腸凄斷月明砧征鴻送恨連雲起促織驚秋傍砌吟風悄悄夜沉沉鴛機坐冷曉霜侵挑成錦字心相向未必君心似妾心又閨思多病春来事事慵偶因撲蝶到庭中落紅萬叠花經雨斜碧千條栁困風深院宇小簾櫳幾年離别恰相逢擎觴未飮心先醉爲有春愁似酒濃又别意行盡春山春事空别愁離恨滿江東三更鼓潤官樓雨五夜燈殘客舍風寒淡淡曉朧朧黄雞催斷丑時鐘紫驑嚼勒金銜響衝破飛花一道紅又惜别一曲危絃斷客腸津橋捩柂轉牙檣江心雲帶蒲㠶重樓上風吹粉涙香瑶草碧栁芽黄載將離恨過瀟湘請君看取東流水方識人間别意長又春思病去那知春事深流鶯喚起惜春心桐舒碧葉慳三寸栁引金絲可一尋憐綉閣對雲岑苦無多力懶登臨翠羅衫底寒猶在弱骨離支痩不禁又閨情髙杏酣酣出短墻垂楊裊裊蘸池塘文鴛藉草眠春畫金鯽吹波弄夕陽閑倚鏡理明粧自翻銀葉炷衙香鳴鞭已過青樓曲不是劉郎定阮郎又閨情公子詩成著錦袍王家桃葉舊妖嬈檀槽摐急斜金鴈綵袖翩躚嚲翠翹沈水過懶重燒十分濃醉十分嬌複羅帳裏春寒少只恐香酥拍漸消玉樓春春思春風只在園西畔薺菜花繁胡蝶亂氷池晴緑照還空香徑落紅吹已斷意長翻恨逰絲短盡日相思羅帶緩寶奩如月不欺人明日歸来君試看阮郎歸春思腮花輕拂紫綿香瓊杯初暖粧貪凭彫檻看鴛鴦無心上綉床風絮亂恣輕狂惱人依舊忙夢随殘雨下髙唐悠悠春夢長婆羅門引春情花明栁暗一天春色繞朱樓斷鴻聲喚人愁欲問鴻歸何處身世自悠悠正東風畱滯楚尾呉頭追思舊逰歎雙鬢颯驚秋可惜等閑孤了酒令花籌斷絃難續謾題詩分付東流流不到蓬島瀛洲醉桃源春景拍堤春水蘸垂楊水流花片香弄花噆栁小鴛鴦一雙隨一雙簾半捲露新粧春衫是栁黄倚欄看處背斜陽風流暗斷腸好事近舟行曉色未分明敲動月邉鼉鼓卯酒一杯徑醉又别君南浦春江如席照晴空大舶夾雙櫓腸斷斜陽渡口正落紅如雨訴衷情章貢别懐一聲水調解蘭舟人間無此愁無情江水東流去與我涙爭流人已逺更囘頭苦凝眸斷䰟何處梅花㟁曲小小紅樓多麗記恨㝡無端官樓画角輕吹一聲来深閨深處把人好夢驚回許多愁儘敎奴受些箇事未必君知涙滴蘭衾寒生珠幌翠雲撩亂枕頻欹窗兒上幾條殘月斜玉界羅帷更堪聼霜摧敗葉靜扣朱扉念别離千里萬里問何日是歸期闗情處魚来鴈徃斷腸是兔走烏飛美景良辰賞心樂事風流孤負縷金衣謾嬴得花顔玉骨痩損為相思歸須早劉郎雙鬢莫遣成絲一落索春懐清曉鶯啼紅樹又一雙飛去日髙花氣撲人来獨自價傷春無緒别後暗寛金縷倩誰傳語一春不忍上髙樓為怕見分携處南柯子莫春栁陌通雲徑瓊梳啓翠樓桃花紙薄漬氷油記得年時詩句為君畱曉緑千層出春紅一半休門前溪水泛花流流到西川猶是故家愁菩薩鬘雙溪亭征鴻㸃破空雲碧丹霞染出新秋色返照落平洲半江紅錦流風清漁笛晩寸寸愁腸斷寄語笛休横只消三兩聲嚴少魯名參自號三休昭武人沁園春自適曰歸去来歸去来兮吾將安歸但有東籬菊有西園桂有南溪月有北山薇蜂則有房魚還有穴蟻有樓臺獸有衣吾應有雲中舊隠竹裏柴扉人間征路熹㣲看處處丹楓白露晞看寒原衰草牛羊来下淡烟秋水鱸鱖初肥自笑平生頽然骨相只合持竿坐釣磯都休也對西風無語落日斜暉又題呉明仲竹坡竹焉美哉愛竹者誰曰君子歟向佳山水處築宫一畆好風煙裏種玉千餘朝引輕霏夕延凉月此外塵埃一㸃無須知道有樂其樂者吾愛吾廬竹之清也何如應料得詩人清矣乎况滿庭秀色對拈彩筆半窗凉影伴讀殘書休說龍吟莫言鳯嘯且道髙標誰勝渠君試看正遶坡雲氣似渭川圖花菴詞選續集巻五, SBCK: ''}
