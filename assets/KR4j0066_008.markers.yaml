  - {type: variant, offset: 2718, length: 413, content: 茆舎竹籬邊雀噪晩枝時節一陣暗香飄處巳不勝愁絶江南得地故先開不待有飛雪腸斷幾囘山路恨無人攀折憶少年春恨年時酒伴年時去處年時春色清明又近也却天涯為客念過眼光陰難再得想前歡盡成陳迹登臨恨無語把䦨干暗拍徐幹臣名伸三衢人有青山樂府一巻行于世然多雜調詞惟此一曲天下稱之二郎神春詞悶來彈鵲又攪碎一簾花影謾試着春衫還思纎手熏徹金猊燼冷動是愁端如何向但怪得新來多病嗟舊日沈腰如今潘鬢怎堪臨鏡重省别時泪溼羅衣猶凝料為我厭厭日髙慵起長托春酲未醒鴈足不來馬蹄難去門掩一庭芳景空佇立盡日䦨干倚遍晝長人静李玉賀新郎春情篆縷銷金鼎醉沈沈庭陰轉午畫堂人静芳草王孫知何處惟有楊花糝徑漸玉枕騰騰春醒簾外殘紅春已透鎮無聊殢酒厭厭病雲鬢亂未忺整江南舊事休重省遍天涯尋消問息斷鴻難倩月滿西樓慿䦨久依舊歸期未定又只恐缾沈金井嘶騎不來銀燭暗枉敎人立盡梧桐影誰伴我對鸞鏡李君之詞雖不多見然風流醖藉盡此篇矣王昴嘉王榜狀元及第好事近催粧詞喜氣擁朱門光動綺羅香陌行到紫薇花下悟身非, SBCK: ''}
