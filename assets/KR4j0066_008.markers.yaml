  - {type: variant, offset: 0, length: 142, content: 欽定四庫全書花菴詞選巻八宋黄昇撰宋詞魯逸仲詞意婉麗佀万俟雅言南浦旅懷風悲畫角聽單于三弄落譙門投宿駸駸征騎飛雪滿孤村酒市漸閒燈火正敲窓亂葉舞紛紛送數聲驚鴈下離烟水嘹唳度寒雲好在半朧溪月到如今無處不銷魂故國梅花歸夢愁損綠羅裙為問暗香閒艶也相思萬㸃付啼㾗算翠屏應是兩眉餘恨倚黄昏水龍吟梅花歲, SBCK: ''}
