  - {type: variant, offset: 263, length: 758, content: 將雛惆悵睡殘清曉還似初相見時携手旗亭酒香梅小向登臨長是傷春滋味泪彈多少因甚却輕許風流終非長久又說分飛煩惱羅衣瘦損綉被香消那更亂紅如掃門外無窮路岐天若有情和天須老念髙唐歸夢凄凉何處水流雲遶劉偉明名弇號龍雲先生洞仙歌別恨凄凉楚弄行客腸應斷濤捲秋容暗淮甸去年時正是今日孤舟烟浪裏身與江雲共逺別來單枕夢幾過滄洲皓月而今為誰滿薄倖苦無端誤却嬋娟有人在玉樓天半最不慣西風破㠶來甚時節收拾望中心眼宋退翁名齊愈宣和間為太學官眼兒媚固陵召對曰卿文章新奇可作梅詞進呈須是不經人道語齊愈立進此詞時天語稱善次日諭近臣曰宋齊愈梅詞非惟不經人道又且自開花說主結子黄熟并天色言之可謂盡之矣霏霏疎影轉征鴻人語暗香中小橋斜渡曲屏深院水月濛濛人閒不是藏春處玉笛曉霜空江南處處黄垂密雨綠漲薫風唐子西名庚眉山人累為學官張天覺拜相擢京畿提舉常平後坐貶惠州有詩文十巻行于世訴衷情旅愁平生不會歛眉頭諸事等閒休元來却到愁處須着與他愁殘照外大江流去悠悠風悲蘭杜烟淡滄浪何處扁舟何晉之名大圭小重山惜别綠樹鶯啼春正濃釵頭青杏小綠成叢玉船風動酒鱗紅歌聲咽相見幾時重車馬去匆匆路隨芳草逺恨無窮相思只在夢魂中今宵月偏照小樓東陸敦信感皇恩旅思殘角兩三聲催登古道逺水長山又重到水聲山色看盡輪蹄昏曉風頭日脚下人空老匹馬舊時西征談笑緑鬢朱顏正年少旗亭斗酒任是十千傾倒而今酒興減詩情少趙循道名企感皇恩入京騎馬踏紅塵長安重到人面依前似花好舊歡才展又被新愁分了未成雲雨夢巫山曉千里斷腸關山古道囘首髙城似天杳滿懷離恨付與落花啼鳥故人何處也青春老何子初名籕宴清都春詞細草沿堦軟遲日薄蕙風輕靄微暖春工靳惜桃紅尚小柳芽猶短羅幃綉幕髙捲又早是歌慵笑懶凭畫樓那更天逺山逺水逺人逺堪歎傅粉疎狂竊香俊雅無計拘管青絲絆馬紅巾寄羽甚時迷戀無言泪珠零亂翠袖滴重重漬徧故要知別後思量歸時覷見向伯恭名子諲自號薌林居士, SBCK: ''}
