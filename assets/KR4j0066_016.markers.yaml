  - {type: variant, offset: 1308, length: 4510, content: 悲也作此後凡載宫調者並是自製曲淮左名都竹西佳處解鞍少駐初程過春風十里盡薺麥青青自朔馬窺江去後廢池喬木猶厭言兵漸黄昏清角吹寒都在空城杜郎俊賞算如今重到須驚縱荳蔲詞工青樓夢好難賦深情二十四橋仍在波心蕩冷月無聲念橋邊紅藥年年知為誰生驀山溪題錢氏溪月與鷗為客緑野留吟屐兩行柳垂陰是當年仙翁手植園亭寂寞煙外帶愁横荷冉冉展凉雲横卧虹千尺才因老盡秀句君休覓萬緑正迷人更愁入山陽夜笛百年心事惟有玉欄知吟未了放船回月下空相憶㸃絳唇丁未冬過呉淞燕鴈無心太湖西畔隨雲去數峰清苦商畧黄昏雨第四橋邊擬共天隨住今何許凭欄懐古殘柳參差舞暗香仙呂宫索辛亥之冬予載雪詣石湖止既月授簡句且徴新聲作此兩曲石湖把玩不巳使二妓𨽻習之音節諧婉乃命之曰暗香疎影舊時月色算幾畨照我梅邊吹笛喚起玉人不管清寒與攀摘何遜而今漸老都忘却春風詞筆但怪得竹外疎花香冷入瑶席江國正寂寂嘆寄與路遥夜雪初積翠尊易泣紅萼無言耿相憶長記曽携手處千樹壓西湖寒碧又片片吹盡也幾時見得疎影仙呂宫苔枝綴玉有翠禽小小枝上同宿客裏相逢籬角黄昏無言自倚修竹昭君不慣龍沙逺但暗憶江南江北想佩環月夜歸來化作此花幽獨猶記深宫舊事那人正睡裏飛近蛾緑莫似春風不管盈盈早與安排金屋還教一片隨波去又却怨玉龍哀曲等恁時重覓幽香已入小窗横幅長亭怨慢中呂宮今桓大司馬云昔年種桺依依漢南看摇落悽愴江潭樹猶如此人何以堪此語予深愛之漸吹盡枝頭香絮是處人家緑深門戶逺浦縈回暮㠶零亂向何許閲人多矣誰得似長亭樹樹若有情時不㑹得青青如此日暮望髙城不見只見亂山無數韋郎去也怎忘得玉環分付第一是早早歸來怕紅萼無人為主算只有并刀難剪離愁千縷齊天樂蟋蟀中都呼為促織庾郎先自吟愁賦凄凄更聞私語露濕銅鋪苔侵石井都是曾聼伊處哀音似訴正思婦無眠起尋機杼曲曲屏山夜涼獨自甚情緒西窗又吹暗雨為誰頻斷續相和砧杵候館吟秋離宫弔月别有傷心無數豳詩謾與笑籬落呼燈世間兒女寫入琴絲一聲聲更苦宣政間有士大夫製蟋蟀吟小重山令潭州紅梅人繞湘臯月墜時斜横花樹小浸愁漪一春幽事有誰知東風冷香逺茜裙歸鷗去昔遊非遙憐花可可夢依依九疑雲杳斷魂啼相思血都沁緑筠枝鷓鴣天元夕不出憶昨天街預賞時柳慳梅小未教知而今正是歡遊夕却怕春寒自掩扉簾寂寂月低低舊情唯有絳都詞芙蓉影暗三更後卧聼鄰娃笑語歸又苕溪記所見京洛風流絶代人因何風絮落溪津籠鞋淺出鴉頭韈知是凌波縹緲身紅乍笑緑長嚬與誰同度可憐春鴛鴦獨宿何曾慣化作西樓一縷雲又十六夜遊輦路珠簾兩行垂千枝銀燭舞僛僛東風歴歴紅樓下誰識三生杜牧之歡正好夜何其明朝春過小桃枝鼓聲漸逺遊人散惆悵歸來有月知憶王孫番陽彭氏小樓冷紅葉葉下塘秋長與行雲共一舟零落江南不自由兩綢繆料得吟鸞夜夜愁湘月雙調即念奴嬌之鬲指聲也五湖舊約問經年底事長負清景暝入西山漸喚我一葉夷猶乗興倦網都收歸禽時度月上汀洲冷中流容與畫橈不㸃清鏡誰解喚起湘靈煙鬟霧鬢理哀絃鴻陣玉麈談𤣥歎坐客多少風流名勝暗柳蕭蕭飛星冉冉夜久知秋信鱸魚應好舊家樂事誰省念奴嬌吳興荷花閙紅一舸記來時嘗與鴛鴦為侶三十六陂人未到水佩風裳無數翠葉吹凉玉容銷酒更洒菰蒲雨嫣然揺動冷香飛上詩句日暮青蓋亭亭情人不見爭忍凌波去只恐舞衣寒易落愁入西風南浦髙柳垂陰老魚吹浪畱我花間住田田多少幾回沙際歸路惜紅衣吳興荷花無射宫簟枕邀凉琴書換日睡餘無力細洒氷泉并刀破甘碧墻頭喚酒誰問訊城南詩客岑寂髙樹晩蟬説西風消息虹梁水陌魚浪吹香紅衣半狼籍維舟試望故國渺天北可惜柳邊沙外不共美人遊歴問甚時同賦三十六陂秋色琵琶仙吳興感遇雙槳來時有人似舊曲桃根桃葉歌扇輕約飛花蛾眉正竒絶春漸逺汀洲自緑更添了幾聲啼鴂十里揚州三生杜牧前事休説又還是宫燭分烟奈愁裏匆匆換時節都把一襟芳思與空階榆莢千萬縷藏鴉細柳為玉尊起舞回雪想見西出陽關故人初别秋宵吟越調秋夜古簾空墜月皎坐久西窗人悄蛩吟苦漸漏永丁丁箭壺催曉引凉颸動翠葆露脚斜飛雲表因嗟念似去國情懐暮帆煙草帶眼銷磨為近日愁多頓老衛娘何在宋玉歸來兩地暗縈繞揺落江楓早嫩約無憑幽夢又杳但盈盈淚洒單衣今夕何夕恨未了少年遊戲張平甫雙螺未合雙蛾先歛家在碧雲西别母情懐隨郎滋味桃葉渡江時扁舟載了匆匆去今夜泊前溪楊柳津頭梨花墻外心事兩人知鬲溪梅令仙吕調無錫歸寓意好花不與殢香人浪粼粼又恐春風歸去緑成陰玉鈿何處尋木蘭雙槳夢中雲小横陳謾向孤山山下覓盈盈翠禽啼一春淒涼犯仙呂調犯商調合肥秋夕緑陽巷陌西風起邊城一片離索馬嘶漸逺人歸甚處戍樓吹角情懐正惡更衰草寒煙淡薄似當時將軍部曲迤邐度沙漠追念西湖上小舫携歌晩花行樂舊遊在否想如今翠凋紅落謾寫羊裙等新鴈來時繫著怕匆匆不肯寄與悞後約翠樓吟雙調武昌安逺樓成月冷龍沙塵清虎落今年漢酺初賜新翻蕃部曲聼氊幕元戎歌吹層樓髙峙看檻曲縈紅簷牙飛翠人姝麗粉香吹下夜寒風細此地宜有詞仙擁素雲黄鶴與君遊戲玉梯凝望久歎芳草萋萋千里天涯情味仗酒祓清愁花嬌英氣西山外晩來還捲一簾秋霽清波引梅冷雲迷浦倩誰喚玉妃起舞嵗華如許野梅弄眉嫵屐齒印蒼蘚漸為尋花來去自隨秋鴈南來望江國渺何處新詩謾與好風景長是暗度故人知否抱幽恨難語何時共漁艇莫負滄浪烟雨况有清夜啼猿怨人良苦法曲獻仙音張彦功官舍虚閣籠寒小簾通月暮色偏憐髙處樹隔離宫水平馳道湖山盡入尊俎奈楚客淹畱久砧聲帶愁去屢回顧過秋風未成歸計誰念我重見冷楓紅舞喚起淡粧人問逋仙今在何許象筆鸞牋甚而今不道秀句怕平生幽恨化作沙邊煙雨玲瓏四犯越中嵗暮聞簫鼓感懐疊鼓夜寒垂燈春淺匆匆時事如許倦遊歡意少俛仰悲今古江淹又吟恨賦記當時送君南浦萬里乾坤百年身世惟有此情苦楊州柳垂官路有輕盈喚馬端正窺戶酒醒明月下夢逐潮聲去文章信美知何用謾嬴得天涯羈旅教説與春來要尋花伴侶淡黄柳正平調近客合肥空城曉角吹入垂陽陌馬上單衣寒惻惻看盡鵝黄嫩緑都是江南舊相識正岑寂明朝又寒食强携酒小橋宅怕梨花落盡成秋色燕燕飛來問春何在唯有池塘自碧側犯詠芍藥恨春易去甚春却向揚州住微雨正繭栗梢頭弄詩句紅橋二十四總是行雲處無語漸半脱宮衣笑相顧金壺細葉千朶圍歌舞誰念我鬢成絲來此共尊俎後日西園緑陰無數寂寞劉郎自修花譜眉嫵亦名百宜嬌戲張仲逺看垂楊連苑杜若吹沙愁損未歸眼信馬青樓去重簾下娉婷人妙飛燕翠尊共欵聼艷歌郎意先感便携手月地雲堦裏愛良夜微煖無限風流疎散有暗藏弓履偷寄香翰明日聞津鼓湘江上催人還解春䌫亂紅萬㸃悵斷魂煙水遥逺又爭似相携乗一舸鎮長見石湖仙越調夀石湖居士松江烟浦是千古三髙遊衍佳處須信石湖仙侣鴟夷翩然引去浮雲安在我自愛緑香紅舞容與看世間幾度今古盧溝舊曽駐馬為黄花閒吟秀句見説燕歌也學綸巾欹雨玉友金蕉玉人金縷緩移箏柱聞好語明年定在槐府解連環玉鞍重倚却沉吟未上又縈離思為大喬能撥春風小喬妙移箏鴈啼秋水柳怯雲鬆更何必十分梳洗道郎携羽扇那日隔簾半靣曽記西窗夜涼雨霽歎幽歡未足何事輕棄問後約空指薔薇算如此溪山甚時重至水驛燈昏又見在曲屏近平聲底念惟有夜來皓月照伊自睡玉梅令髙平調石湖畏寒不出作此戲之疎疎雲片散入溪南苑春寒鎻舊家亭館有玉梅幾樹背立怨東風髙花未吐暗香巳逺公來領客梅花能勸花長好願公更健便揉春為酒剪雪作新詩拚一日繞花千轉踏莎行金陵感夢燕燕輕盈鶯鶯嬌軟分明又向華胥見夜長爭得薄情知春初早被相思染别後書詞别時針線離魂暗逐郎行逺淮南皓月冷千山㝠㝠歸去無人管八歸湘中送胡徳華芳蓮墜粉疎桐吹緑庭院暗雨乍歇無端抱影銷魂處還見篠墻螢暗蘚階蛩切送客重尋西去路問水靣琵琶誰撥最可惜一片江山總付與啼鴂長恨相從未欵而今何事又對西風離别渚寒煙淡棹移人逺縹緲行舟如葉想文君望久倚竹愁生歩羅襪歸來後翠尊雙飲下了珠簾玲瓏閒看月髙賔王名觀國號竹屋詞名竹屋癡語陳造為序稱其與史邦卿皆秦周之詞所作要是不經人道語其妙處少游美成若唐諸公亦未及也玉胡蝶秋思喚起一襟涼思未成晩雨先做秋陰楚客悲殘誰解此意登臨古臺荒斷霞斜照新夢黯微月疎砧總難禁盡將幽恨分付孤斟從今倦看青鏡既遲勲業可負煙林斷梗無憑嵗華揺落又驚心想蓴汀水雲愁凝閒蕙帳猿鶴悲吟信沈沈故園歸計休更侵尋喜遷鶯秋懐涼雲歸去再約著晩來西樓風雨水靜簾陰鷗閒菰影秋到露汀煙浦試省喚回幽恨盡是愁邊新句倦登眺動悲凉還在殘蟬吟處淒楚空見説香鎻霧扃心似秋蓮苦寳瑟彈氷玉臺窺月淺黛可憐偷聚幾時翠溝題葉無復繡簾吹絮鬢華晩念庾郎情在風流誰與玉樓春春思多時不踏章臺路依舊東風芳草渡鶯聲喚起水邊情日影炙開花上霧謝娘不信佳期誤認得馬嘶迎繡戶今宵翠被不春寒只恐香穠春又去又憶舊春煙澹澹生春水曽記芳洲蘭棹􅋈岸花香到舞衣邉汀草色分歌扇底棹沉雲去情千里愁壓雙鴛飛不起十年春事十年心怕説濺裙當日事菩薩鬘蘇堤芙蓉紅雲半壓秋波急艷粧泣露嬌啼色佳夢入仙城風流石曼卿宫袍呼醉醒休捲西風錦明日粉香殘六橋烟水寒又水晶膾玉鱗熬出香凝軟并刀斷處氷絲顫紅縷間堆盤輕明相映寒纎柔分勸處膩滑難停筯一洗醉魂清真成醒酒氷又春思春風吹緑湖邉草春光依舊湖邊道玉勒錦障泥少年遊冶時煙明花似繡且醉旗亭酒斜日照花西歸鴉花外啼杏花天春愁霽煙消處寒猶嫩乍門巷愔愔晝永池塘夢草魂初醒秀句吟春未穩仙源阻春風痩損又燕子來無芳信小桃也自知人恨滿靣羞紅難問祝英臺近閨思一牕閒孤燼冷獨自箇春睡繡被熏香不似舊風味靜聼滴滴簷聲驚愁攪夢更不管庾郎心醉念芳意一併十日春寒梅花曬憔悴懶做新詞春在可憐裏幾時挑菜踏青雲沈雨斷盡分付楚天之外生查子梅香驚楚驛寒痩倚湘筠暮一笛巳黄昏片月尤清楚沉沉氷玉魂漠漠煙雲浦酸淚不成彈又向春心聚永遇樂次韻弔青樓淺暈修蛾脆㾗紅粉猶記窺戶香斷奩空塵生砌冷誰喚青鸞舞春風花信秋宵月約歴歴此心曽許銜芳恨千年怨結玉骨未應成土木蘭艇子莫愁何在謾繫寒江煙樹事逐雲沈情隨佩冷短夢分今古一杯遥夜孤光難曉多少碎人腸處空凄黯西風細雨盡吹淚去御街行賦轎藤筠巧織花紋細稱穩歩如流水踏青陌上雨初晴嫌怕濕文鴛雙履要人送上逢花須住才過處香風起裙兒挂在簾兒底更不把窗兒閉紅紅白白簇花枝恰稱得尋春芳意歸來時晚紗籠引道扶下人微醉霜天曉角春情春雲粉色春水和雲濕試問西湖楊柳東風外幾絲碧望極連翠陌蘭橈雙槳急欲訪莫愁何處旗亭在畫橋側卜算子春晚屈指數春來彈指驚春去簷外蛛絲網落花也要留春住幾日喜春晴幾夜愁春雨十二彫牕六曲屏題徧傷春句踏莎行九日西山水減堤㾗秋生屐齒痩笻喚起登髙意翠微烟冷夢淒涼黄花香晩人憔悴懐古風流悲秋情味紫萸勸入旗亭醉玉人相見説新愁可憐又濕西風淚風入松春晴捲簾日日恨春陰寒食新晴馬蹄只向南山去長橋愛花柳多情紅外風嬌日暖翠邊水秀山明杜郎歌酒過平生到處蓬瀛醉魂不入重城晩穠歡寄桃葉桃根繡被嫩寒清曉鶯聲喚醒春酲又聞隣女吹笛粉嬌曽隔翠簾看横玉聲寒夜深不管柔荑冷櫻朱度香噴雲鬟霜月揺揺吹落梅花簌簌驚殘蕭郎且放鳳簫閒何處驂鸞靜聼三弄霓裳罷魂飛斷愁裏關山三十六宫天近念奴却在人間思佳客秋扇入手西風意巳秋不須玉斧為重修撲螢涼夜沉沉月障靣清歌澹澹秋休棄置且遲畱可憐又向篋中收莫教暗損乗鸞女漢殿凄凉萬古愁聲聲慢元夕壺天不夜寳炬生香光風蕩揺金碧月灔氷㾗花外峭寒無力歌傳翠簾盡捲誤驚回瑶臺仙跡禁漏促拚千金一刻未酬佳夕捲地香塵不斷最得意輸他五陵狂客楚柳吳梅無限眼邊春色鮫綃暗中寄與待重尋行雲消息乍醉醒怕南樓吹斷曉笛解連環春水浪揺新緑浸芳洲翠渚雨㾗初足蕩霽色流入横塘看風外漪漪皺紋如縠藻荇縈廻似畱戀鴛飛鷗浴愛嬌雲蘸色媚日挼藍逺迷心目仙源漾舟岸曲照芳容幾樹香浮紅玉記那回西洛橋邊濺裙翠傳情玉纎輕掬三十六陂錦鱗渺芳音難續隔垂楊故人望斷浸愁千斛花菴詞選續集巻六, SBCK: ''}
