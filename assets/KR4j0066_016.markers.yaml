  - {type: line-break, offset: 0, content: '', id: KR4j0066_WYG_016-1a01}
  - {type: variant, offset: 0, length: 1313, content: 欽定四庫全書花菴詞選續集巻六宋黄昇輯宋詞馬莊父字子嚴建安人自號古洲居士水龍吟為陳坂種玉莊作買莊為貯梅花玉妃一萬森庭戶古來詞客比方不類可憐毫楮誰掃塵凡獨超物表神仙中取是崑邱標致姑山風骨除此外吾誰與九醖醍醐雪乳和金盤月邊清露夀陽驕騃單于疎賤不堪充數弄玉排簫許瓊揮拍胎禽飛舞待先生披着羊裘鶴氅作園林主又海棠東君直是多情好花一夜都開盡杏梢零落藥欄遲暮不教寧靜風度秋千日移簾幕翠紅交映正太真浴罷西施濃抹都沈醉嬌相稱磨徧緑窗銅鏡挽春衫不堪比並暮雲空谷佳人何處碧苔侵逕睡裏相看酒邊凝想許多風韻問因何却欠一些香味惹㫄人恨臨江仙上元人意舒閒春事到徐徐弄日微雲翠鬟飛繞鬧蛾羣煙横沽酒市風轉落梅村嵗事一新人半舊相逢際晩醺醺花間亭館柳間門尅除風雨外排日醉紅裙月華清憶别瑟瑟秋聲蕭蕭天籟滿庭摇落空翠數徧丹楓不見葉間題字人何處千里嬋娟愁不斷一江流水遥睇見征鴻幾㸃碧天無際悵望月中仙桂問竊藥佳人誰與同嵗把鏡當空照盡别離情意心裏恨莫結丁香琴上曲休彈秋思拍裏又悲來老却蘭臺公子賀聖朝春遊遊人拾翠不知逺被子規呼轉紅樓倒影背斜陽墜幾聲絃管荼䕷香透海棠紅淺恰平分春半花前一笑不須慳待花飛休怨魚遊春水怨別池塘生春草數盡歸鴻人未到天涯目斷青鳥尚賖音耗曉月頻窺白玉堂暮雨還溼青門道巢燕引雛乳鶯空老庭際香紅倦掃乾鵲休來枝上噪前回準擬同它翻成病了欲題紅葉憑誰寄獨抱孤桐無心挑眉間翠攢鬢邊霜早海棠春春景桺腰暗怯花風弱紅映秋千院落歸逐鴈兒飛斜撼真珠箔滿林翠葉胭脂萼不忍頻頻覷著䕶取一庭春莫彈花間鵲鷓鴣天閨思睡鴨徘徊煙縷長日髙春困不成粧步欹草色金蓮潤撚斷花鬚玉笋香輕洛浦笑巫陽錦紋親織寄檀郎兒家閉戶藏春色戲蝶遊蜂不敢狂末二句有深意歸朝懽春遊聽得提壺沽美酒人道杏花深處有杏花狼藉鳥啼風十分春色今無九麝煤銷永晝青煙飛上庭前柳畫堂深不寒不煖正是好時候團團寳月憑纎手暫借歌喉招舞袖真珠滴破小槽紅香肌縮盡纎羅痩投分須白首黄金散與親和舊且銜盃壯心未落風月長相守孤鸞早春沙堤香軟正宿雨初收落梅飄滿可奈東風暗逐馬蹄輕捲湖波又還漲緑粉墻陰日融煙煖驀地刺桐枝上有一聲春喚任酒帘飛動畫樓晩便指數燒燈時節非逺陌上呌聲好是賣花行院玉梅對粧雪柳鬧娥兒象生嬌顫歸去爭先戴取倚寳釵雙燕阮郎歸西湖春暮清明寒食不多時香紅漸漸稀畨騰粧束鬧蘇堤留春春怎知花褪雨絮沾泥凌波寸寸移三三兩兩呌船兒人歸春也歸姜堯章名䕫號白石道人中興詩家名流詞極精妙不减清真樂府其間髙處有美成所不能及善吹簫自製曲初則率意為長短句然後協以音律云居鄱陽探春慢過苕霅别鄭次臯諸君衰草愁煙亂鴉送日風沙回旋平野拂雪金鞭欺寒茸㡌還記章臺走馬誰念漂零久謾嬴得幽懐難寫故人清沔相逢小窗閒共情話長恨離多㑹少重訪問竹西珠淚盈把鴈磧沙平漁汀人散老去不堪遊冶無奈苕溪月又喚我扁舟東下甚日歸來梅花亂零春夜一萼紅人日長沙登定王臺古城陰有官梅幾許紅萼未宜簪池靣氷膠墻腰雪老雲意還又沉沉翠藤共閒穿徑竹漸笑語驚起卧沙禽野老林泉故王臺榭呼喚登臨南去北來何事蕩湘雲楚水目極傷心朱戶黏雞金盤簇燕空嘆時序侵尋記曽共西樓雅集想垂柳還裊萬絲金待得歸鞍到時只怕春深揚州慢中呂宫薺淳熙丙申至日余過維揚夜雪初霽麥彌望入其城則四顧蕭條寒水自碧暮色漸起戍角悲吟予懐愴然感慨今昔因自度此曲千巖老人以為有黍離, SBCK: ''}
