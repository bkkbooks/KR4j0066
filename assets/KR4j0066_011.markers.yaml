  - {type: line-break, offset: 0, content: '', id: KR4j0066_WYG_011-1a01}
  - {type: variant, offset: 0, length: 954, content: 欽定四庫全書花菴詞選續集巻一宋黄昇撰宋詞康伯可名與之號順庵渡江初有聲樂府受知秦申王王薦於太上皇帝以文詞待詔金馬門凡中興粉飾治具及慈寧歸養兩宫歡集必假伯可之歌詠故應制之詞為多書市刋本皆假托其名今得官本乃其壻趙善貢及其友陶安世所校定篇篇精妙汝陰王性之一代名士嘗稱伯可樂章非近代所及今有晏叔原亦不得獨擅葢知言云瑞鶴仙上元應制瑞煙浮禁苑正綘闕春囘新正方半氷輪桂華滿溢花衢歌市芙蓉開遍龍樓兩觀見銀燭星毬有爛捲珠簾盡日笙歌盛集寶釵金釧堪羡綺羅叢裏蘭麝香中正冝遊翫風柔夜暖花影亂笑聲喧閙蛾兒滿路成團打塊簇着冠兒鬬轉喜皇都舊曰風光太平再見按此詞進入太上皇帝極稱賞風柔夜煖以下至於末章賜金甚厚瑞鶴仙别恨薄寒羅袖怯敎小玉添香被翻宫襭蘭缸半明滅聽幾聲歸雁一簾㣲月情波恨葉索新詞猶自怨别夢囘時雪暖酥凝掠鬢寶鴛釵折凄切紋窗描綉舊譜尋棊變成虚設同心對結重来是甚時節悵姑蘇臺上征㠶何許隠隠遥山萬疊袖紅綃獨立無言偷彈淚血漢宫春慈寧殿元夕被㫖作雲海沉沉峭寒收建章雪殘鳷鵲蕐燈照夜萬井禁城行樂春随鬢影映參差桺絲梅萼丹禁杳鼇峰對聳三山上通寥廓春衫綉羅香薄歩金蓮影下三千綽約氷輪桂滿皓色冷浸樓閣霓裳帝樂奏昇平天風吹落畱鳳輦通宵宴賞莫放漏聲閒却喜遷鶯丞相生日臘殘春早正簾幕護寒樓臺清曉寶運當千佳辰餘五嵩岳誕生元老帝遣阜安宗社人仰雍容廊廟盡總道是文章孔孟勲庸周召師表方眷遇魚水君臣湏信從来少玉帶金魚朱顔緑鬢占斷世間榮耀篆刻鼎彞将遍整頓乾坤都了願嵗嵗見桺梢青淺梅英紅小此詞雖佳惜皆媚竈之語葢爲檜相作耳又秋夜聞鴈秋寒初勁看雲路鴈来碧天如鏡湘浦煙深衡陽沙遶風外㡬行斜陣囘首塞門何處故國闗河重省漢使老認上林欲下裵􅏆清影江南煙水暝聲過小樓燭暗金猊冷送目鳴琴裁詩挑錦此恨此情無盡夢想洞庭飛下㪚入雲濤千頃過盡也奈杜陵人逺玉關無信醜奴兒令促養直赴雪夜溪堂之約馮夷翦碎澄溪練飛下同雲著地無痕桺絮梅花處處春山陰此夜明如晝月滿前村莫掩溪門恐有扁舟乗興人又自嶺表還臨安作紅樓紫陌青春路桺色皇州月澹煙柔褭褭亭亭不自由舊時扶上雕鞍處此地重遊總是新愁桺自輕盈水自流訴衷情令登欝孤臺與施德初同讀坡詩作欝孤臺上立多時煙晚暮雲低山川城郭良是囘首昔人非今古事秪堪悲此心知一樽芳酒慷慨悲歌月墮人歸又長安懐古阿房廢址漢荒丘狐又羣遊豪蕐盡成春夢畱下古今愁君莫上古原頭淚難收夕陽西下塞鴈南飛渭水東流, SBCK: ''}
