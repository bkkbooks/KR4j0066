  - {type: variant, offset: 0, length: 6719, content: 欽定四庫全書花菴詞選續集巻二宋黃昇撰宋詞劉彦沖名子翬號屏山先生劉忠顯公之子朱文公之師有屏山文集行于世小詞附其後驀山溪九日浮煙冷雨此日還重九秋去又秋来但黃花年年依舊平臺戲馬無處問英雄茅舍小竹籬疎兀坐空搔首客來何有草草三杯酒一醉萬緣空休貪他金印如斗病翁老矣誰共賦歸與芟隴麥網溪魚未落它人後滿庭芳和胡明仲桂花詞秋入㣲陰涼生平逺小山愁絶天南似聞還斷飛䇿徧千巖葉底輕黃纂纂惱人是微裂芳緘翛然勝清真冷淡無艷寄塵凡澄潭欹兩㟁波光揺動碧影相參任西風十里吹度松杉我自寒灰槁木凝神處不覺醺酣歸来晚飛花無迹明月滿空函趙元鎭名鼎號得全居士為中興名相詞婉媚不減花間集蝶戀花春思盡日東風吹綠樹向晚輕寒數㸃催花雨年少淒凉天賦與更堪春思縈離緒臨水髙樓携酒處曾倚哀絃歌斷黄金縷樓下水流何處去凭欄目送蒼煙暮㸃絳唇春愁香冷金爐夢囘鴛帳餘香嫩更無人問一枕江南恨消痩休文頓覺春衫褪清明近杏花吹盡薄暮東風𦂳又惜别惜别傷離此生此念無重數故人何處還送春歸去美酒一杯誰解歌金縷無情緒淡煙疎雨花落空庭暮賀聖朝秋思斷霞收盡黄昏雨滴梧桐疎樹簾櫳不巻夜沉沉鎖一庭風露天涯人逺心期夢悄苦長宵難度知它窗外促織兒有許多言語浣溪沙美人艷艷春嬌入眼波勸人金盞緩聲歌不禁粉淚揾香羅暮雨朝雲相見少落花流水别離多寸腸爭柰此情何畫堂春春日空籠簾影隔垂楊夢囘芳草池塘杏花枝上蝶雙雙春晝初長強理雲鬟臨照暗彈粉涙沾裳自憐容艶惜流光無限思量醉桃園春晚青春不與花為主花正開時春暮花下醉眠休訴看取春歸去鶯愁蝶怨春知否欲問春歸何處只有一樽芳醑畱得青春住人月圓中秋連環寳瑟深深願結盡一生愁人間天上佳期勝賞今夜中秋雅歌妍態常娥見了應羡風流芳樽美酒年年嵗嵗月滿髙樓怨東風閨怨寳鑑凌花瑩孤鸞慵照影魚書蝶夢兩消沉恨恨恨結盡丁香痩如楊桺雨疎雲冷宿醉懨懨病羅巾空淚粉欲將逺意託湘絃悶悶悶香絮悠悠畫簾悄悄日長春困滿江紅丁未九日南渡泊舟儀真江口慘結秋隂西風送絲絲雨溼凝望眼征鴻幾字莫投沙磧欲向鄉關何處是水雲浩蕩連南北但修眉一抹有無中遥山色天涯路江上客腸巳斷頭應白空搔首興嘆莫年離隔欲待忘憂除是酒奈酒行有盡愁無極便挽將江水入樽罍澆胸臆西江月福唐别故人世態浮雲易變時光飛箭難畱五年重見海東頭只有交情似舊未盡别来深意難堪老去離愁青山迢逓水悠悠明日扁舟病酒王民瞻名庭珪號瀘溪先生廬陵人棄官養志二十年紹興辛酉胡澹菴謫新州民瞻以詩送之云癡兒不了公家事男子要爲天下竒坐是除名編𨽻辰州感皇恩畱别一葉下西風寒生南浦椎鼓鳴鐃送君去長亭把酒却倩阿誰畱住樽前人似玉能畱否醉中暫聽離歌幾許聽不能終涙如雨無情江水斷送扁舟何處歸時煙浪捲朱簾暮㸃絳唇感舊花外紅樓當時青鬢顔如玉淡煙殘燭醉入花間宿白髪相逢猶唱當時曲當時曲斷絃難續且盡杯中醁鳯棲梧王彦㳟生日瓊海無邊銀浪捲畫㦸朱樓縹緲雲間見當日使君曾擁傳海霞光裏時開讌翠斚紅鱗吹酒面莫謂今朝人在天涯逺彩鳯銜書應不晩願公難老身長健滿庭芳戊辰上元黄子餘席上時未有月宿雨初收晚風㣲度萬家簾捲青煙暗塵隨馬人物似神仙試問天公借月天須放明月敎圎應移下廣寒宫殿燈火接星躔盧川元古郡當時太守賔從俱賢到如今萬井歌吹喧闐花下紅粧賣酒時相遇曲水橋邉誰知道山城父老重見中興年桃園憶故人辰州泛舟送郭景文周子康赴行在催花一霎清明雨畱得東風且住兩㟁桺汀煙塢未放行人去人如雙鵠雲間舉明夜扁舟何處只向武陵南渡便是長安路李似之名彌遜自號筠翁中興初名士不附秦檜坐貶聲聲慢木犀龍涎燒就沈水熏成分明亂屑瓊瑰一朶才開人間十里先知此花大卽不大有許多瀟洒清竒較量盡謂勝如茉䔧賽得荼䕷更被秋光掇送放些兒月照著陣風吹惱殺多情猛拚沉醉酬伊朝朝暮暮守定儘忙時也不相離睡夢裏膽瓶兒枕畔數枝菩薩蠻别意江城烽火連三月不堪對酒長亭别休作斷腸聲老来無涙傾風髙㠶影疾目送舟痕碧錦字幾時来薰風無雁囘張材甫名掄號蓮社居士南渡故老及見太平之盛者集中多應制詞桺梢青侍宴栁色初勻輕寒似水纎雨如塵一陣東風縠紋微皺碧沼鱗鱗仙娥花月精神奏鳳管鸞絲鬭新萬嵗聲中九霞杯裏長醉芳春蝶戀花海棠前日海棠猶未破㸃㸃胭脂染就真珠顆今日重来花下坐亂鋪宫錦春無那賸摘繁枝簪幾朶痛惜深憐只恐芳菲過醉倒何妨花底卧不湏紅袖来扶我臨江仙禁中丹桂玉宇涼生清禁曉丹葩色照晴空珊瑚敲碎小玲瓏人間無此種来自廣寒宫雕玉䦨干深院靜嫣然凝笑西風曲屏須占一枝紅且圖欹醉枕香到夢䰟中又車駕朝享景靈宫久雨一夕開霽聞道彤庭森寶仗霜風逐雨驅雲六龍扶輦下青㝠香随鸞扇逺曰射赭袍明簾捲天街人隘路滿城喜望清塵歡聲催起嶺梅春欲知天意好昨夜月華新西江月瑞香剪就碧雲閙葉刻成紫玉芳心淺春不怕峭寒侵暖徹薰籠瑞錦花裏清芬獨歩樽前勝韻難禁飛香直到玉杯深消得厭厭痛飮朝中措夜景燈花挑盡夜將䦨斜掩小屏山一㸃凉蟾窺幔釧敲玉臂生寒起来無緒爐薰燼冷桐葉聲乾都把沈思幽恨明朝分付眉端燭影揺紅上元有懷雙闕中天鳳樓十二春寒淺去年元夜奉宸游曾侍瑶池宴玉殿珠簾盡捲擁羣仙蓬壺閬苑五雲深處萬燭光中揭天絲管馳隙流年恍如一瞬星霜換今宵誰念泣孤臣囘首長安逺可是塵緣未斷謾惆悵華胥夢短滿懷幽恨數㸃寒燈幾聲歸鴈浣溪沙和曾純甫題謝氏小閣築室崢嶸占寶峰退朝燕坐萬緣空出塵髙志抗㝠鴻何日嘉招陪一笑看君豪飮釂千鍾試慿鄙句作先容霜天曉角别恨曉風揺幕欹枕聞殘角霜月可窗寒影金猊冷翠衾薄舊恨無處着新愁還又作夜夜單于聲裏燈花共涙珠落張安國名孝祥號于湖歴陽人以妙年射䇿魁天下不數載入直中書有紫㣲雅詞湯衡為序稱其平昔為詞未嘗著藁筆酣興健頃刻即成無一字無来處如歌頭凱歌諸曲駿發蹈厲寓以詩人句法者也六州歌頭長淮望斷闗塞莽然平征塵暗霜風勁悄邉聲黯銷凝追想當年事殆天數非人力洙泗上絃歌地亦荆榛隔水氊鄉落日牛羊下區脱縱橫看名王宵獵騎火一川明笳鼓悲鳴遣人驚念腰間箭匣中劍空埃蠧竟何成時易失心徒壮嵗將零渺神京干羽方懐逺静烽燧且休兵冠葢使紛馳騖若為情聞道中原遺老常南望翠葆霓旌使行人到此忠憤氣填膺有涙如傾水調歌頭凱歌寄湖南安撫劉舍人猩鬼嘯篁竹玉帳夜分弓少年荆楚劒客突騎錦襜紅千里風飛雷厲四校星流彗掃蕭斧挫春葱談笑青油幕日奏㨗書同詩書帥黄閣老黑頭公家傳鴻寶祕略小試不言功聞道璽書頻下看即沙堤歸去帷幄且從容君王自神武一舉朔庭空又舟過金山寺江山自雄麗風露與髙寒寄聲月姊借我玉鑑此中看幽壑魚龍悲嘯倒影星辰揺動海氣夜漫漫擁起白銀闕危駐紫金山表獨立飛玉佩整雲冠潄氷濯雪眇視萬里一毫端囘首三山何處聞道羣仙笑我要我欲俱還揮手從此去翳鳳更驂鸞又隱靜寺觀雨寺有碧霄泉青嶂度雲氣幽壑舞囘風江神助我雄觀喚起碧霄龍電掣金蛇千丈雷震靈鼉萬疊洶洶欲崩空盡瀉銀潢水散入寶蓮宫坐中客凌積翠看奔洪人間應失匕箸惟我獨從容凈洗從来塵垢潤及無邉枯槁造物不言功天宇忽開霽日在五雲東滿江紅秋懐秋滿灕源瘴雲淨曉山如簇動逺思空江小艇髙丘喬木䇿䇿西風雙鬢底暉暉斜日朱欄曲試側身囘首望京華迷南北思歸夢天邉鵠遊宦事蕉中鹿想一年好處砌紅堆綠羅帕分柑霜落齒氷盤剝芡珠盈掬借春纎縷鱠搗金虀新篘熟念奴嬌欲雪呈朱漕朔風吹雨送凄凉天意垂垂欲雪萬里南荒雲霧滿弱水蓬莱相接凍合龍崗寒侵銅柱碧海氷澌結慿髙一笑問君何處炎熱家在楚尾呉頭歸期猶未對此驚時節記得年時貂帽煖鐵馬千羣觀獵狐兔成車歌鍾殷地歸踏層城月持盃且醉不湏北望凄切又洞庭洞庭青草近中秋更無一㸃風色玉界瓊田三萬頃着我扁舟一葉素月分輝銀河共影表裏俱澄徹怡然心㑹妙處難與君説應念嶺海經年孤光自照肝肺皆氷雪短髪蕭騷襟袖冷穏泛滄浪空濶盡挹西江細傾北斗萬象為賔客扣舷一笑不知今夕何夕又離思星沙初下望重湖逺水長雲漠漠一葉扁舟誰念我今日天涯飄泊平楚南來大江東去處處風波惡呉中何地滿懐俱是離索長記送我行時綠波亭上泣透青羅薄檣燕低飛人去後依舊湘城簾幕不盡山川無窮烟浪辜負秦樓約漁歌聲斷為君雙涙傾落木蘭花離思送歸雲去鴈淡寒彩滿溪樓正佩解湘腰釵孤楚鬢鸞鑑分收凝情望行處路但疎煙逺樹織離憂只有樓前溪水伴人清淚長流霜蕐夜永逼衾裯喚誰護衣篝念粉館重来芳塵未掃爭見嬉逰情知悶来殢酒奈囘腸不醉只添愁脉脉無言竟日斷䰟雙騖南州又别情紫簫吹散後恨燕子只空樓念璧月長虧玉簪中折覆水難收青鸞送碧雲句道霞扄霧鎖不堪憂情與文梭共織怨隨宫葉同流人間天上兩悠悠暗涙洒燈篝記谷口園林當時驛舍夢裏曾逰銀屏低聞笑語但夢時冉冉醒時愁擬把菱花一半試尋髙價皇州雨中花長沙一葉凌波十里御風煙鬟雨鬢蕭蕭認得江臯玉佩水館氷綃秋净明霞乍吐曙凉宿靄初消恨微顰不語欲進還休凝佇超遥神交冉冉愁思盈盈斷䰟欲遣誰招還似待青鸞傳信烏鵲成橋悵望胎仙琴叠羞看翡翠蘭苕夢囘人逺紅雲一片天際笙簫驀山溪春情雄風豪雨時節清明近簾幙起輕寒煖紅爐笑翻灰燼陰藏遲日欲驗幾多長綉工慵圍棊倦香篆頻銷印茂林芳逕綠變紅添潤桃杏意酣酣占前頭一畨花信華堂尊酒但作艶陽歌禽聲喜流雲盡明日春逰俊鷓鴣天長沙餞劉樞密浴殿西頭白玉堂湘江東畔碧油幢北辰躔次占星象南斗山川解印章随歩武借恩光送君先促舍人裝他年真肯傳衣鉢今日先須釂一觴又春情日日青樓醉夢中不知樓外已春濃杏花未遇疎疎雨楊桺初揺短短風扶画鷁躍花驄湧金門外小橋東行行又入笙歌裏人在珠簾第幾重菩薩鬘舟中十年長作江南客檣竿又挂西風席白鳥去邉明楚山無數青倒冠仍落佩我醉君同醉試問識君不青山與白鷗又杏花東風約略吹羅幕一簷細雨春陰薄試把杏花看溼紅嬌暮寒佳人雙玉枕烘醉鴛鴦錦折得㝡繁枝暖香生翠幃鵲橋仙橫波滴素遥山蹙翠江北江南腸斷不知何處御風来雲霧裏釵橫鬢亂香羅叠恨鸞牋冩意付與瑶臺女伴醉時言語醒時愁道說與醒時休看又梅吹香成陣飛花如雪不那朝来風雨可憐無處避春寒但玉立仙衣數縷清愁萬斛柔腸千結醉裏一時分付勸君不用嘆飄零待結子成陰歸去西江月黃陵廟滿載一船明月平鋪千里秋江波神畱我看斜陽喚起鱗鱗細浪明日風囘更好今朝露宿何妨水晶宫裏奏霓裳凖擬岳陽樓上又洞庭問訊湖邉春色重来又是三年東風吹我過湖船楊桺絲絲拂面世路如今巳慣此心到處悠然寒光亭下水連天飛起沙鷗一片又爲劉樞密太夫人壽疇昔通家事契卽今兩鎮交承起居樞密太夫人綠髮斑衣相映乞得神仙九醖祝敎福禄千春台星直上壽星明長見問䦨鼎盛憶秦娥雪雲垂幕陰風慘淡天花落天花落千林瓊玖滿空鸞鶴征車渺渺穿華薄路迷迷路增離索增離索楚溪山水碧湘樓閣又梅梅花發寒梢挂着瑶臺月瑶臺月和羮心事履霜時節斷橋流水聲嗚咽行人立馬空愁絶空愁絶爲誰凝佇為誰攀折又元夕元宵節鳳樓相對鼇山結鼇山結香塵随歩栁梢㣲月多情又見珠簾揭㳺人不放笙歌歇笙歌歇曉煙輕散帝城宫闕吳彦髙名激先朝故臣米元章之壻春從天上来㑹寧府遇老姬善鼔瑟自言梨園舊籍海角飄零嘆漢苑秦宫墜露飛螢夢裏天上金屋銀屏歌吹競舉青冥問當時遺譜有絶藝鼓瑟湘靈促哀彈似林鶯嚦嚦山澑泠泠梨園太平樂府醉幾度春風鬢變星星舞徹中原塵飛滄海風雪萬里龍庭寫寒笳幽怨人憔悴不似丹青酒㣲醒一軒涼月燈火青熒三山鄭中卿從張貴謨使北曰聞有歌之者青衫溼宴北人張侍御家有感南朝千古傷心地還唱後庭花舊時王謝堂前燕子飛入人家恍然在遇天姿勝雪宫鬢堆鴉江州司馬青衫溼淚同是天涯右二曲皆精妙悽婉惜無人拈出今録入選必有能知其味者楊廷秀名萬里號誠齋吉州人以道德風節照映一世實為四朝壽俊念奴嬌上章乞休置戲作小詞自賀老夫歸去有三徑足可長拖衫袖一道官銜清徹骨别有監臨主守主守清風監臨明月兼管栽花桺登山臨水作詩三首兩首休説白日昇天莫誇金印斗大懸雙肘且説廬陵新盛事三箇閒人眉壽揀罷軍貟歸農押録致政誠齋叟只愁醉殺螺江門外私酒吉有螺江門憶秦娥初春新春早春前十日春歸了春歸了落梅如雪桃野紅小老夫不管春催老只圖爛醉花前倒花前倒兒扶歸去醒來窗曉吳大年名億渡江初人燭影揺紅元夕樓雪初消麗譙吹罷單于晩使君千炬起班春歌吹香風煖十里珠簾盡捲人正在蓬壺閬苑賣薪買酒立馬傳觴昇平重見誰識鼇頭去年曾侍傳柑宴至今衣袖帶天香行處氤氲滿巳是春宵苦短更莫遣歡逰意懶細聽歸路璧月光中玉簫聲逺南鄉子江上江上雪初消暖日晴烟弄桺條認得裙腰芳草綠䰟銷曾折梅花過斷橋潘鬢為誰凋長恨金閨閉阿嬌遥想晚粧呵手罷夭饒更傍朱唇暖玉簫范至能名成大號石湖居士孝宗朝入參大政詩文超絶三髙亭記天下之人誦之嘗為蜀帥毎有篇章即日傳布人以先覩為快眼兒媚萍鄉道中乍晴卧輿中困甚小憇桺塘酣酣日脚紫煙浮妍暖破輕裘困人天色醉人花氣午夢扶頭春慵恰似春塘水一片縠紋愁溶溶曵曵東風無力欲皺還休一落索南浦舟中與江西帥漕酌别夜後忽大雪画㦸錦車皆雅故簫鼓畱連客住南浦春波莫難忘羅韈生塵處明日船旗應不駐且唱斷腸新句捲盡珠簾雨雪花一夜随人去菩薩鬘元夕立春雪林一夜收寒了東風恰向燈前到今夕是何年新春新月圎綺叢香霧隔猶記醒狂客畱取縷金幡夜蛾相竝看又湘東驛客行忽到湘東驛明朝真是瀟湘客晴碧萬重雲幾時逢故人江南如塞北别後書難得先自鴈来稀那堪春半時滿江紅清江風帆甚快作此與客劇飮歌之千古東流聲捲地雲濤如屋横浩𣺌檣竿十丈不勝㠶腹夜雨翻江春浦漲船頭鼓急風初熟似當年呼禹亂黄川飛梭速擊楫誓空驚俗休拊髀都生肉任炎天氷海一杯相屬荻笋蔞芽新入饌鵾絃鳳吹能翻曲笑人間何處似尊前添銀燭謁金門冝春道中野塘春水可喜有懐舊隱塘水碧仍帶麴塵顔色泥泥縠紋無氣力東風如愛惜恰似越来溪側也有一雙鸂鶒只欠栁絲千百尺繫船春弄笛秦樓月寒食日湖南提舉胡元髙家席上聞琴湘江碧故人同作湘中客湘中客東風囘鴈杏花寒食温温月到藍橋側醒心絃裏春無極春無極明朝殘夢馬嘶南陌陸務觀名㳺號放翁山隂人官至煥章閣待制劉漫塘云范至能陸務觀以東南文墨之彦至能爲蜀帥務觀在幕府主賓唱酬短章大篇人爭傳誦之水龍吟春日逰摩訶池摩訶池上追逰路紅綠參差春晩韶光妍媚海棠如醉桃花欲暖挑菜初閒禁烟將近一城絲管看金鞍爭道香車飛葢爭先占新亭館惆悵年華暗換黯銷䰟雨收雲散鏡奩掩月釵梁拆鳯秦箏斜鴈身在天涯亂山孤壘危樓飛觀歎春来只有楊花和恨向東風滿沁園春别恨一别秦樓轉眼新春又近放燈憶盈盈倩笑纎纎柔握雪香花語玉暖酥凝念逺愁腸傷春病思自怪平生殊未曾君知否漸香消蜀錦淚漬呉綾難求繫日長繩况倦客飄零少舊朋但江郊鴈起漁村笛怨寒缸委燼孤硯生氷水繞山圍烟昏雲慘縱有髙臺常怯登銷魂處是魚箋不到蘭夢無慿月照梨花閨思霽景風軟烟江春漲小閣無人綉簾半上花外姊妹相呼約樗蒲修蛾忘了章臺様細思一餉感事添惆悵胷酥臂玉消減擬覓雙魚倩傳書又閨思悶已縈損那堪多病幾曲屏山伴人晝静梁燕催起猶慵換熏籠新愁舊恨何時盡漸凋綠鬢小雨知花信芳牋寄與何處綉閣珠櫳桺陰中夜遊宫記夢雪曉鳴笳亂起夢逰處不知何地鐵騎無聲望似水想闗河雁門西青海際睡覺寒燈裏漏聲斷月斜窗紙自許封矦在萬里有誰知鬢雖殘心未死又宴席宴罷珠簾半捲畫簷外蠟香人散翠霧霏霏漏聲斷倚香肩看中庭花影亂宛是髙唐館寶奩炷麝烟初煖璧月何妨夜夜滿擁芳柔恨今年寒尚淺臨江仙晩春鳩雨催成新綠燕泥收盡殘紅春光還與美人同論心空眷眷分袂却匆匆只道真情易寫那知怨句難工水流雲散各西東半廊花院月一㡌栁橋風釵頭鳳閨詞紅酥手黄縢酒滿城春色宫墻栁東風惡歡情薄一懐愁緒幾年離索錯錯錯春如舊人空痩淚痕紅浥鮫綃透桃花落閒池閣山盟雖在錦書難托莫莫莫浪淘沙别恨緑樹暗長亭幾把離尊陽闗常恨不堪聞何况今朝秋色裏身是行人清涙浥羅巾各自消䰟一江離恨恰平分安得千尋橫鐵鎖截斷江津南鄉子賦歸歸夢寄呉檣水驛江程去路長想見芳洲初繫纜斜陽烟樹參差認武昌愁鬢㸃新霜曾是朝衣染御香重到故鄉交舊少凄凉却恐他鄉勝故鄉感皇恩感懐小閣倚秋空下臨江渚漠漠孤雲未成雨數聲新鴈囘首杜陵何處壯心空萬里人誰許黄閣紫樞築壇開府莫怕功名欠人做如今熟計只有故鄉歸路石帆山脚下菱三畝好事近東歸書事嵗晩喜東歸掃盡市朝陳迹揀得亂山環處釣一潭澄碧賣魚沽酒醉還醒心事付橫笛家在萬重雲外有沙鷗相識蝶戀花寒食陌上簫聲寒食近雨過園林花氣浮芳潤千里斜陽鍾欲暝慿髙望斷南樓信海角天涯行略盡三十年間無處無遺恨天若有情終欲問忍敎霜㸃相思鬢又懐别水漾萍根風巻絮倩笑嬌顰忍記逢迎處只有夢䰟能再遇堪嗟夢不由人做夢若由人何處去短㡌輕衫夜夜眉州路不怕銀缸深繡户只愁風斷青衣渡朝中措閨情怕歌愁舞懶逢迎粧晚托春酲總是向人深處當時枉道無情闗心近日啼紅宻訴剪綠深盟杏館花陰恨淺畫堂銀燭嫌明鵲橋仙感舊華燈縱博雕鞍馳射誰記當年豪舉酒徒一一取封侯獨去作江邉漁父輕舟八尺低篷三扇占斷蘋洲烟雨鏡湖元自屬閒人又何必君恩賜與破陣子省華仕至千鍾良易年過七十常稀眼底榮華元是夢身後聲名不自知營營端為誰幸有旗亭沽酒何妨繭紙題詩幽谷雲蘿朝采藥靜院軒窗夕對棊不歸真箇癡玉胡蝶王忠州家席上倦客平生行處墜鞭京洛解佩瀟湘此夕何年初賦宋玉髙唐綉簾開香塵乍起蓮歩穩銀燭分行暗端相燕羞鶯妬蝶遶蜂忙難忘芳樽頻勸峭寒新退玉漏猶長幾許幽情只愁歌罷月侵廊欲歸時司空笑問微近處丞相嗔狂斷人腸假饒相送上馬何妨如夢令閨思獨倚博山峰小翠霧滿身飛繞只恐學行雲去作陽臺春曉春曉春曉滿院緑楊芳草真珠簾羇逰有感水村山館參差路感羇逰正似殘春風絮掠地復穿簾必竟歸何處鏡裏新霜空自閔問幾時鸞臺鼇署遲暮謾慿髙竚立書空獨語自昔儒冠多誤悔當年早不抽身歸去醉下白蘋洲看夕陽鷗鷺蓴菜鱸魚都弃了只換得青衫塵土休顧早扁舟江上一蓑烟雨花菴詞選續集巻二, SBCK: ''}
