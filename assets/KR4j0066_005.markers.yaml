  - {type: variant, offset: 2288, length: 811, content: 江城梅花引年年江上見寒梅暗香來為誰開疑是月宮仙子下瑤臺冷艶一枝春在手故人逺相思寄與誰怨極恨極嗅香蘂念此情家萬里暮霞散綺楚天碧片片輕飛為我多情特地㸃征衣花易飄零人易老正心碎那堪塞管吹田不伐工於樂府南柯子春景夢怕愁時斷春從醉裏囘悽凉懷抱向誰開些子清明時候被鶯催栁外都成絮闌邊半是苔多情簾燕獨徘徊依舊滿身花雨又歸來又春思團玉梅梢重香羅芰扇低簾風不動蝶交飛一樣綠陰庭院鎖斜暉對月懷歌扇因風念舞衣何須惆悵惜芳菲拚却一年憔悴待春歸汪正夫名輔之行香子記恨晩綠寒紅芳意匆匆惜年華今與誰同碧雲零落數字賔鴻看渚蓮凋宮扇舊怨秋風流波墜葉佳期何在想天敎離恨無窮試將前事閒倚梧桐有銷䰟處明月夜錦屏空趙承之名鼎臣仕宣和中自開封少尹除少蓬以右文撰除知鄧州召為太府卿卒贈待制念奴嬌送王長卿赴河間司録舊遊何處記金湯形勝蓬瀛佳麗綠水芙蓉元帥與賔僚風流濟濟萬栁亭邊雅歌堂上醉倒春風裏十年一夢覺來烟水千里惆悵送子重遊南樓依舊否朱䦨誰倚要識當時惟是有明月曽陪珠履量減盃中雪添頭上甚矣吾衰矣酒徒相問為言憔悴如此章質夫名楶水龍吟栁花燕忙鶯懶花殘正堤上栁花飄墜輕飛㸃畫青林誰道全無才思閒趂游絲静臨深院日長門閉傍珠簾散漫垂垂欲下依前被風扶起蘭帳玉人睡覺怪春衣雪霑瓊綴綉床漸滿香毬無數才圓却碎時見蜂兒仰粘輕粉魚吞池水望章臺路杳金鞍遊蕩有盈盈泪傍珠簾散漫數語形容盡矣劉仲方六州歌頭項羽廟秦亡草昧劉項起吞并驅龍虎鞭寰宇斬長鯨掃攙搶血染彭門戰視餘耳皆鷹犬平禍亂歸炎漢勢奔傾兵散月明風急旌旗亂刁斗三更命虞姬相對泣聽楚歌聲玉帳魂驚泪盈盈恨花無主凝愁緒揮雪刄掩泉扄時不利騅不逝困陰陵叱追兵喑嗚摧天地望歸路忍偷生功葢世成閒紀建遺靈江静水寒烟冷波紋細古木凋零遣行人到此追念痛傷情勝負難慿水調歌頭落日塞垣路風勁戞貂裘翩翩數騎閒獵深入黒山頭極目平沙千里惟見琱弓白羽鐵面駭驊騮隱隱望青冢特地起閒愁漢天子方鼎盛四百州玉顏皓齒深鎖三十六宮秋堂有經綸賢相邊有縱横謀將不作翠蛾羞寰宇和樂也聖主永無憂聶冠卿, SBCK: ''}
