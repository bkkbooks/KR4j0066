  - {type: variant, offset: 0, length: 6537, content: 欽定四庫全書花菴詞選續集巻七宋黄昇輯宋詞史邦卿名達祖號梅溪有詞百餘首張功父姜堯章為序堯章稱其詞竒秀清逸有李長吉之風韻綺羅香春雨做冷欺花將煙困柳千里偷催春暮盡日㝠迷愁裏欲飛還住驚粉重蝶宿西園喜泥潤燕歸南浦最妨他佳約風流鈿車不到杜陵路沈沈江上望極還被春潮急難尋官渡隱約遥峰和淚謝娘眉嫵臨斷岸新緑生時是落紅帶愁流處記當日門掩梨花剪燈深夜語臨斷岸以下數語最為堯章所歎賞玉樓春社前一日遊人等得春晴也處處旗亭堪繫馬雨前穠杏尚娉婷風裏殘梅無顧藉忘拈針線還逢社鬭草嬴多裙欲卸明朝雙燕定歸來叮囑重簾休放下又梨花玉容寂寞誰為主寒食新晴愁幾許前身清淡似梅粧遥夜依微畱月住香迷胡蝶飛時路雪在秋千來徃處黄昏著了素衣裳深閉重門聼夜雨萬年歡春思兩袖梅風謝橋邊岸㾗猶帶陰雪過了匆匆燈市草根青發燕子春愁未醒悞幾處芳音遼絶煙溪上采緑人歸定應愁沁花骨非干厚情易歇奈燕臺句老難道離别小逕吹衣曽記故里風物多少驚心舊事第一是侵階羅襪如今但桺髮晞春夜來和露梳月杏花天清明軟波拖碧浦芽短畫橋外花晴柳暖今年自是清明晩便覺芳情較懶春衫瘦東風剪剪過花塢香吹醉靣歸來立馬斜陽岸隔岸歌聲一片西江月閨思西月澹窺樓角東風暗落簷牙一燈初見影窗紗又是重簾不下幽思屢隨芳草閒愁多似楊花楊花芳草徧天涯繡被春寒夜夜菩薩鬘夜景梨花不礙東城月月明照見空欄雪雪底夜香微褰簾拜月歸錦衾幽夢短明日南堂宴宴罷小樓臺春風來不來臨江仙閨思愁與西風應有約年年同赴清秋舊游簾幕記揚州一燈人著夢雙鴈月當樓羅帶鴛鴦塵暗澹更須整頓風流天涯萬一見温柔痩應縁此痩羞亦為郎羞齊天樂秋興䦨干只在鷗飛處年年怕吟秋興斷浦沈雲空山挂雨只有詩愁千頃波聲未定望舟尾拖涼渡頭籠暝正好登臨有人歌罷翠簾冷悠然魂墮故里奈閑情未了還被吹醒拜月虚簷聼蛩壊砌誰復能憐嬌俊憂心耿耿寄桐葉芳題冷楓新詠莫遣秋聲樹頭喧夜永又湖上即席分韻得羽字鴛鴦拂破蘋花影低低趂涼飛去畫裏移舟詩邊就夢葉葉碧雲分雨芳游自許過柳影閒波水花平渚見説西風為人吹恨上瑶樹䦨干斜照未滿杏墻應望斷春翠偷聚淺約挼香深盟搗月誰是窗間青羽孤筝幾柱問因甚參差蹔成離阻夜色空庭待歸聼俊語雙雙燕詠燕形容盡矣過春社了度簾幕中間去年塵冷差池欲住試入舊巢相並還相雕梁藻井又軟語商量不定飄然快拂花梢翠尾分開紅影芳徑芹泥雨潤愛貼地爭飛競誇輕俊紅樓歸晩㸔足柳昏花暝應自棲香正穩便忘了天涯芳信愁損翠黛雙蛾日日畫欄獨凭姜堯章極稱其柳昏花暝之句東風第一枝春雪巧剪蘭心偷黏草甲東風欲障新暖謾凝碧瓦難畱信知暮寒較淺行天入鏡做弄出輕鬆纎軟料故園不捲重簾悞了乍來雙燕青未了柳回白眼紅欲斷杏開素靣舊遊憶着山陰厚盟遂妨上苑寒爐重煖便放慢春衫針線恐鳳鞋挑菜歸來萬一灞橋相見結句尤為姜堯章拈出又元夕酒館歌雲燈街舞繡笑聲喧似簫鼓太平京國多歡大酺綺羅幾處東風不動照花影一天春聚耀翠光金縷相交冉冉細吹香霧羞醉玉少年丰度懐豔雪舊家伴侣閉門明月關心倚窻小梅索句吟情欲斷念嬌俊知人無據想袖寒珠絡藏香夜久帶愁歸去換巢鸞鳳春情人若梅嬌正愁横斷塢夢繞溪橋倚風融漢粉坐月怨秦簫相思因甚到纎腰定知我今無魂可銷佳期晩謾幾度淚㾗相照人悄天渺渺花外語香時透郎懐抱暗握荑苗乍嘗櫻顆猶恨侵堦芳草天念王昌忒多情換巢鸞鳳教偕老温柔鄉醉芙蓉一帳春曉過龍門春愁醉月小紅樓錦瑟箜篌夜來風雨曉來收幾㸃落花饒柳絮同為春愁寄信問晴鷗誰在芳洲緑波寧處有蘭舟獨對舊時携手地情思悠悠瑞鶴仙紅梅館娃春睡起為潑粧酒煖臉霞輕膩氷霜一生裏厭從來冷澹粉腮重洗胭脂暗試便無限芳穠氣味向黄昏竹外寒深醉裏為誰偷倚嬌媚春風模様霜月心腸痩來肌體孤香細細吹夢到杏花底被髙樓横筦一聲驚斷却對南枝灑淚謾相思桃葉桃根舊家姊妹滿江紅九月廿一日出京懐古緩轡西風歎三宿遲遲行客桑梓外鋤耰漸入柳坊花陌雙闕逺騰龍鳳影九門空鎖鴛鸞翼更無人擫笛傍宫墻苔花碧天相漢民歸國天厭禍臣同徳趂建瓴一舉再收鼇極老子豈無經世術詩人不預平戎策辦一襟風月看升平吟春色卓稼翁名田號西山建陽之文士好事近三衢買舟奏賦謁金門行盡雲山無數尚有江天一半買扁舟東去波神眼底識英雄閣住半空雨喚起一帆風力去青天尺五昭君怨送人赴上庠千里功名岐路幾緉英雄草履八座與三台箇中來壯士寸心如鐵有淚不霑離别劒未斬樓蘭莫空還品令新秋立秋十日早露出新凉靣斜風急雨戰退炎光一半月上紗窗疑是廣寒宫殿無端宋玉撩亂生悲怨一年好處都被秋光占斷你且思量今夜怎生消遣崔正子名與之自號菊坡屢以右相召不起水調歌頭萬里雲間戍立馬劍門關亂山極目無際直北是長安人苦百年塗炭鬼哭三邊鋒鏑天道久應還手寫留屯奏烱烱寸心丹對青燈搔白髮漏聲殘老來勲業未就妨却一身閒梅嶺緑陰青子蒲澗清泉白石怪我舊盟寒烽火平安夜歸夢到家山魏華父名了翁臨卭人號鶴山先生慶元巳未黄甲第三名晩與真西山齊名有詞附鶴山集皆夀詞之得體者水調歌頭范靖州生日猶記端門外鞭袖五更寒一聲天上鍾柝金鎖掣重關君向紫宸上閣我侍玉皇香案都號舍人班夢覺帝鄉逺相對兩蒼顔玉圍腰金繫肘繡籠鞍鄉人袞袞嚴近五馬度荆山收拾五湖氣度巻束蟠胷兵甲春意滿人間天錫公純嘏氣象自平寛又孫靖州生日九十九峰下百二十年州西風吹起客夢月滿驛南樓影入天河左界辰在夀星向上還是去年秋要和木蘭曲載酒夀君侯天邊信雲外歩去難留夀觴庭院依舊巳帶别離愁離合鍾情未免富貴關人何事浪白世間頭將相時來作身健百無憂鷓鴣天范靖州十月廿一日生日誰把璿璣運化工參旗又挂玉梅東三三律琯聲餘亥九九𤣥經卦起中新嵗月舊遊從一觴還似去年冬人間事㑹無終極分付翹關老令公郭令公以武舉出身應翹關負米科菩薩鬘靖倅江塤生日東窗五老峰前月南窻九疊坡前雪堆出侍郎山著君窗戶間離騷鄉裏住恰記庚寅度挹取芷蘭芳酌君千嵗觴劉潛夫名克莊甫田人號後村先生負一代盛名詩文甚髙有後村别調一巻淳祐辛丑八月御筆劉某文名久著史學尤精可特賜同進士出身六州歌頭牡丹維摩病起兀坐等枯株清晨裏誰來問是文殊遣名姝奪盡羣芳色浴才出醒初解千萬態嬌無力困相扶絶代佳人不入金張室却訪吾廬對茶鐺禪榻笑殺此翁癯珠髻金壺始消渠憶承平日繁華事修成譜寫成圖竒絶甚歐公記蔡公書古來無一自京華隔問姚魏竟何如多應是綵雲散劫灰餘野鹿銜將花去空回首河洛邱墟謾傷春弔古夢遶漢唐都歌罷欷歔水調歌頭和西外判宗湖樓韻君㸔郭西景渾不減孤山飛樓突兀百尺輪奐侈前觀絶唱新詞寡和墮淚舊碑無恙徃事付驚瀾不見遼鶴返惟對水鷗閒又何必珠翠盛管絃歡唾壺麈尾瀟灑領客上髙寒丞相功存宗廟祭酒義兼家國世事尚相關風月寓意耳莫作晉人看沁園春夢方孚若何處相逢登寳釵樓訪銅雀臺喚厨人斫就東溟鯨鱠圉人呈罷西極龍媒天下英雄使君與操餘子誰堪共酒盃車千乗載燕南代北劒客竒材飲酣鼻息如雷誰信被晨雞輕喚回嘆年光過盡功名未立書生老去機㑹方來使李將軍遇髙皇帝萬戶侯何足道哉披衣起但淒涼感舊慷慨生哀又送包尉我羡君歸一路秋風芙蓉木犀想慈顔望久靈烏乍噪新眉畫就郎馬頻嘶忙脱征衫快呼斗酒細為家人説建谿爭知道這中年懐抱最怕分携丈夫南北東西應笑殺離筵粉淚啼悵佳人來未碧雲冉冉王孫去後芳草萋萋明日相思山重水複古道人稀茅店雞元龍老有髙樓百尺誰共登梯又寄鍾賢良我夢見君戴飛霞冠著宫錦袍與牧之髙㑹齊山詩酒謫仙同載采石風濤萬巻星羅千篇電掃肯學窮兒事楚騷掀髯嘯有魚龍鼓舞狐兔悲嘷英雄埋没蓬蒿誰摸索當年劉與曹嘆事機易失功名難偶誅茅西崦種秫東臯柵有雞豚庭無羔鴈道是先生索價髙人間窄待相期海上共摘蟠桃又贈孫季蕃弔方漕西歸嵗莫天寒一見飄然幅巾布裘儘縁雲鳥道躋攀絶頂拍天鯨浸笑傲中流疇昔竒君紫髯鐵靣生子當如孫仲謀誰知道向中年猶未建節封侯南來萬里何求因感慨橋公成逺遊悵名姬駿馬都成昨夢隻雞斗酒誰弔新邱天地無情功名有命千古英雄只麽休平生客獨羊曇一箇灑淚西州又寄九華葉賢良一巻陰符二石硬弓百斤寳刀更玉花驄噴鳴鞭電抹烏絲欄展醉墨龍跳牛角書生虬鬚豪客談笑皆堪折簡招依稀記曽請纓繫粤草檄征遼當年目視雲霄誰信道淒涼今折腰悵燕然未勒南歸草草長安不見北望迢迢老去胷中有些磊塊歌罷猶須著酒澆休休也但帽邊鬢改鏡裏顔凋摸魚兒賞海棠甚春來冷煙凄雨朝朝遲了芳信驀然作煖晴三日又覺萬株嬌困霜㸃鬢潘令老年年不帶看花分才情減盡悵玉局飛仙石湖絶筆辜負這風韻傾城色懊惱佳人薄命墻頭岑寂誰問東風日暮無聊頼吹得胭脂成粉君細認花共酒古來二事天尤吝年光去迅謾緑葉成陰青苔滿地做取異時恨又感歎怪新年倚樓看鏡清狂渾不如舊暮雲千里傷心處那更亂蟬疎柳凝望久愴故國百年陵闕誰回首功名大謬歎采藥名山讀書精舎此計幾時就封侯事久矣輸人妙手滄洲聊作漁叟髙冠長劒渾閒物世上切身惟酒千載後君試看拔山扛鼎俱烏有英雄骨朽問顧曲周郎而今還解來聼小詞否念奴嬌菊花老夫白首尚兒嬉廢圃一番料理餐飲落英并墜露重把離騷拈起野艷幽香深黄淺白占斷西風裏飛來雙蝶遶叢欲去還止嘗試銓次羣芳梅花差可伯仲之間耳佛説諸天金色界未必莊嚴如此尚友靈均定交元亮結好天隨子籬邊坡下一杯聊泛霜蘂賀新郎寄題聶侍郎鬱孤臺絶頂規危榭跨髙寒鳥飛不過雲生其下斤斸無聲人按堵翕忽青紅變化覽城郭山川如畫閣老鳳樓修造手笑談間突出凌雲厦臺上景買無價唾壺麈尾登臨暇似當年滁陽太守歐陽公也傾倒贛江供硯滴判斷雪天月夜更喚起鄒枚司馬銅雀凌歊歌舞散訪殘磚斷甓無存者餘翰墨被風雅又春景動地東風起畫橋西繞溪桑柘漫山桃李寂寂墻陰蒼苔逕猶印前回屐齒驚嵗月飇馳雲駛太息攀翻長亭樹是先生手種今如此君不樂欲何俟傍人錯㑹淵明意笑斯翁皇皇汲汲登山臨水佳處徑呼籃輿去彷彿柴桑栗里從我者門生兒子嘗試平章先賢傳屈原醒不似劉伶醉判茗艼卧花底又客贈芍藥一夢揚州事畫堂深金瓶萬朶元戎髙㑹座上祥雲層層起不減洛中姚魏歎别後關山迢遞國色天香何處在想東風猶憶狂書記驚嵗月一彈指數枝清曉煩馳騎向小窗依稀重見蕪城妖麗料得花憐儂消瘦儂亦憐花顦顇謾悵望竹西歌吹老矣應無騎鶴日但春衫㸃㸃當時淚那更有舊情味又送陳子華赴真州北望神州路試平章這場公事怎生分付記得太行山百萬曽入宗爺駕馭今把作握蛇騎虎君去京東豪傑喜想投戈下拜真吾父談笑裏定齊魯兩河蕭索惟狐問當年祖生去後有人來否多少新亭揮淚客誰夢中原塊土算事業須由人做應笑書生心膽怯向車中閉置如新婦空目送塞鴻去又端午深院榴花吐畫簾開綀衣紈扇午風清暑兒女紛紛夸結束時様釵符艾虎早巳有游人觀渡老大逢場慵作戲任陌頭年少爭旗鼓溪雨急浪花舞靈均標致髙如許憶生平既紉蘭佩更懐椒糈誰信騷魂千載後波底垂涎角黍又説是蛟饞龍怒把似而今醒到了料當年醉死差無苦聊一笑弔千古又九日湛湛長空黒更那堪斜風細雨亂愁如織老眼平生空四海頼有髙樓百尺看浩蕩千崖秋色白髮書生神州淚儘凄涼不向牛山滴追徃事去無迹少年自負凌雲筆到而今春華落盡滿懐蕭瑟常恨世人新意少愛説南朝狂客把破帽年年拈出若對黄花孤負酒怕黄花也笑人岑寂鴻北去日西匿又遊水東周家花園溪上收殘雨倚危欄薄綿乍脱日陰亭午閙市不知春色處散在荒園廢墅漸小白長紅無數客子雖非河陽令也隨縁暫作鶯花主那可負甕中醑碧雲四合千巖莫恨匆匆余方有事子姑歸去趂取羣芳未揺落暇日提魚就煮歎激電光陰如許回首明年何處在問桃花尚記劉郎否公莫笑醉中語又郡會聞妓歌有感妾出於微賤少年時朱絃彈絶玉笙吹徧粗識國風關雎亂羞學流鶯百囀總不涉閨情春怨誰向西鄰公子説要珠鞍迎入梨花院身未動意先懶主家十二樓連苑那人人靚粧按曲繡簾初捲道是畫堂簫管唱笑殺街坊拍袞回首望侯門天逺我有平生離鸞操頗哀而不愠微而婉聊一奏更三歎生查子上元戲陳敬叟繁燈奪霽華戲鼓侵明發物色舊時同情味中年别淺畫鏡中眉深拜樓西月人散市聲收漸入愁時節臨江仙種海棠作落魄長官江海客少豪萬里尋春而今憔悴向溪濵斷無觴詠興惟有簿書塵手揷海棠三百本等閒粧㸃芳辰他年絳雪映紅雲丁寧風與月記取種花人滿江紅送王實之天壤王郎數人物方今第一談笑裏風霆驚座雲煙生筆落落元龍湖海氣琅琅董相天人策問如何十載尚青衫諸侯客易愛底些官職難保底些名節擬閉門投轄劇談三日疇昔評君天下寳當為天下蒼生惜向臨分慷慨出商聲摧金石又二月二十四夜飲海棠花下老子年來頗自許心腸鐵石尚一㸃消磨未盡愛花成癖懊惱每嫌寒勒住丁寧莫被晴烘拆奈暄風烈日太無情如何得張畫燭頻頻惜憑素手輕輕摘更幾畨雨過彩雲無跡今夕不來花下飲明朝空向枝頭覓對殘紅滿院杜鵑啼添愁寂又范尉梅谷赤日黄埃夢不到清溪翠麓空健羡君家别墅幾株幽獨骨冷肌清偏要月天寒日暮尤宜竹想主人杖屨繞千回山南北寧委澗嫌金屋寧映水羞銀燭歎出羣風韻背時粧束競愛東鄰姬傅粉誰憐空谷人如玉笑林逋何遜漫為詩無人讀又金甲琱戈記當日轅門初立磨盾鼻一揮千紙龍蛇猶濕鐵馬曉嘶營壁冷樓船夜渡風濤急有誰憐猨臂故將軍無功級平戎策從軍什零落盡慵收拾把茶經香傳時時温習生怕客談榆塞事且敎兒誦花間集歎臣之壯也不如人今何及卜算子手植海棠盛開風雨作祟輙作小詞二首盡是手成持合得天饒借風雨於花有底讐著意相陵藉做暖逼教開做冷催教謝不負明年花下人只負栽花者又片片蝶衣輕㸃㸃猩紅小道是天公不惜花百種千般巧朝見樹頭繁莫見枝頭少道是天公果惜花雨洗風吹了昭君怨牡丹曽記洛陽舊譜只許姚黄獨歩若比廣陵花太虧他舊日王侯園圃今日荆榛狐君莫説中州怕花愁又瓊花后土宫中標韻天上人間一本道號玉真妃字瓊姬我與花曽半靣流落天涯重見莫把玉簫吹怕驚飛清平樂丹陽舟中作别意休彈别鶴淚與絃俱落歡事中年如水薄懐抱那堪作惡昨宵月露髙樓今朝煙雨孤舟除是無身方了有身長是閒愁又五月十五夜翫月纎雲掃跡萬頃玻瓈色醉跨玉龍游八極歴歴天青海碧水晶宫殿飄香羣仙方按霓裳消得幾多風露變教人世清涼又風髙浪快萬里騎鯨背曽識嫦娥真體態素靣元無粉黛身游銀闕珠宫俯看積氣濛濛醉裏偶揺桂樹人間喚作涼風又頃在維揚陳師文參議冢舞姬絶妙賦此宫腰束素只怕能輕舉好築避風臺䕶取莫遣驚鴻飛去一團香玉温柔笑顰俱有風流貪與蕭郎眉語不知舞錯伊州玉樓春戲呈林節推鄉兄并下一首年年躍馬長安市客裏似家家似寄青錢換酒日無何紅燭呼盧宵不寐易挑錦婦機中字難得玉人心下事男兒西北有神州莫滴水西橋畔淚菩薩鬘小鬟解事髙燒燭羣花圍繞摴蒱局道是五陵兒風騷滿肚皮玉鞭鞭玉馬戲走章臺下笑殺㶚橋翁騎驢風雪中憶秦蛾感舊春酲薄夢中毬馬豪如昨豪如昨月明横笛曉寒吹角古來成敗難描摸而今却悔當時錯當時錯鐵衣猶在不堪重著又梅謝了塞垣凍解鴻歸早鴻歸早憑伊問訊大梁遺老浙河西靣邊聲悄淮河南北炊煙少炊煙少宣和宫殿冷煙衰草又遊人絶緑陰滿野芳菲歇芳菲歇養蠶天氣采茶時節枝頭杜宇啼成血陌頭楊柳吹成雪吹成雪淡烟微雨江南三月長相思寒相催煖相催催了開時催謝時丁寧花放遲角聲吹笛聲吹吹了南枝吹北枝明朝成雪飛又風蕭蕭雨蕭蕭相送津亭折柳條春愁不自聊煙迢迢水迢迢準擬江邊駐畫橈舟人頻報潮浪淘沙旅况紙帳素屏遮全似僧家無端霜月闖窗紗喚起玉關征戍夢幾疊寒笳嵗晩客天涯短髮蒼華今年衰似去年些詩酒新來俱倚閤孤負梅花一剪梅中秋解宜春郡印陌上行行惟府公還是文窮還是詩窮下車上馬太匆匆來是春風去是秋風階銜免得管兵農嬉到昏鐘睡到齋鐘不須提岳與知宫喚作溪翁喚作山翁踏莎行甲午重九牛山作日月跳丸光陰脫兔登臨不用深懐古向來吹㡌挿花人盡隨殘照西風去老矣征衫飄然客路炊煙三兩人家住欲携斗酒答秋光山深無覓黄花處劉伯寵名襃武夷人一字春卿水龍吟桂林元夕呈帥座東風起縠池波輕陰未放游絲墮新春歌管豐年笑語六街燈火繡轂雕鞍飛塵巻霧氷流雲過恍揚州十里三生夢覺捲朱箔映青𤨏金猊戲掣星橋鎖博山香烟濃百和使君行樂絳紗萬炬雪梅千朶羯鼓喧空鵾絃沸曉櫻梢微破想明年更好傳柑宴罷醉扶狨座雨中花慢春日旅况縹蔕緗枝玉葉翡英百梢爭趂春忙正雨後蜂粘落絮燕撲晴香遺策誰家蕩子唾花何處新粧想流紅有恨拾翠無心徃事淒涼春愁如海客思翻空帶圍只看東陽更那堪玉笙度曲翠羽傳觴紅淚不勝閨怨白雲應老他鄉夢回羇枕風驚庭樹月在西廂滿庭芳留別柳裊金絲梨鋪香雪一年春事方中燭前一見花艷覺羞紅枕臂香㾗未落舟横岸作計匆匆明朝去暮天平水雙槳碧雲東隔離歌一闋琵琶聲斷燕子樓空歎陽臺夢杳行雨無蹤後會芙渠未老從今去日望歸鴻愁如織斷腸啼鴂饒舌訴東風六州歌頭上廣西張帥憑深負阻蠭午肆奔騰龍江上妖氛漲鯨海外白波驚羽檄交飛急玉帳靜金韜閟恢逺馭振長纓密分兵細草黄沙渺渺西關路風裊髙旌聼飛霜令肅堅壁夜無聲鼔角何神地中鳴看追風騎攢雲槊雷野轂激天鉦飛箭集旄頭墜長圍掩郭東傾振旅觀旋凱笳鼓競繡旗明刀換犢戈藏革士休營黄色赤雲交映論功何止蔡州平想環城蒼玉深刻入青㝠永詔來今水調歌頭中秋天淡四垂幕雲細不成衣西風掃盡纎翳掠我鬢邊絲破匣菱花飛動跨海清光無際草露滴明璣杯到莫停手何用問來期坐虚堂揩病眼泝流輝雲山應有幽恨瑶瑟掩金徽河漢無聲自轉玉兔有情亦老世事巧相違一寫謫仙怨雙淚滿君頤花菴詞選續集巻七, SBCK: 卷}
