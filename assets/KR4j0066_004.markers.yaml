  - {type: variant, offset: 2972, length: 276, content: 金絲絡馬青錢路笑指玉皇香案去㸃衣栁陌墮殘紅拂面風橋吹細雨曉釵壓鬢頭慵舉恨裏歌聲兼别苦西湖一頃白菱花惆悵行雲無覓處卜算子苔池臺小雨乾門巷香輪少誰把青錢襯落紅滿地無人掃何時鬭草歸幾度尋花了留得佳人蓮步㾗宮樣鞋兒小秦處度名湛黄山谷嘗稱其詞卜算子春情春透水波明寒峭花枝瘦極目烟中百尺樓人在樓中否四和褭金鳬雙陸思纎手擬倩東風浣此情情更濃於酒李方叔名豸東坡門下士虞美人玉䦨干外清江浦𣺌𣺌天涯雨好風如扇雨如簾時見岸花汀草漲㾗添青林枕上關山路卧想乘鸞處碧蕪千里思悠悠惟有霎時凉夢到南州清平樂落梅嗚咽暗淡城頭月吹滿江天驚夢蝶喚起畫樓傷别簾風輕觸銀鈎梧桐玉露新秋底事瑣窓深, SBCK: ''}
