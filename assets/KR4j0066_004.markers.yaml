  - {type: variant, offset: 3249, length: 335, content: 素娥常伴人愁廖世美好事近夕景落日水鎔金天淡暮烟凝碧樓上誰家紅袖靠䦨干無力鴛鴦相對浴紅衣短棹弄長笛驚起一雙飛去聽波聲拍拍燭影搖紅别愁靄靄春空畫樓森聳凌雲漢紫薇登覽最關情絶妙誇能賦惆悵相思遲暮記當日朱欄共語塞鴻難問岸栁何窮别愁紛絮催促年光舊來流水知何處斷腸何必更殘陽極目傷平楚晚霽波聲帶雨悄無人舟横古渡數峰江上芳草天涯參差烟樹李嬰滿江紅元豐中為益水令作此上東坡坡甚奇之荆楚風烟寂寞近中秋時候露下冷蘭英將謝葦花初秀歸燕殷勤辭巷陌鳴蛩凄楚來窓牖又誰念江邊有神仙飄零乆横琴膝携笻手曠望眼閒吟口任紛紛萬事到頭何有君不見凌煙冠劍客何人氣貌長依舊歸去來一曲為君吟為君壽杜安世名壽域訴衷情燒殘絳蠟泪成㾗街鼓報黄昏碧雲又阻來信廊上月侵門愁永夜拂香䄄待誰溫夢蘭憔悴擲果凄凉兩處銷魂花菴詞選巻四, SBCK: 覇}
