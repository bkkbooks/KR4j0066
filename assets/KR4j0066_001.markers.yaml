  - {type: variant, offset: 644, length: 347, content: 三臺令一名翠華引池北池南草綠殿前殿後花紅天子千秋萬歲未央明月清風又魚藻池邊射鴨芙蓉苑裏看花日色赭黄相似不着紅鸞扇遮徐昌圖木蘭花令沈檀烟起盤紅霧一翦霜風吹繡戶漢宫花面學梅粧謝女雪詩裁柳絮長垂天幕孤鸞舞旋炙銀笙雙鳯語紅窻酒病對寒氷永覺相思無夢處張志和字子同婺州金華人居江湖自稱烟波釣徒著𤣥真子亦以為號毎垂鈎不設餌志不在魚也漁歌子五首極能道漁家之事西塞山前白鷺飛桃花流水鱖魚肥青蒻笠綠簔衣斜風細雨不須歸又青草湖中月正圓巴陵漁父棹歌連釣車子橛頭船樂在風波不用仙又松江蠏舍主人歡菰飯蓴羮亦共飡楓葉落荻花乾醉宿漁舟不覺寒又霅溪灣裏釣漁翁舴艋為家西復東江上雪浦邊風笑着荷衣不歎窮又釣臺漁父褐為裘兩兩三三舴艋舟能縱棹慣乗流長江白浪不須憂溫庭筠詞極流麗宜為花間集之冠菩薩鬘小山重疊金明滅鬢雲欲度香腮雪懶起畫蛾睂弄, SBCK: ''}
