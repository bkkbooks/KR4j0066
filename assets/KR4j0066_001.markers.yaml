  - {type: variant, offset: 2422, length: 283, content: 毛文錫醉花間休相問怕相問相問還添恨春水滿塘生鸂鶒還相趂昨夜雨霏霏臨明寒一陣偏憶戍樓人久絶邊庭信又深相憶莫相憶相憶情難極銀漢是紅牆一帶遙相隔金盤珠露滴兩岸榆花白風搖玉佩清今夕為何夕河滿子紅粉樓前月照碧紗窻外鶯啼夢斷遼陽音信那堪獨守香閨恨對百花時節王孫綠草萋萋更漏子春夜闌春恨切花外子規啼月人不見夢難慿紅紗一㸃燈偏怨别是芳節庭下丁香千結宵霧散曉霞輝梁間雙燕飛牛希濟生查子春山烟欲收天澹星稀小殘月臉邊明别涙臨清曉語已多情未了囘首猶重道記得綠羅裙處處憐芳草一本無已字謁金門秋已暮重疊關山岐路嘶馬搖鞭何處去曉禽霜滿樹夢斷禁城鐘鼓淚滴枕檀無數一㸃凝紅和薄霧翠蛾愁不語歐陽烱浣溪沙, SBCK: ''}
