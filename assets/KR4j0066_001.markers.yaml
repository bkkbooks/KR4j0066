  - {type: variant, offset: 285, length: 249, content: 媚宸遊教在誰邊清平調辭沈香亭應制古詞多只四句名花傾國兩相歡長得君王帶笑看解釋春風無限意沈香亭北倚闌干又一枝紅艶露凝香雲雨巫山枉斷腸借問漢宫誰得似可憐飛燕倚新粧又雲想衣裳花想容春風拂檻露華濃若非羣玉山頭見㑹向瑤臺月下逢白樂天名居易號香山居士長相思閨怨二詞非後世作者所及深畫睂淺畫睂蟬鬢鬅鬙雲滿衣陽臺行雨廻巫山高巫山低暮雨瀟瀟郎不歸空房獨守時又此詞上四句皆談錢塘景汴水流泗水流流到𤓰州古渡頭呉山㸃㸃愁思悠悠恨悠悠恨到歸時方始休月明人倚樓王建有宫詞百首甚工古調笑團扇團扇美人竝來遮面玉顔顦顇三年誰復商量管, SBCK: 筦}
