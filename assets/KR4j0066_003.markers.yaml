  - {type: variant, offset: 265, length: 783, content: 曰蓬山不逺因以内人賜之畫轂雕鞍狹路逢一聲腸斷綉簾中身無彩鳯雙飛翼心有靈犀一㸃通金作屋玉為籠車如流水馬游龍劉郎已恨蓬山逺更隔蓬山幾萬重好事近睡起玉屏風吹去亂紅猶落天氣驟生輕暖襯沈香帷箔珠簾約住海棠風愁拖兩眉角昨夜一庭明月冷秋千紅索顏持約名博文西江月詞簡意髙佳作也草草書傳錦字厭厭夢繞梅花海山無計駐仙槎腸斷芭蕉影下缺月舊時庭院飛雲到處人家而今憔悴鬢先華說着多情巳怕陳希元名堯佐為仁宗朝宰相號知餘子諡文惠公踏莎行皇祐中呂公夷簡乞致仕而仁宗因問卿去誰可代者夷簡乃薦堯佐上遂召還大拜申公生日公作此詞携酒過之申公使之歌申公笑曰只恐捲簾人巳老公曰莫愁調鼎事無功老於廊廟猶藴藉如此二社良辰千家庭院翩翩又覩雙飛燕鳯皇巢穩許為鄰瀟湘烟暝來何晩亂入紅樓低飛綠岸畫梁輕拂歌塵轉為誰歸去為誰來主人恩重珠簾捲范希文名仲淹諡文正公蘇幕遮别恨碧雲天紅葉地秋色連波波上寒烟翠山映斜陽天接水芳草無情更在斜陽外黯鄉魂追旅意夜夜除非好夢留人睡明月樓髙休獨倚酒入愁腸化作相思泪漁家傲秋思塞下秋來風景異衡陽鴈去無留意四面邊聲連角起千嶂裏長烟落日孤城閉濁酒一盃家萬里燕然未勒歸無計羌管悠悠霜滿地人不寐將軍白髪征夫淚蘇子美名舜欽娶杜祁公女坐監進奏院市故紙會客削籍為民自號滄浪翁善書草聖尤妙水調歌頭滄浪亭瀟洒太湖岸淡竚洞庭山魚龍隱處烟霧深鎖𣺌瀰間方念陶朱張翰忽有扁舟急槳撇浪載鱸還落日暴風雨歸路遶汀灣丈夫志當景盛耻疎閒壯年何事憔悴華髪改朱顏擬借寒潭垂釣又恐鷗鳥相猜不肯傍青綸刺棹穿蘆荻無語看波瀾王元之名禹偁翰林學士為太宗嘗稱其文章獨步當世㸃絳唇感興雨恨雲愁江南依舊稱佳麗水村漁市一縷孤烟細天際征鴻遙認行如綴平生事此時凝睇誰會憑欄意蘇叔黨名過坡仙季子㸃綘唇此詞作時方禁坡文故隱其名以傳于世今或以為汪彥章所作非也新月娟娟夜寒江静山銜斗起來搔首梅影横窓瘦好箇霜天閒却傳杯手君知否亂鴉啼後歸興濃如酒王君玉名琪仕仁宗朝翰林學士, SBCK: ''}
