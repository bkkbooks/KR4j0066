  - {type: variant, offset: 2148, length: 257, content: 静千門笑語聲在簾幃李景元過秦樓春晚賣酒壚邊尋芳原上亂花飛絮悠悠已蝶稀鶯散便擬把長繩繫日無由謾道草忘憂也徒將酒解閒愁正江南春盡行人千里蘋滿汀洲有翠紅徑裏盈盈侶簇芳茵禊飲時笑時謳當暖風遲景任相將永日爛漫狂遊誰信盛狂中有離情忽到心頭向樽前擬問雙燕來時曽過秦樓帝臺春春感芳草碧色萋萋遍南陌暖絮亂紅也知人春愁無力憶得盈盈拾翠侶共携賞鳯城寒食到今來海角逢春天涯倦客愁旋釋還似織泪暗拭又偷滴謾倚遍危欄儘黄昏也只是暮雲凝碧拚則而今已拚了忘則怎生便忘得又還問鱗鴻試重尋消息孫巨源名洙河滿子秋怨悵望浮生急景悽凉寳瑟餘音楚客多情偏怨别碧, SBCK: ''}
