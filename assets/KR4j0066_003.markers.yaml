  - {type: variant, offset: 1181, length: 504, content: 還沈南北别離心興廢事千古一沾襟山下孤烟漁市曉栁邊疎雨酒家深行客莫登臨張文潛名耒元祐中為館職與魯直少游无咎號四學士竝從東坡游風流子秋思亭臯木葉下重陽近又是搗衣秋奈愁入庾腸老侵潘鬢謾簪黄菊花也應羞楚天晩白蘋烟盡處紅蓼水邊頭芳草有情夕陽無語鴈横南浦人倚西樓玉容知安否香牋共錦字兩處悠悠空恨碧雲離合青鳥沈浮向風前懊惱芳心一㸃寸眉兩葉禁甚閒愁情到不堪言處分付東流解方叔名昉永遇樂春情風暖鶯嬌露濃花重天氣和煦院落烟收垂楊舞困無奈堆金縷誰家巧縱青樓絃管惹起夢雲情緒憶當時紋衾粲枕未嘗暫孤鴛侶芳菲易老故人難聚到此翻成輕誤閬苑仙遥蠻牋縱寫何計傳深訴青山綠水古今長在惟有舊歡何處空嬴得斜陽暮草淡烟細雨程觀過名過滿江紅梅春欲來時長是與江梅有約還又向竹林疎處一枝開却對酒漸驚身老大看花應念人離索但十分沈醉祝東君長如昨芳草渡孤舟泊山歛黛天垂幕黯銷魂無奈暮雲殘角便好折來和雪戴莫敎酒醒隨風落待殷勤留此寄相思誰堪託昭君怨試問愁來何處門外山無重數芳草不知人翠連雲欲看不忍看心事只堪腸斷腸斷宿孤村雨昏昏孫濟師名艤菩薩鬘落梅一聲羌管吹嗚咽玉溪夜半梅翻雪江月正茫茫斷橋流水香含章春欲暮落日千山雨一㸃着枝酸吳姬先齒寒王晉卿名詵與東坡最善燭影搖紅春恨, SBCK: ''}
