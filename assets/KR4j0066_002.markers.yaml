  - {type: variant, offset: 4363, length: 855, content: 奈被些名利縳無奈被它情擔閣可惜風流總閒却當初謾留華表語而今誤我秦樓約夢䦨時酒醒後思量著王元澤名雱荆公之子封臨川伯倦尋芳露晞向曉簾幙風輕小院閒晝翠徑鶯來驚下亂紅鋪繡倚危䦨登髙榭海棠著雨胭脂透算韶華又因循過了清明時候倦游燕風光滿目好景良辰誰共携手恨被榆錢買斷兩眉長皺憶得髙陽人散後落花流水仍依舊這情懷對東風盡成消瘦王平甫名安國荆公之弟㸃絳唇秋景秋氣微凉夢囘明月穿簾幕井梧蕭索正遶南枝鵲寳瑟塵生金鴈空零落情無託鬢雲慵掠不似君恩薄清平樂春晚留春不住費盡鶯兒語滿地殘紅宮錦汚昨夜南園風雨小憐初上琵琶曉來思遶天涯不肯畫堂朱户春風自在梨花減字木蘭花春情畫橋流水雨濕落紅飛不起月破黄昏簾裏餘香馬上聞徘徊不語今夜夢魂何處去不佀垂楊猶解飛花入洞房林君復名逋贈和靖先生長相思別情吳山青越山青兩岸青山相送迎誰知離别情君泪盈妾泪盈羅帶同心結未成江頭潮巳平㸃絳唇草金谷年年亂生春色誰為主餘花落處滿地和烟雨又是離愁一闋長亭暮王孫去萋萋無數南北東西路錢思公名惟演玉樓春此詞暮年作詞極悽惋城上風光鶯語亂城下烟波春拍岸綠楊芳草幾時休淚眼愁腸先已斷情懷漸變成衰晚鸞鏡朱顏驚暗換昔年多病厭芳尊今日芳尊惟恐淺賈子明名昌朝為仁宗朝宰相諡文元公木蘭花平生惟賦此一詞極有風味都城水綠嬉遊處仙棹往來人笑語紅隨逺浪泛桃花雪散平堤飛柳絮東君欲共春歸去一陣狂風和驟雨碧油紅斾錦障泥斜日畫橋芳草路夏子喬名竦乃慶厯間所謂一不肖者然文章有名于世諡文莊公喜遷鶯令景德中水殿按舞時公翰林内直上遣中使取新詞公援毫立成以進大䝉天奬霞散綺月垂鈎簾捲未央樓夜涼銀漢截天流宮闕鎖清秋瑤臺樹金莖露鳯髓香盤烟霧三千珠翠擁宸遊水殿接涼州丁謂之名謂為真宗朝宰相諡晉公鳯棲梧十二層樓春色早三殿笙歌九陌風光好堤栁岸花連複道玉梯相對開蓬島鶯囀喬林魚在藻太液微波綠鬭王孫草南闕萬人瞻羽葆後天祝聖天難老又朱闕玉城通閬苑月桂星榆春色無深淺簫瑟篌笙仙客宴蟠桃花滿蓬萊殿九色明霞裁羽扇雲霧為車鸞鶴驂彫輦路指瑤池歸去晚壺中日月如天逺寇平仲名準為真宗朝宰相贈萊國公踏莎行春暮春色將䦨鶯聲漸老紅英落盡青梅小畫堂人静雨, SBCK: ''}
