  - {type: variant, offset: 4151, length: 443, content: 髻鬟雲鬢梳吹玉蘂飲雲腴不須紅䄂扶少年隨意數花鬚老來心已無減字木蘭花棃花院宇澹月傾雲初過雨一枕輕寒夢入西瑶小道山花深人靜簾鎻御香清晝永紅藥䦨干玉按春風窈窕間孫浩然離亭燕一帶江山如畵風物向秋瀟洒水浸碧天何處斷霽色冷光相射蓼嶼荻花洲掩映竹籬茅舍雲際客㠶髙挂烟外酒旗低亞多少六朝興廢事盡入漁樵閒話悵望倚層樓寒日無言西下李重元憶王孫春詞萋萋芳草憶王孫桺外樓高空斷魂杜宇聲聲不忍聞欲黄昏雨打棃花深閉門又夏詞風蒲獵獵小池塘過雨荷花滿院香沈李浮𤓰氷雪凉竹方床針線慵拈午夢長又秋詞颼颼風冷荻花秋明月斜侵獨倚樓十二珠簾不上鈎黯凝眸一㸃漁燈古渡頭又冬詞彤雲風掃雪初晴天外孤鴻三兩聲獨擁寒衾不忍聴月籠明窓外梅花痩影横查荎透碧霄惜别艤蘭舟十分端是載離愁練波送逺屏山遮斷此去難留相從爭奈心期久要屢變霜秋歎人生杳似萍浮又翻成輕别都將深恨付與東流想斜陽影裏寒烟明處雙槳去悠悠愛渚梅幽香動須採掇倩纎柔艶歌粲發誰傳餘韻來説仙遊念故人留此遐州但春風老後秋月圓時獨倚江樓林少詹少年遊早行霽霞散曉月猶明疎木挂殘星山徑人稀翠蘿深處, SBCK: 䯻}
