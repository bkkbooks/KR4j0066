  - {type: variant, offset: 499, length: 422, content: 畫船穩泛春江𣺌夕雨寒聲小紫烟深處數峯横驚起一灘鷗鷺照人明玉樓今夜歸期誤恨入闌干暮可堪春事滿春懷不似珠簾新燕早歸來蔡子正名挺為神宗朝樞宻諡敏肅喜遷鶯元豐間公自西掖出鎮平陽府經數嵗意欲歸作此詞詞播中都逐徹聖聽上因語吕丞相曰蔡挺欲歸遂以西掖召還霜天秋曉正紫塞故壘黄雲衰草漢馬嘶風邊鴻叫月隴上鐵衣寒早劍歌騎曲悲壯盡道君恩須報塞垣樂盡櫜鞬錦領山西年少談笑刁斗静烽火一把時報平安耗聖主憂邊威懷遐逺强敵尚寛天討嵗華向晩愁思誰念玉闗人老太平也且歡娛莫惜金尊頻倒阮閎休名閲有詩話總龜行干世曾守袁州眼兒媚離情樓上黄昏杏花寒斜月小䦨干一雙燕子兩行征鴈畫角聲殘綺窓人在東風裏洒泪對春閒也應似舊盈盈秋水淡淡青山閎休小詞惟有此篇見于世英妙傑時所謂百不為多一不為少毛澤民名雱有東堂集十巻惜分飛元祐中東坡守錢塘澤民為法曹椽秩滿辭去是夕晏客有妓歌此詞坡問誰所作妓以毛法曹對坡語坐客曰郡寮有詞人不及知某之罪也翌日折簡追還畱連數月澤民因此得名泪濕闌干花着露愁到眉峯碧聚此恨平分取更無, SBCK: ''}
