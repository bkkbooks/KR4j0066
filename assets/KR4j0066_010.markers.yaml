  - {type: variant, offset: 0, length: 176, content: 欽定四庫全書花菴詞選巻十宋黄昇撰宋詞閨秀吳城小龍女清平樂令黄魯直登荆州亭柱間有此詞魯直悽然曰似為余發也筆勢類女子又有泪眼不曽晴之語疑其鬼也是夕有女子見夢曰我家豫章吳城山附客舟至此墮水死登江亭有感而作不意公能識之魯直驚悟曰此必吳城小龍女也簾巻曲䦨獨倚山展暮天無際泪眼不曾晴家在吳頭楚尾數㸃雪花亂委撲鹿沙鷗驚起詩句欲成時没入蒼烟叢裏魏夫人曽子宣丞相之内子菩, SBCK: ''}
