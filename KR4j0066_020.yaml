body:
  text: 花菴詞選續集卷十宋黃升撰宋詞劉圻父名子寰號篁㟳翁居麻沙早登朱文公之門劉後村嘗序其詩行於世齊天樂夀史滄洲雅歌堂下新堤路柳外行人相語碧藕開花金桃結子三見使君初度樓臺北渚似畫出西湖水雲深處綵鷁雙飛水亭開宴近重午溪蒲堪薦緑醑幔亭何惜為曽孫留住碧水吟哦滄洲夢想未放舟橫野渡維申及甫正夾輔中興擎天作柱願祝嵩髙嵗添長命縷花發沁園春呈史滄洲換譜伊涼選歌燕趙一畨樂事重起花新笑靨柳軟纎腰濟楚衆芳圍裏年年佳㑹長是傍清明天氣正魏紫衣染天香蜀粧紅破春睡一簇猩羅鳳翠遍東園西城㸃檢芳事鈴齊吏散晝館人稀幾闋管絃清脆人生適意流轉共風光遊戲到遇景取次成歡怎教良夜休醉玉樓春題小竿嶺今來古往吳京道嵗嵗榮枯原上草行人幾度到江濵不覺身隨風樹老蒲花易晚蘆花早客裏光陰如過鳥一般垂柳短長亭去路不如歸路好沁園春西巖三澗雲壑泉泓小者如杯大者如罌更石筵平瑩寬容數客淙流回激環繞飛觥三澗交流兩崖懸瀑搗雪飛霜落翠屏經行處有丹荑碧草古木蒼藤裴􅏆却倚山楹笑山水娛人若有情見傍回側轉峰巒疊疊欲窮還有巖谷層層仰視雲間茅茨雞犬疑有仙家來避秦青林表望煙霞縹眇隱隱鸞笙賀新郎登玉田峰拄杖凌髙絶望千山隱隱波瀾動搖天末下有白雲平逺壑湧起潮頭噴雪浸絶島孤峰出沒赤縣神州何處是但風烟杳杳迷空闊呼不見古人物碧松枝下青瑤石舉頭看長空湛湛淡琉璃色上界星辰多官府夸父忙鞭日月任兔走烏飛超忽宇宙茫茫如許大百年間何用爭優劣身世事一毛髮滿江紅風泉峽觀泉雲壑飛泉蒲根下懸流陸續堪愛處石池湛湛一方寒玉暑際直當磐石坐渴來自引懸瓢掬聼泠泠清響瀉淙琤勝絲竹寒照膽消炎燠清徹骨無塵俗笑幽人欣玩滯留空谷靜坐時看松鼠飲醉眠不礙山禽浴喚仙人伴我酌瓊瑶餐秋菊霜天曉角春愁橫陰漠漠似覺羅衣薄正是海棠時候紗窗外東風惡惜春春寂寞尋花花冷落不㑹這些情味元不是念離索洞仙歌寄劉令君潛夫風饜雨足也解為花地收拾浮雲放新霽愛調亭小翠㸃滴猩紅新粧了妃子朝來睡起遙知春有主整頓歡娛興在新亭錦圍底便選歌燕趙授簡鄒枚須記作他日城山盛事笑東君不用管楊花任飛去天涯在東風裏吳君特名文英自號夢窗四明人從吳履齊諸公遊山陰尹煥叙其詞略曰求詞於吾宋者前有清真後有夢窗此非煥之言四海之公言也聲聲慢閨重九飲郭園檀欒金碧婀娜蓬萊游雲不蘸芳洲露柳霜蓮十分㸃綴殘秋新彎畫眉未穩似含羞低度墻頭愁送逺駐西臺車馬共惜臨流知道池亭多宴掩庭花長是驚落秦謳膩粉䦨干猶聞憑袖香留輸他翠漣拍甃瞰新粧終日凝眸簾半捲帶黃花人在小樓倦尋芳餞周紏定夫暮帆挂雨氷岸飛梅春思零亂送客將歸逼是故宫離苑醉酒曽同涼月舞尋芳還隔紅塵靣去難留悵夫容路窄緑楊天逺便繫馬鶯邊清曉煙草晴花沙潤香軟爛錦年華誰念故人遊倦寒食相思隄上路行雲應在孤山畔寄新吟莫空回五湖春鴈絳都春為清華內子夀香深霧暖正人在錦瑟年華深院舊日漢宮分得紅蘭滋吳苑臨池羞落梅花片弄水月初勻粧靣紫煙籠處雙鸞共跨洞簫低按歌管紅圍翠袖凍雲外似覺東風先轉繡畔晝遲花底天寬春無限仙郎驕馬瓊林宴待捲上珠簾教看更傳鶯入新年寶叉夢燕唐多令惜别何處合成愁離人心上秋縱芭蕉不雨也颼颼都道晚涼天氣好有明月怕登樓年事夢中休花空煙水流燕辭歸客尚淹留垂柳不縈裙帶住謾長是繫行舟法曲獻仙音和丁宏菴韵落葉霞翻敗窗風咽暮色淒涼深院瘦不關秋淚緣生别情銷鬢霜千㸃悵翠冷搔頭燕那能語恩怨紫簫逺記桃枝尚隨春渡愁未洗鉛水又將恨染粉縞澀離箱忍重拈燈夜裁剪望極藍橋綵雲飛羅扇歌斷料鶯籠玉鎖夢裏隔花時見好事近秋飲鴈外雨絲絲將恨和愁都織玉骨西風添瘦減尊前歌力袖香曽枕醉紅腮依約唾㾗碧花下凌波入夢引春雛雙鶒憶舊遊别黃淡翁送人猶未苦苦送春隨人去天涯片紅都飛盡陰陰潤緑暗裏啼鴉賦情頓雪雙鬢飛夢逐塵沙歎病渴淒涼分香瘦减兩地看花西湖斷橋路想繫馬垂楊依舊欹斜葵麥迷煙處問離巢孤燕飛過誰家故人為寫深怨空壁掃秋蛇但醉上吳臺殘陽草色歸思賖宴清都病渴文園久梨花月夢殘春故人舊愁彈枕雨哀翻帽雪為情僝僽千金醉躍驕驄試問取朱橋翠柳痛恨不買斷斜陽西湖醖入春酒吳宫亂水斜煙留連倦客慵更回首幽蛩韵苦哀鴻呌絶斷音難偶題紅泛葉零亂想夜冷江楓暗瘦付與誰一半悲秋行雲在否金縷曲陪履齊先生滄浪看梅喬木生雲氣訪中興英雄陳迹暗追前事戰艦東風慳借便夢斷神州故里旋小築吳宫閒地華表月明歸夜鶴歎當時花竹今如此枝上露濺清淚遨頭小簇行春隊步蒼苔尋幽别塢看梅開未重唱梅邊新度曲催發寒梢凍蘂此心與東君同意後不如今今非昔兩無言相對滄浪水懷此恨寄殘醉陳敬叟名以莊號月溪建安人水龍吟記錢塘之恨晚來江濶潮平越船吳㮄催人去稽山滴翠胥濤濺恨一襟離緒訪柳章臺問桃仙浦物華如故向秋娘渡口泰娘橋畔依稀是相逢處窈窕青門紫曲蒨羅新衣翻金縷舊音恍記輕攏慢撚哀絃危柱金屋難成阿嬌巳逺不堪春暮聼一聲杜宇紅殷緑老雨花風絮賀新郎和劉潛夫韵曉夢鶯呼起便安排詩家厨傳酒家行李㸃檢花邊新雨露春在萬家生齒道官似錦溪清駛但使有人耕緑野正不妨鼓吹頻來此方覓句且夷俟畫橋西畔多春意記年年曽來幾度落花流水行到水窮雲起處依約輞川竹里興未屬王孫公子料想明年端門裏有傳柑宴罷黃封醉肯回首萬杉底馮熙之名取洽號雙溪翁延平人摸魚兒和玉林韵蓋為遺蛻山中桃花作歎劉郎那回輕别霏霏三落紅雨𤣥都觀裏應遺恨一抹淡煙殘縷愁望處想霧暗雲深忘却來時路新花舊主記刻羽流商裁紅剪翠山徑日將暮空枝上時有幽禽對語聲聲如問來否人生行樂須聞健衰老念誰免此吾所與在溪上深深錦繡千花塢何時定去但對酒思君呼兒為我頻唱小桃句賀新郎送别江定軒夢折營門柳送君歸暫戲斑衣又攏征袖到得皇州風景異只有湖山似舊把感慨寓之杯酒雨抹晴粧西子樣且平章剩賦詩千首富與貴本來有青油幕底籌攻守擁貔貅朝氣凌雲夜鋒衝斗蜀祲淮氛猶在眼一掃政須健帚又何惜驅馳奔走快展韜鈐資世用看歸來金印懸雙肘須玉斚為君夀沁園春中和節日為黃玉林夀禀氣之中具聖之和生逢令辰算三春中月方才破二百年大齊去聲恰則平分立玉林深散花菴小中有翛然自在身詩何似似蘇州閒逺庾府清新青鞋布襪烏巾試勇往蓉溪一問津有心香一瓣心聲一闋更携阿艾同夀靈椿劫劫長存生生不息寧極深根秋又春聊添我作去聲風流二老嵗嵗尋盟西江月太嵗日作老子齊頭六十新年第一今朝放開懷抱不須焦萬事付之一笑煙柳效顰翠斂露桃獻笑紅妖巳拚行樂到元宵尚可追隨年少蝶戀花和玉林韵秋到雙溪溪上樹葉葉凉聲未省來何許盡拓溪樓窗與戶倚欄清夜窺河鼓那得吟朋同此住獨對秋芳欲寄花無處杖屨相從曽有語未來先自愁君去馮偉夀名艾子號雲月雙溪子精於律吕詞多自製腔玉連環憶李謫仙謫仙往矣問當年飲中儔侣於今誰在歎沈香醉夢胡塵日月流浪錦袍宫帶髙吟三峽動舞劒九州隘玉皇歸覲半空遺下詩囊酒佩雲月仰挹清芬攬虬鬚尚友千載晉宋頺波羲黃春夢樽前一慨待相將共躡龍肩鯨背海山何處五雲靉靉春風裊娜春恨黃鍾羽被梁間雙燕話盡春愁朝粉謝午花柔倚紅欄故與蝶圍蜂繞柳綿無數飛上搔頭鳳管聲圓蠶房香暖笑挽羅衫須少留隔院蘭馨趂風逺鄰墻桃影伴煙收些子風情未减眉頭眼尾萬千事欲說還休薔薇露牡丹毬殷勤記省前度綢繆夢裏飛紅覺來無覓望中新緑别後空稠相思難偶歎無情明月今年巳是三度如鈎春雲怨上巳黃鍾商春風惡劣把數枝香錦和鶯吹折雨重柳腰嬌困燕子欲扶扶不得軟日烘煙乾風收霧芍藥荼䕷弄顔色簾幕輕陰圖書清潤日永篆香絶盈盈笑靨宫黃額試紅鸞小扇丁香雙結團鳳眉心倩郎貼教洗金罍共看西堂醉花新月曲水成空麗人何處往事暮雲萬葉雲仙引桂花夾鍾羽紫鳳臺髙紅鸞鏡裏馡馡幾度秋馨黃金重緑雲輕丹砂鬢邊滴粟翠葉玲瓏煙剪成含笑出簾月香滿袖天霧縈身年時花下逢迎有遊女翩翩如五雲亂擲芳英為簪斜朵事事關心長向金風一枝在手嗅蘂悲歌雙黛嚬繞臨溪樹對初弦月露下更深眼兒媚春情自嚬雙黛聼啼鴉簾外翠煙斜社前風雨巳歸燕子未入人家鞋兒試著無人看莫是忒寬些想他樓上悶拈簫管憔悴鶯花木蘭花慢和答玉林韻酒醒人世換碧桃靚海山春任青鳥沉沉紫鱗杳杳有玉林人宫袍掉頭未愛愛荷衣不染市朝塵仙樣蓬萊翰墨雲間鸞鳳精神笑呼銀漢入金鯨瓊苑自由身羡咳唾成章香薰花霧音和韶均六丁夜來捧去使天人也自歎尖新那得金箋飛灑浩歌飛步蒼旻李耘叟名藝子號芳洲昭武人石屏序其詞最稱賞豫懷渺渺以下數語木蘭花慢秋意占西風早處一畨雨一畨秋記故國斜陽去年今日落葉林幽悲歌幾回激烈寄疏狂酒令與詩籌遺恨清商易改多情紫燕難留嗟休觸緒繭絲抽舊事續何由奈豫懷渺渺羇愁鬱鬱歸夢悠悠生平不如老杜便如他飄泊也風流寄語庭柯徑菊甚時得棹孤舟連可久名久道江湖得道之士也十二嵗已能作詩其父携見熊曲肱適有漁父過前令賦漁父詞曲肱贈以詩且謂此子富貴中留不住後果為羽衣多往來西山清平樂漁父陳鴻驚處一網沉江渚落葉亂風和細雨撥棹不如歸去蘆花輕泛微瀾蓬窗獨自清閒一覺遊仙好夢任他竹冷松寒洪叔璵名瑹自號空同詞客月華清春夜對月花影搖春蟲聲吟暮九霄雲幕初捲誰駕氷蟾擁出桂輪天半素魄映青瑣窗前皓彩散畫欄干畔凝盼見金波晃漾分輝鵲殿况是風柔夜暖正燕子新來海棠微綻不似秋光只照離人腸斷恨無奈利鎖名韁誰為喚舞裙歌扇吟玩怕銅壺催曉玉繩低轉水龍吟追和朝次膺經年不見書來後期杳杳從誰問梅英蠟小柳枝金嫩艷陽春近羅幕風柔泛紅浮緑連朝花信念平生多少情條恨葉鎮長使芳心困可是風流薄命鏡臺前鬆鬆蟬鬢茜桃凝粉薰蘭漲膩翠愁紅損縱使歸來燈前月下恐難相認卷重簾憔悴殘粧淚洗把羅襟揾驀山溪憶中都潮平風穩行色催津鼓回首望重城但滿眼紅雲紫霧分香解佩空記小樓東銀燭暗繡簾垂昵昵憑肩語關山千里垂柳河橋路燕子又歸來但惹得滿身花雨彩箋不寄蘭夢更無憑燈影下月明中魂斷金叉股齊天樂閨思轆轤聲破銀床凍霜寒又侵鴛被皓月疏鐘悲風斷漏驚起畫樓人睡銀屏十二歎塵滿絲簧暗消金翠可恨風流故人迢遞隔千里相思情緒最苦舊歡無續處魂夢空費斷鴈無情離鸞有恨空想吳山越水花憔玉悴但翠黛愁橫紅鉛淚洗待剪江梅倩人傳此意菩薩鬘宿水口斷虹逺飲橫江水萬山紫翠斜陽裏繫馬短亭西丹楓明酒旗浮生長客路事逐孤鴻去又是月黃昏寒燈人閉門又湖上吳姬壓酒浮紅蟻少年未飲心先醉駐馬緑楊隂酒樓三月春相看成一笑遺恨知多少回首欲魂銷長橋連斷橋踏莎行别意滿滿金杯垂垂玉筯離歌不放行人去醉中扶上木蘭船醒來忘却桃源路帶綰同心叉分一股斷魂空草髙唐賦秋山萬疊水雲深茫茫無著相思處瑞鶴仙離筵代意聼梅花吹動涼夜何其明星有爛相看淚如霰問而今去也何時㑹靣匆匆聚散恐便作秋鴻社燕最傷情夜來枕上斷雲零雨何限且念人生萬事回首悲涼都成夢幻芳心繾綣空惆悵巫陽館况船頭一轉三千餘里隱隱髙城不見恨無情春水連天片帆似箭浪淘沙别意花霧漲𡨕𡨕欲雨還晴薄羅衫子正宜春無奈金宵鴛帳裏身是行人别酒不須斟難洗離情絲鞘如電紫騮鳴腸斷畫橋芳草路月曉風清南柯子新月柳浪搖晴沼荷風度晚簷碧天如水印新蟾一罅清光斜露玉纎纎寶鏡微開匣金鈎半押簾西樓今夜有人忺應傍粧臺低照畫眉尖永遇樂送春歌雪徘徊夢雲溶曳欲勸春住薄幸楊花無端杜宇抵死催教去參差煙岫千回百匝不解禁春歸路病厭厭那堪更聼小樓一夜風雨金叉鬭草玉盤行菜往事了無憑據合數松兒分香帕子總是牽情處小桃朱戶題詩在否尚憶去年崔護緑陰中鶯鶯燕燕也應解語謁金門春晚風共雨催盡亂紅飛絮百計留春春不住杜鵑聲更苦細柳官河狹路幾被嬋娟相誤空憶墜鞭遺扇處碧窗眉語度菩薩鬘春感玉琴不療文園病對花長抱深深恨恨入鬢霜邊才情輸少年蛾眉梳墮馬翠袖薰蘭麝醉夢未全醒緑窗啼曉鶯阮郎歸壬辰邵武試燈夕東風吹破藻池氷晴光開五雲緑情紅意兩逢迎扶春來逺林花艷艷玉英英羅衣金縷明閙蛾兒簇小蜻蜓相呼看試燈行香子代贈楚楚精神楊柳腰身是風流天上飛瓊凌波微步羅襪生塵有許多嬌許多韻許多情十年心事兩字眉婚問何時真箇行雲秋衾半冷窗月窺人想為人愁為人瘦為人顰鷓鴣天情景意態嬋娟畫不如瑩然初日照芙渠笑捐瓊佩遺交甫肯把文梭擲幼輿花上蝶水中鳬芳心密意兩相於情知不作庭前柳到得秋來日日疏黃叔暘名號玉林又號花菴賀新郎題雙溪馮熙之交游風月之樓倦整摩天翼笑歸來㸃畫亭臺按行泉石落落元龍湖海氣更著髙樓百尺收攬盡水光山色曽駕飇車蟾宫去幾回批借月支風敕斯二者慣相識玲瓏窗戶青紅濕夜深時寒光爽氣洗清肝髙似此交游真灑落判與升堂入室有萬象來為賔客不用笙歌輕㸃涴看仙翁手搦虹霓筆吟思逺兩峰碧樓對兩峯甚竒又乙已正月十日雙溪携酒遺蛻亭桃花方開主人浩歌酌客歡甚即席作此風送行春步漸行行山回路轉入雲深處問訊花梢春幾許半在詩人杖屨㸃㸃是祥煙膏露中有瑶池千嵗種整嚴粧來作巢仙侣相嫵媚試凝竚風流座上揮談麈更多情多才多調緩歌金縷趂取芳時同宴賞莫惜清樽緩舉有明月隨人歸去從此一春須一到願東君長與花為主泉共石聞斯語又菊莫恨黃花瘦正千林風霜搖落暮秋時候晚節相看元不惡采采東籬獨秀試攬結幽香盈手幾劫修來方得到與淵明千載為知舊同冷淡比蘭友柴桑心事君知否把人間功名富貴付之塵垢不肯折腰營口腹一笑歸歟五栁悵此意而今安有若得風流如此老也何妨相對無杯酒詩自可了重九又梅自掃梅花下問梢頭冷蘂疏疏幾時開也間者濶焉今久矣多少幽懷欲寫有誰是孤山流亞香月一聨真絶唱與詩人千載為嘉話餘興味付來者清癯不戀華亭榭待與君白髮相親竹籬茅舍喜甚今年無酒禁溜溜小槽壓蔗已準擬雪天霜夜自醉自吟仍自笑任解冠落珮從嘲罵書此意寄同社木蘭花慢題馮雲月玉連環詞後自沈香夢斷風雨外失餘春悵袍錦淋漓金鑾論奏四海無人蛾眉古來見妬奈昭陽飛燕亦成塵惟有空梁落月至今能為傳神神遊八表跨長鯨誰是再來身愛雲月溪頭玉環一曲筆力千鈞人間不堪著眼但香名百世尚如新乞我九霞蜚珮梯空共上秋旻又乙巳病中問潘郎兩鬢更禁得幾畨秋悵病骨臞臞幽懷渺渺短髮颼颼雲邊一聲長笛這風情都屬趙家樓欹枕困尋藥裹熏衣慵訊香篝悠悠老矣復焉求何止賦三休念少日書魔中年酒病晚嵗詩愁巳攀桂花作證便從今把筆一齊勾只有煙霞痼疾相陪風月交游又懷舊問春春不語謾新緑滿芳洲記歷歷前遊看花南陌命酒西樓東風翠紅圍繞把功名一笑付糟邱醉裏了忘身世吟邊自負風流風流莫莫復休休白髮漸盈頭悵十載重來略無歡意惟有間愁多情向人似舊但小桃婀娜柳纎柔望斷殘霞落日水天拍拍飛鷗南柯子丁酉清明天上傳新火人間試夾衣定巢新燕覓香泥不為繡簾朱戶說相思側帽吹飛絮憑欄送落暉粉㾗銷淡錦書稀怕見山南山北子規啼又丙申重九蘭佩秋風冷茱囊曉露新多情多感怯芳辰强折黃花來照碧鱗鱗落帽參軍醉空樽靖節貧世間那復有斯人目送歸鴻西去一傷神行香子梅寒意方濃暖信才通是晴陽暗拆花封氷霜作骨玉雪為容看體清癯香淡竚影朦朧孤城小驛斷角殘鐘又無邊散與春風芳心一㸃幽恨千重任雪霏霏雲漠漠月溶溶賣花聲己亥三月一日鶯蝶太匆匆惱殺衰翁牡丹開盡狀元紅俯仰之間增感慨花事成空垂柳緑陰中粉絮濛濛多情多病轉疏慵不是東風孤負我負東風又憶舊秋色滿層霄剪剪寒飇一襟殘照兩無聊數盡歸鴉人不見落木蕭蕭往事欲魂銷夢想風標春江緑漲水平橋側帽停鞭沽酒處柳軟鶯嬌長相思秋懷天悠悠水悠悠月印金樞曉未收笛聲人倚樓蘆花秋蓼花秋催得吳霜㸃鬢稠香箋莫寄愁又秋夜砧聲齊杵聲齊金井欄邊敗葉飛夜寒烏不棲風淒淒露淒淒影轉梧桐月已西花冠窗外啼又春晚惜春歸愛春歸脫了羅衣著苧衣緑陰黃鳥啼酒醒時夢醒時清簟疏簾一局棋丁東風馬兒感皇恩送饒溪臺遊浙騎鶴上揚州腰纒十萬拈起詩人舊公案看山看水此去勝遊須遍煩君收拾取歸吟卷少日風流暮年蕭散佳處何妨小留欵沙河塘上落日繡簾爭捲也須拂拭起看花眼蝶戀花春感百計留春春不住褪粉吹香日日催教去心事欲憑鶯語訴流鶯剗地無憑據緑玉䦨干圍綺戶一㸃柔紅應在深深處想倚翠簾吹柳絮淺顰惆悵芳期誤月照梨花閨怨晝景方永重簾花影好夢猶酣鶯聲喚醒門外風絮交飛送春歸修蛾畫了無人問幾多别恨淚洗殘粧粉不知郎馬何處煙草萋迷鷓鴣啼摸魚兒為遺蛻山中桃花作寄馮雲月問山中小桃開後曽經多少晴雨遙知載酒花邊去唱我舊歌金縷行樂處正蝶繞蜂圍錦繡迷無路風光有主想倚杖西阡停杯北望望斷碧雲暮花知道應倩蜚鴻寄語年來老子安否一春一到成虛約不道樹猶如此煩說與但嵗嵗東風粧㸃紅雲塢劉郎老去待有日重來同君一笑拈起看花句水龍吟贈丁南鄰少年有志封侯彎弓欲挂扶桑外一朝斂縮蕭然清興了無拘礙袖裏陰符枕中鴻寶功名蟬蛻看舌端霹霹劇談𤣥妙人間世疑無對閬苑醉鄉佳處想當年緑陰猶在羣仙寄語不須㸃勘鬼神功罪碧海千尋赤城萬丈風髙浪快待踞龜食蛤相期汗漫與煙霞會西河巳亥秋作天似洗殘秋未有寒意何人短笛弄西風數聲壯偉倚欄感慨展雙眸離離煙樹如薺少年事成夢裏客愁付與流水筆牀茶具老空山未妨肆志世間富貴要時賢深居宜有餘味大江東去日西墜想悠悠千古興廢此地閲人多矣且揮絃寄興氛埃之外目送蜚鴻歸天際清平樂宫怨珠簾寂寂愁背銀缸泣記得少年初選入三十六宫第一當時掌上承恩而今冷落長門又是羊車過也月明花落黃昏又宫詞深深禁籞霽日明鶯羽風動槐龍交翠舞恰恰花陰亭午一簾暖絮悠揚金爐旋炷沉香天子方看諌疏內人休鬭新粧酹江月戲題玉林玉林何有有一灣蓮沼數間茅宇斷塹疏籬聊補葺那得粉墻朱戶禾黍秋風雞豚曉日活脫田家趣客來茶罷自挑野菜同煮多少甲第連雲十眉環座人醉黃金塢回首邯鄲春夢破零落珠歌翠舞得似衰翁蕭然陋巷長作溪山主紫芝可採更尋巖谷深處酹江月夜涼西風解事為人間洗盡三庚煩暑一枕新涼宜客夢飛入藕花深處氷雪襟懷琉璃世界夜氣清如許劃然長嘯起來秋滿庭戶應笑楚客才髙蘭成愁悴遺恨傳千古作賦吟詩空自好不直一杯秋露淡月䦨干微雲河漢耿耿天催曙此情誰㑹梧桐葉上疏雨浣沙溪醮壇鐘磬泠泠夜未央梨花庭院月如霜步虛聲裏拜瑶章紫極清都雲渺渺紅塵濁世事茫茫未知誰有返魂香鷓鴣天暮春沈水香銷夢半醒斜陽恰照竹間亭戲臨小草書團扇自揀殘花插淨瓶鶯宛轉燕丁寧晴波不動晚山青玉人只怨春歸去不道槐雲緑滿庭又張園作雨過芙蕖葉葉涼摩挲短髮照橫塘一行歸鷺拖秋色幾樹鳴蟬餞夕陽花側畔柳㫄相微雲淡月又昏黃風流不在談鋒勝袖手無言味最長秦樓月秋夕心如結西風老盡黃花節黃花節塞鴻聲斷冷煙淒月漢朝陵廟唐宫闕興衰萬變從誰說從誰說千年青史幾人華髮重疊金壬寅立秋西風半夜驚羅扇蛩聲入夢傳幽怨碧藕試初涼露㾗啼粉香清氷凝簟竹不許雙鴛宿又是五更鐘鴉啼金井桐又冬南山未解松梢雪西山巳挂梅梢月說似玉林人人間無此清此身元是客小住娛今夕拍手憑䦨干霜風吹鬢寒又除日立春銀幡綵勝參差剪東風吹上叉頭燕一笑繞花身小桃先報春新春今日是明日新年至擘繭莫探官人間行路難謁金門初春花事淺方費化工勻染墻角紅梅開未遍小桃才數㸃人在暮寒庭院閒續茶經香傳酒思如氷詩思懶雨聲簾不捲南鄉子夏夜多病帶圍寬未到衰年巳鮮歡夢破小樓風馬響珊珊缺月無情轉畫欄涼入苧衾單起探燈花夜欲䦨書冊滿床空伴睡慵觀拈得漁樵笛譜看又夜景萬籟寂無聲衾鐵稜稜近五更香斷燈昏吟未穩淒清只有霜華伴月明應是夜寒凝惱得梅花睡不成我念梅花花念我關情起看清氷滿玉瓶花發沁園春芍藥㑹上曉燕傳情午鶯喧夢起來檢校芳事荼䕷褪雪楊柳吹綿迤邐麥秋天氣翻階傍砌看芍藥新粧嬌媚正鳳紫勻染綃裳猩紅輕透羅袂晝暖朱䦨困倚是天姿妖嬈不減姚魏隨蜂惹粉趂蝶棲香引動少年情味花濃酒美人正在翠紅圍裏問誰是第一風流折花簪向雲髻阮郎歸效姜堯章體粉香吹暖透單衣金泥雙鳳飛閒來花下立多時春風酒醒遲桃葉曲柳枝詞芳心空自知湘臯月冷佩聲微鴈歸人不歸鵲橋仙青林雨歇珠簾風細人在緑陰庭院夜來能有幾多寒巳瘦了梨花一半寶叉無據玉琴難托合造一襟幽怨雲窗霧閣事茫茫試與問杏梁雙燕花菴詞選續集卷十
