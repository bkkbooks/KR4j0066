body:
  text: 花菴詞選卷七宋黃升撰宋詞周美成名邦彥初進汴都賦得官徽廟時提舉大晟樂府官至待制詞名清真詩餘瑞龍吟春詞章臺路還見褪粉梅梢試花桃樹愔愔坊陌人家定巢燕子歸來舊處黯凝竚因記箇人癡小乍窺門戶侵晨淺約宫黃障風映袖盈盈笑語前度劉郎重到訪鄰尋里同時歌舞惟有舊家秋娘聲價如故吟箋賦筆猶記燕臺句知誰伴名園露飲東城閒步事與孤鴻去探春盡是傷離意緒官柳低金縷歸騎晚纎纎池塘飛雨斷腸院落一簾風絮今按此詞自章臺路至歸來舊處是第一假自黯凝竚至盈盈笑語是第二段此謂之雙拽頭屬正平調自前度劉郎以下即犯大石係第三段至歸騎晚以下四句再歸正平今諸本皆於吟箋賦筆處分段者非也蘭陵王柳柳陰直烟裏絲絲弄碧隋堤上曽見幾番拂水飄綿送行色登臨望故國誰識京華倦客長亭路年去嵗來應折柔條過千尺閒尋舊蹤跡又酒趂哀絃燈照離席梨花榆火催寒食愁一箭風快半篙波暖回頭迢遞便數驛望人在天北悽惻恨堆積漸别浦縈回津堠岑寂斜陽冉冉春無極記月榭携手露橋聞笛沈思前事似夢裏泪暗滴隔浦蓮近夏景新篁搖動翠葆曲徑通深窈夏果收新脆金丸落驚飛鳥濃靄迷岸草蛙聲閙驟雨鳴池沼水亭小浮萍破處簾花簷影顛倒綸巾羽扇困卧北窗清曉屏裏吳山夢自到驚覺依然身在江表西河金陵懷古佳麗地南朝盛事誰記山圍故國繞清江髻鬟對起怒濤寂寞打空城風檣遙度天際斷岸樹猶倒倚莫愁艇子曾繫空餘舊迹鬱蒼蒼霧沈半壘夜深月過女牆來傷心東望淮水酒旗戲鼓甚處市想依稀王謝鄰里燕子不知何世向尋常巷陌人家相對如說興亡斜陽裏解連環怨别怨懷難託嗟情人斷絶信音遼邈縱妙手能解連環似風散雨收霧輕雲薄燕子樓空暗塵鎖一床絃索想移根換葉盡是舊時手種紅葉汀洲漸生杜若料舟移岸曲人在天角謾記得當日音書把閒語閒言待總燒却水驛春回望寄我江南梅萼拚今生對花對酒為伊泪落風流子初夏新緑小池塘風簾動碎影舞斜陽羡金屋去來舊時巢燕土花繚繞前度莓牆繡閣鳳幃深幾許聽得理絲簧欲說又休慮乖芳信未歌先咽愁近清觴遙知新粧了開朱戶應自待月西廂最苦夢魂今宵不到伊行問甚時說與佳音密耗寄將秦鏡偷換韓香天便教人霎時厮見何妨又秋詞楓林凋晚葉關河回楚客慘將歸望一川暝靄鴈聲哀怨半規凉月人影參差酒醒後泪花銷鳳蠟風幕卷金泥砧杵韻高喚回殘夢綺羅香減牽起餘悲亭髙分襟地難拚處偏是掩而牽衣何況怨懷長結重見無期想寄恨書中銀鉤空滿斷腸聲裏玉筯偷垂多少暗愁密意惟有天知花犯梅花粉牆低梅花照眼依然舊風味露㾗輕綴疑淨洗鉛華無恨清麗去年勝賞曾孤倚氷盤同宴喜更可惜雪中髙樹香篝熏素被今年對花太匆匆相逢似有限依依愁悴凝望久青苔上旋看飛墜相將見脆圓薦酒人正在空江烟浪裏但夢想一枝瀟灑黃昏斜照水此只詠梅花而紆餘反覆道盡三年間事昔人謂好詩圓美流轉如彈丸余於此詞亦云意難忘美人衣染鶯黃愛停歌駐拍勸酒持觴低鬟蟬影動私語口脂香荷露滴竹風凉拚劇飲淋浪夜漸深籠燈就月細與端相知音見說無雙解移宫換羽未伯周郎長顰知有恨貪耍不成粧些箇事惱人腸待說與何妨又恐伊尋消問息瘦減容光側犯荷花暮霞霽雨小蓮出水紅粧靚風定看步襪江妃照明鏡飛螢度暗草秉燭遊花徑人靜携艷質追凉就槐影金環皓腕雪藕清泉瑩誰念省滿身香猶是舊荀令見說胡姬酒壚寂靜烟鎖漠漠藻池苔井蝶戀花早行月皎驚烏棲不定更漏將䦨轆轤牽金井喚起兩眸清炯炯淚花落枕紅綿冷執手霜風吹鬢影去意徊徨别語愁難聽樓上闌干橫斗柄露寒人逺雞相應齊天樂秋詞緑蕪凋盡臺城路殊鄉又逢秋晚暮雨生寒鳴蛩勸織深閣時聞裁剪雲窗靜掩嘆重拂羅䄄頓疏花簟尚有練囊露螢清夜照書卷荆江留滯最久故人相望處離思何限渭水西風長安亂葉空憶詩情宛轉憑髙眺逺正玉液新芻蟹螯初薦醉倒山翁但愁斜照斂滿庭芳夏景風老鶯雛雨肥梅子午陰嘉樹清圓地卑山近衣潤費爐烟人靜烏鳶自樂小橋外新緑濺濺憑䦨久黃蘆苦竹疑泛九江船年年如社燕漂流瀚海來寄修椽且莫思身外長近尊前憔悴江南倦客不堪聽急管繁絃歌筵畔先安簟枕容我醉時眠渡江雲春詞晴嵐低楚甸暖回鴈翼陳勢起平沙驟驚春在眼借問何時委曲到山家塗香暈色盛粉飾爭作妍華千萬絲陌頭楊柳漸漸可藏鴉堪嗟清江東注畫舸西流指長安日下愁宴䦨風翻旗尾潮濺烏紗今宵正對初弦月傍水驛深艤蒹葭沈恨處時時自剔燈花過秦樓夜景水浴清蟾葉喧凉吹巷陌馬聲初斷閒依露井笑撲流螢惹破畫羅輕扇人靜夜久憑䦨愁不歸眠立殘更箭嘆年華一瞬人今千里夢沈書逺空見說鬢怯瓊梳容銷金鏡漸懶趂時勻染梅風地溽梧雨苔滋一架舞紅都變誰信無憀為伊才減江淹情傷荀倩但明河影下遙看稀星數㸃解蹀躞秋詞候館丹楓吹盡面旋隨風舞夜寒霜月飛來伴孤旅還是獨擁秋衾夢餘酒困都醒滿懷離苦甚情緒深念凌波微步幽房暗相遇泪珠都作秋宵枕前雨此恨音驛難通待慿征鴈歸時寄將愁去一寸金新定作州夾蒼崖下枕江山是城郭望海霞接日紅翻水面晴風吹草青搖山腳波暖鳬鷖作沙㾗退夜潮正落疏林外一㸃炊烟渡口參差正寥廓自歎勞生經年何事京華信漂泊念渚蒲汀柳空歸閒夢風輪雨楫終辜前約情景牽心眼流連處利名易薄回頭謝冶葉倡條便入漁釣樂朝次膺宣和間克大晟府協律郎與万俟雅言齊名按月律進詞黃河清慢應制作晴景初升風細細雲收天淡如洗望外鳳皇城闕蔥蔥佳氣朝罷香烟滿袖侍臣報天顔有喜夜來連得封章奏大河徹底清泚君王夀與天齊馨香動上穹頻降祥瑞大晟奏功六樂初調宫徴合殿薰風乍轉萬花覆千官盡醉內家傳詔重開宴未央宫裏水龍吟早春倦遊京洛風塵夜來病酒無人問九衢雪小千門月淡元宵燈近香散梅梢凍消池面一畨春信記南樓醉裏西城宴闋都不管人春困屈指流年未幾早驚人潘郎雙鬢當時體態而今情緒多應瘦損馬上牆頭縱教瞥見也難相認憑䦨干但有盈盈泪眼把羅襟揾又梅花夜來深雪前村路應是早梅初綻故人念我江頭春信南枝向暖疏影橫斜暗香浮動月明清淺向亭邊驛畔行人立馬頻回首空腸斷别有玉溪仙館夀陽人宫粧粉面天教占了百花頭上和羮未晚最是傷情處髙樓上一聲羌管仗何人向道爭如留取倚䦨千看鷓鴣天升平詞霜壓天街不動塵千官環珮賀成禋三竿閶闔樓邊日五色蓬萊頂上雲隨步輦卷香䄄六宫紅粉倍添春樂章近與中聲合一片仙韶特地新清平樂夏詞深沈院宇枕簟清無暑睡起花陰初轉午一霎飛雲過雨雨餘隱隱殘雷夕陽却照庭槐莫把珠簾垂下妨他雙燕歸來驀山溪春情風流心膽直把春償酒選得一枝花綺羅中算來未有名園翠苑風月最佳時夜迢迢車欵欵是處曾携手重來一夢池館皆依舊幽恨寫新詩托何人章臺問柳漁舟歸後雲鎖武陵溪水潺潺花片片艤棹空回首行香子别恨别恨綿綿屈指三年再相逢情分依然君初霜鬢我已華顛況其間有多少恨不堪言小庭幽檻菊蘂斕斑近清宵月已嬋娟莫思身外且鬭尊前願花長好人長健月長圓万俟雅言精於音律自號詞隱崇寧中克大晟府製撰依月用律製詞故多應制所作有大聲集五卷周美成為序山谷亦稱之為一代詞人三臺清明應制見梨花初帶夜月海棠半含朝雨內苑春不禁過青門御溝漲潛通南浦東風靜細柳垂金縷望鳳闕非煙非霧好時代朝野多歡遍九陌太平簫鼓乍鶯兒百囀斷續燕子飛來飛去近緑水臺榭映秋千鬭草聚雙雙遊女餳香更酒冷踏青路㑹暗識夭桃朱戶向晚驟寶馬雕鞍醉襟惹亂花飛絮正輕寒輕暖漏永半陰半晴雲暮禁火天已是試新粧嵗華到三分佳處清明看漢宫傳䗶炬散翠煙飛入槐府斂兵衛閶闔門開住傳宣又還休務戀芳春慢寒食前進蜂蘂分香燕泥破潤暫寒天氣清新帝里繁華昨夜細雨初勻萬品花藏四苑望一帶柳接重津寒食近蹴踘秋千又是無限遊人紅粧趂戲綺羅夾道青帘賣酒臺榭侵雲處處笙歌不負治世良辰共見西城路好翠華定將出嚴宸誰知道仁主祈祥為民非事行春安平樂慢都門池苑應制瑞日初遲緒風乍暖千花百草爭香瑶池路穩閬苑春深雲樹水殿相望柳曲沙平看塵隨青蓋絮惹紅粧賣酒緑陰傍無人不醉春光有十里笙歌萬家羅綺身世疑在仙鄉行樂知無禁五侯半隱少年場舞妙歌妍空妬得鶯嬌燕忙念芳菲都來幾日不堪風雨疏狂卓牌兒春晚東風緑楊天如畫出清明院宇玉艷淡泊梨花帶月胭脂零落海棠經雨單衣怯黃昏人正在珠簾笑語相竝戲蹴秋千共携手同倚䦨干暗香時度翠窗繡戶路繚繞潛通幽處斷魂凝佇嗟不似飛絮閒悶閒愁難消遣此日年年意緒無據奈酒醒春去昭君怨春到南樓雪盡驚動燈期花信小雨一畨寒倚䦨干莫把䦨干倚一望幾重烟水何處是京華暮雲遮又一望西山烟雨目斷心飛何處天外白雲城幾多程謾記陽關句衣上粉啼㾗汚隴水一分流此生休訴衷情送春一鞭清曉喜還家宿醉困流霞夜來小雨新霽雙燕舞風斜山不盡水無涯望中賖送春滋味念逺情懷分付楊花梅花引冬怨曉風酸曉霜乾一鴈南飛人度關客衣單客衣單千里斷魂空歌行路難寒梅驚破前村雪寒雞啼破西樓月酒腸寬酒腸寬家在日邊不堪頻倚䦨憶秦娥天如洗金波冷浸氷壺裏氷壺裏一年得似此宵能幾等閒莫把䦨干倚馬蹄去便三千里三千里幾重雲岫幾重烟水又别情千里草萋萋盡處遙山小遙山小行人逺似此山多少天若有情天亦老此情說便說不了說不了一聲喚起又驚春曉憶少年隴首山隴雲溶泄隴山峻秀隴泉嗚咽行人暫駐馬已不勝愁絶上隴首凝眸天四濶更一聲塞鴈悽切征書待寄逺有知心明月長相思雨一聲聲一更更窗外芭蕉窗裏燈此時無限情夢難成恨難平不道愁人不喜聽空階滴到明又山驛短長亭古今情樓外凉蟾一暈生雨餘秋更清暮雲平暮山橫幾葉秋聲和鴈聲行人不要聽雅言之詞詞之聖者也發妙㫖於律吕之中運巧思於斧鑿之外平而工和而雅比諸刻琢句意而求精麗者逺矣潘元質倦尋芳閨思獸鐶半掩鴛甃無塵庭院瀟灑樹色沈沈春盡燕嬌鶯姹夢草池塘青漸滿海棠軒檻紅相亞聽簫聲記秦樓夜約彩鸞齊跨漸迤邐更催銀箭何處貪歡猶繫驕馬旋翦燈花兩㸃翠眉誰畫香滅羞回空帳裏日髙猶在重簾下恨疏狂待歸來碎揉花打蘇養直名伯固號後湖居士菩薩鬘春園園林寂寂春歸去濛濛柳下飄香絮野水接雲橫緑烟啼曉鶯江南鵜鴂夢山色歸來重小艇小灣頭蘋花蘋葉舟鷓鴣天和康伯可韻梅妬晨粧雪妬輕逺山依約學眉青樽前無復歌金縷夢覺空餘月滿林魚與鴈兩浮沉淺顰微笑總關心相思恰似江南柳一夜東風一夜深又楓落河梁野水秋淡烟衰草接郊丘醉眠小塢黃茅店夢倚髙城赤葉樓天杳杳路悠悠鈿箏歌扇等閒休灞橋楊柳年年恨鴛浦芙蕖葉葉愁阮郎歸春恨西園風暖落花時緑陰鶯亂啼倚䦨無語惜芳菲絮飛胡蝶飛緣底事減腰圍遣愁愁著眉波連春渚暮天垂燕歸人未歸木蘭花令江雲疊疊遮鴛浦江水無情流薄暮歸帆初張葦邊風客夢不禁篷背雨渚花不解留人住只作深愁無盡處白沙烟樹有無中鴈落滄洲何處所李蕭逺名祁少有詩名官至尚書郎宣和間責監漢陽酒稅如夢令不見玉人清曉長嘯一聲雲杪碧水滿蘭塘竹外一枝風裊竒妙竒妙半夜山空月皎水龍吟郎官湖碧山橫繞清湖茂林秀麓波光裏南宫老大西州漂蕩危樓重倚雨步雲行餌風飲霧平生遊戲笑此中空洞都無一物有神妙浩然氣掃盡雲南夢北看三江五湖秋水狂歌兩解清尊一舉超然千里江漢蒼茫故人何處山川良是待白蘋露下青天月上約騎鯨起醉桃源春風碧水滿郎湖水清梅影疏渡江桃葉酒家壚髻鬟雲鬢梳吹玉蘂飲雲腴不須紅䄂扶少年隨意數花鬚老來心已無減字木蘭花梨花院宇淡月傾雲初過雨一枕輕寒夢入西瑶小道山花深人靜簾鎖御香清晝永紅藥䦨干玉按春風窈窕間孫浩然離亭燕一帶江山如畫風物向秋瀟灑水浸碧天何處斷霽色冷光相射蓼嶼荻花洲掩映竹籬茅舍雲際客帆髙挂烟外酒旗低亞多少六朝興廢事盡入漁樵閒話悵望倚層樓寒日無言西下李重元憶王孫春詞萋萋芳草憶王孫柳外樓高空斷魂杜宇聲聲不忍聞欲黃昏雨打梨花深閉門又夏詞風蒲獵獵小池塘過雨荷花滿院香沈李浮瓜氷雪凉竹方床針線慵拈午夢長又秋詞颼颼風冷荻花秋明月斜侵獨倚樓十二珠簾不上鈎黯凝眸一㸃漁燈古渡頭又冬詞彤雲風掃雪初晴天外孤鴻三兩聲獨擁寒衾不忍聽月籠明窗外梅花瘦影橫查荎透碧霄惜别艤蘭舟十分端是載離愁練波送逺屏山遮斷此去難留相從爭奈心期久要屢變霜秋歎人生杳似萍浮又翻成輕别都將深恨付與東流想斜陽影裏寒烟明處雙槳去悠悠愛渚梅幽香動須採掇倩纎柔艷歌粲發誰傳餘韻來說仙遊念故人留此遐州但春風老後秋月圓時獨倚江樓林少詹少年遊早行霽霞散曉月猶明疏木挂殘星山徑人稀翠蘿深處啼鳥兩三聲霜華重迫駝裘冷心共馬蹄輕十里青山一溪流水都做許多情花菴詞選卷七
