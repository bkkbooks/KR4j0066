body:
  text: 花菴詞選續集卷八宋黃升撰宋詞劉叔安名鎮號隨如兄弟皆以文鳴有隨如百詠刋於三山沁園春和劉潛夫送孫花翁韻誰似花翁長年湖海蹇驢弊裘想紅塵醉帽青樓小扇揮金談笑惜玉風流吳下阿䝉江南老賀肯為良田二頃謀人間世算到頭一夢螻蟻王侯悠悠吾道何求况白首相逢記舊游記疏風淡月寒燈古寺平章詩境分付糟邱聚散摶沙炎凉轉燭歸去來兮萬事休無和有問從前那箇騎鶴揚州又題西宗雲山樓爽氣西來玉削羣峰千杉萬松望疏林清曠晴烟紫翠雪邊回棹柳外聞鐘夜月瓊田夕陽金界倒影樓臺表裏空橋陰曲是舊來忠定手種芙蓉仙翁心事誰同付魚鳥相忘一笑中向月梅香底招邀和靖雲山髙處問訊梁公物象搜竒風流懷古消得文章萬丈虹沈吟久想依依春樹人在江東花心動臨安新亭鳩雨催晴遍園林一番緑嬌紅媚柳外金衣花底香鬚消得艷陽天氣障泥步錦尋芳路稱來往縱橫珠翠笑攜手旗亭問酒更酬春思還記東山樂事向歌雪香中伴春沉醉粉袖殢人彩筆題詩陶寫老來風味夜深銀燭明如晝待歸去看承花睡夢雲散屏山半熏沈水漢宫春鄭賀守席上懷舊日軟風柔望暖紅連島晴緑平川尋芳拾蘂勝伴陌上鮮妍玉驄歸路記青門曽墮吟鞭人去後庭花弄影一簾香月娟娟追念舊遊何在歎佳期虛度錦瑟華年博山夜來燼冷誰換沈煙屏幃半掩奈夢雲不到愁邊春易老相思無據間情分付魚箋水龍吟丙子立春懷內三山臘雪才消夜來誰轉回寅斗試燈簾幕送寒幡勝暗香攜手少日歡娛舊遊零落異鄉歌酒到而今生怕春來太早空嬴得兩眉皺春到蘭湖少住肯殷勤訪梅尋柳相思人逺帶圍寬減粉㾗消瘦雙燕無憑尺書難表甚時回首想畫欄倚遍東風閒負却桃花呪又庚寅寄逺老來慣與春相識長記傷春如故去年今日舊愁新恨送將風絮粉淚羞紅黛眉顰翠推愁不去任瑣窗深閉屏山半掩還别有愁來路回首畫橋煙水念故人匆匆何處客情懷逺雲迷北樹草連南浦離合悲歡去留遲速問春無語笑劉郎不道無桃可種苦留春住又丙戌清明和章質夫韻弄晴臺館收煙候時有燕泥香墜宿酲未解單衣初試騰騰春思前度桃花去年人靣重門深閉記彩鸞别後青驄歸去長亭路芳塵起十二屏山遍倚任蒼苔㸃紅如綴黃昏人靜暖香吹月一簾花碎芳意婆娑緑陰風雨畫橋煙水笑多情司馬留春無計濕青衫淚慶春澤丙子元夕燈火烘春樓臺浸月良宵一刻千金錦步承蓮彩雲簇仗難尋蓬壺影動星毬轉映兩行寶珥瑤簪恣嬉遊玉漏聲催未歇芳心笙歌十里跨張地記年時行樂憔悴而今客裏情懷伴人閒笑閒吟小桃未靜劉郎老把相思細寫瑶琴怕歸來紅紫欺風三徑成陰蝶戀花丁丑七夕誰送涼蟾消夜暑河漢迢迢牛女何曽渡乞得巧來無用處世間枉費閒針縷人在江南煙水路頭白鴛鴦不道分飛苦信逺翻嗔烏鵲誤屏山暗鎖巫陽雨江神子弔方檢討思君夢裏說邯鄲未成歡巳炊殘斷送春歸風雨霎時間空有生前醫國手醫不到子孫寒欲登詩境弔方干倩誰看北邙山落落晨星不見暮雲還莫在人間尋食客尋見後匹如間柳梢青七夕乾鵲收聲濕螢度影庭院秋香步月移陰梳雲約翠人在回廊醺醺宿酒殘粧待付與溫柔醉鄉郤扇藏嬌牽衣索笑今夜差涼又戲簡髙菊澗瞥眼光陰章臺舊路楊柳春深尚憶風流殢人倚玉替客揮金髙陽醉後分襟想妬雨嗔雲到今消息真時笑啼難處方表人心臨江仙代閨怨蕩紫飄紅芳信斷都無人問穠纎吟鞭倚醉問涼蟾香消金縷篆塵壓寶粧奩夢峽朝雲飛不到一春離緒厭厭却疑歸燕礙重簾心期花底誤眉恨柳邊添浣溪沙丁亥餞元宵簾幕收燈斷續紅歌臺人散彩雲空夜寒歸路噤魚龍宿醉未消花市月芳心巳逐柳塘風丁寧鶯燕莫匆匆清平樂趙園避暑柳陰庭院簾約風前燕著雨荷花紅半斂消得盈盈緑扇竹光野色生寒玉纎雪藕氷盤長記酒醒人靜暗香吹月闌干賀新郎題王守西湖書院雲淡天垂野望晴郊疏煙半捲斷虹低跨老樹連陰藏逺景十里湖光照夜看不盡真山圖畫春滿軒窗無著處更銀蟾冷浸鴛鴦瓦人共境轉幽雅文章太守歸來也似當年和靖風流小孤山下問訊佩蘭餐菊友曾約梅兄入社待付與竹臞陶寫塵外閒尋行樂地任傍人歌舞喧臺榭詩世界有王謝江神子三月晦日西湖餞春送春曽到百花洲夕陽收暮雲留想伴花神騎鶴上揚州回首湖山情味淡重把酒更登樓相思南浦古津頭未拏舟已驚鷗柳外歸鴉㸃㸃是離愁空倚陽關三疊曲歌不盡水東流念奴嬌茉莉調氷弄雪想花神清夢徘徊南土一夏天香收不起付與蘂仙無語秀入精神凉生肌骨銷盡人間暑稼軒愁絶惜花還勝兒女長記歌酒闌珊開時向晚笑浥金莖露月浸闌干天似水誰伴秋娘窗戶困殢雲鬟醉欹風帽總是牽情處返魂何在玉川風味如許阮郎歸秋夜寒陰漠漠夜來霜階庭風葉黃歸鴉數㸃帶斜陽誰家砧杵忙燈弄幌月侵廊熏籠添寶香小屏低枕怯更長和雲入醉鄉又丹桂金莖浥露未成霜西風只舊涼蘂仙何事換霞粧惱人秋思長香世界錦文章花神不覆藏小山騷客政清狂同花入醉鄉玉樓春東山探梅泠泠水向橋東去漠漠雲歸溪上住疏風淡月有來時流水行雲無覓處佳人獨立相思苦薄袖欺寒修竹莫白頭空負雪邊春著意問春春不語行香子贈柳兒行露葉煙條天與多嬌算風流張緒難消惱人春思政自無聊奈斂愁眉酣醉眼减圍腰風絮招要蝶弄鶯嘲最關情是短長橋解驂分袂催上蘭橈更緑波平紅日墜碧雲遙施乘之楓溪清平樂元夕風消雲縷一碧無今古欲壞上元天不許晴了晚來些雨莫言冷落山家山翁本厭繁華試問蓮燈千炬何如月上梅花戴式之名復古號石屏天台詩人滿江紅赤壁懷古赤壁磯頭一畨過一畨懷古想當時周郎年少氣吞區宇萬騎臨江貔虎噪千艘烈炬魚龍怒卷長波一鼓困曹瞞今如許江上渡江邊路形勝地興亡處覽遺蹤勝讀史書言語幾度東風吹世換千年往事隨潮去問道旁楊柳為誰春搖金縷沁園春自𫐠一曲狂歌有百餘言說盡平生費十年燈火讀書讀史四方奔走求利求名蹭蹬歸來閉門獨坐嬴得窮吟詩句清夫詩者皆吾儂平日愁歎之聲空餘豪氣崢嶸安得良田二頃耕向臨卭滌器可憐司馬成都賣卜誰識君平分則宜然吾何敢怨螻蟻逍遙戴粒行開懷抱有青梅薦酒緑樹啼鶯賀新郎豐真州建江淮偉觀樓百尺連雲起試登臨江山人物一時俱偉㫄挹金陵龍虎勢京峴諸峰對峙隱隱接揚州歌吹雪浪舞從三峽下乍逢迎海若談秋水形勝地有如此使君一世經綸志把風斤月斧來此等閒遊戲見說樓成無多日大手一何容易笑天下紛紛血指醖釀春風與和氣舉長江變作香醪美人共樂醉桃李又寄豐宅之憶把金罍酒歎别來光陰荏苒江湖宿留世事不堪頻著眼嬴得兩眉長皺但東望故人翹首木落山空天逺大送飛鴻北去傷懷久天下事公知否錢塘風月西湖柳渡江來百年機會從前未有喚起東山邱壑夢莫惜風霜老手要整頓封疆如舊早晚樞庭開幕府是英雄盡為公奔走看金印大如斗又兄弟爭塗田而訟歌此詞主和議蝸角爭多少是英雄割據乾坤到頭休了一片泥塗荒草地盡是魚龍故道新堤上風濤難保滄海桑田何時變怕桑田未變人先老休為此生煩惱訟庭不許頻頻到這官坊翻來覆去有何分曉無諍人中為第一長訟元非吉兆但有恨平章不早樽酒喚回和氣在看從來兄弟依然好把前事付一笑木蘭花幔懷舊鶯啼啼不盡憑燕語語難通這一㸃芳心十年不斷惱亂東風重來故人何處但依前流水小橋東記得同題粉壁而今壁破無蹤蘭臯空漲緑溶溶流恨落花紅念著破春衫當時送别燈下裁縫相思謾令自苦嘆雲煙過眼總成空落日楚天無際憑欄目送歸鴻水調歌頭題李季允侍郎鄂州吞雲樓輪奐半天上勝槩壓南樓籌邊獨坐豈欲登覽快雙眸浪說胸吞雲夢直把氣吞強敵西北望神州百載好機會人事恨悠悠騎黃鶴賦鸚鵡謾風流嶽王祠畔楊柳烟鎖古今愁整頓乾坤手段指授英雄方略雅志若為酬杯酒不在手雙鬢恐驚秋滿庭芳楚州上巳萬柳池應監丞飲客三月春光羣賢勝餞山陰何似山陽鵝池墨妙曲水記流觴自許風流邱壑何人共擊楫長江新亭上山河有異舉目恨堂堂使君經世志十年邊上兩鬢風霜問池邊楊柳因甚凄凉萬樹重新種了株株在桃李花傍仍須待賸栽蘭芷為國洗河湟又元夕上郡武王守子文草木生春樓臺不夜團團月上雲霄太平官府民物共逍遙指㸃江梅一笑幾畨負雨秀風嬌今年好花邊把酒歌舞醉元宵風流賢太守青雲志氣玉樹丰標是神仙班裏舊日王喬出奉版輿行樂金蓮照十里笙簫收燈後看看丹詔催入聖明朝清平樂興國軍呈李司直今朝欲去忽有留人處說與江頭楊柳樹繫我扁舟且住十分酒興詩腸難禁冷落秋光借取春風一笑狂夫到老猶狂盧申之名祖臯號蒲江樓攻愧先生之甥趙紫芝翁靈舒諸賢之詩友樂章甚工字字可入律呂浙人皆唱之有蒲江詞稿行於世賀新郎彭傅帥於吳江三髙堂之前作釣雪亭蓋擅漁人之窟宅以供詩境也趙子野約余賦之挽住風前柳問鴟夷當日扁舟近曽來否月落潮生無限事零亂茶煙未久謾留得蓴鱸依舊可是功名從來誤撫荒祠誰繼風流後今古恨一搔首江涵鴈影梅花瘦四無塵雪飛雲凍夜窗如晝萬里乾坤清絶處付與漁翁釣叟又恰是題詩時侯猛拍䦨干呼鷗鷺道他年我亦垂綸手飛過我共樽酒又姑蘇臺觀雪十頃涵空碧畫圖中崢嶸幻玉亂零吹璧倚遍危欄吟不盡把酒風前岸幘記當日西湖為客誰剪吳松江上水笑乾坤竒事成兒劇還照我夜窗白崇臺目斷清無極引枝笻瓊瑶步軟印登臨屐娃館娉婷知何在淚粉愁儂恨積故化作飛花狼籍舊事悠悠渾莫問有玉蟾醉裏曽相識聊伴我夜吹笛宴清都初春春訊飛瓊管風日薄度墻啼鳥聲亂江城次第笙歌翠合綺羅香暖溶溶澗緑冰泮醉夢裏年華暗換料黛眉重鎖隋堤芳心還動梁苑新來鴈闊雲音鸞分鑑影無計重見啼春細雨籠愁淡月憑時庭院離腸未語先斷算猶有憑髙望眼更那堪芳草連天飛梅弄晚魚遊春水離愁離愁禁不去好夢别來無覓處風翻征袂觸目年芳如許軟紅塵裏鳴鞭鐙拾翠叢中勾伴侣都負嵗時暗關情緒昨夜山陰杜宇似把歸期驚倦旅遙知樓倚東風凝顰暗數寶香拂拂遺鴛錦心事悠悠尋燕語芳草暮寒亂花微雨倦尋芳春思香泥壘燕密葉巢鶯春晴寒淺花徑風柔著地舞裀紅軟鬭草煙欺羅袂薄秋千影落春遊倦醉歸來記寶帳歌慵錦屏香暖别來悵光陰容易還又荼䕷牡丹開遍妬恨疏狂那更柳花迎靣鴻羽難憑芳信短長安猶近歸期逺倚危樓但鎮日繡簾髙捲西江月中春燕掠晴絲裊裊魚吹水葉粼粼禁街微雨灑芳塵寒食清明相近謾著宫羅試暖閒呼社酒酬春晚風簾幕悄無人二十四畨花訊清平樂春恨柳邉深院燕語明如剪消息無憑聼又懶隔斷畫屏雙扇寶杯金縷紅牙醉魂幾度兒家何處一春游蕩夢中猶恨楊花烏夜啼離恨柳色津頭泫緑桃花渡口啼紅一春又負西湖醉離恨雨聲中客袂迢迢西塞餘寒剪剪東風誰家拂水飛來燕惆悵小樓空又西湖漾暖紋波颭颭吹晴絲雨濛濛輕衫短帽西湖路花氣撲春驄鬭草褰衣濕翠秋千瞥眼飛紅日長不放春醪困立盡海棠風又秋別段段寒沙淺水蕭蕭暮雨孤篷香羅不共征衫逺砧杵客愁中别恨慵看楊柳歸期暗數芙蓉碧梧聲到紗窗曉昨夜幾秋風謁金門惜別蘭棹舉相趂落紅飛去一隙輕簾凝睇處柳絲牽不住昨日翠蛾金縷今夜碧波煙渚好夢無憑窗又雨天涯知幾許又春思閒院宇獨自行來行去花片無聲簾外雨峭寒生碧樹做弄清明時序料理春酲情緒憶得歸時停棹處畫橋看落絮水龍吟荼䕷蕩紅流水無聲暮煙細草粘天逺低回倦蝶往來忙燕芳期頓懶緑霧迷墻翠虬騰架雪明香暖笑依依欲挽春風教住還疑是相逢晚不似海粧瘦減占人間丰神蕭散攀條弄蘂天涯猶記曲闌小院老去情懷酒邊風味有時重見對枕幃空想東窗舊夢帶將離恨又淮西重午㑹昌湖上扁舟幾年不醉西山路流光又是宫衣初試安榴半吐千里江山滿川煙草薰風淮楚念離騷恨逺獨醒人去䦨干外誰懷古亦有魚龍戲舞豔晴川綺羅歌鼓鄉情節意樽前同是天涯羇旅漲緑池塘翠陰庭院歸期無據問明年此夜一眉新月照人何處洞仙歌茉莉玉肌翠袖較似酴醿瘦幾度熏醒夜窗酒問炎州何事得許清涼塵不到一段氷壺剪就晚來庭戶悄暗數流光細拾芳英黯回首念日暮江東偏為魂銷人易老幽韻清標似舊政簟紋如水帳如煙更奈向月明露濃時候鷓鴣天春懷纎指輕拈小砑紅自調宫羽按歌童寒餘芍藥欄邊雨香落荼䕷架底風閒意態小房櫳丁寧須滿玉西東一春醉得鶯花老不似年時怨玉容又春暮庭緑初圓結蔭濃香溝收拾樹梢紅池塘少歇鳴蛙雨簾幕輕回舞燕風春又老笑誰同淡煙斜日小樓東相思一曲臨風笛吹過雲山第幾重摸魚兒九日登姑蘇臺怪西風曉來欹帽年華還是重九天機袞袞山新瘦客子情懷誰剖微雨後更鴈帶邊寒裊裊欺羅袖慵荷倦柳誚不似黃花田田照眼風味儘如舊登臨地寂寞崇臺最久闌干幾度搔首翻雲覆雨無窮事流水斜陽知否吟未就但衰草寒煙商略愁時候間愁浪有總輸與淵明東籬醉舞身世付杯酒夜飛鵲慢别意驕嘶破清曉分恨臨期花下恁月明知餘光是處散離思最憐香靄霏霏牽衣揾彈淚問凄風愁露剗地東西留鞭換佩怕匆匆巳是遲遲凉怯幾畨羅袂還燕别文梁螢㸃書幃一自秋娘迢遞黃金對酒爭忍輕揮新來院落鴈難尋簾幕長垂怕雕梧敲徑驚回舊夢應也顰眉漁家傲夀白石白石山中風景異先生日日懷歸計何事黃岡飛雪地偏著意畫堂却為東坡起人說前身坡老是文章氣節渾相似只待鼎彛勳業遂梅花外歸來長向山中醉木蘭花慢别西河兩詩僧嫩寒催客棹載酒去載詩歸政紅葉漫山清泉潄石多少心期三生溪橋話别悵薜蘿猶惹翠雲衣不似今畨醉夢帝城幾渡斜暉鴻飛煙水瀰瀰回首處只君知念吳江鷺憶孤山鶴怨依舊東西髙峯夢醒雲起是瘦吟窗底憶君時何日還尋後約為余先寄梅枝沁園春雙溪狎鷗幾葉凋楓半篙寒日傍橋繫船愛洞門深鎖人間福地雙溪分占天上星躔破帽欹寒短鞭敲月此地經行知幾年空嬴得似沈郎銷瘦還缺詩篇沙鷗伴我愁眠向水驛風亭紅蓼邊有村醪可飲且須同醉溪魚堪鱠切莫論錢笠澤波頭垂虹亭上橙蟹肥時霜滿天相隨否算江南江北惟有君閒菩薩鬘春思翠樓十二闌干曲雨㾗新染蒲萄緑時節又黃昏東風深閉門玉簫吹未徹窗影梅花月無語只低眉閒拈雙荔枝滿江紅齊雲月酌樓倚晴空炎雲淨晚來風力滄海外等閒吹上滿輪寒璧河漢低垂天欲近乾坤浩蕩秋無極憑欄干衣袂拂青冥知何夕登眺地追疇昔吳越事皆陳迹對清光秪有醉吟消得萬古悠悠惟月在浮生袞袞空頭白自騎鯨仙去有誰知遙相憶李公甫名劉號梅亭賀新郎上趙侍郎生日鵠立通明殿又重逢揆余初度夢庚華旦不學花奴簪紅槿且看秋香宜晚任甲子從新更換天欲東都修車馬故降神生甫維周翰歌嵩嶽詠江漢明堂朝罷夷琛獻引星辰萬人共聼風塵長算清晝山東諸將捷席捲黃河兩岸問誰在玉皇香案師保萬民功業别向西京原廟行圭瓚定郟鄏卜瀍澗花菴詞選續集卷八
