body:
  text: 花菴詞選續集巻九宋黄昇撰宋詞張宗瑞名輯鄱陽人自號東澤有詞二巻名東澤綺語債朱湛盧為序稱其得詩法於姜堯章世所傳欵乃集皆以為采石月下謫仙復作不知其又能詞也其詞皆以篇末之語而立新名云踈簾淡月寓桂枝香秋思梧桐雨細漸滴作去聲秋聲被風驚碎潤逼衣篝線褭蕙罏沈水悠悠嵗月天涯醉一分秋一分憔悴紫簫吹斷素牋恨切夜寒鴻起又何苦凄涼客裏負草堂春緑竹溪空翠落葉西風吹老幾畨塵世從前諳盡江湖味聼商歌歸興千里露侵宿酒疎簾淡月照人無寐貂裘換酒寓賀新郎乙未冬別馬可久笛喚春風起向湖邊臘前折柳問君何意孤負梅花立晴晝一舸凄涼雪底但小閣琴棋而巳佳客清朝留不住為康廬只在家窗裏湓浦去兩程耳草堂舊日談經地更從容南山北水庾樓重倚萬巻心胷幾今古牛斗多年紫氣正江上風寒如此且趂霜天鱸魚好把貂裘換酒長安市明夜去月千里淮甸春寓念奴嬌丙申嵗游髙沙訪淮海迹短髯懐古更文遊臺上秋生吟興聞説坡仙來把酒月底頻留清影極目平蕪孤城泗水畫角西風勁曲欄猶在十分心事誰領詞巻空落人間黄樓何處回首愁深省斜照寒鴉知幾度夢想當年名勝只有山川曽窺翰墨彷彿餘風韻舊遊休問柳花淮甸春冷如此江山寓齊天樂西風揚子江頭路扁舟雨晴呼渡岸隔瓜洲津横蒜石揺盡波聲千古詩仙一去但對峙金焦斷磯青樹欲下斜陽長淮渺渺正愁予中流笑與客語把貂裘為浣半生塵土品水烹茶看碑憶鶴恍似舊曽遊處聊憑陸諝問八極神遊肯重來否如此江山更蒼煙白鷺釣船笛寓好事近載酒岳陽樓秋入洞庭深碧極目水天無際正白蘋風急月明不見宿鷗驚醉把玉欄拍誰解百年心事恰釣船横笛廣寒秋寓鵲橋仙杯行將半月來猶未瀟灑水亭無暑清宵數客一欄秋對氷雪荷花似語雄邊臺上文遊臺上咫尺紅雲容與天風吹送廣寒秋正畫舸湖光佳處月當窗寓霜天曉角看朱成碧曽醉梅花側相遇匆匆相别又爭似不相識南北千里隔幾時重見得最苦子規啼處一片月當窗白山漸青寓長相思山無情水無情楊柳飛花春雨晴征衫長短亭擬行行重行行吟到江南第幾程江南山漸青碧雲深寓憶秦娥風凄凄井欄絡緯驚秋啼驚秋啼涼侵好夢月正樓西巻簾望月知心誰關河空隔長相思長相思碧雲暮合有美人兮東仙寓沁園春馮可遷號予為東仙故賦東澤先生誰説能詩興到偶然但平生心事落花啼鳥多年盟好白石清泉家近宫亭眼中廬阜九疊屏開雲錦邊出門去且掀髯大笑有釣魚船一絲風裏嬋娟愛月在滄浪上下天更叢書觀遍筆牀靜晝蓬窗睡起茶竈疎煙黄鶴來遲丹砂成未何日風流葛稚川人間世聼江湖詩友號我東仙南浦月寓㸃綘唇賦瀟湘漁父來剪蓴絲江頭一陣鳴蓑雨孤篷歸路吹得蘋風暮短髪蕭蕭笑與沙鷗語休歸去玉龍嘶處邀月過南浦沙頭雨寓㸃綘唇帶醉歸時月華猶在吹簫處曉愁情緒忘却匆匆語客裏風霜詩鬢空如許江南去岸花迎艣遥隔沙頭雨花自落寓謁金門春寂寞簾底蕙爐煙薄聼盡歸鴻書怎託相思天一角象筆鸞牋間却秀句與誰商畧睡起愁懐何處著無風花自落垂楊碧寓謁金門花半濕睡起一窗晴色千里江南真咫尺醉中歸夢直前度蘭舟送客雙鯉沉沉消息樓外垂楊如此碧問春來幾日欄干萬里心寓憶王孫小樓柳色未春深湘月牽情入苦吟翠袖風前冷不禁怕登臨幾曲闌干萬里心杏梁燕寓解連環小樓春淺記鈎簾看雪袖粘芳片似不似柳絮因風更細與品題屢呵氷硯宛轉吟情縱真草鳳牋都徧到燈前笑謔酒祓峭寒移盡更箭而今柳陰滿院却花空雪似人隔春逺歎萬事流水斜陽謾嬴得前詩醉汙團扇脉脉重來算唯有畫欄曽見把千種舊愁付與杏梁語燕比梅寓如夢令深夜沉沉尊酒酒醒客衾寒透城角挾霜飛吹得月如清晝僝僽僝僽比著梅花誰痩月上瓜洲寓相見懽南徐多景樓作江頭又見新秋幾多愁塞草連天何處是神州英雄恨古今淚水東流唯有漁竿明月上𤓰洲月底修簫譜寓祝英臺近闃乙未之秋髙郵朱史君錢塘北舟中客西湖聼夜雨更向别離處小小船窗香雪照尊俎斷腸一曲秋風行雲不語總寫入征鴻無數認眉嫵喚醒巖壑風流丹砂有竒趣羞殺秦郎淮海謾千古要看自作新詞雙鸞飛舞趂月底重修簫譜一絲風寓訴衷情泊松江作卧虹千尺界湖光冷浸月茫茫當日三髙何處漁唱入凄涼人世事縱軒裳夢黄粱有誰蓑笠一釣絲風吹盡荷香憶蘿月寓清平樂作客盱江秋夜鼓琴思故山新涼窗戶間對琴言語彈到無人知得處兩袖五湖煙雨坐中斗轉參横珠躔碎落瑶觥憶著故山蘿月今宵應為誰明宋謙父名自遜號壺山南昌人文筆髙絶當代名流皆敬愛之其詞集名漁樵笛譜驀山溪自述壺山居山未老心先懶愛學道人家辦竹几蒲團茗椀青山可買小結屋三間開一逕俯清溪修竹裁教滿客來便請隨分家常飯若肯小留連更薄酒三杯兩琖吟詩度曲風月任招呼身外事不關心自有天公管沁園春送戴石屏歸去來兮田園將蕪云胡不歸既有詩千首如斯者少行年七十從古來稀地缺東南天傾西北人事何緣有足時江湖上轉不如前日步步危機石屏自有柴扉占海岸潮頭伴一磯喚綵衣孫子攜壺挈榼白頭翁媪舉桉齊眉身外聲名世間夢幻萬事一酲無是非書來徃都不須長語直寫心期賀新郎題雪堂喚起東坡老問雪堂幾畨興廢斜陽衰草一月有錢三十塊何苦抽身不早又底用北門摛藻儋耳蠻煙添老色和陶詩翻被淵明惱到底是忘言好周郎英發人間少謾依然烏鵲南飛山髙月小嵗月堂堂畱不住此世何時是了算不滿英雄一笑我有豐淮千斗酒把新愁舊恨都傾倒三弄笛楚天曉又七夕靈鵲橋初就記迢迢重湖風浪去年時候嵗月不畱人易老萬事茫茫宇宙但獨對西風搔首巧拙豈關今夕事奈癡兒騃女流傳謬添話柄柳州柳道人識破灰心久只好風涼月佳時疎狂如舊休笑雙星經嵗别人到中年巳後雲雨夢可曽常有雪藕調氷花熏茗正梧桐雨過新涼透且隨分一杯酒滿江紅秋感舉扇西風又十載重遊秋浦對舊日江山錯愕鬢絲如許世事興亡空感慨男兒事業誰堪數被老天開眼看人忙成今古江上路喧鼙鼓山中地紛豺虎謾乾坤許大著身何處名利等成狂夢寐文章亦是閒言語頼雙投酒熟蟹螯肥忘羇旅西江月自述何敢笑人干禄自知無分彈冠只將貧賤博清閒留取書遮老眼世上風波任險門前路徑須寛心無忘想夢魂安萬事鶴長鳬短王子文名埜號潛齋西河天下事問天怎忍如此陵圖誰把獻君王結愁未巳少豪氣槩總成塵空餘白骨黄葦千古恨吾老矣東遊曽弔淮水綉春臺上一廻登一廻揾淚醉歸撫劔倚西風江濤猶壯人意只今袖手野色裏望長淮猶二千里縱有英心誰寄近新來又報兵塵起絶域張騫歸來未曹西士名豳號東畎西河和王潛齋韻今日事何人弄得如此漫漫白骨蔽川原恨何日巳關河萬里寂無煙月明空照廬葦謾哀痛無及矣無情莫問江水西風落日慘新亭幾人墮淚戰和何者是良籌扶危但看天意只今寂寞藪澤裏豈無人髙卧閭里試問安危誰寄定相將有詔催公起須信前書言猶未李俊明名昻英號文溪摸魚兒送王子文知太平州怪朝來片紅初痩半分春事風雨丹山碧水含離恨有脚艷陽難駐芳草渡似呌住東君滿樹黄鸝語無端杜宇報采石磯頭驚濤屋大寒色要春䕶陽關唱畫鷁徘徊東渚相逢知又何處摩挱老劔雄心在對酒細評今古君此去幾萬里東南隻手擎天柱長生夀母更穩坐安輿三槐堂上好看綵衣舞趙用父名以夫號虛齋賀新郎餞鄭金部去國載酒陽關去正西湖連天煙草滿堤晴絮采翠擷芳遊治處應和嬌絃艷鼔看柳外畫船無數萬頃琉璃渾鏡淨陡風波洶洶魚龍舞談笑裏遽如許流觴滿引澆離緒便東西斜陽立馬綠波南浦自是蓴鱸髙興動恰聼春山杜宇謾回首軟紅香霧咫尺佳人千里隔望空江明月横洲渚清夢斷恨如縷黄子魯名師參號魯菴三山人白石先生之子沁園春餞金部去國谷口髙人偶泝明河近尺五天見紫霄宫闕空中突兀玉皇姬侍雲裏蹁躚滴露研朱披肝作紙細寫靈均孤憤篇排雲呌奈大鈞不管沙界三千語髙天上驚傳早斥去人間伴謫仙念赤城丹籍香名空在蓬萊弱水欲到無緣還倚枯槎飄然歸去回首清都若箇邊家山好有一灣風月小小漁船潘庭堅名牥號紫巖乙未探花以氣節聞於時南鄉子題南劒州妓館生怕倚闌干閣下溪聲閣外山惟有舊時山共水依然暮雨朝雲去不還應是躡飛鸞月下時時整佩環月又漸底霜又下更闌折得梅花獨自看吳毅甫名潛號履齋嘉定丁丑狀元有履齋詩餘行於世滿江紅送李御帶琪紅玉階前問何事翩然引去湖海上一汀鷗鷺半㠶煙雨報國無門空自怨濟時有策從誰吐過垂虹亭下繫扁舟鱸堪煮拚一醉留君住歌一曲送君路徧江南江北欲歸何處世事悠悠渾未了年光冉冉今如許試舉頭一笑問青天天無語又齊山綉春臺十二年前曽上到綉春臺頂雙脚健不煩笻杖透巖穿嶺老去漸消狂氣習重來依舊佳風景想牧之千載尚神遊空山冷山之下江流水江之外淮山暝望中原何處虎狼猶梗勾蠡規模非淺近石符事業真俄頃問古今宇宙竟如何無人省又金陵烏衣園柳帶榆錢又還過清明寒食天一笑滿園羅綺滿城簫笛花樹得晴紅欲染逺山過雨青如滴問江南池館有誰來江南客烏衣巷今猶昔烏衣事今難覓但年年燕子晩煙斜日抖擻一春塵土債悲涼萬古英雄迹且芳樽隨分趂芳時休虚擲水調歌頭送吳叔永文昌才惜季方去又更别元方驚心天上雙鳳接翅下髙岡萬里瞿塘煙浪一片昭亭雲月渺渺正相望夜雨連風壑此意獨凄涼杜鵑聲猶不住攪離腸黄雞白酒吾亦歸興動家鄉人事紛紛難料世事悠悠難説何處問穹蒼肯落兒曹淚一笑付滄浪賀新郎送吳叔季侍郎説著成凄楚正塵飛岷峨灧澦嘷狐舞頗牧禁中留不住彈壓征西幕府便一舸月汀煙渚四塞三關天様險問何人自闢鼪鼯路成敗事幾今古荼䕷芍藥春將暮最無情飄零柳絮攪人離緒屈指秋風吹鴈訊應憶西湖夜雨謾嵗月消磨如許上下四方男子志肯臨岐昵昵兒曹語呼大白為君舉又吳中韓氏滄浪亭和吳夢窗韻撲盡征衫氣小夷猶樽罍杖屨踏開花事解后山翁行樂處何似烏衣舊里歎荒草舞臺歌地百嵗光隂如夢斷算古今興廢都如此何用灑兒曹淚江南自有漁樵隊想家山猿愁鶴怨問人歸未寄語寒梅休放盡留取三花兩蘂待老子領些春意皎皎風流心自許儘何妨痩影横斜水煩翠羽伴醒醉又用趙用父左司韻送鄭宗丞又是春殘去倚東風寒雲淡日墮紅飄絮燕社鴻秋人不問儘管吳笙越鼓但短髮星星無數萬事惟消彭澤醉也何妨袖巻長沙舞身與世只如許闌干拍手閒情緒便明朝蒼煙白鷺北山南渚笑指午橋橋畔路簾幕深深院宇尚趂得柳煙花霧我亦故山猿鶴怨問何時歸棹雙谿渚歌一曲恨千縷又寄趙南仲煙樹𤓰洲岸望旌旗獵獵遙空故人天逺不似沙鷗飛得渡直到雕鞍側畔但徙倚危闌目斷自古鍾情須我輩况人間萬事思量遍濤似雪風如箭揚州十里珠簾捲想桃根桃葉依稀舊家庭院誰把青紅吹到眼知有醉翁局段便回首舟移帆轉渺渺江波愁未了正淮山日暮雲撩亂閣酒盞倚歌扇又春感笑口開能幾把年年芳情冶思總抛閒裏桃杏枝頭春才半寒食清明又是但嵗月飇飛川逝回首秦樓雙燕語到如今目斷斜陽外將徃事試重記香羅尚有相思淚笑人生新愁易積舊歡難繼水上流紅無覓處還隔關山萬里但嬴得新來憔悴昨夜東風顛狂後想餘芳盡是飄零底詞寫就倩誰寄滿庭芳春感漠漠春陰疎疎春雨鵓鳩喚起春眠小園人靜獨自倚鞦韆又見飄紅墮雪芳徑裏都是花鈿年年事閒愁閒悶挂在緑楊邊尋思都徧了功名竹帛富貴貂蟬但身為利鎻心被名牽爭似依山傍水數椽外二頃良田無縈絆炊粳釀秫長是好花天酹江月梅花曉來窗外正南枝初放兩花三蘂千古春風頭上立羞退穠桃繁李姑射神遊夀陽粧褪色界塵都洗竹扉松戶平生所寄聊耳堪笑强説和羮此君心事指髙山流水隴驛凄涼却怕被哀角城頭吹起此處關情為他凝佇淡月清霜裏巡簷何事嵗寒相誓而巳又暇日登新樓望揚州於雲煙縹緲之間寄趙南仲端明半空樓閣把江山圖畫一時收拾白鳥孤飛飛盡處最好暮天秋碧萬里西風百年人事謾倚闌干拍凝眸何許揚州煙樹歴歴應念老子年來浮名浮利巳作虚空擲三徑才尋歸活計又是飄零為客回首平生驚心雙鬢容易成悽惻尊前一笑且由醉㡌欹側聲聲慢和吳夢窗賦梅挨晴拶暖載酒呼朋夷猶東圃西園緑萼枝頭兩三初破輕寒平生自甘寂寞占冷妝不為人妍林逋去問影疎香暗誰賦其間空想故山竒事正煙横嶺曲月浸溪灣杏錯桃訛那時青子都圓惟饒夢窗知處對翠禽依約神仙休引角怕征人淚落塞邊王實之名邁號臞軒莆陽人丁丑第四人及第賀新郎呈劉後村時自桂林被召到莆又遭煩言出了羅浮洞有多情梅花雪片殷勤相送見説翛然琴鶴外詩壓牛腰較重又管甚羣兒嘲弄嶺海三年持翠節料無時不作家山夢馳玉勒歸金鳳金鳳池乃所居也一門朱紫環昆仲看堦庭森森蘭玉慈顔歡動宰相時來須著做且舞萊衣侍奉却不信大才難用時事多艱人物少便中興誰辨浯溪頌更大厦要梁棟又為後村母夫人夀瓔珞珠垂縷看花冠端容麗服補陀巖主只坐塵縁蹉一念朱紫叢中得度人世福夫人兼五銀鹿諸孫來定省對金屏綉幕輝雲母人頂禮柳行路所居地名柳行朝朝口誦琅函句覺從來夀仁福善老天無誤消得天恩封福國錦誥鸞翔鳳舞聼來歲日邊佳語上殿肩輿簾慼綉遣佳兒扶掖天應許笑陳媪三題柱有陳夫人者題閩帥㕔柱云嘗侍父從夫及就養三至此廨又送趙伯泳侍郎守温陵憶昔同時召正青山親提玉尺量材廊廟當日班行比元祐北玉西珠照耀一轉首宫商移調君自烏臺登騎省覺精神風采増清峭數賢者一不肖酒酣耳熱惟長嘯便翩翩輟班荷槖一麾閩嶠堪笑狂生無用處垂老雲耕月釣這富貴非由人要疇昔評君如玉雪好翛然琴鶴風塵表清獻後又有趙又丁未守邵武宴同官此是河清宴覺朝來薰風滿入生綃團扇太守愁眉才一展且喜街頭米賤也莫管官租難辦遶砌苔錢無限數更蓮池雨過珠零亂儘買得凌波靣家山樂事真堪羡記年時荔支新熟荷筩齊勸底事來尋蕉鹿夢嬴得乾忙似箭笑富貴都如郵傳做了豐年還百姓便蓴鱸歸興催張翰看卿等上霄漢摸魚兒閩漕王㓜學作碧灣丹嶂堂歌此詞以墨本見寄依韻和之昔元城一生清峭南都髙卧堅壁留耕便是元城様何肯枉吾尋尺曽直筆説社稷安危屢叩龍墀額明時逐客却惠顧丹山來持翠節對此一灣碧澄清暇無奈登臨有癖梅山時訪仙迹神仙偏喜公心事一見莞然前席閑不得有先見蓍龜消得君王憶天閽不隔要濟險孤舟支傾一柱公外向誰覓沁園春迎方右史徳潤首尾四年臺省好官都做一回便前頭更有合當做底何妨且恁猛省歸來甲第新成開尊行樂脆管繁絃十二釵回頭笑這狂生無用削盡官階狂生真箇狂哉潑性氣年來全未灰有龍鱗鳳翼不能攀附牛衣漁具早巳安排爛煮園蔬熟煨山芋白髮蒼顔窮秀才官休做莫狂無處著送去瓊崖念奴嬌熙春臺宴同官層臺雲外閲古今多少興衰成敗老木千章若箇是南國甘棠遺愛羣籟號風繁陰蔽日有此清涼界賔朋在坐朗然心目明快更向㑹景亭前登髙弔古此景何人㑹嵗嵗春來春又去獨有靈臺春在早稻炊香晩禾揺穗管取三登泰釀成春酒把杯行樂須再方千里三衢人盡和美成詩過秦樓春思柳灑鵝黄草揉螺黛院落雨㾗才斷蜂鬚霧濕燕觜泥融陌上細風頻扇多少艷景關心長苦春光疾如飛箭對東風忍負西園清賞翠深香逺空暗憶醉走銅駝閒敲金鐙倦跡素衣塵染因花瘦覺為酒情鍾緑鬢幾畨催變何况逢迎向人眉黛供愁嬌波回倩料相思此際濃似飛紅萬㸃風流子憶别河梁携手别臨岐語共約踏青歸自雙燕再來斷無音信海棠開了還又參差料此際笑隨花便回醉騁錦障泥不憶故園粉愁香怨忍教華屋緑慘紅悲萬家歌舞地生疎久塵暗鳳縷羅衣何限可憐心事難訴歡期但兩㸃愁蛾才開重斂幾行清淚欲制還垂爭表為郎憔悴相見方知訴衷情旅思一鈎新月淡於霜楊柳漸分行征塵厭堆襟袂雞唱促晨裝淮水濶楚山長暗悲傷重陽天氣盃酒黄花還寄他鄉劉靜甫名清夫居麻沙念奴嬌武夷詠梅亂山深處見寒梅一朶皎然如雪的皪妍姿羞半吐斜映小窗幽絶玉染香腮酥凝冷艷容態天然别故人雖逺對花誰肯輕折疑是姑射神仙幔亭宴罷迤邐停瑶節愛此溪山供秀潤飽翫洞天風月萬石叢中百花頭上誰與爭潔麄桃俗李不須連夜催發沁園春詠劉篁㟳碧蓮時内子將誕淺碧芙蓉素艷亭亭前身阿嬌記湘濵露冷酥容倍潔華清水滑酒暈全消瑤剪豐肌雲翻碎萼白羽鮮明時自揺風流處是古香幽韻時度鮮飇瓊枝璧月清標對千朶嬋娟傾翠瓢况水晶臺榭低迷淨緑氷霜詞調隱約輕橈細認金房鍾竒孕秀巳覺青衿横素腰西風晩看花開十丈玉井非遙金菊對芙蓉沙邑宰綰琴妓用舊韻戲之淺拂春山慢横秋水玉纎閒理絲桐按清冷繁露淡竚悲風素絃瑶軫調新韻顫翠翹金簇芙蓉疊蠲重鎻輕挑慢摘特地情濃泛商刻羽無窮似和鳴鸞鳳律應雌雄問髙山流水此意誰同箇中只許知音聼有茂陵車馬雍容晝簾人靜琴心三疊時倒金鍾水調歌頭殘臘捲愁去春至莫閒愁榮枯㑹有成説無處著機謀身世石中敲火富貴草頭垂露何用苦貪求三尺布衣劒千載赤松遊憶親朋方丱角總白頭羊腸世路巇嶮莫莫且休休選甚范侯髙爵遮莫陶公鉅産爭似五湖舟萬事付蝸角止坎謾乗流玉樓春柳梢緑小眉如印乍暖還寒猶未定惜花長是為花愁殢酒却嫌添酒病蠅頭蝸角都休競萬古豪華同一盡東君曉夜促歸期三十六畨花逓信花菴詞選續集巻九
