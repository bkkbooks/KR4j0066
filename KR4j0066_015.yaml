body:
  text: 花菴詞選續集卷五宋黃升撰宋詞劉德修名光祖號後溪蜀之名士有鶴林文集小詞附焉鵲橋仙留别相逢一笑又成相避南鴈歸時霜透明朝人在短亭西看舞袖雙雙行酒歌聲此處秋聲何處幾度亂愁搔首如何不寄一行書有萬緒千端别後昭君怨别恨人在醉鄉居住記得舊曾來去疏雨聼芭蕉夢魂遙惆悵栁煙何處目送落霞江浦明夜月當樓照人愁江城子梅花十分雪意却成霜莫雲黃月微茫只有梅花依舊吐幽芳還喜無邉春信漏疏影下覓浮香才清端是紫薇郎别鵷行憶宫墻夜半胡為人與月交相君合召歸吾老矣月隨去照西廂洞仙歌荷花晚風收暑小池塘荷淨獨倚胡床酒初醒起徘徊時有香氣吹來雲藻亂葉底遊魚動影空擎承露蓋不見氷容惆悵明粧曉鸞鏡後夜月涼時月淡花低幽夢覺欲慿誰省且應記臨流憑闌干便遙想江南紅酣千頃長相思别意玉樽涼玉人涼若聼離歌須斷腸休教成鬢霜畫橋西畫橋東有淚分明清漲同如何留醉翁水調歌頭旅思客夢一回醒三度碧梧秋仰看今夕天上河漢又西流早晚涼風過鴈驚落空階一葉急雨閙清溝歸計休令莫宵露浥征裘古來今生老病許多愁那堪更説無限功業鏡中羞只有青山髙致對此還論世事舉白與君浮送我一杯酒誰起舞涼州臨江仙春思小院回廊春寂寂晚來獨自間行畫簾東畔碧雲生也知無雨空滴枕邉聲一簇小桃開又落低頭拾取紅英東風相送忘相迎梨花寒食到得錦官城又自詠我似萬山千里外悠然一片歸雲官銜猶自帶云云誰知於進士已是故將軍間坐間行間飲酒間拈間字間文諸公留我笑紛紛一枝簪寶髻六幅舞羅裙踏莎行春暮掃徑花零閉門春晚恨長無奈東風短起來消息探荼䕷雪條玉蘂都開遍晚月魂清夕陽香逺故山别後誰拘管多情於此更情多一枝嗅罷還重撚醉落魄春日懷故山春風開者一時還共春風謝栁條送我今槐夏不飲香醪辜負人生也曲塘泉細幽琴寫胡床滑簟應無價日遲睡起簾鈎挂何不歸歟花竹秀而野李子大名洪家世同登桂籍躋膴仕號淮甸儒族子大其弟漳泳泉浙皆以文鳴有李氏花萼詞五卷其姪直倫為之序廬陵人念奴嬌曉起觀落梅麗譙吹角漸疏星明淡簾篩殘月嫋嫋霜飇欺翠袖飛下一庭香雪半面粧新回風舞困此况真竒絶桄榔林裏蘇仙偏感華髮休怨時暫飄零玉堂清夢不惹間蜂蝶好似王家叢竹畔乘興山陰時節剪水無情閬風歸去忍使芳心歇和羮有待恁時身到天闕李子清名漳鵲橋仙七夕迢迢郎意盈盈妾恨今夕鵲橋欲度世間兒女一何癡鬭乞巧紛紛無數遙知此際有人孤坐心切天街雲路好因緣是惡因緣夢魂逺陽臺雨暮桃源憶故人閨情小樓簾捲闌干外花下朱門半啓中有傾城佳麗一笑西風裏盈盈臨水情難致盡日相看如醉乾鵲不知人意只管聲聲喜李子永名泳賀新郎感舊門掩長安道捲重簾垂楊散暑嫩涼生早午夢驚回庭陰翠蝶舞鶯吟未了政露冷芙蓉池沼金鴈塵昏么絃斷理餘音尚想腰支裊歡漸逺思還繞臨臯望極滄江渺晚潮平湘煙萬頃斷虹殘照綵舫凌波分飛後别浦菱花自老問錦鯉何時重到樓逈層城看不見對瀟瀟暮雨憐芳草幽恨濶楚天杳李子召名泉滿庭芳送張守漢卿赴召麥秀連雲桑枝重緑史君佳政流傳鳳銜丹詔來自九重天千里歡騰祖帳棠隂外多少攀轅津亭路紞如五鼓難駐鄧侯船光華家世事門中列戟圯上遺編况建炎勳業圖畫凌煙此去朝端濟美看平步兩兩台躔須知道中興盛治主聖賴臣賢李子秀名淅踏莎行送新城交代李達善紅藥香殘緑筠粉嫩春歸何處尋春信繡鞍初上馬蹄輕舉頭便覺長安近别酒無情啼粧有恨山城向晚斜陽褪清江極目帶寒煙錦鱗去後慿誰問劉改之名過太和人稼軒之客王簡卿侍郎嘗贈以詩云觀渠論到前賢處據我看來近世無其詞多壯語蓋學稼軒者也號龍洲道人賀新郎懷舊老去相如倦問文君説似而今怎生消遣衣袂京塵曾染處空有香紅尚軟料彼此魂銷腸斷一枕新涼眠客舍聼梧桐疏雨秋聲顫燈暈冷記初見樓低不放珠簾捲晚粧殘翠鈿狼藉淚痕凝臉人道愁來須殢酒無奈愁深酒淺但寄興焦琴紈扇莫鼓琵琶江上曲怕荻花楓葉俱悽怨雲萬疊寸心逺又逰西湖睡覺啼鶯曉醉西湖兩峰日日買花簪帽去盡酒徒無人問惟有玉山自倒任拍手兒童爭笑一騎乘風翩然去避魚龍不見波聲悄歌韻逺喚蘇小神仙路近蓬萊島紫雲深參差禁樹有煙花繞人世紅塵西障日百計不如歸好付樂事與它年少費盡柳金梨雪句問沉香亭北何時召心未愜鬢先老又贈張彥功曉印霜花步夢半醒扶上雕鞍馬嘶人去嵐溼青絲雙轡冷緩鞚野梅江路聼畫角吹殘更鼓悲壯寒聲撩客恨甚貂裘重擁愁無數霜月白照離緒青樓回首家何處早山遙水闊天低斷腸煙樹誰念天涯牢落况輕負暖雲濃雨記酒醒香銷時語客裏歸韀須早發怕天寒風急相思苦應為我翠眉聚又多病劉郎瘦最傷心天寒嵗晚客它鄉久大舸翩翩何許至元是髙陽舊友便一笑相歡携手為問武昌城下月定何如揚子江頭栁追往事兩眉皺燭花細剪明于晝喚青娥小紅樓上殷勤勸酒昵昵琵琶恩怨語春笋輕攏翠袖看舞徹金叉微澑若見故鄉吾父老道長安市上狂如舊重會面幾時又念奴嬌自述知音者少算乾坤許大著身何處直待功成方肯退何日可尋歸路多景樓前垂虹亭下一枕眠秋雨虛名相誤十年枉費辛苦不是奏賦明光獻書北闕無驚人之語我自匆忙天未許嬴得衣裾塵土白璧堆前黃金買笑付與君為主蓴鱸江上浩然明日歸去糖多令再過武昌蘆葉滿汀洲寒沙帶淺流二十年重度南樓栁下繫船猶未穩能幾日又中秋黃鶴斷磯頭故人曾到不舊江山都是新愁欲買桂花重載酒終不似少年逰水調歌頭春半春事能幾許密葉著青梅日髙花困海棠風暖想都開不惜春衣典盡只怕春光歸去片片點蒼苔能得幾時好追賞莫徘徊雨飄紅風換翠苦相催人生行樂且須痛飮莫辭杯坐則髙談風月醉則恣眠芳草醒後亦佳哉湖上新亭好何事不曾來又自述弓劒出榆塞鉛槧上蓬山得之渾不費力失亦匹如間未必古人皆是未必今人俱錯世事沐猴冠老子不分别內外與中間酒須飲詩可作指休彈人生行樂何自催得鬢毛斑逹則牙旗金甲窮則蹇驢破帽莫作兩般看世事只如此自有識梟鸞天仙子初赴省别妾别酒醺醺渾易醉回過頭來三十里馬兒不住去如飛牽一憩坐一憩斷送殺人山共水是則青衫終可喜不道恩情拚得未雪迷村店酒旗斜去則是住則是煩惱自家煩惱你沁園春風雪中欲詣稼軒久寓湖上未能一往因賦此詞以自解斗酒彘肩風雨渡江豈不快哉被香山居士與林和靖約坡仙等勒駕豫回坡謂西湖正如西子淡粧濃抹臨照臺二公者皆掉頭不顧只恁傳杯白云天竺去來看金璧崔嵬樓觀開況一澗縈迂東西水繞兩山南北髙下雲堆逋曰不然暗香浮動何似孤山先放梅晴須去訪稼軒未晚且此徘徊劉叔擬名仙倫廬陵人自號招山有詩集行於世樂章尤為人所膾炙吉州刋本多遺落今以家藏善本選集賀新郎壽王侍郎簡卿小隊停鉦鼓向沙邉栁下維舟慶公初度平盡羣蠻方易鎮此事多應有數奈自古功成人妬君看樂羊中山役任謗書盈篋終無據千載下竟誰與詩中帶得西山雨指天台鴈蕩歸歟壽鄉深處緩急朝廷須公出更作中流砥柱笑癡騃紛紛兒女多少人間不平事有皇天老眼能區處揮玉斚聽金縷又題吳江重喚松江渡嘆垂虹亭下銷磨幾畨今古依稀四橋風景在為問坡仙甚處但遺愛沙邉鷗鷺天水相連蒼茫外更碧雲去盡山無數潮正落日還暮十年到此長凝佇恨無人與共秋風鱠絲蓴縷小轉朱絃彈九奏擬致湘妃伴侣俄皓月飛來煙渚恍若乘槎河漢上怕客星犯斗蛟龍怒歌欵乃過江去又洪守席上詠牡丹翠蓋籠嬌面記當年沉香亭北醉中曾見見了風流傾國艷紅紫紛紛過眼算好處何嫌春晚誰把天香和曉露倩東風特地勻芳臉千萬朵一時遍隔花聼取提壺勸道此花過了春歸蝶愁鶯怨挽住東君須醉倒花底不妨留戀待喚取笙歌一片最愛就中紅一朵似狀元得意春風殿還惹起少年眼又贈建康鄭玉脫籍鄭玉非娼女嘆塵緣未了飄零被春留住腸斷胭脂坡下路成甚心情意緒生怕入梨園歌舞寂寞陽臺雲雨散算人間誰是吹簫侣空買斷兩眉聚新來鏡裏驚如許暗傷懷鶯老花殘幾畨春莫事逐孤鴻都已往月落千山杜宇念修竹天寒何處不念瑣窗并繡户妾從前命薄甘荆布誰為作解絛主念奴嬌送張明之赴京西幕艅艎東下望西江千里蒼茫煙水試問襄州何處是雉堞連雲天際叔子殘碑卧龍陳迹遺恨斜陽裏後來人物如君瓌偉能幾其肯為我來邪河陽下士正自強人意勿謂時平無事也便以言兵為諱眼底山河樓頭鼓角都是英雄淚功名機會要須間暇先備又感懷呈洪守吳山青處悵長安路斷黃塵如霧荆楚西來行塹逺北過淮堧嚴扈九塞貔貅三關虎豹空作陪京固天髙難呌若為得訴忠語追念江左英雄中興事業枉被姦臣誤不見翠華移蹕處枉負吾皇神武擊楫慿誰問籌無計何日寬憂顧倚笻長嘆滿懷清淚如雨又長沙趙帥席上作西風何事為行人掃蕩煩襟如洗熏漲蒸瀾都卷盡一片瀟湘清泚酒病驚秋詩愁入鬢對景人千里楚宫故事一時分付流水江上買取扁舟排雲湧浪直過金沙尾歸去江南丘壑處不用來尋月姊風露杯深芙蓉裳冷笑傲煙霞裏草廬如舊卧龍知為誰起滿江紅題快閣和徐宰韻快閣東西鷗邉問晚晴可喜鷗解語既盟之後兩翁曾倚笛弄慣聽黃魯直履聲深識徐淵子添我來相對兩忘機真相似也不種間桃李也不玩佳山水有新詩字字愛民而已一片心間秋月外三年人在春風裏漲一篙江水送歸鴻明朝是又春曉著意留春留不住春歸難戀最苦是梅天煙雨麥秋庭院嫩竹濃陰鶯出谷柔桑采盡蠶成繭奈沈腰寬盡有誰知難消遣幽閣恨雙眉斂香箋寄飛鴻逺向風簾羞見一雙歸燕翠被間將情做夢青樓賺得恩成怨對尊前莫惜喚瓊姬持杯勸木蘭花幔秋日海棠漸秋空向晚被風雨趲重陽正木落疏林海棠枝上忽見紅粧料應妬它蘭菊甚年年獨自占秋光故把春風嬌面向人逞艷呈芳看來畢竟此花強秪是欠些香俏一似當年五陵公子却厭膏粱肯來水邉竹下與幽人相對説凄涼只恐夜深花睡五更微有清霜霜天曉角題蛾眉亭倚空絶壁直下江千尺天際兩蛾凝黛愁與恨幾時極暮潮風正急酒醒聞塞笛試問謫仙何處青山外逺煙碧訴衷情客中征衣薄薄不禁風長日雨絲中又是一年春事花信到梧桐雲漠漠水溶溶去匆匆客懷今夜家在江西身在江東江神子洪守出歌姬就席口占華堂深處出娉婷語聲輕笑聲清燕語鶯啼一一付春情恰似洛陽花正發見花好不知名金甌盛酒玉纖擎滿盈盈勸深深不怕主人教你十分斟只怕酒闌歌罷後人不見暮山青繫裙腰愁别山兒矗矗水兒清船兒似葉兒輕風兒更沒人情月兒明厮合造送行人眼兒蓛蓛淚兒傾燈兒更冷青青遭逢著鴈兒又沒前程一聲聲怎生得夢兒成詞狷薄而意優柔永遇樂春莫有懷青幄蔽林白氊鋪徑紅雨迷楚晝閣關愁風簾捲恨盡日縈情緒陽臺雲去文園人病寂寞翠尊雕爼惜韶容匆匆易失芳叢對眼如霧巾欹潤裛衣寬涼滲又覺漸回驕暑解籜吹香遺丸薦脆小芰浮鴛浦畫欄如舊依稀猶記佇立一鈎蓮步黯銷魂那堪又聼杜鵑更苦菩薩鬘怨别吹簫人去行雲杳香篝翠被都間了疊損縷金衣是他渾不知冷煙寒食夜淡月梨花下猶自軟心腸為他燒夜香又怨别東風去了秦樓畔一川煙草無人管芳樹雨初晴黃鸝三兩聲海棠花已謝春事無多也只有牡丹時知它歸不歸辭鄙意濃嚴次山名仁樵溪人詞集名清江欵乃杜月渚為之序其詞極能道閨闈之趣賀新郎寄上官偉長序云扁舟何時下滄灣孤劒尚客東楚渺渺千里寄一曲歌覩物懷人想見臨風激烈也蘭芷湘東國正愁子一江紅葉水程孤驛欲寫瀟湘無限意那得如椽彩筆但滿眼西風蕭瑟我所思兮何處所在鐔津津上滄灣側誰氏子閬風客閬風仙客才無敵賦悲秋抑揚頓挫流離沉鬱百賦千詩朝復暮解道波濤春力憶共爾乘槎吹笛八表神逰吾夢見渺洞庭青草煙波隔空悵望楚天碧又清浪軒送春碧浪搖春渚浸虛簷蒲萄滉漾翠綃掀舞委曲經過臺下路載取落花東去問花亦漂流良苦花不能言應有恨恨十分都被春風誤同此恨有飛絮人生聚散元無據儘憑欄一樽相對蘋洲春莫嫉色沖沖空悵望淚盡世間兒女君不見千金求賦飛燕媫妤今何在看粘雲江影傷千古流不去斷魂處又送杜子野赴省説到城南杜儘風流至今人號去天尺五家世聯翩蒼玉佩自有文章機杼看鸞鳳九霄軒翥文陳堂堂新得雋正少年壯氣虹霓吐拈彩筆月城去出關相送梅千樹雪連空馬蹄特特曉寒人度帝里春濃花似海吹入明光奏賦須快展亨衢濶步隨世功名真漫浪要平生所學期無負須記得别時語歸朝歡南劒雙溪樓五月人間揮汗雨離恨一襟何處去雙溪樓下碧千尋雙溪樓上匏尊舉晚涼生緑樹漁燈幾點依洲渚莫狂歌潭空月淨慘慘瘦蛟舞變化往來無定所求劒刻舟應笑汝只今誰是晉司空斗牛奕奕紅光吐我來空弔古與君同記憑欄語問滄波乘槎此去流到天河否又壽蕭禹平知縣雲表金莖珠璀璨當日投懷驚玉燕文章議論壓西雍風流姓字翔東觀紫皇嗟見晚祥麟五色留金殿大江西銅章墨綬暫爾煩君綰十二金叉扶玉盞錦瑟摐摐隨急管獸爐煙動彩雲髙秋聲拍碎紅牙板趣君歸翰苑萊衣煥爛潘輿穩任方瞳從今看到弱水波淸淺又别意朱户緑窗深窈窕閃閃華旗紅幹小相逢斜栁絆輕舟渚香不斷蘋花老西風吹夢草題詩未了還驚覺獨傷心凄涼故館月過西樓悄樓外斜河低浸斗夜巳如何夜將曉心期欲寄赤鱗魚秋雲不動秋江渺相思千里道多情直被無情惱玉臺前請君試看華髮添多少水龍吟題連州翼然亭呈歐守翼然新榜髙亭翰林鐵畫燕公手滁陽盛事何人重繼湟川太守太守謂誰文章的𣲖醉翁賢胄對千峰削翠雙溪注玉端不減琅琊秀坐嘯清香畫戟聼丁丁滴花晴漏棠陰晝寂細賡賔客竹枝楊栁只恐明朝綈封趣覲未容借冦儘江山識賞鹽梅事業煥青氊舊又題天風海濤呈潘料院飇車飛上蓬萊不須臾跨琴髙鯉剨然長嘯天風澒洞雲濤無際我欲乘桴從兹浮海約任公子辦虹竿千丈犗鈎五十親點對連鼇餌誰榜佳名空翠紫陽仙去騎箕尾銀鈎鐵畫龍拏鳯峙留人間世更憶東山哀筝一曲灑沾襟淚到而今幸有髙亭遺愛寓甘棠意又題盱江偉觀城頭傑觀崢嶸重欄下瞰蒼龍脊鏤珉盤礎雕檀竦楶玲瓏金碧華子岡頭麻源谷口神仙窟宅道至今清夜月明風冷常隱隱聞笙笛翠壁煙霞縹眇更寒泉飛空千尺數峰江上孤舟天際夕陽紅溼抖擻征塵浩然長嘯跨青鸞翼向鳯岡西望遙釃斗酒酹文章伯李泰伯墓在鳯凰山下水調歌頭上韶州方檢討時有節制之命慘淡望京闕慷慨夢天山引杯中夜看劒壯氣刷幽燕鼉鼓滿天催曙畫角連雲嘯月吹斷戍瓶煙犀角赤兔馬虎帳緑熊氊仗漢節伸大義伐可汗靑冥更下斧鉞赤子要君安鐵騎千羣觀獵宫樣十眉環座礕礰聼鳴弦莫厭兜鍪冷歸去已貂蟬木蘭花慢社日有懷東風吹霧雨更吹起夾衣寒正莽莽叢林潭潭伐鼓鬱鬱焚蘭闌干曲多少意看青煙如篆繞溪灣桑柘緑陰猶薄杏桃紅雨初翻飛花片片走潺湲問何日西還嘆擾擾人生紛紛離合渺渺悲歡想雲軿何處也對芳時應只在人間惆悵回紋錦字斷腸斜日雲山蝶戀花快閣傑閣青紅天半倚萬里歸舟更近闌干􅋈木落山寒鳬鴈起一聲漁笛滄洲尾千古文章黃太史捫蝨髙風長照氷壺裏何以薦君秋菊蘂癯瓢為酌西江水又春情院靜日長花氣暖一簇嬌紅得見春深淺風送生香來近逺笑聲只在秋千畔目力未窮腸已斷一寸芳心更逐逰絲亂朱戶對開簾捲半日斜江上春風晚鷓鴣天怨别一徑蕭條落葉深離腸凄斷月明砧征鴻送恨連雲起促織驚秋傍砌吟風悄悄夜沉沉鴛機坐冷曉霜侵挑成錦字心相向未必君心似妾心又閨思多病春來事事慵偶因撲蝶到庭中落紅萬疊花經雨斜碧千條栁困風深院宇小簾櫳幾年離别恰相逢擎觴未飮心先醉為有春愁似酒濃又别意行盡春山春事空别愁離恨滿江東三更鼓潤官樓雨五夜燈殘客舍風寒淡淡曉朧朧黃雞催斷丑時鐘紫驑嚼勒金銜響衝破飛花一道紅又惜别一曲危絃斷客腸津橋捩柂轉牙檣江心雲帶蒲帆重樓上風吹粉淚香瑶草碧栁芽黃載將離恨過瀟湘請君看取東流水方識人間别意長又春思病去那知春事深流鶯喚起惜春心桐舒碧葉慳三寸栁引金絲可一尋憐繡閣對雲岑苦無多力懶登臨翠羅衫底寒猶在弱骨離支瘦不禁又閨情髙杏酣酣出短墻垂楊裊裊蘸池塘文鴛藉草眠春畫金鯽吹波弄夕陽間倚鏡理明粧自翻銀葉炷衙香鳴鞭已過青樓曲不是劉郎定阮郎又閨情公子詩成著錦袍王家桃葉舊妖嬈檀槽摐急斜金鴈綵袖翩躚嚲翠翹沈水過懶重燒十分濃醉十分嬌復羅帳裏春寒少只恐香酥拍漸消玉樓春春思春風只在園西畔薺菜花繁胡蝶亂氷池晴緑照還空香徑落紅吹已斷意長翻恨逰絲短盡日相思羅帶緩寶奩如月不欺人明日歸來君試看阮郎歸春思腮花輕拂紫綿香瓊杯初暖粧貪憑雕檻看鴛鴦無心上繡床風絮亂恣輕狂惱人依舊忙夢隨殘雨下髙唐悠悠春夢長婆羅門引春情花明栁暗一天春色繞朱樓斷鴻聲喚人愁欲問鴻歸何處身世自悠悠正東風留滯楚尾吳頭追思舊逰歎雙鬢颯驚秋可惜等間孤了酒令花籌斷絃難續謾題詩分付東流流不到蓬島瀛洲醉桃源春景拍堤春水蘸垂楊水流花片香弄花噆栁小鴛鴦一雙隨一雙簾半捲露新粧春衫是栁黃倚欄看處背斜陽風流暗斷腸好事近舟行曉色未分明敲動月邉鼉鼓卯酒一杯徑醉又别君南浦春江如席照晴空大舶夾雙櫓腸斷斜陽渡口正落紅如雨訴衷情章貢别懷一聲水調解蘭舟人間無此愁無情江水東流去與我淚爭流人已逺更回頭苦凝眸斷魂何處梅花岸曲小小紅樓多麗記恨最無端官樓畫角輕吹一聲來深閨深處把人好夢驚回許多愁儘教奴受些箇事未必君知淚滴蘭衾寒生珠幌翠雲撩亂枕頻欹窗兒上幾條殘月斜玉界羅帷更堪聼霜摧敗葉靜扣朱扉念别離千里萬里問何日是歸期關情處魚來鴈往斷腸是兔走烏飛美景良辰賞心樂事風流孤負縷金衣謾嬴得花顔玉骨瘦損為相思歸須早劉郎雙鬢莫遣成絲一落索春懷清曉鶯啼紅樹又一雙飛去日髙花氣撲人來獨自價傷春無緒别後暗寬金縷倩誰傳語一春不忍上髙樓為怕見分携處南柯子莫春栁陌通雲徑瓊梳啓翠樓桃花紙薄漬氷油記得年時詩句為君留曉緑千層出春紅一半休門前溪水泛花流流到西川猶是故家愁菩薩鬘雙溪亭征鴻點破空雲碧丹霞染出新秋色返照落平洲半江紅錦流風清漁笛晚寸寸愁腸斷寄語笛休橫只消三兩聲嚴少魯名參自號三休昭武人沁園春自適曰歸去來歸去來兮吾將安歸但有東籬菊有西園桂有南溪月有北山薇蜂則有房魚還有穴蟻有樓臺獸有衣吾應有雲中舊隱竹裏柴扉人間征路熹微看處處丹楓白露晞看寒原衰草牛羊來下淡煙秋水鱸鱖初肥自笑平生頽然骨相只合持竿坐釣磯都休也對西風無語落日斜暉又題吳明仲竹坡竹焉美哉愛竹者誰曰君子歟向佳山水處築宫一畝好風煙裏種玉千餘朝引輕霏夕延涼月此外塵埃一點無須知道有樂其樂者吾愛吾廬竹之清也何如應料得詩人清矣乎况滿庭秀色對拈彩筆半窗涼影伴讀殘書休説龍吟莫言鳯嘯且道髙標誰勝渠君試看正繞坡雲氣似渭川圖花菴詞選續集卷五
