body:
  text: 花菴詞選卷一宋黃升輯唐詞凡看唐人詞曲當看其命意造語工緻處蓋語簡而意深所以為竒作也李太白名白號青蓮居士賀知章號之為謫仙菩薩鬘二詞為百代詞曲之祖平林漠漠煙如織寒山一帶傷心碧暝色入髙樓有人樓上愁玉階空佇立宿鳥歸飛急何處是歸程長亭連短亭憶秦娥簫聲咽秦娥夢斷秦樓月秦樓月年年柳色霸陵傷别樂遊原上清秋節咸陽古道音塵絶音塵絶西風殘照漢家陵闕清平樂令翰林應制以按唐吕鵬遏雲集載應制詞四首後二首無清逸氣韻疑非太白所作禁庭春晝鶯羽披新繡百草巧求花下鬬只賭珠璣滿斗日晚却理殘粧御前間舞霓裳誰道腰支窈窕折旋消得君王又禁闈秋夜月探金窗罅玉帳鴛鴦噴沉麝時落銀燈香灺女伴莫話孤眠六宫羅綺三千一笑皆生百媚宸遊教在誰邊清平調辭沈香亭應制古詞多只四句名花傾國兩相歡長得君王帶笑看解釋春風無限意沈香亭北倚闌干又一枝紅艷露凝香雲雨巫山枉斷腸借問漢宫誰得似可憐飛燕倚新粧又雲想衣裳花想容春風拂檻露華濃若非羣玉山頭見會向瑤臺月下逢白樂天名居易號香山居士長相思閨怨二詞非後世作者所及深畫睂淺畫睂蟬鬢鬅鬙雲滿衣陽臺行雨回巫山高巫山低暮雨瀟瀟郎不歸空房獨守時又此詞上四句皆談錢塘景汴水流泗水流流到瓜州古渡頭吳山點點愁思悠悠恨悠悠恨到歸時方始休月明人倚樓王建有宫詞百首甚工古調笑團扇團扇美人並來遮面玉顔憔悴三年誰復商量管絃絃管絃管春草昭陽路斷又蝴蝶蝴蝶飛上金花枝葉君前對舞春風百葉桃花樹紅紅樹紅樹燕語鶯啼日暮又羅袖羅袖飄舞春風已舊遙看歌舞玉樓好日新粧坐愁愁坐愁坐一世虛生虛過又楊柳楊柳日暮白沙渡口船頭江水茫茫商人少婦斷腸腸斷腸斷鷓鴣夜來失伴三臺令一名翠華引池北池南草緑殿前殿後花紅天子千秋萬歲未央明月清風又魚藻池邊射鴨芙蓉苑裏看花日色赭黃相似不著紅鸞扇遮徐昌圖木蘭花令沈檀煙起盤紅霧一翦霜風吹繡戶漢宫花面學梅粧謝女雪詩裁柳絮長垂天幕孤鸞舞旋炙銀笙雙鳯語紅窗酒病對寒氷永覺相思無夢處張志和字子同婺州金華人居江湖自稱煙波釣徒著玄真子亦以為號每垂鈎不設餌志不在魚也漁歌子五首極能道漁家之事西塞山前白鷺飛桃花流水鱖魚肥青蒻笠緑簔衣斜風細雨不須歸又青草湖中月正圓巴陵漁父棹歌連釣車子橛頭船樂在風波不用仙又松江蟹舍主人歡菰飯蓴羮亦共餐楓葉落荻花乾醉宿漁舟不覺寒又霅溪灣裏釣漁翁舴艋為家西復東江上雪浦邊風笑著荷衣不歎窮又釣臺漁父褐為裘兩兩三三舴艋舟能縱棹慣乘流長江白浪不須憂溫庭筠詞極流麗宜為花間集之冠菩薩鬘小山重疊金明滅鬢雲欲度香腮雪懶起畫蛾睂弄粧梳洗遲照花前後鏡花面交相映新著綺羅襦雙雙金鷓鴣又南園滿地堆輕絮愁聞一霎清明雨雨後却斜陽杏花零落香無言勻睡臉枕上屏山掩時節欲黃昏無聊獨倚門又翠翹金縷雙鸂鶒水文細起春池碧池上海棠梨雨晴紅滿枝繡衫遮笑靨煙草粘飛蝶青瑣對芳菲玉關音信稀又水精簾裏玻璃枕暖香惹夢鴛鴦錦江上柳如煙鴈飛殘日天藕絲秋色淺人勝參差翦雙鬢隔香紅玉叉頭上風更漏子柳絲長春雨細花外漏聲迢遞驚塞雁起城烏畫屏金鷓鴣香霧薄透簾幕惆悵謝家池閣紅燭背繡簾垂夢長君不知又玉爐香紅蠟淚偏照畫堂秋思睂翠薄鬢雲殘夜長衾枕寒梧桐樹三更雨不道離情正苦一葉葉一聲聲空階滴到明又背江樓臨海月城上角聲嗚咽堤柳動島煙昏兩行征鴈分京口路歸帆渡正是芳菲欲度銀燭盡玉繩低一聲村落雞又星斗稀鐘鼓歇簾外曉鶯殘月蘭露重柳風斜滿庭堆落花虛閣上倚闌望還似去年惆悵春欲暮思無窮舊歡如夢中清平樂令洛陽愁絶楊柳花飄雪終日行人恣攀折橋下水流嗚咽上馬爭勸離觴南浦鶯聲斷腸愁殺平原年少回首揮淚千行河傳湖上間望雨蕭蕭煙浦花橋路遙謝娘翠娥愁不銷終朝夢魂迷晚潮蕩子天涯歸棹逺春已晚鶯語空腸斷若耶溪溪水西柳堤不聞郎馬嘶韋莊西蜀宰相菩薩鬘洛陽城裏春光好洛陽才子他鄉老柳暗魏王隄此時心轉迷桃花春水緑水上鴛鴦浴凝恨對殘暉憶君君不知又人人盡説江南好遊人只合江南老春水碧於天畫船聽雨眠壚邊人似月皓腕凝霜雪未老莫還鄉還鄉須斷腸應天長緑槐隂裏黃鶯語深院無人春晝午畫簾垂金鳯舞寂寞繡屏香一縷碧天雲無定處空有夢魂來去夜夜緑窗風雨斷腸君信否清平樂令野花芳草寂寞關山道柳吐金絲鶯語早惆悵香閨暗老羅帶悔結同心獨憑朱欄思深夢覺半床斜月小窗風觸鳴琴謁金門空相憶無計得傳消息天上嫦娥人不識寄書何處覔新睡覺來無力不忍看伊書迹滿院落花春寂寂斷腸芳草碧小重山一閉昭陽春又春夜寒宫漏永夢君恩卧思陳事暗銷魂羅衣濕紅袂有啼痕歌吹隔重閽繞庭芳草緑倚長門萬般惆悵向誰論凝情立宫殿欲黃昏木蘭花令獨上小樓春欲暮望斷玉關芳草路消息斷不逢人却斂細睂歸繡户坐看落花空歎息羅袂濕斑紅淚滴千山萬水不曾行魂夢欲教何處覔薛昭藴浣溪沙握手河橋柳似金蜂鬚輕惹百花心蕙風蘭思寄清琴意滿便同春水滿情深還似酒杯深楚煙湘月兩沈沈又傾國傾城恨有餘幾多紅淚泣姑蘇倚風凝睇雪肌膚吳主山河空落日越王宫殿半平蕪藕花菱蔓滿重湖小重山春到長門春草青玉階華露滴月朧明東風吹斷紫簫聲金爐冷簾外曉啼鶯愁極夢難成殘粧和宿淚不勝情手挼裙帶繞花行思君切羅幌暗塵生又秋到長門秋草黃畫梁雙燕去出宫墻玉簫無復理霓裳金蟬墜鸞鏡掩休粧憶昔在昭陽舞衣紅綬帶繡鴛鴦至今猶惹御爐香魂夢斷愁聽漏更長謁金門春滿院疉損羅衣金線睡覺水精簾未捲簷前雙語燕斜掩金鋪一扇滿地落花千片早是相思腸欲斷忍教頻夢見牛嶠更漏子南浦情紅粉淚爭奈兩人深意低翠黛卷征衣馬嘶霜葉飛招手别寸腸結還是去年時節書託鴈夢歸家覺來江月斜菩薩鬘舞裙香暖金泥鳯畫梁語燕驚殘夢門外柳花飛玉郎猶未歸愁勻紅粉淚睂翦春山翠何處是遼陽錦屏春晝長張泌浣溪沙枕障熏爐隔繡幃二年終日兩相思杏花明月始應知天上人間何處去舊歡新夢覺來時黃昏微雨畫簾垂又翡翠屏開金幄紅謝娥無力曉粧慵錦帷鴛被宿香濃微雨小庭春寂寞燕飛鶯語隔簾櫳杏花凝恨倚東風滿宫花花正芳樓似綺寂寞上陽宫裏鈿籠金鎖睡鴛鴦簾冷露華珠翠嬌艷輕盈香雪膩細雨黃鶯雙起東風惆悵欲清明公子橋邊沈醉江城子唐詞多無換頭如此詞兩段自是兩首故兩押情字今人不知合為一首則誤矣碧闌干外小中庭雨初晴曉鶯聲飛絮落花時節近清明睡起卷簾無一事勻面了沒心情又浣花溪上見卿卿眼波明黛睂輕高綰緑雲金簇小蜻蜓好事問他來得麼還笑道莫多情毛文錫醉花間休相問怕相問相問還添恨春水滿塘生鸂鶒還相趂昨夜雨霏霏臨明寒一陳偏憶戍樓人久絶邊庭信又深相憶莫相憶相憶情難極銀漢是紅牆一帶遙相隔金盤珠露滴兩岸榆花白風搖玉佩清今夕為何夕河滿子紅粉樓前月照碧紗窗外鶯啼夢斷遼陽音信那堪獨守香閨恨對百花時節王孫緑草萋萋更漏子春夜闌春恨切花外子規啼月人不見夢難慿紅紗一點燈偏怨别是芳節庭下丁香千結宵霧散曉霞輝梁間雙燕飛牛希濟生查子春山煙欲收天淡星稀小殘月臉邊明别淚臨清曉語已多情未了回首猶重道記得緑羅裙處處憐芳草一本無已字謁金門秋已暮重疊關山岐路嘶馬搖鞭何處去曉禽霜滿樹夢斷禁城鐘鼓淚滴枕檀無數一點凝紅和薄霧翠蛾愁不語歐陽炯浣溪沙落絮殘鶯半日天玉柔花醉只思眠惹窗映竹滿爐煙獨掩畫屏愁不語斜欹瑤枕髻鬟偏此時心在阿誰邊賀聖朝憶昔花前相見後只慿纎手暗拋紅豆人前不解巧傳心事别來依舊孤負春晝碧羅衣上蹙金繡覩對對鴛鴦空裛淚痕透想韶顔非久終是為伊只恁偷瘦玉樓春日照玉樓花似錦樓上醉和春色寢緑楊風送小鶯聲殘夢不成離玉枕堪愛晚來韶景甚寶柱秦箏方再品青蛾紅臉笑來迎又向海棠花下飲菩薩鬘紅爐暖閣佳人睡隔簾飛雪添寒氣小院奏笙歌香風簇綺羅酒傾金盞滿闌燭重開宴公子醉如泥天街聞馬嘶和凝石晉宰相採桑子蝤蠐領上訶梨子繡帶雙垂椒戶間時競學樗蒲賭荔支叢頭鞋子紅編細裙窣金絲無事嚬睂春思翻教阿母疑喜遷鶯曉月墜宿雲披銀燭錦屏帷建章鐘動玉繩低宫漏出花遲春態淺來雙燕紅日漸長一線嚴粧欲罷囀黃鸝飛上萬年枝薄命女天欲曉宫漏穿花聲繚繞窗裏星光少冷霞寒侵帳額殘月光沈樹杪夢斷錦幃空悄悄強起愁眉小又一本名長命女小重山春入神京萬木芳禁林鶯語滑蝶飛狂曉桃凝露妬啼粧紅日永風和百花香煙鎖柳絲長御溝澄碧水轉池塘時時微雨洗風光天衢逺到處引笙簧顧敻河傳棹舉舟去波光渺渺不知何處岸花汀草依依雨微鷓鴣相逐飛天涯離恨江聲咽啼猿切此意向誰説倚蘭橈獨無憀魂銷小爐香欲焦一本汀草下有共字玉樓春拂水雙飛來去燕曲檻小屏山六扇春愁凝思結眉心緑綺懶調紅錦薦話别情多聲欲顫玉筯痕留紅粉面鎮長獨立到黃昏却怕良宵頻夢見浣溪沙春色迷人恨正賖可堪蕩子不還家細風輕露著梨花簾外有情雙燕揚檻前無力緑楊斜小屏狂夢繞天涯臨江仙幽閨小檻春光晚柳濃花淡鶯稀舊歡思想尚依依翠顰紅斂終日損芳菲何事狂夫音信斷不如梁燕猶歸畫堂深處麝煙微屏虛枕冷風細雨霏霏孫光憲南唐詞人浣沙溪花漸凋疏不耐風畫簾垂地晚堂空墮階縈蘚舞愁紅膩粉半粘金靨子殘香猶暖繡熏籠蕙心無處與人同一本疏作零晚作滿又攬鏡無言淚欲流凝情半日懶梳頭一庭疏雨濕春愁楊柳秪知傷怨别杏花應信損嬌羞淚沾魂斷軫離憂又輕打銀箏墜燕泥斷絲髙罥畫樓西花冠間上午牆啼粉籜半開新竹徑紅苞盡落舊桃蹊不堪終日閉深閨菩薩鬘木棉花映叢祠小越禽聲裏春光曉銅鼓雜蠻歌南人祈賽多客帆風正急茜袖偎檣立極浦幾回頭煙波無限愁又花冠頻鼓牆頭翼東方淡白連窗色門外早鶯聲背樓殘月明薄寒籠醉態依舊鉛華在握手送人歸半拖金縷衣又小庭花落無人掃疏香滿地東風老春晚信沈沈天涯何處尋曉堂屏六扇睂共湘山逺爭奈别離心近來尢不禁魏承班菩薩鬘羅衣隱約金泥畫玳筵一曲當秋夜聲顫覷人嬌雲鬟裊翠翹酒醺紅玉軟眉翠秋山逺繡幌麝煙沈誰人知兩心生查子寂寞畫堂空深夜垂羅幕燈暗錦屏欹月冷珠簾薄愁恨夢難成何處貪歡樂看看春又來還是長蕭索漁歌子柳如眉雲似髮鮫綃霧縠籠香雪夢魂驚鐘漏歇窗外曉鶯殘月幾多情無處説落花飛絮清明節少年郎容易别一去音書斷絶鹿虔扆臨江仙金鎖重門荒苑靜綺窗愁對秋空翠華一去寂無蹤玉樓歌吹聲斷已隨風煙月不知人事改夜闌還照深宫藕花相向野塘中暗傷亡國清露泣香紅閻選浣溪沙寂寞流蘇冷繡茵倚屏山枕惹香塵小庭花露泣濃春劉阮信非仙洞客嫦娥終是月中人此生無路訪東鄰尹鶚菩薩鬘隴雲暗合秋天白俯窗獨坐窺煙陌樓際角重吹黃昏方醉歸荒唐難共語明日還應去上馬出門時金鞭莫與伊毛熙震清平樂春光欲暮寂寞間庭戶粉蝶雙雙穿檻舞簾卷晚天疏雨含愁獨倚閨幃玉爐煙斷香微正是銷魂時節東風滿院花飛菩薩鬘梨花滿地飄香雪髙樓夜靜風箏咽斜月照簾幃憶君和夢稀小窗燈影背無語驚愁態屏掩斷香飛行雲山外歸又繡簾高軸臨塘看雨翻荷芰真珠散殘暑晚初涼輕風度水香無憀悲往事爭那牽情思光影暗相催等間秋又來更漏子秋色清河影淡深戶燭寒光暗綃幌碧錦衾紅博山香炷融更漏咽蛩鳴切滿院霜華如雪新月上薄雲收映簾懸玉鈎又煙月寒秋夜靜漏轉金壺初永羅幕下繡屏空燈花結碎紅人悄悄愁無了思夢不成難曉長憶得與郎期竊香私語時李珣浣溪沙入夏偏宜淡薄粧越羅衣褪鬱金黃翠鈿檀注助容光相見無言還有恨幾回拚却又思量月窗香徑夢悠揚又晚出間庭看海棠風流學得內家粧小叉橫戴一枝芳鏤玉梳斜雲鬢膩縷金衣透雪肌香暗思何事立殘陽望逺行露滴幽庭葉落時愁聚蕭娘柳眉玉郎一去負佳期水雲迢遞鴈書遲屏半掩枕斜欹蠟淚無言對垂吟蛩斷續漏頻移入窗明月鑒空帷菩薩鬘回塘風起波紋細刺桐花裏門斜閉殘日照平蕪雙雙飛鷓鴣征帆何處客相見還相隔不語欲魂銷望中煙水遙河傳去去何處迢迢巴楚山水相連朝雲暮雨依舊十二峯前猿聲到客船愁腸豈易丁香結因離别故國音書絶想佳人花下對明月春風恨應同又春暮微雨送君南浦愁斂雙蛾落花深處啼鳥似逐離歌粉檀珠淚和臨流更把同心結情哽咽後會何時節不堪回首相望已隔汀洲櫓聲幽巫山一段雲唐詞多緣題所賦臨江仙則言仙事女冠子則述道情河瀆神則詠祠廟大槩不失本題之意爾後漸變去題逺矣如此二詞實唐人本來詞體如此有客經巫峽停橈向水湄楚王曽此夢瑤姬一夢杳無期塵暗珠簾捲香銷翠幄垂西風回首不勝悲暮雨灑空祠又古廟依青嶂行宫枕碧流水聲山色鎖粧樓往事思悠悠雲雨朝還暮煙花春復秋啼猿何必近孤舟行客自多愁韓致堯名偓昭宗朝翰林學士浣溪沙攏鬢新收玉步搖背燈初解繡裙腰枕寒衾冷異香焦深院不關春寂寂落花和雨夜迢迢恨情殘醉却無憀又宿醉離愁慢髻鬟六銖衣薄惹輕寒慵紅悶翠掩青鸞羅襪況兼金菡蓞雪肌仍是玉琅玕骨香腰細更沈檀李中主名景望逺行碧砌花光照眼明朱扉長日鎮長扄餘寒欲去夢難成爐香煙冷自亭亭遼陽月秣陵砧不傳消息但傳情黃金臺下忽然驚征人歸日二毛生李後主名煜字重光虞美人春花秋葉何時了往事知多少小樓昨夜又東風故國不堪回首月明中雕欄玉砌應猶在只是朱顔改問君還有幾多愁恰似一江春水向東流山花子菡蓞香銷翠葉殘西風愁起緑波間還與韶光共憔悴不堪看細雨夢回雞塞逺小樓吹徹玉笙寒多少淚珠何限恨倚闌干又手捲珠簾上玉鈎依前春恨鎖重樓風裏落花誰是主思悠悠青鳥不傳雲外信丁香空結雨中愁回首緑波三峽暮接天流烏夜啼此詞最悽惋所謂亡國之音哀以思無言獨上西樓月如鈎寂寞梧桐深院鎖清秋翦不斷理還亂是離愁别是一般滋味在心頭清平樂别來春半觸目愁腸斷砌下落梅如雪亂拂了一身還滿鴈來音信無憑路遙歸夢難成離恨恰如春草更行更逺還生浪淘沙簾外雨潺潺春意闌珊羅衾不暖五更寒夢裏不知身是客一晌貪歡獨自莫憑欄無限江山别時容易見時難流水落花歸去也天上人間馮延巳南唐翰林學士謁金門風乍起吹皺一池春水間引鴛鴦香徑裏手挼紅杏蘂鬬鴨闌干遍倚碧玉搔頭斜墜終日望君君不至舉頭聞鵲喜更漏子夜初長人近别夢覺一窗殘月鸚鵡卧蟪蛄鳴西風寒未成紅蠟燭彈棊局床上畫屏山緑褰繡幌倚瑤琴前歡淚滴襟花菴詞選卷一
